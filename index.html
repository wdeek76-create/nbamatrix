<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Slate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      padding: 2rem;
    }
    .container { width: 100%; max-width: 520px; }
    .header { text-align: center; margin-bottom: 2rem; }
    .sub {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: #ff6b35;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: bold;
      color: #f0f0f0;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .toggle {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border: 1px solid #222;
      margin-bottom: 1rem;
    }
    .toggle button {
      padding: 0.65rem;
      background: #111;
      color: #555;
      border: none;
      border-right: 1px solid #222;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
    }
    .toggle button:last-child { border-right: none; }
    .toggle button.active { background: #ff6b35; color: #0a0a0a; }
    #fetch-btn {
      width: 100%;
      padding: 0.85rem;
      background: #ff6b35;
      color: #0a0a0a;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 1rem;
    }
    #fetch-btn:disabled { background: #222; color: #666; cursor: not-allowed; }
    #error { color: #ff4444; font-size: 0.75rem; text-align: center; margin-bottom: 1rem; display: none; }
    #slate-box {
      background: #111;
      border: 1px solid #222;
      color: #f0f0f0;
      padding: 1.25rem;
      font-size: 0.8rem;
      line-height: 1.7;
      white-space: pre;
      overflow-x: auto;
      margin-bottom: 0.75rem;
      max-height: 60vh;
      overflow-y: auto;
      display: none;
    }
    #copy-btn {
      width: 100%;
      padding: 0.75rem;
      background: #111;
      color: #888;
      border: 1px solid #333;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
    }
    #copy-btn.copied { background: #1a3a1a; color: #4caf50; border-color: #4caf50; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="sub">Daily</div>
    <h1>NBA Slate</h1>
  </div>

  <div class="toggle">
    <button class="active" onclick="switchView('daily')">Daily</button>
    <button onclick="switchView('weekly')">Weekly</button>
    <button onclick="switchView('monthly')">Monthly</button>
  </div>

  <button id="fetch-btn" onclick="fetchSlate()">Get Daily Slate</button>
  <div id="error"></div>
  <pre id="slate-box"></pre>
  <button id="copy-btn" onclick="copySlate()">Copy</button>
</div>

<script>
  const API_KEY = "9cdb249f-9635-4cca-a998-37c7b98a9372";
  let currentView = "daily";
  let currentSlate = "";

  function switchView(v) {
    currentView = v;
    document.querySelectorAll(".toggle button").forEach((b, i) => {
      b.classList.toggle("active", ["daily","weekly","monthly"][i] === v);
    });
    const cap = v.charAt(0).toUpperCase() + v.slice(1);
    document.getElementById("fetch-btn").textContent = "Get " + cap + " Slate";
    document.getElementById("slate-box").style.display = "none";
    document.getElementById("copy-btn").style.display = "none";
    document.getElementById("error").style.display = "none";
    currentSlate = "";
  }

  function pad(n) { return String(n).padStart(2, "0"); }
  function fmtDate(d) { return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate()); }

  function getParams() {
    const today = new Date();
    if (currentView === "daily") {
      return "dates[]=" + fmtDate(today) + "&per_page=100";
    }
    if (currentView === "weekly") {
      const start = new Date(today);
      start.setDate(today.getDate() - today.getDay());
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      return "start_date=" + fmtDate(start) + "&end_date=" + fmtDate(end) + "&per_page=100";
    }
    if (currentView === "monthly") {
      const year = today.getFullYear();
      const month = today.getMonth();
      const start = new Date(year, month, 1);
      const end = new Date(year, month + 1, 0);
      return "start_date=" + fmtDate(start) + "&end_date=" + fmtDate(end) + "&per_page=100";
    }
  }

  function getDateLabel() {
    const today = new Date();
    if (currentView === "daily") {
      return today.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
    }
    if (currentView === "weekly") {
      const start = new Date(today);
      start.setDate(today.getDate() - today.getDay());
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      const fmt = d => d.toLocaleDateString("en-US", { month:"short", day:"numeric" });
      return "Week of " + fmt(start) + " \u2013 " + fmt(end);
    }
    if (currentView === "monthly") {
      return today.toLocaleDateString("en-US", { month:"long", year:"numeric" });
    }
  }

  function getTime(datetimeStr) {
    if (!datetimeStr) return "TBD";
    return new Date(datetimeStr).toLocaleTimeString("en-US", {
      hour: "numeric", minute: "2-digit",
      timeZone: "America/New_York", hour12: true
    });
  }

  function toMin(t) {
    if (!t || t === "TBD") return 9999;
    const parts = t.split(" ");
    let [h, m] = parts[0].split(":").map(Number);
    if (parts[1] === "PM" && h !== 12) h += 12;
    if (parts[1] === "AM" && h === 12) h = 0;
    return h * 60 + m;
  }

  function parseDayLabel(dateStr) {
    const [y, mo, d] = dateStr.split("-").map(Number);
    return new Date(y, mo-1, d).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
  }

  function formatSlate(games) {
    const label = getDateLabel();
    if (games.length === 0) return "NBA Slate - " + label + "\n0 Games";

    if (currentView === "daily") {
      const byTime = {};
      for (const g of games) {
        const t = getTime(g.datetime);
        if (!byTime[t]) byTime[t] = [];
        byTime[t].push(g.visitor_team.abbreviation + " @ " + g.home_team.abbreviation);
      }
      const times = Object.keys(byTime).sort((a,b) => toMin(a) - toMin(b));
      let out = "NBA Slate - " + label + "\n" + games.length + " Game" + (games.length !== 1 ? "s" : "") + "\n";
      for (const t of times) {
        const gs = byTime[t];
        out += "\n" + t + " ET  (" + gs.length + " game" + (gs.length !== 1 ? "s" : "") + ")\n";
        out += gs.join("\n") + "\n";
      }
      return out.trim();
    }

    // weekly / monthly
    const byDay = {};
    for (const g of games) {
      if (!byDay[g.date]) byDay[g.date] = [];
      byDay[g.date].push(g);
    }
    const days = Object.keys(byDay).sort();
    let out = "NBA Slate - " + label + "\n" + games.length + " Game" + (games.length !== 1 ? "s" : "") + "\n";
    for (const day of days) {
      const gs = byDay[day].sort((a,b) => toMin(getTime(a.datetime)) - toMin(getTime(b.datetime)));
      out += "\n\u2500\u2500 " + parseDayLabel(day) + "  (" + gs.length + " game" + (gs.length !== 1 ? "s" : "") + ") \u2500\u2500\n";
      const byTime = {};
      for (const g of gs) {
        const t = getTime(g.datetime);
        if (!byTime[t]) byTime[t] = [];
        byTime[t].push(g.visitor_team.abbreviation + " @ " + g.home_team.abbreviation);
      }
      const times = Object.keys(byTime).sort((a,b) => toMin(a) - toMin(b));
      for (const t of times) {
        out += t + " ET\n" + byTime[t].join("\n") + "\n";
      }
    }
    return out.trim();
  }

  async function fetchSlate() {
    const btn = document.getElementById("fetch-btn");
    const errEl = document.getElementById("error");
    const slateBox = document.getElementById("slate-box");
    const copyBtn = document.getElementById("copy-btn");

    btn.disabled = true;
    btn.textContent = "Fetching...";
    errEl.style.display = "none";
    slateBox.style.display = "none";
    copyBtn.style.display = "none";

    try {
      const url = "https://api.balldontlie.io/nba/v1/games?" + getParams();
      const res = await fetch(url, { headers: { Authorization: API_KEY } });
      if (!res.ok) throw new Error("API error " + res.status);
      const data = await res.json();
      currentSlate = formatSlate(data.data || []);
      slateBox.textContent = currentSlate;
      slateBox.style.display = "block";
      copyBtn.style.display = "block";
      const cap = currentView.charAt(0).toUpperCase() + currentView.slice(1);
      btn.textContent = "Refresh " + cap;
    } catch (e) {
      errEl.textContent = "Failed to fetch: " + e.message;
      errEl.style.display = "block";
      const cap = currentView.charAt(0).toUpperCase() + currentView.slice(1);
      btn.textContent = "Get " + cap + " Slate";
    }
    btn.disabled = false;
  }

  function copySlate() {
    navigator.clipboard.writeText(currentSlate);
    const btn = document.getElementById("copy-btn");
    btn.textContent = "✓ Copied";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
  }
</script>
</body>
</html>
