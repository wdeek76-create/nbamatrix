      background: var(--nav); border-bottom: 1px solid var(--border);
      padding: 0 2rem; display: flex; align-items: center; justify-content: space-between;
      height: 62px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 24px rgba(0,0,0,0.6);
    }
    .nav-left { display: flex; align-items: center; }
    .brand-logo { width: 30px; height: 30px; object-fit: contain; margin-right: 0.55rem; }
    .brand-name {
      font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif;
      font-size: 1.65rem; font-weight: 400; letter-spacing: 0.08em;
      color: #fff; margin-right: 2.5rem; text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255,255,255,0.25), 0 0 40px rgba(255,255,255,0.1);
      line-height: 1;
    }
    .brand-name span {
      color: var(--teal);
      text-shadow: 0 0 16px rgba(0,229,204,0.7), 0 0 40px rgba(0,229,204,0.35);
    }
    .nav-divider { width: 1px; height: 20px; background: var(--border); margin-right: 0.25rem; }
    .nav-tabs { display: flex; }
    .nav-tab { padding: 0 1.1rem; height: 62px; display: flex; align-items: center; font-size: 1rem; font-weight: 400; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.08em; }
    .nav-tab.active { color: var(--teal); border-bottom-color: var(--teal); }
    .nav-tab:hover:not(.active) { color: #7a9cc0; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .date-pill { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 0.38rem 0.9rem; font-size: 0.85rem; font-weight: 400; color: var(--muted); letter-spacing: 0.08em; }
    .load-btn { background: var(--teal); color: #000; border: none; border-radius: 8px; padding: 0.52rem 1.4rem; font-size: 0.9rem; font-weight: 400; cursor: pointer; font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif; transition: all 0.2s; letter-spacing: 0.1em; text-transform: uppercase; box-shadow: 0 2px 16px rgba(0,229,204,0.35); }
    .load-btn:hover { background: #1fffd0; box-shadow: 0 4px 24px rgba(0,229,204,0.5); }
    .load-btn:disabled { background: var(--dim); color: var(--muted); cursor: not-allowed; box-shadow: none; }

    /* ── MAIN ── */
    .main { padding: 1.5rem 2rem 5.5rem; max-width: 1100px; margin: 0 auto; }

    .chip-row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.32rem 0.9rem; font-size: 0.85rem; color: var(--muted); letter-spacing: 0.08em; }
    .chip .hi { color: var(--teal); }

    /* TIME SLOT TABS */
    .slot-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .slot-tab {
      font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif; font-size: 0.82rem; letter-spacing: 0.08em;
      padding: 0.3rem 0.85rem; border-radius: 20px; cursor: pointer;
      background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border2); transition: all 0.15s;
    }
    .slot-tab:hover { color: #fff; border-color: var(--border2); }
    .slot-tab.active { background: var(--teal); color: #000; border-color: var(--teal); box-shadow: 0 0 10px rgba(0,229,204,0.35); }

    .time-section { margin-bottom: 0.25rem; }
    .section-head { display: flex; align-items: center; gap: 0.6rem; margin: 1.75rem 0 0.75rem; padding-bottom: 0.55rem; border-bottom: 1px solid var(--border); }
    .section-time { font-size: 1.05rem; color: var(--teal); letter-spacing: 0.1em; }
    .section-badge {
      font-size: 0.85rem; color: #fff;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px; padding: 0.1rem 0.65rem;
      letter-spacing: 0.08em;
      box-shadow: 0 0 8px rgba(255,255,255,0.12);
    }

    /* Weekly/monthly compact day rows */
    .day-head { font-size: 1.05rem; color: #fff; letter-spacing: 0.08em; margin: 2rem 0 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .day-head span { color: var(--muted); font-size: 0.85rem; letter-spacing: 0.06em; }
    .day-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 1rem; margin-bottom: 0.35rem; display: flex; align-items: center; justify-content: space-between; }
    .day-summary-left { font-size: 0.95rem; color: var(--teal); letter-spacing: 0.08em; min-width: 6rem; }
    .day-summary-games { font-size: 0.85rem; color: var(--muted); flex: 1; padding-left: 1rem; line-height: 1.6; }
    .day-summary-count { font-size: 0.8rem; color: #fff; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; padding: 0.1rem 0.5rem; white-space: nowrap; margin-left: 0.75rem; }

    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0.6rem; }

    /* GAME CARD */
    .game-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 0 0 1px rgba(0,229,204,0.04), 0 0 16px rgba(0,229,204,0.06), 0 4px 16px rgba(0,0,0,0.3);
    }
    .game-card:hover {
      border-color: var(--teal-dim);
      box-shadow: 0 0 0 1px rgba(0,229,204,0.15), 0 0 28px rgba(0,229,204,0.12), 0 8px 28px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }
    .game-final { opacity: 0.7; }
    .game-final:hover { opacity: 1; }
    .final-tag { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.12em; }
    .card-score-row { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .card-score { font-size: 1.2rem; color: #fff; letter-spacing: 0.04em; min-width: 1.5rem; text-align: center; }
    .card-score.score-win { color: var(--teal); text-shadow: 0 0 10px rgba(0,229,204,0.5); }
    .card-score-sep { font-size: 0.9rem; color: var(--muted); }
    .card-score-line { display: flex; align-items: center; gap: 0.6rem; padding: 0.45rem 1.1rem; border-top: 1px solid var(--border); font-size: 0.88rem; letter-spacing: 0.05em; }
    .card-score-line .score-win { color: var(--teal); text-shadow: 0 0 8px rgba(0,229,204,0.4); }
    .card-score-total { margin-left: auto; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; }
    .team-winner { color: var(--teal) !important; text-shadow: 0 0 12px rgba(0,229,204,0.5) !important; }
    .win-badge { font-size: 1.3rem; color: #00e5cc; font-family: Impact, 'Arial Black', sans-serif; font-weight: 900; letter-spacing: 0; text-shadow: 0 0 8px rgba(0,229,204,0.9), 0 0 20px rgba(0,229,204,0.6), 0 0 40px rgba(0,229,204,0.3); line-height: 1; }
    .game-card:hover .card-hint { color: var(--teal); }
    .card-footer { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 1.1rem; border-top: 1px solid var(--border); }
    .game-countdown {
      font-size: 0.9rem; letter-spacing: 0.08em; transition: color 0.3s;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4), 0 0 40px rgba(255,255,255,0.2);
    }

    /* ODDS */
    .odds-row { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid var(--border); }
    .odds-cell { padding: 0.45rem 0.5rem; display: flex; flex-direction: column; align-items: center; border-right: 1px solid var(--border); }
    .odds-cell:last-child { border-right: none; }
    .odds-label { font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.2rem; }
    .odds-pair { display: flex; align-items: center; gap: 0.3rem; }
    .odds-val { font-size: 0.85rem; letter-spacing: 0.04em; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5), 0 0 16px rgba(255,255,255,0.2); }
    .odds-pos { color: #fff; }
    .odds-neg { color: #fff; }
    .odds-sep { font-size: 0.6rem; color: var(--dim); }

    /* SEARCH BAR */
    .inj-search-wrap { position: relative; margin-bottom: 0.85rem; }
    .inj-search {
      width: 100%; padding: 0.65rem 1rem 0.65rem 2.5rem;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text);
      font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.06em;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .inj-search::placeholder { color: var(--muted); }
    .inj-search:focus { border-color: var(--teal); box-shadow: 0 0 0 1px rgba(0,229,204,0.2); }
    .inj-search-icon { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }

    .team-row { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.1rem; }
    .team-row + .team-row { border-top: 1px solid var(--border); }
    .tl { display: flex; align-items: center; gap: 0.75rem; }
    .team-logo { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
    .team-abbr { font-size: 1.3rem; color: #fff; min-width: 3rem; letter-spacing: 0.06em; text-shadow: 0 0 12px rgba(255,255,255,0.6), 0 0 28px rgba(255,255,255,0.2); }
    .team-city { font-size: 0.95rem; color: #fff; letter-spacing: 0.08em; text-shadow: 0 0 8px rgba(255,255,255,0.3); }
    .away-tag, .home-tag { font-size: 0.75rem; letter-spacing: 0.1em; padding: 0.18rem 0.55rem; border-radius: 4px; flex-shrink: 0; }
    .away-tag { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); }
    .home-tag { background: rgba(0,229,204,0.08); color: var(--teal); border: 1px solid rgba(0,229,204,0.25); }

    .empty { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 4rem 1rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .error-msg { color: #f87171; font-size: 0.78rem; text-align: center; padding: 1rem; display: none; }

    .copy-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav); border-top: 1px solid var(--border); padding: 0.75rem 2rem; display: none; align-items: center; justify-content: space-between; gap: 1rem; box-shadow: 0 -4px 20px rgba(0,0,0,0.4); }
    .copy-info { font-size: 0.85rem; color: var(--muted); letter-spacing: 0.06em; }
    .copy-info span { color: var(--teal); }
    .copy-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border2); border-radius: 8px; padding: 0.45rem 1.35rem; font-size: 0.9rem; font-weight: 400; cursor: pointer; font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.08em; }
    .copy-btn.copied { background: rgba(0,229,204,0.1); color: var(--teal); border-color: rgba(0,229,204,0.4); }

    /* ── ROSTER MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 200; display: none; align-items: center; justify-content: center;
      padding: 1rem; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 14px; width: 100%; max-width: 1000px;
      max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--nav); flex-shrink: 0;
    }
    .modal-title { display: flex; align-items: center; gap: 0.75rem; }
    .modal-logos { display: flex; align-items: center; gap: 0.3rem; }
    .modal-logo { width: 28px; height: 28px; object-fit: contain; }
    .modal-matchup { font-size: 1.4rem; color: #fff; letter-spacing: 0.06em; }
    .modal-time { font-size: 0.9rem; color: var(--muted); letter-spacing: 0.08em; margin-top: 0.1rem; }
    .modal-close { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif; }
    .modal-close:hover { color: #fff; border-color: var(--muted); }

    .modal-body { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; flex: 1; }
    .roster-col { overflow-y: auto; overflow-x: hidden; min-width: 0; }
    .roster-col:first-child { padding-left: 0; }
    .roster-col + .roster-col { border-left: 1px solid var(--border); }
    .roster-col-header {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--surface2); z-index: 1;
    }
    .roster-logo { width: 24px; height: 24px; object-fit: contain; }
    .roster-team-name { font-size: 1rem; color: #fff; letter-spacing: 0.06em; }
    .roster-tag { font-size: 0.7rem; padding: 0.1rem 0.45rem; border-radius: 3px; letter-spacing: 0.08em; }
    .roster-tag.away { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
    .roster-tag.home { background: rgba(0,229,204,0.1); color: var(--teal); border: 1px solid rgba(0,229,204,0.3); }

    .player-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1.25rem; border-bottom: 1px solid #0d1520;
      transition: background 0.1s;
    }
    .player-row:hover { background: var(--surface2); }
    .player-left { display: flex; align-items: center; gap: 0.75rem; }
    .player-num { font-size: 0.95rem; color: var(--muted); min-width: 1.75rem; text-align: center; }
    .player-name { font-size: 1.1rem; color: var(--text); margin-right: 0.5rem; letter-spacing: 0.04em; }
    .player-pos {
      font-size: 0.75rem;
      color: #00e5cc;
      background: rgba(0,229,204,0.1);
      border: 1px solid rgba(0,229,204,0.35);
      border-radius: 4px; padding: 0.12rem 0.45rem;
      letter-spacing: 0.08em;
    }
    .player-name-pos { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    /* LIVE STATS */
    .live-badge { display: inline-flex; align-items: center; gap: 0.25rem; background: rgba(0,60,80,0.5); border: 1px solid #006080; border-radius: 20px; padding: 0.1rem 0.45rem; font-size: 0.55rem; color: #00bfaa; letter-spacing: 0.1em; margin-left: 0.5rem; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: #00bfaa; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .modal-search-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1.1rem; border-bottom: 1px solid var(--border); background: var(--nav); position: relative; }
    .modal-search-icon { color: var(--muted); font-size: 1rem; }
    .modal-search-input { background: none; border: none; outline: none; color: #fff; font-family: 'AmericanCaptain','Bebas Neue',sans-serif; font-size: 0.9rem; letter-spacing: 0.06em; width: 100%; }
    .modal-search-input::placeholder { color: var(--muted); }
    .stat-row.player-highlight { background: rgba(0,229,204,0.08); border-left: 3px solid var(--teal); }
    .player-row.player-highlight { background: rgba(0,229,204,0.08); border-left: 3px solid var(--teal); }
    .score-side { font-size: 1.4rem; color: #fff; letter-spacing: 0.05em; text-shadow: 0 0 12px rgba(255,255,255,0.4); min-width: 1.5rem; text-align: center; }
    .score-divider { font-size: 1rem; color: var(--muted); }

    .stat-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 0.75rem 0.85rem 1rem; border-bottom: 1px solid #0d1520;
      transition: background 0.1s; min-width: 0; overflow: hidden;
    }
    .stat-row:hover { background: var(--surface2); }
    .stat-left { display: flex; align-items: center; gap: 0.5rem; flex: 1; overflow: hidden; }
    .stat-num { font-size: 0.78rem; color: var(--muted); min-width: 1.5rem; text-align: center; }
    .stat-name { font-size: 0.95rem; color: #fff; letter-spacing: 0.04em; text-shadow: 0 0 8px rgba(255,255,255,0.2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .stat-name.expanded { max-width: 220px; color: var(--teal); text-shadow: 0 0 8px rgba(0,229,204,0.4); }
    .stat-pos-badge { font-size: 0.62rem; color: var(--teal); background: rgba(0,229,204,0.1); border: 1px solid rgba(0,229,204,0.25); border-radius: 3px; padding: 0.1rem 0.4rem; flex-shrink: 0; }
    .stat-nums { display: flex; align-items: center; gap: 1.25rem; flex-shrink: 0; }
    .stat-item { display: flex; flex-direction: column; align-items: center; min-width: 1.5rem; text-align: center; }
    .stat-val { font-size: 1rem; color: #fff; letter-spacing: 0.03em; }
    .stat-val.big { color: var(--teal); text-shadow: 0 0 10px rgba(0,229,204,0.6); }
    .stat-lbl { font-size: 0.52rem; color: var(--muted); letter-spacing: 0.06em; margin-top: 0.05rem; }
    .stat-min { font-size: 0.75rem; color: var(--muted); min-width: 3rem; text-align: right; letter-spacing: 0.03em; }
    .stat-col-header { display: flex; align-items: center; justify-content: space-between; padding: 0.35rem 0.85rem; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
    .stat-col-name { flex: 1; }
    .stat-col-nums { display: flex; align-items: center; gap: 0.5rem; }
    .stat-col-lbl { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.08em; text-align: center; }
    .stat-row.hnp { opacity: 0.35; }

    /* ── INJURY STYLES ── */
    .inj-tag {
      font-size: 0.68rem; letter-spacing: 0.06em;
      padding: 0.1rem 0.4rem; border-radius: 3px;
      background: rgba(248,113,113,0.12);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.3);
      white-space: nowrap; flex-shrink: 0;
    }
    .player-row.injured { opacity: 0.6; }
    .player-row.injured .player-name { text-decoration: line-through; text-decoration-color: rgba(248,113,113,0.5); }

    /* Injury tab */
    .inj-container { padding: 0; }
    .inj-team-block { margin-bottom: 1.25rem; }
    .inj-team-header {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.65rem 0; margin-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }
    .inj-team-logo { width: 24px; height: 24px; object-fit: contain; }
    .inj-team-name { font-size: 1rem; color: #fff; letter-spacing: 0.06em; }
    .inj-count { font-size: 0.75rem; color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.25); border-radius: 8px; padding: 0.08rem 0.5rem; margin-left: auto; }
    .inj-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1.1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 0.45rem; transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 12px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.02);
    }
    .inj-row:hover { border-color: var(--border2); box-shadow: 0 0 20px rgba(0,0,0,0.35), 0 0 8px rgba(0,229,204,0.06); }
    .inj-row-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
    .inj-logo { width: 32px; height: 32px; object-fit: contain; flex-shrink: 0; }
    .inj-player-name { font-size: 1.1rem; color: var(--text); letter-spacing: 0.04em; }
    .inj-pos { font-size: 0.72rem; color: #00e5cc; background: rgba(0,229,204,0.1); border: 1px solid rgba(0,229,204,0.3); border-radius: 3px; padding: 0.08rem 0.4rem; }
    .inj-status { font-size: 1rem; letter-spacing: 0.1em; text-align: right; white-space: nowrap; color: #fff; }
    .inj-status.s-gtd { color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.5); }
    .inj-status.s-doubtful { color: #f87171; text-shadow: 0 0 10px rgba(248,113,113,0.5); }
    .inj-status.s-questionable { color: #fb923c; text-shadow: 0 0 10px rgba(251,146,60,0.5); }
    .inj-status.s-probable { color: #a3e635; text-shadow: 0 0 10px rgba(163,230,53,0.5); }
    .inj-status.s-out { color: #f87171; text-shadow: 0 0 10px rgba(248,113,113,0.5); }
    .inj-team-pill { font-size: 0.72rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; padding: 0.08rem 0.5rem; letter-spacing: 0.06em; }
    .inj-return { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.04em; margin-top: 0.15rem; text-align: right; }
    .inj-filter-bar { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .inj-filter-btn {
      font-family: 'AmericanCaptain', 'Bebas Neue', sans-serif;
      font-size: 0.85rem; letter-spacing: 0.08em;

    if (currentView==="weekly") {
      const s=new Date(t); s.setDate(t.getDate()-t.getDay());
      const e=new Date(s); e.setDate(s.getDate()+6);
      return s.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" – "+e.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    }
    return t.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  }

  function getTime(dt) {
    if (!dt) return "TBD";
    return new Date(dt).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/New_York",hour12:true});
  }
  function toMin(t) {
    if (!t||t==="TBD") return 9999;
    const p=t.split(" "); let [h,m]=p[0].split(":").map(Number);
    if(p[1]==="PM"&&h!==12)h+=12; if(p[1]==="AM"&&h===12)h=0; return h*60+m;
  }
  function parseDayLabel(ds) {
    const [y,mo,d]=ds.split("-").map(Number);
    return new Date(y,mo-1,d).toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  }

  function buildSlateText(games) {
    const label = getDateLabel();
    if (!games.length) return "NBA Slate - "+label+"\n0 Games";
    if (currentView==="daily") {
      const bt={};
      for(const g of games){const t=getTime(g.datetime);if(!bt[t])bt[t]=[];bt[t].push(g.visitor_team.abbreviation+" @ "+g.home_team.abbreviation);}
      const times=Object.keys(bt).sort((a,b)=>toMin(a)-toMin(b));
      let out="NBA Slate - "+label+"\n"+games.length+" Games\n";
      for(const t of times){out+="\n"+t+" ET  ("+bt[t].length+" game"+(bt[t].length!==1?"s":"")+")\n"+bt[t].join("\n")+"\n";}
      return out.trim();
    }
    const bd={};
    for(const g of games){if(!bd[g.date])bd[g.date]=[];bd[g.date].push(g);}
    let out="NBA Slate - "+label+"\n"+games.length+" Games\n";
    for(const day of Object.keys(bd).sort()){
      const gs=bd[day].sort((a,b)=>toMin(getTime(a.datetime))-toMin(getTime(b.datetime)));
      out+="\n── "+parseDayLabel(day)+" ("+gs.length+" games) ──\n";
      const bt={};
      for(const g of gs){const t=getTime(g.datetime);if(!bt[t])bt[t]=[];bt[t].push(g.visitor_team.abbreviation+" @ "+g.home_team.abbreviation);}
      for(const t of Object.keys(bt).sort((a,b)=>toMin(a)-toMin(b))){out+=t+" ET\n"+bt[t].join("\n")+"\n";}
    }
    return out.trim();
  }

  function fmtOdds(val) {
    if (val == null) return "—";
    const n = parseInt(val);
    if (isNaN(n)) return "—";
    const cls = n > 0 ? "odds-pos" : "odds-neg";
    const str = n > 0 ? `+${n}` : `${n}`;
    return `<span class="odds-val ${cls}">${str}</span>`;
  }

  function gameCard(g) {
    const away=g.visitor_team.abbreviation, home=g.home_team.abbreviation;
    const awayCity=(TEAM_INFO[away]||{name:away}).name;
    const homeCity=(TEAM_INFO[home]||{name:home}).name;
    const time=getTime(g.datetime);
    const isFinal = g.status === "Final";
    if (isFinal) console.log("Final game:", g.visitor_team.abbreviation, g.visitor_team_score, "vs", g.home_team.abbreviation, g.home_team_score, "| status:", g.status);
    const isLive = !isFinal && g.status && g.status !== "scheduled" && g.period > 0;
    const gameData = encodeURIComponent(JSON.stringify({
      away, home, time,
      awayId: g.visitor_team.id,
      homeId: g.home_team.id,
      gameId: g.id,
      status: g.status || "",
      isLive
    }));
    const isoTime = g.datetime || "";

    const awayScore = isFinal ? (finalScores[g.id]?.away ?? 0) : (g.visitor_team_score || 0);
    const homeScore = isFinal ? (finalScores[g.id]?.home ?? 0) : (g.home_team_score || 0);
    const hasScores = (awayScore > 0 || homeScore > 0);
    const awayWon = isFinal && hasScores && awayScore > homeScore;
    const homeWon = isFinal && hasScores && homeScore > awayScore;

    // Odds
    const o = oddsMap[g.id];
    let oddsHtml = "";
    if (o && !isFinal) {
      const mlAway = fmtOdds(o.moneyline_away_odds);
      const mlHome = fmtOdds(o.moneyline_home_odds);
      const spAway = o.spread_away_value != null ? `<span class="odds-val">${parseFloat(o.spread_away_value)>0?"+":""}${o.spread_away_value}</span>` : "<span class='odds-val'>—</span>";
      const spHome = o.spread_home_value != null ? `<span class="odds-val">${parseFloat(o.spread_home_value)>0?"+":""}${o.spread_home_value}</span>` : "<span class='odds-val'>—</span>";
      const total = o.total_value != null ? `<span class="odds-val">O/U ${o.total_value}</span>` : "<span class='odds-val'>—</span>";
      oddsHtml = `<div class="odds-row">
        <div class="odds-cell"><div class="odds-label">Moneyline</div><div class="odds-pair">${mlAway}<span class="odds-sep">/</span>${mlHome}</div></div>
        <div class="odds-cell"><div class="odds-label">Spread</div><div class="odds-pair">${spAway}<span class="odds-sep">/</span>${spHome}</div></div>
        <div class="odds-cell"><div class="odds-label">Total</div><div class="odds-pair">${total}</div></div>
      </div>`;
    }

    const showScores = (isFinal && hasScores) || isLive;
    const total = showScores ? awayScore + homeScore : 0;
    const scoreLine = showScores ? `<div class="card-score-line">
      <span class="${awayWon?"score-win":""}">${away}: ${awayScore}</span>
      <span class="card-score-sep">·</span>
      <span class="${homeWon?"score-win":""}">${home}: ${homeScore}</span>
      <span class="card-score-total">${total} PTS</span>
    </div>` : "";

    return `<div class="game-card${isFinal?" game-final":""}" onclick="openRoster('${gameData}')">
      <div class="team-row">
        <div class="tl">
          <img class="team-logo" src="${logoUrl(away)}" onerror="this.style.display='none'" alt="${away}">
          <span class="team-abbr${awayWon?" team-winner":""}">${away}</span>
          <span class="team-city">${awayCity}</span>
          ${awayWon ? `<span class="win-badge">W</span>` : ""}
        </div>
        ${!showScores ? '<span class="away-tag">Away</span>' : ""}
      </div>
      <div class="team-row">
        <div class="tl">
          <img class="team-logo" src="${logoUrl(home)}" onerror="this.style.display='none'" alt="${home}">
          <span class="team-abbr${homeWon?" team-winner":""}">${home}</span>
          <span class="team-city">${homeCity}</span>
          ${homeWon ? `<span class="win-badge">W</span>` : ""}
        </div>
        ${!showScores ? '<span class="home-tag">Home</span>' : ""}
      </div>
      ${scoreLine}
      ${oddsHtml}
      <div class="card-footer">
        ${isFinal ? `<span class="final-tag">Final</span>` : `<span class="card-hint">Click to view rosters</span>`}
        ${isFinal ? "" : isoTime ? `<span class="game-countdown" data-tip="${isoTime}">—</span>` : ""}
      </div>
    </div>`;
  }

  function renderTimeGroup(time, games) {
    return `<div class="time-section" data-slot="${time}">
      <div class="section-head">
        <div class="section-time">${time} ET</div>
        <div class="section-badge">${games.length} game${games.length!==1?"s":""}</div>
      </div>
      <div class="games-grid">${games.map(gameCard).join("")}</div>
    </div>`;
  }

  function renderGames(games) {
    const c = document.getElementById("games-container");
    const slotTabsEl = document.getElementById("slot-tabs");
    c.innerHTML = "";
    if (!games.length) {
      c.innerHTML=`<div class="empty">No games scheduled</div>`;
      slotTabsEl.style.display = "none";
      return;
    }

    if (currentView==="daily") {
      const active = games.filter(g => g.status !== "Final");
      const finals = games.filter(g => g.status === "Final");
      const bt={};
      for(const g of active){const t=getTime(g.datetime);if(!bt[t])bt[t]=[];bt[t].push(g);}
      const times = Object.keys(bt).sort((a,b)=>toMin(a)-toMin(b));

      // Build slot tabs (only non-final games)
      slotTabsEl.innerHTML = `<button class="slot-tab active" onclick="filterSlot('all',this)">All</button>`
        + times.map(t => `<button class="slot-tab" onclick="filterSlot('${t}',this)">${t} ET</button>`).join("")
        + (finals.length ? `<button class="slot-tab" onclick="filterSlot('final',this)">Final (${finals.length})</button>` : "");
      slotTabsEl.style.display = "flex";

      for(const t of times) c.innerHTML+=renderTimeGroup(t,bt[t]);

      if (finals.length) {
        c.innerHTML += `<div class="time-section" data-slot="final">
          <div class="section-head">
            <div class="section-time" style="color:var(--muted)">Final</div>
            <div class="section-badge">${finals.length} game${finals.length!==1?"s":""}</div>
          </div>
          <div class="games-grid">${finals.map(gameCard).join("")}</div>
        </div>`;
      }
    } else {
      slotTabsEl.style.display = "none";
      const bd={};
      for(const g of games){if(!bd[g.date])bd[g.date]=[];bd[g.date].push(g);}
      for(const day of Object.keys(bd).sort()){
        const gs=bd[day].sort((a,b)=>toMin(getTime(a.datetime))-toMin(getTime(b.datetime)));
        c.innerHTML+=`<div class="day-head">${parseDayLabel(day)}<span>${gs.length} game${gs.length!==1?"s":""}</span></div>`;
        const bt={};
        for(const g of gs){const t=getTime(g.datetime);if(!bt[t])bt[t]=[];bt[t].push(g);}
        for(const t of Object.keys(bt).sort((a,b)=>toMin(a)-toMin(b))){
          const slotGames = bt[t];
          const matchups = slotGames.map(g=>`${g.visitor_team.abbreviation} @ ${g.home_team.abbreviation}`).join("  ·  ");
          c.innerHTML+=`<div class="day-summary">
            <div class="day-summary-left">${t} ET</div>
            <div class="day-summary-games">${matchups}</div>
            <div class="day-summary-count">${slotGames.length} game${slotGames.length!==1?"s":""}</div>
          </div>`;
        }
      }
    }
  }

  function filterSlot(slot, btn) {
    document.querySelectorAll(".slot-tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".time-section").forEach(sec => {
      sec.style.display = (slot === "all" || sec.dataset.slot === slot) ? "" : "none";
    });
  }
  // ── ODDS ──
  let oddsMap = {}; // gameId -> best odds object

  async function fetchOdds(dates) {
    try {
      const params = dates.map(d => `dates[]=${d}`).join("&");
      const res = await fetch(
        `https://api.balldontlie.io/nba/v2/odds?${params}&per_page=100`,
        { headers: { Authorization: API_KEY } }
      );
      if (res.status === 401 || res.status === 403 || res.status === 402) {
        console.log("Odds not available on current BDL tier:", res.status);
        return;
      }
      if (!res.ok) return;
      const data = await res.json();
      const byGame = {};
      for (const o of (data.data || [])) {
        if (!byGame[o.game_id]) byGame[o.game_id] = [];
        byGame[o.game_id].push(o);
      }
      oddsMap = {};
      for (const [gid, odds] of Object.entries(byGame)) {
        const dk = odds.find(o => o.vendor === "draftkings")
          || odds.find(o => o.vendor === "fanduel")
          || odds[0];
        oddsMap[parseInt(gid)] = dk;
      }
      console.log("Odds loaded:", Object.keys(oddsMap).length, "games");
    } catch(e) { console.log("odds err", e); }
  }

  // ── INJURIES ──
  let injuryMap = {}; // playerId -> injury object
  let injuriesLoaded = false;
  let BDL_PLAYER_TEAM = {}; // playerId -> team abbreviation, built from BDL rosters
  const finalScores = {}; // gameId -> {away, home}

  async function buildPlayerTeamMap() {
    try {
      let cursor = null;
      do {
        const url = `https://api.balldontlie.io/nba/v1/players/active?per_page=100` + (cursor ? `&cursor=${cursor}` : "");
        const res = await fetch(url, { headers: { Authorization: API_KEY } });
        if (!res.ok) break;
        const data = await res.json();
        for (const p of (data.data || [])) {
          const abbr = p.team?.abbreviation || ID_TO_ABBR[p.team?.id];
          if (abbr && p.id) BDL_PLAYER_TEAM[p.id] = abbr;
        }
        cursor = data.meta?.next_cursor || null;
      } while (cursor);
    } catch(e) { console.log("player map err", e); }
  }

  async function fetchInjuries() {
    try {
      const res = await fetch(
        `https://api.balldontlie.io/nba/v1/player_injuries?per_page=100`,
        { headers: { Authorization: API_KEY } }
      );
      if (!res.ok) return {};
      const data = await res.json();
      const map = {};
      for (const inj of (data.data||[])) {
        if (inj.player?.id) map[inj.player.id] = inj;
      }
      return map;
    } catch { return {}; }
  }

  async function loadInjuryTab() {
    const c = document.getElementById("games-container");
    c.innerHTML = `<div class="inj-loading">Loading injuries...</div>`;
    document.getElementById("copy-bar").style.display = "none";
    document.getElementById("chip-row").style.display = "none";

    // Make sure player->team map is populated before we render
    if (Object.keys(BDL_PLAYER_TEAM).length === 0) {
      try { await buildPlayerTeamMap(); } catch(e) {}
    }

    try {
      const res = await fetch(
        `https://api.balldontlie.io/nba/v1/player_injuries?per_page=100`,
        { headers: { Authorization: API_KEY } }
      );
      if (!res.ok) throw new Error("API error " + res.status);
      const data = await res.json();
      const STATUS_ORDER = ["gtd","game time decision","questionable","doubtful","probable","day-to-day","d2d","out"];
      const injuries = (data.data || []).filter(inj => {
        const s = (inj.status || "").toLowerCase();
        return STATUS_ORDER.some(r => s.includes(r));
      }).sort((a, b) => {
        const sa = (a.status || "").toLowerCase();
        const sb = (b.status || "").toLowerCase();
        const ra = STATUS_ORDER.findIndex(r => sa.includes(r));
        const rb = STATUS_ORDER.findIndex(r => sb.includes(r));
        if (ra !== rb) return ra - rb;
        // Within same status, sort by soonest return date
        const da = a.return_date ? new Date(a.return_date) : new Date("9999-01-01");
        const db = b.return_date ? new Date(b.return_date) : new Date("9999-01-01");
        return da - db;
      });

      // Batch fetch current team for each injured player directly from BDL
      const playerIds = [...new Set(injuries.map(i => i.player?.id).filter(Boolean))];
      const teamLookup = {};
      for (let i = 0; i < playerIds.length; i += 25) {
        const chunk = playerIds.slice(i, i + 25);
        try {
          const params = chunk.map(id => `player_ids[]=${id}`).join("&");
          const r = await fetch(
            `https://api.balldontlie.io/nba/v1/players/active?${params}&per_page=25`,
            { headers: { Authorization: API_KEY } }
          );
          if (r.ok) {
            const d = await r.json();
            for (const p of (d.data || [])) {
              if (p.team?.abbreviation) teamLookup[p.id] = p.team.abbreviation;
            }
          }
        } catch {}
      }

      if (!injuries.length) {
        c.innerHTML = `<div class="empty">No active injuries reported</div>`;
        return;
      }

      const classMap = {GTD:"s-gtd",Questionable:"s-questionable",Doubtful:"s-doubtful",Probable:"s-probable",Out:"s-out"};
      const statusOrder = ["GTD","Questionable","Doubtful","Probable","Out"];

      // Build filter options from what's actually present
      const present = [...new Set(injuries.map(inj => {
        const sl = (inj.status||"").toLowerCase();
        return sl.includes("gtd")||sl.includes("game time") ? "GTD"
          : sl.includes("doubtful") ? "Doubtful"
          : sl.includes("questionable") ? "Questionable"
          : sl.includes("probable") ? "Probable"
          : "Out";
      }))];
      const filterStatuses = statusOrder.filter(s => present.includes(s));

      let html = `<div class="inj-container">
        <div class="inj-search-wrap">
          <span class="inj-search-icon">⌕</span>
          <input class="inj-search" id="inj-search" type="text" placeholder="Search player or team..." oninput="searchInjuries(this.value)">
        </div>
        <div class="inj-filter-bar">
          <button class="inj-filter-btn active" onclick="filterInjuries('all',this)">All</button>
          ${filterStatuses.map(s=>`<button class="inj-filter-btn ${classMap[s]}" onclick="filterInjuries('${s}',this)">${s}</button>`).join("")}
        </div>
        <div id="inj-list">`;

      for (const inj of injuries) {
        const p = inj.player || {};
        const teamAbbr = teamLookup[p.id] || BDL_PLAYER_TEAM[p.id] || p.team?.abbreviation || "";
        const pos = p.position || "—";
        const status = inj.status || "Out";
        const sl = status.toLowerCase();
        const statusLabel = sl.includes("gtd")||sl.includes("game time") ? "GTD"
          : sl.includes("questionable") ? "Questionable"
          : sl.includes("doubtful") ? "Doubtful"
          : sl.includes("probable") ? "Probable"
          : "Out";
        const statusClass = classMap[statusLabel];
        const todayStr = fmtDate(new Date());
        const retLabel = inj.return_date
          ? (inj.return_date === todayStr ? "Est. Return: TODAY" : `Est. Return: ${inj.return_date}`)
          : (inj.description || "");
        const ret = retLabel;
        html += `<div class="inj-row" data-status="${statusLabel}">
          <div class="inj-row-left">
            <div style="display:flex;align-items:center;gap:0.55rem;flex-wrap:wrap">
              <span class="inj-player-name">${p.first_name||""} ${p.last_name||""}</span>
              <span class="inj-pos">${pos}</span>
              ${teamAbbr ? `<span class="inj-team-pill">${teamAbbr}</span>` : ""}
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div class="inj-status ${statusClass}">${status}</div>
            ${ret ? `<div class="inj-return" ${ret.includes("TODAY") ? 'style="color:var(--teal);text-shadow:0 0 8px rgba(0,229,204,0.5)"' : ""}>${ret}</div>` : ""}
          </div>
        </div>`;
      }
      html += `</div></div>`;
      c.innerHTML = html;
    } catch(e) {
      c.innerHTML = `<div class="empty">Failed to load injuries</div>`;
    }
  }

  // ── ROSTER MODAL ──
  let liveStatsInterval = null;

  async function openRoster(encoded) {
    const g = JSON.parse(decodeURIComponent(encoded));
    const overlay = document.getElementById("modal-overlay");

    document.getElementById("modal-matchup").textContent = `${g.away} vs ${g.home}`;
    document.getElementById("modal-time").textContent = `${g.time} ET`;
    document.getElementById("modal-logos").innerHTML = `
      <img class="modal-logo" src="${logoUrl(g.away)}" onerror="this.style.display='none'" alt="${g.away}">
      <span style="color:var(--muted);font-size:0.9rem;margin:0 0.25rem">@</span>
      <img class="modal-logo" src="${logoUrl(g.home)}" onerror="this.style.display='none'" alt="${g.home}">
    `;
    document.getElementById("modal-live-badge").style.display = "none";
    document.getElementById("modal-score").style.display = "none";
    document.getElementById("modal-refresh-info").textContent = "";
    document.getElementById("modal-player-search").value = "";
    if (liveStatsInterval) { clearInterval(liveStatsInterval); liveStatsInterval = null; }

    document.getElementById("roster-away").innerHTML = rosterColHeader(g.away, "away") + `<div class="roster-loading">Loading...</div>`;
    document.getElementById("roster-home").innerHTML = rosterColHeader(g.home, "home") + `<div class="roster-loading">Loading...</div>`;
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";

    // Detect if game is live or final
    const isLive = g.isLive || false;
    const isFinal = (g.status || "").toLowerCase() === "final";

    if ((isLive || isFinal) && g.gameId) {
      if (isLive) document.getElementById("modal-live-badge").style.display = "inline-flex";
      await loadLiveStats(g.gameId, g.away, g.home, isFinal);
      if (isLive) liveStatsInterval = setInterval(() => loadLiveStats(g.gameId, g.away, g.home, false), 60000);
    } else {
      const [awayPlayers, homePlayers, injuries] = await Promise.all([
        fetchRoster(g.awayId),
        fetchRoster(g.homeId),
        fetchInjuries()
      ]);
      injuryMap = injuries;
      document.getElementById("roster-away").innerHTML = rosterColHeader(g.away, "away") + renderRoster(awayPlayers);
      document.getElementById("roster-home").innerHTML = rosterColHeader(g.home, "home") + renderRoster(homePlayers);
    }
  }

  async function loadLiveStats(gameId, awayAbbr, homeAbbr, isFinal=false) {
    try {
      const res = await fetch(
        `https://api.balldontlie.io/nba/v1/stats?game_ids[]=${gameId}&per_page=100`,
        { headers: { Authorization: API_KEY } }
      );
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      const stats = data.data || [];
      const sortStats = (arr) => arr.sort((a, b) => {
        const aMin = parseFloat((a.min||"0").replace(":","."))||0;
        const bMin = parseFloat((b.min||"0").replace(":","."))||0;
        if (aMin > 0 && bMin === 0) return -1;
        if (aMin === 0 && bMin > 0) return 1;
        return (b.pts||0) - (a.pts||0);
      });
      const awayStats = sortStats(stats.filter(s => s.team?.abbreviation === awayAbbr));
      const homeStats = sortStats(stats.filter(s => s.team?.abbreviation === homeAbbr));
      document.getElementById("roster-away").innerHTML = rosterColHeader(awayAbbr, isFinal?"final":"away") + renderStats(awayStats);
      document.getElementById("roster-home").innerHTML = rosterColHeader(homeAbbr, isFinal?"final":"home") + renderStats(homeStats);

      // Calculate score from player pts
      const awayScore = awayStats.reduce((sum, s) => sum + (s.pts||0), 0);
      const homeScore = homeStats.reduce((sum, s) => sum + (s.pts||0), 0);

      // Store for card W badge updates
      if (isFinal) finalScores[gameId] = {away: awayScore, home: homeScore};

      const scoreEl = document.getElementById("modal-score");
      const leading = awayScore > homeScore ? "away" : awayScore < homeScore ? "home" : null;
      document.getElementById("score-away").textContent = awayScore;
      document.getElementById("score-away").style.color = leading === "away" ? "var(--teal)" : "#fff";
      document.getElementById("score-home").textContent = homeScore;
      document.getElementById("score-home").style.color = leading === "home" ? "var(--teal)" : "#fff";
      scoreEl.style.display = "flex";

      if (!isFinal) {
        const now = new Date();
        document.getElementById("modal-refresh-info").textContent = `Updated ${now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})} · Auto-refresh 60s`;
      } else {
        document.getElementById("modal-refresh-info").textContent = "Final";
      }
    } catch(e) {
      document.getElementById("modal-refresh-info").textContent = "Stats unavailable";
    }
  }

  function renderStats(stats) {
    if (!stats.length) return `<div class="roster-empty">No stats yet</div>`;
    const header = ``;
    return header + stats.map(s => {
      const p = s.player || {};
      const pts = s.pts||0, reb = s.reb||0, ast = s.ast||0;
      const stl = s.stl||0, blk = s.blk||0, fg3m = s.fg3m||0;
      const pra = pts + reb + ast;
      const rawMin = s.min || "";
      // Format minutes: "06:23" -> "6:23", "0" -> "HNP"
      let minDisplay = "HNP";
      if (rawMin && rawMin !== "0" && rawMin !== "00:00") {
        // Strip leading zero from minutes
        const parts = rawMin.toString().split(":");
        if (parts.length === 2) {
          minDisplay = `${parseInt(parts[0])}:${parts[1]}`;
        } else {
          const n = parseInt(rawMin);
          minDisplay = isNaN(n) || n === 0 ? "HNP" : `${n}:00`;
        }
      }
      const hnp = minDisplay === "HNP";
      const firstName = p.first_name || "";
      const lastName = p.last_name || "";
      const displayName = firstName ? `${firstName[0]}. ${lastName}` : lastName;
      return `<div class="stat-row${hnp?" hnp":""}">
        <div class="stat-left">
          <span class="stat-name" title="${firstName} ${lastName}">${displayName}</span>
          <span class="stat-pos-badge">${p.position||"—"}</span>
        </div>
        <div class="stat-nums">
          ${hnp ? `<span class="stat-hnp">HNP</span>` : `
          <div class="stat-item"><div class="stat-val${pts>=20?" big":""}">${pts}</div><div class="stat-lbl">PTS</div></div>
          <div class="stat-item"><div class="stat-val${reb>=10?" big":""}">${reb}</div><div class="stat-lbl">REB</div></div>
          <div class="stat-item"><div class="stat-val${ast>=8?" big":""}">${ast}</div><div class="stat-lbl">AST</div></div>
          <div class="stat-item"><div class="stat-val${fg3m>=3?" big":""}">${fg3m}</div><div class="stat-lbl">3PM</div></div>
          <div class="stat-item"><div class="stat-val${pra>=30?" big":""}">${pra}</div><div class="stat-lbl">PRA</div></div>
          <div class="stat-min">${minDisplay}</div>
          `}
        </div>
      </div>`;
    }).join("");
  }

  function rosterColHeader(abbr, type) {
    const info = TEAM_INFO[abbr] || {city:abbr, name:""};
    return `<div class="roster-col-header">
      <img class="roster-logo" src="${logoUrl(abbr)}" onerror="this.style.display='none'" alt="${abbr}">
      <span class="roster-team-name">${info.city} ${info.name}</span>
      <span class="roster-tag ${type}">${type}</span>
    </div>`;
  }

  async function fetchRoster(teamId) {
    try {
      const res = await fetch(
        `https://api.balldontlie.io/nba/v1/players/active?team_ids[]=${teamId}&per_page=100`,
        { headers: { Authorization: API_KEY } }
      );
      if (!res.ok) return [];
      const data = await res.json();
      return (data.data||[]).sort((a,b)=> (a.last_name||"").localeCompare(b.last_name||""));
    } catch { return []; }
  }

  function renderRoster(players) {
    if (!players.length) return `<div class="roster-empty">No roster data</div>`;

    // Sort: healthy first, injured middle, out for season last
    const sorted = [...players].sort((a, b) => {
      const injA = injuryMap[a.id];
      const injB = injuryMap[b.id];
      const rankInj = inj => {
        if (!inj) return 0;
        const s = (inj.status||"").toLowerCase();
        if (s.includes("season")) return 3;
        if (s.includes("out")) return 2;
        return 1;
      };
      const diff = rankInj(injA) - rankInj(injB);
      if (diff !== 0) return diff;
      return (a.last_name||"").localeCompare(b.last_name||"");
    });

    return sorted.map(p => {
      const inj = injuryMap[p.id];
      const injHtml = inj ? `<span class="inj-tag">${inj.status||"Out"}</span>` : "";
      const injClass = inj ? " injured" : "";
      return `<div class="player-row${injClass}">
        <div class="player-left">
          <span class="player-num">${p.jersey_number||"—"}</span>
          <div class="player-name-pos">
            <span class="player-name">${p.first_name} ${p.last_name}</span>
            <span class="player-pos">${p.position||"—"}</span>
            ${injHtml}
          </div>
        </div>
      </div>`;
    }).join("");
  }

  function searchModalPlayer(query) {
    const q = query.toLowerCase().trim();
    document.querySelectorAll(".stat-row, .player-row").forEach(row => {
      const name = row.querySelector(".stat-name, .player-name");
      if (!name) return;
      row.classList.remove("player-highlight");
      if (q && name.textContent.toLowerCase().includes(q)) {
        row.classList.add("player-highlight");
        row.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    });
  }

  function closeModal(e) {
    if (e.target === document.getElementById("modal-overlay")) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById("modal-overlay").classList.remove("open");
    document.body.style.overflow = "";
    if (liveStatsInterval) { clearInterval(liveStatsInterval); liveStatsInterval = null; }
  }
  document.addEventListener("keydown", e => { if(e.key==="Escape") closeModalDirect(); });

  // ── COUNTDOWN TIMERS ──
  let countdownInterval = null;

  function startCountdowns() {
    if (countdownInterval) clearInterval(countdownInterval);
    tickCountdowns();
    countdownInterval = setInterval(tickCountdowns, 1000);
  }

  function tickCountdowns() {
    const now = new Date();
    document.querySelectorAll(".game-countdown").forEach(el => {
      const iso = el.dataset.tip;
      if (!iso) return;
      // NBA games typically tip off ~10 mins after listed start time
      const tip = new Date(new Date(iso).getTime() + 10 * 60000);
      const diff = tip - now;
      if (diff <= 0) {
        el.textContent = "Live";
        el.style.color = "#00bfaa";
        el.style.textShadow = "0 0 8px rgba(0,191,170,0.4)";
        return;
      }
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const timeStr = h > 0 ? `${h}h ${pad(m)}m` : `${m}m ${pad(s)}s`;
      el.textContent = `Starts In: ${timeStr}`;
      if (diff < 1800000) {
        el.style.color = "#fbbf24";
        el.style.textShadow = "0 0 10px rgba(251,191,36,0.9), 0 0 24px rgba(251,191,36,0.5), 0 0 40px rgba(251,191,36,0.2)";
      } else {
        el.style.color = "#fff";
        el.style.textShadow = "0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4), 0 0 40px rgba(255,255,255,0.2)";
      }
    });
  }

  function switchView(v) {
    currentView = v;
    const views = ["daily","weekly","monthly","injuries"];
    document.querySelectorAll(".nav-tab").forEach((b,i)=>b.classList.toggle("active", views[i]===v));
    document.querySelectorAll(".mobile-tab").forEach((b,i)=>b.classList.toggle("active", views[i]===v));
    document.getElementById("copy-bar").style.display = "none";
    document.getElementById("error").style.display = "none";
    document.getElementById("chip-row").style.display = "none";
    document.getElementById("slot-tabs").style.display = "none";
    document.getElementById("date-badge").textContent = v === "injuries" ? "Live" : getDateLabel();
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }

    if (v === "injuries") {
      document.getElementById("fetch-btn").textContent = "Refresh";
      document.getElementById("fetch-btn").onclick = loadInjuryTab;
      loadInjuryTab();
    } else {
      document.getElementById("fetch-btn").textContent = "Refresh";
      document.getElementById("fetch-btn").onclick = fetchSlate;
      document.getElementById("games-container").innerHTML = `<div class="empty" style="color:#1e2d42">Fetching games...</div>`;
      currentSlate = "";
      fetchSlate();
    }
  }

  async function fetchSlate() {
    const btn=document.getElementById("fetch-btn");
    const errEl=document.getElementById("error");
    const copyBar=document.getElementById("copy-bar");
    btn.disabled=true; btn.textContent="Loading...";
    errEl.style.display="none"; copyBar.style.display="none";
    document.getElementById("games-container").innerHTML=`<div class="empty" style="color:#1e2d42">Fetching games...</div>`;
    try {
      // Paginate to get all games (monthly needs multiple pages)
      let games = [];
      let cursor = null;
      const baseParams = getParams();
      do {
        const url = "https://api.balldontlie.io/nba/v1/games?" + baseParams + (cursor ? "&cursor="+cursor : "");
        const res = await fetch(url, {headers:{Authorization:API_KEY}});
        if(!res.ok) throw new Error("API error "+res.status);
        const data = await res.json();
        games = games.concat(data.data||[]);
        cursor = data.meta?.next_cursor || null;
      } while (cursor);

      currentSlate=buildSlateText(games);

      // Fetch odds for daily view only
      if (currentView === "daily") {
        const today = new Date();
        await fetchOdds([fmtDate(today)]);
      } else {
        oddsMap = {};
      }

      renderGames(games);
      startCountdowns();

      // After render, fetch final game scores one at a time (avoid rate limit)
      if (currentView === "daily") {
        const finalGames = games.filter(g => g.status === "Final");
        for (const g of finalGames) {
          await new Promise(r => setTimeout(r, 400));
          try {
            const r = await fetch(`https://api.balldontlie.io/nba/v1/stats?game_ids[]=${g.id}&per_page=100`, {headers:{Authorization:API_KEY}});
            if (!r.ok) continue;
            const d = await r.json();
            const stats = d.data || [];
            const awayAbbr = g.visitor_team.abbreviation;
            const homeAbbr = g.home_team.abbreviation;
            const awayPts = stats.filter(s=>s.team?.abbreviation===awayAbbr).reduce((sum,s)=>sum+(s.pts||0),0);
            const homePts = stats.filter(s=>s.team?.abbreviation===homeAbbr).reduce((sum,s)=>sum+(s.pts||0),0);
            finalScores[g.id] = {away: awayPts, home: homePts};
          } catch {}
        }
        // Re-render with scores populated
        if (finalGames.length) renderGames(games);
      }
      document.getElementById("chip-games").innerHTML=`<span class="hi">${games.length}</span> Games`;
      document.getElementById("chip-date").textContent=getDateLabel();
      document.getElementById("chip-row").style.display="flex";
      document.getElementById("copy-info").innerHTML=`<span>${games.length} games</span> · ${getDateLabel()}`;
      copyBar.style.display="flex";
      btn.textContent="Refresh";
      document.getElementById("date-badge").textContent=getDateLabel();
    } catch(e) {
      errEl.textContent="Failed: "+e.message; errEl.style.display="block";
      btn.textContent="Load Slate";
      document.getElementById("games-container").innerHTML=`<div class="empty">Could not load games</div>`;
    }
    btn.disabled=false;
  }

  function copySlate() {
    navigator.clipboard.writeText(currentSlate);
    const btn=document.getElementById("copy-btn");
    btn.textContent="✓ Copied!"; btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="Copy as Text";btn.classList.remove("copied");},2000);
  }

  function filterInjuries(status, btn) {
    document.querySelectorAll(".inj-filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const search = (document.getElementById("inj-search")?.value || "").toLowerCase();
    document.querySelectorAll("#inj-list .inj-row").forEach(row => {
      const matchStatus = status === "all" || row.dataset.status === status;
      const matchSearch = !search || row.textContent.toLowerCase().includes(search);
      row.style.display = (matchStatus && matchSearch) ? "" : "none";
    });
  }

  function searchInjuries(val) {
    const search = val.toLowerCase();
    const activeFilter = document.querySelector(".inj-filter-btn.active")?.textContent?.trim() || "all";
    document.querySelectorAll("#inj-list .inj-row").forEach(row => {
      const matchStatus = activeFilter === "All" || row.dataset.status === activeFilter;
      const matchSearch = !search || row.textContent.toLowerCase().includes(search);
      row.style.display = (matchStatus && matchSearch) ? "" : "none";
    });
  }

  document.getElementById("date-badge").textContent=getDateLabel();
  document.getElementById("fetch-btn").onclick = fetchSlate;
  fetchSlate();
</script>
</body>
</html>
