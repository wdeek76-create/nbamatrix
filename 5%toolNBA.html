<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worst Price Finder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #111318;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 16px;
    color: #e0e0e0;
  }
  .container { width: 100%; max-width: 520px; }
  .top-label { font-size: 11px; letter-spacing: 4px; color: #c8f55a; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  h1 { font-size: 30px; font-weight: 900; color: #fff; line-height: 1.1; margin-bottom: 6px; letter-spacing: -0.5px; }
  h1 span { color: #c8f55a; }
  .subtitle { color: #555; font-size: 12px; letter-spacing: 1px; margin-bottom: 24px; font-weight: 500; }

  .card {
    background: #1a1d24;
    border: 1px solid #252830;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
  }

  .grid-head, .grid-row {
    display: grid;
    grid-template-columns: 0.6fr 0.6fr 0.85fr;
  }
  .grid-head { background: #1a1d24; border-bottom: 1px solid #252830; }
  .grid-head div {
    padding: 13px 14px;
    font-size: 10px;
    letter-spacing: 2px;
    color: #666;
    font-weight: 700;
    border-right: 1px solid #252830;
    text-transform: uppercase;
  }
  .grid-head div:last-child { border-right: none; }

  .grid-row div {
    border-right: 1px solid #252830;
    display: flex;
    align-items: center;
    min-height: 60px;
  }
  .grid-row div:last-child { border-right: none; }

  input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 20px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    letter-spacing: -0.5px;
    padding: 10px 14px;
    cursor: text;
  }
  input[type="text"]::placeholder { color: #333; font-size: 14px; font-weight: 400; }
  input[type="text"]:focus { background: rgba(200,245,90,0.03); }

  .btn-row {
    display: flex;
    gap: 10px;
    padding: 14px 14px;
    background: #1a1d24;
    border-top: 1px solid #252830;
  }
  button {
    background: #c8f55a; color: #000; border: none; border-radius: 10px;
    padding: 13px 20px; font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; font-family: 'Inter', sans-serif; flex: 1;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button.secondary {
    background: #252830;
    color: #888;
    flex: 0 0 auto;
    padding: 13px 20px;
    border: none;
  }
  button.secondary:hover { background: #2e3240; color: #bbb; opacity: 1; }

  .error {
    color: #ff6b6b; font-size: 12px; letter-spacing: 1px;
    padding: 10px 16px; background: rgba(255,107,107,0.05);
    border-top: 1px solid rgba(255,107,107,0.1); display: none;
  }

  /* Table */
  .table-wrap {
    background: #1a1d24; border: 1px solid #252830;
    border-radius: 14px; overflow: hidden; display: none; margin-bottom: 14px;
  }
  .table-head {
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 13px 18px; border-bottom: 1px solid #252830;
    background: #1a1d24; font-size: 10px; letter-spacing: 3px; color: #555; font-weight: 700; text-transform: uppercase;
  }
  .table-row {
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 16px 18px; border-bottom: 1px solid #1e2028;
    transition: background 0.15s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: rgba(200,245,90,0.04) !important; }
  .ev-cell { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .odds-cell { font-weight: 800; font-size: 22px; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }

  .badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .badge-max { background: #a855f7; color: #fff; }
  .badge-min { background: #7c3aed; color: #fff; }

  /* Plays */
  .plays-section { margin-top: 8px; }
  .plays-label { font-size: 10px; letter-spacing: 4px; color: #555; text-transform: uppercase; margin-bottom: 10px; font-weight: 700; }
  .note-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
  textarea {
    flex: 1; background: #1a1d24; border: 1px solid #252830; border-radius: 12px;
    padding: 12px 14px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif;
    resize: none; outline: none; line-height: 1.6; min-height: 90px;
  }
  textarea::placeholder { color: #444; }
  textarea:focus { border-color: #333; }
  .add-btn {
    background: #a855f7; color: #fff; border: none; border-radius: 12px;
    padding: 0 18px; font-size: 22px; font-weight: 700;
    cursor: pointer; font-family: 'Inter', sans-serif;
    align-self: stretch; flex: 0 0 auto;
  }
  .add-btn:hover { opacity: 0.85; }
  .good-to-btn {
    background: #252830; color: #c8f55a; border: none; border-radius: 12px;
    padding: 0 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer; font-family: 'Inter', sans-serif;
    align-self: stretch; flex: 0 0 auto; white-space: nowrap;
  }
  .good-to-btn:hover { background: #2e3240; opacity: 1; }

  .plays-list { display: flex; flex-direction: column; gap: 8px; }
  .note-item {
    background: #1a1d24; border: 1px solid #252830; border-radius: 12px;
    padding: 12px 14px; display: flex; align-items: flex-start; gap: 10px; transition: border-color 0.15s;
  }
  .note-item:hover { border-color: #333; }
  .note-text { flex: 1; font-size: 14px; color: #ccc; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
  .note-actions { display: flex; gap: 6px; flex-shrink: 0; padding-top: 1px; }
  .icon-btn {
    background: #252830; border: none; border-radius: 8px; color: #666; font-size: 11px;
    padding: 5px 10px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600;
  }
  .icon-btn:hover { background: #2e3240; color: #aaa; opacity: 1; }
  .icon-btn.copied { background: rgba(200,245,90,0.15); color: #c8f55a; }
  .icon-btn.grading { color: #888; }
  .grade-badge {
    display: inline-block; border-radius: 6px; font-size: 11px; font-weight: 700;
    padding: 3px 8px; margin-left: 8px; font-family: 'Inter', sans-serif; flex-shrink: 0;
  }
  .grade-win  { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .grade-loss { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
  .grade-push { background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.3); }
  .grade-err  { background: rgba(148,163,184,0.1); color: #64748b; border: 1px solid rgba(148,163,184,0.2); }
  .bdl-key-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
  }
  .bdl-key-row input {
    flex: 1; background: #1a1d24; border: 1px solid #252830; border-radius: 10px;
    padding: 10px 14px; color: #fff; font-size: 13px; font-family: 'Inter', sans-serif;
    outline: none;
  }
  .bdl-key-row button {
    background: #252830; border: none; border-radius: 10px; color: #888;
    font-size: 12px; padding: 10px 14px; cursor: pointer; font-family: 'Inter', sans-serif;
    font-weight: 600; white-space: nowrap;
  }
  .bdl-key-row button:hover { background: #2e3240; color: #aaa; }
  .bdl-key-saved { color: #22c55e; font-size: 11px; font-weight: 700; }

  .plays-clear-row { margin-top: 10px; display: flex; justify-content: flex-end; }
  .plays-clear-btn {
    background: transparent; border: 1px solid #252830; border-radius: 8px;
    color: #444; font-size: 11px; padding: 6px 14px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 600;
  }
  .plays-clear-btn:hover { border-color: #ff6b6b; color: #ff6b6b; background: transparent; opacity: 1; }
  .empty-plays { font-size: 12px; color: #333; letter-spacing: 2px; text-align: center; padding: 20px 0; font-weight: 600; }
  .grade-all-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 12px;
  }
  .grade-all-btn {
    background: #1a1d24; border: 1px solid #252830; border-radius: 10px;
    color: #c8f55a; font-size: 12px; font-weight: 700; padding: 9px 16px;
    cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.5px;
    flex: 1;
  }
  .grade-all-btn:hover { border-color: #c8f55a; }
  .summary-section {
    background: #1a1d24; border: 1px solid #252830; border-radius: 12px;
    padding: 14px; margin-bottom: 12px; display: none;
  }
  .summary-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .summary-label { font-size: 10px; color: #555; font-weight: 700; letter-spacing: 1.5px; }
  .summary-copy-btn {
    background: #252830; border: none; border-radius: 8px; color: #666;
    font-size: 11px; padding: 5px 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 600;
  }
  .summary-copy-btn:hover { color: #aaa; background: #2e3240; }
  .summary-copy-btn.copied { color: #c8f55a; }
  .summary-name-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .summary-name-input {
    background: #111318; border: 1px solid #252830; border-radius: 8px;
    color: #fff; font-size: 13px; font-family: 'Inter', sans-serif;
    padding: 6px 10px; outline: none; flex: 1; font-weight: 600;
  }
  .summary-text {
    font-size: 14px; color: #ccc; font-family: 'Inter', sans-serif;
    line-height: 1.9; font-weight: 600; white-space: pre-wrap;
  }
  .summary-day-line { color: #fff; }
  .summary-alltime-line { color: #c8f55a; }
  /* Date row */
  .date-row {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  }
  .date-label { font-size: 11px; color: #555; font-weight: 700; letter-spacing: 1px; }
  .date-input {
    background: #1a1d24; border: 1px solid #252830; border-radius: 8px;
    color: #fff; font-size: 13px; font-family: 'Inter', sans-serif;
    padding: 6px 10px; outline: none; width: 130px;
  }
  /* Summary bar */
  .tracker-bar {
    display: flex; gap: 0; border: 1px solid #252830; border-radius: 12px;
    overflow: hidden; margin-bottom: 14px;
  }
  .tracker-cell {
    flex: 1; padding: 10px 8px; text-align: center;
    border-right: 1px solid #252830; background: #1a1d24;
  }
  .tracker-cell:last-child { border-right: none; }
  .tracker-cell-label { font-size: 9px; color: #555; font-weight: 700; letter-spacing: 1px; margin-bottom: 3px; }
  .tracker-cell-val { font-size: 14px; font-weight: 800; font-family: 'Inter', sans-serif; }
  .val-pos { color: #22c55e; }
  .val-neg { color: #ef4444; }
  .val-neu { color: #888; }
  /* Grade result on note */
  .note-grade-row {
    font-size: 11px; color: #555; margin-top: 4px; font-weight: 600;
  }
</style>
</head>
<body>
<div class="container">
  <h1>5% CAP<br><span style="color:#a855f7;">TOOL</span></h1>

  <div class="card">
    <div class="grid-head">
      <div>MARKET</div>
      <div style="color:#a855f7;">EV %</div>
      <div style="color:#a855f7;">FAIR</div>
      
    </div>
    <div class="grid-row">
      <div><input type="text" id="marketInput" placeholder="opt." oninput="autoCalc()" /></div>
      <div><input type="text" id="evInput" placeholder="opt." oninput="autoCalc()" /></div>
      <div><input type="text" id="fairInput" placeholder="" oninput="autoCalc()" /></div>
    </div>
    <div class="btn-row">
      <button class="secondary" onclick="clearAll()">CLEAR</button>
    </div>
    <div class="error" id="error"></div>
  </div>

  <div class="table-wrap" id="tableWrap">
    <div class="table-head"><div>EV</div><div>WORST PRICE</div></div>
    <div id="tableBody"></div>
  </div>

  <!-- PLAYS -->
  <div class="search-section" style="margin-bottom:14px;">
  <div style="position:relative;">
    <input type="text" id="playerSearch" placeholder="Search an NBA player" oninput="searchPlayers()" onfocus="searchPlayers()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      style="width:100%;background:#1a1d24;border:1px solid #252830;border-radius:10px;padding:12px 14px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;font-weight:600;outline:none;" />
    <div id="searchResults" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1d24;border:1px solid #333;border-radius:10px;z-index:100;max-height:320px;overflow-y:auto;"></div>
  </div>
</div>

<div class="plays-section">
    <div class="plays-label">Plays</div>
    <div class="note-input-row">
      <textarea id="noteInput" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="" rows="2"></textarea>
      <button class="good-to-btn" id="goodToBtn" onclick="appendWorst()" style="display:none">good to</button>
      <button class="add-btn" onclick="addNote()">+</button>
    </div>
    <div class="date-row">
      <span class="date-label">DATE</span>
      <input class="date-input" type="date" id="playsDate" />
    </div>
    <div class="tracker-bar" id="trackerBar">
      <div class="tracker-cell">
        <div class="tracker-cell-label">TODAY W-L</div>
        <div class="tracker-cell-val val-neu" id="statDayWL">—</div>
      </div>
      <div class="tracker-cell">
        <div class="tracker-cell-label">TODAY +/-</div>
        <div class="tracker-cell-val val-neu" id="statDayPL">—</div>
      </div>
      <div class="tracker-cell">
        <div class="tracker-cell-label">ALL TIME W-L</div>
        <div class="tracker-cell-val val-neu" id="statAllWL">—</div>
      </div>
      <div class="tracker-cell">
        <div class="tracker-cell-label">ALL TIME +/-</div>
        <div class="tracker-cell-val val-neu" id="statAllPL">—</div>
      </div>
    </div>
    <div class="grade-all-row">
      <button class="grade-all-btn" onclick="gradeAll(this)" id="gradeAllBtn">⚡ GRADE ALL</button>
    </div>
    <div class="summary-section" id="summarySection">
      <div class="summary-header">
        <span class="summary-label">SUMMARY</span>
        <button class="summary-copy-btn" onclick="copySummary(this)">COPY</button>
      </div>
      <div class="summary-name-row">
        <input class="summary-name-input" id="summaryName" type="text" value="Boardroom NBA" placeholder="Brand name..." autocorrect="off" spellcheck="false" oninput="saveSummaryName(); renderSummary();" />
      </div>
      <div class="summary-text" id="summaryText"></div>
    </div>
    <div class="bdl-key-row" id="bdlKeyRow" style="display:none">
      <input type="password" id="bdlApiKey" placeholder="Ball Don't Lie API key..." autocomplete="off" autocorrect="off" spellcheck="false" />
      <button onclick="saveBdlKey()">Save Key</button>
      <span id="bdlKeySaved" class="bdl-key-saved" style="display:none">✓ Saved</span>
    </div>
    <div class="plays-list" id="notesList">
      <div class="empty-plays" id="emptyNotes">NO PLAYS YET</div>
    </div>
    <div class="plays-clear-row" id="notesClearRow" style="display:none">
      <button class="plays-clear-btn" onclick="clearAllNotes()">CLEAR ALL PLAYS</button>
    </div>
  </div>
</div>

<script>
  let plays = JSON.parse(localStorage.getItem('ev_notes') || '[]');
  let lastWorstPrice = null;

  // Date picker — default to today
  function initDate() {
    const el = document.getElementById('playsDate');
    const stored = localStorage.getItem('plays_date');
    const today = new Date().toISOString().split('T')[0];
    el.value = stored || today;
    el.addEventListener('change', () => {
      localStorage.setItem('plays_date', el.value);
      renderNotes();
      updateTracker();
      renderSummary();
    });
  }

  function getPlaysDate() {
    return document.getElementById('playsDate').value;
  }

  // ── Unit math ────────────────────────────────────────────────────────
  function extractFirstOdds(text) {
    // Find first standalone odds number (e.g. -130, +122)
    const m = text.match(/(?<![\d])([+-]?(?:1[0-9]{2,3}|[2-9][0-9]{2,3}))(?![\d])/);
    if (!m) return null;
    const n = parseInt(m[1]);
    if (Math.abs(n) < 100) return null;
    return n;
  }

  function calcUnits(odds) {
    if (odds === null) return { risk: 1, toWin: 1 };
    if (odds > 0) {
      return { risk: 1, toWin: +(odds / 100).toFixed(3) };
    } else {
      const risk = +(Math.abs(odds) / 100).toFixed(3);
      return { risk, toWin: 1 };
    }
  }

  function calcPL(odds, result) {
    const { risk, toWin } = calcUnits(odds);
    if (result === 'win')  return +toWin.toFixed(3);
    if (result === 'loss') return +(-risk).toFixed(3);
    return 0; // push
  }

  // ── Grades storage ───────────────────────────────────────────────────
  // grades: { [playText+date]: { result, actual, odds, date } }
  function loadGrades() {
    return JSON.parse(localStorage.getItem('play_grades') || '{}');
  }
  function saveGrades(g) {
    localStorage.setItem('play_grades', JSON.stringify(g));
  }
  function gradeKey(i) {
    return getPlaysDate() + '::' + plays[i];
  }

  // ── Tracker bar ──────────────────────────────────────────────────────
  function updateTracker() {
    const grades = loadGrades();
    const date = getPlaysDate();

    let dayW = 0, dayL = 0, dayPL = 0;
    const baseW = parseInt(localStorage.getItem('baseline_wins') || '0');
    const baseL = parseInt(localStorage.getItem('baseline_losses') || '0');
    const basePL = parseFloat(localStorage.getItem('baseline_pl') || '0');
    let allW = baseW, allL = baseL, allPL = basePL;

    for (const [key, g] of Object.entries(grades)) {
      const pl = calcPL(g.odds, g.result);
      if (g.result === 'win') { allW++; } else if (g.result === 'loss') { allL++; }
      allPL += pl;
      if (key.startsWith(date + '::')) {
        if (g.result === 'win') dayW++;
        else if (g.result === 'loss') dayL++;
        dayPL += pl;
      }
    }

    const fmt = v => (v >= 0 ? '+' : '') + v.toFixed(2) + 'u';
    const cls = v => v > 0 ? 'val-pos' : v < 0 ? 'val-neg' : 'val-neu';

    const dayWL = document.getElementById('statDayWL');
    const dayPLel = document.getElementById('statDayPL');
    const allWL = document.getElementById('statAllWL');
    const allPLel = document.getElementById('statAllPL');

    dayWL.textContent = (dayW + dayL) ? `${dayW}-${dayL}` : '—';
    dayWL.className = 'tracker-cell-val ' + (dayW || dayL ? (dayW >= dayL ? 'val-pos' : 'val-neg') : 'val-neu');
    dayPLel.textContent = (dayW + dayL) ? fmt(dayPL) : '—';
    dayPLel.className = 'tracker-cell-val ' + cls(dayPL);
    allWL.textContent = (allW + allL) ? `${allW}-${allL}` : '—';
    allWL.className = 'tracker-cell-val ' + (allW || allL ? (allW >= allL ? 'val-pos' : 'val-neg') : 'val-neu');
    allPLel.textContent = (allW + allL) ? fmt(allPL) : '—';
    allPLel.className = 'tracker-cell-val ' + cls(allPL);
  }

  // Baseline all-time record (pre-existing before auto-grader)
  if (!localStorage.getItem('baseline_set')) {
    localStorage.setItem('baseline_wins', '162');
    localStorage.setItem('baseline_losses', '136');
    localStorage.setItem('baseline_pl', '16.33');
    localStorage.setItem('baseline_set', '1');
  }

  initDate();
  loadSummaryName();
  renderNotes();
  updateTracker();
  renderSummary();

  function toAmerican(d) { return d >= 2 ? Math.round((d-1)*100) : Math.round(-100/(d-1)); }
  function toDecimal(a) { return a > 0 ? a/100+1 : 100/Math.abs(a)+1; }
  function impliedProb(a) { return a > 0 ? 100/(a+100) : Math.abs(a)/(Math.abs(a)+100); }
  function fmtOdds(n) { return n > 0 ? '+'+n : ''+n; }
  function parseOdds(raw) {
    if (!raw || !raw.trim()) return null;
    raw = raw.trim();
    const n = parseInt(raw);
    if (isNaN(n) || Math.abs(n) < 100) return null;
    return raw.startsWith('-') ? -Math.abs(n) : Math.abs(n);
  }
  function evColor(ev) {
    if (ev >= 5) return '#c8f55a';
    if (ev >= 4) return '#a3d940';
    if (ev >= 3) return '#86efac';
    if (ev >= 2) return '#ffd166';
    if (ev > 0)  return '#ff9f43';
    return '#ff6b6b';
  }

  function showError(msg) {
    const e = document.getElementById('error');
    e.textContent = '⚠ ' + msg;
    e.style.display = 'block';
  }
  function hideError() { document.getElementById('error').style.display = 'none'; }
  function resetOutputs() {

    document.getElementById('tableWrap').style.display = 'none';
    lastWorstPrice = null;
    const btn = document.getElementById('goodToBtn'); if(btn) btn.style.display = 'none';
    
  }

  // Convert decimal odds to American, rounding so the bet stays AT LEAST the target EV.
  // For the 5% row: round toward BETTER odds for the bettor (never slip below 5%)
  //   negative odds → ceiling (e.g. -126.4 → -126, i.e. better price)
  //   positive odds → floor  (e.g. +114.6 → +114, i.e. worse price, still >= 5%)
  // Round to guarantee AT LEAST 5% EV — always favor the bettor
  // Positive odds: need HIGHER number = Math.ceil
  // Negative odds: need LESS negative number = Math.ceil (e.g. -126.4 → -126)
  function toAmericanFloor(d) {
    if (d >= 2) return Math.ceil(parseFloat(((d-1)*100).toFixed(6)));
    return Math.ceil(parseFloat((-100/(d-1)).toFixed(6)));
  }

  function renderTable(prob) {
    const body = document.getElementById('tableBody');
    body.innerHTML = '';

    // Two rows: 5% min and 4.9% floor
    const rows = [
      { ev: 5.0, label: 'WORST', badgeClass: 'badge-max', useFloor: true },
      { ev: 4.9, label: 'FLOOR', badgeClass: 'badge-min', useFloor: false },
    ];

    // Calculate WORST row first to check its actual EV
    const worstD = (5.0/100+1)/prob;
    const worstAmerican = toAmericanFloor(worstD);
    const worstActualEV = (prob * (toDecimal(worstAmerican) - 1) - (1 - prob)) * 100;

    lastWorstPrice = fmtOdds(worstAmerican);
    document.getElementById('goodToBtn').style.display = 'block';
    rows.forEach(({ ev, label, badgeClass, useFloor }) => {
      // Only show FLOOR row if WORST actual EV is between 4.90 and 5.00
      if (ev === 4.9 && worstActualEV > 5.005) return;

      const d = (ev/100+1)/prob;
      const american = useFloor ? toAmericanFloor(d) : toAmerican(d);
      const actualD = toDecimal(american);
      const actualEV = (prob * (actualD - 1) - (1 - prob)) * 100;
      const row = document.createElement('div');
      row.className = 'table-row';
      row.style.background = 'rgba(200,245,90,0.05)';
      row.innerHTML = `
        <div class="ev-cell" style="color:${evColor(ev)}">
          <span class="badge ${badgeClass}">${label}</span>
        </div>
        <div class="odds-cell">${fmtOdds(american)} <span style="font-size:13px;color:#a855f7;font-weight:700;margin-left:8px;font-family:'Inter',sans-serif;">+${actualEV.toFixed(1)}%</span></div>
      `;
      body.appendChild(row);
    });

    document.getElementById('tableWrap').style.display = 'block';
    
  }

  let autoCalcTimer = null;
  function autoCalc() {
    clearTimeout(autoCalcTimer);
    autoCalcTimer = setTimeout(calculate, 400);
  }

  function calculate() {
    hideError();
    resetOutputs();

    const marketRaw = document.getElementById('marketInput').value.trim();
    const evRaw = document.getElementById('evInput').value.trim();
    const fairRaw = document.getElementById('fairInput').value.trim();

    const market = parseOdds(marketRaw);
    const fair = parseOdds(fairRaw);
    const ev = evRaw !== '' ? parseFloat(evRaw) : null;

    // MODE 1: MARKET + EV% → derive fair, then show table
    if (market !== null && ev !== null && fairRaw === '') {
      if (isNaN(ev) || ev < 0) return showError('EV% must be a positive number');
      const d_market = toDecimal(market);
      const fairProb = (ev/100 + 1) / d_market;
      if (fairProb <= 0 || fairProb >= 1) return showError('Invalid combination — check your inputs');
      const fairOdds = toAmerican(1/fairProb);
      document.getElementById('fairInput').value = fmtOdds(fairOdds);
      const worstPrice = toAmerican((5/100 + 1) / fairProb);

      renderTable(fairProb);
      return;
    }

    // MODE 2: FAIR + EV% → show worst in header + table
    if (fair !== null && ev !== null) {
      if (isNaN(ev) || ev < 0) return showError('EV% must be a positive number');
      const prob = impliedProb(fair);
      const d = (ev/100 + 1) / prob;
      const worst = toAmerican(d);

      renderTable(prob);
      return;
    }

    // MODE 3: FAIR only → table
    if (fair !== null && ev === null) {
      renderTable(impliedProb(fair));
      return;
    }

    if (fairRaw === '' && marketRaw === '') return showError('Enter a fair price or market odds');
    if (fair === null && fairRaw !== '') return showError('Fair odds must be valid American odds (e.g. -114)');
    if (market === null && marketRaw !== '') return showError('Market odds must be valid American odds (e.g. -102)');
    showError('Enter fair odds, or market + EV%');
  }

  function clearAll() {
    ['marketInput','evInput','fairInput'].forEach(id => document.getElementById(id).value = '');
    resetOutputs();
    hideError();
  }

  // ── PLAYS ──
  function saveNotes() {
    localStorage.setItem('ev_notes', JSON.stringify(plays));
  }

  function renderNotes() {
    const list = document.getElementById('notesList');
    const empty = document.getElementById('emptyNotes');
    const clearRow = document.getElementById('notesClearRow');

    // Remove all note items (keep emptyNotes)
    Array.from(list.querySelectorAll('.note-item')).forEach(el => el.remove());

    if (plays.length === 0) {
      empty.style.display = 'block';
      clearRow.style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    clearRow.style.display = 'flex';

    plays.forEach((note, i) => {
      const item = document.createElement('div');
      item.className = 'note-item';
      const savedGrade = loadGrades()[getPlaysDate() + '::' + note];
      const badgeHtml = savedGrade
        ? `<div id="grade-badge-${i}" class="grade-badge grade-${savedGrade.result}" style="display:inline-block">${savedGrade.result === 'win' ? '✓ WIN' : savedGrade.result === 'loss' ? '✗ LOSS' : 'PUSH'} (${savedGrade.actual})</div>`
        : `<div id="grade-badge-${i}" class="grade-badge" style="display:none"></div>`;
      item.innerHTML = `
        <div class="note-text">${escHtml(note)}</div>
        <div class="note-actions" style="align-items:center;">
          ${badgeHtml}
          <button class="icon-btn" onclick="gradePlay(${i}, this)">GRADE</button>
          <button class="icon-btn" onclick="copyNote(${i}, this)">COPY</button>
          <button class="icon-btn" onclick="deleteNote(${i})">✕</button>
        </div>
      `;
      list.appendChild(item);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function appendWorst() {
    if (!lastWorstPrice) return;
    const ta = document.getElementById('noteInput');
    const full = ta.value.trimEnd() + ' good to ' + lastWorstPrice;
    const text = full.trim();
    if (text) {
      plays.unshift(text);
      saveNotes();
      renderNotes();
      ta.value = '';
    }
    ta.focus();
  }

  function addNote() {
    const ta = document.getElementById('noteInput');
    const text = ta.value.trim();
    if (!text) return;
    plays.unshift(text);
    saveNotes();
    renderNotes();
    ta.value = '';
  }

  function deleteNote(i) {
    plays.splice(i, 1);
    saveNotes();
    renderNotes();
  }

  function copyNote(i, btn) {
    navigator.clipboard.writeText(plays[i]).then(() => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1500);
    });
  }

  function clearAllNotes() {
    if (plays.length === 0) return;
    plays = [];
    saveNotes();
    renderNotes();
  }

  // Allow Shift+Enter in textarea, Enter to add note
  document.getElementById('noteInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addNote(); }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.id !== 'noteInput') calculate();
  });

  // Player search bar
  function searchPlayers() {
    const input = document.getElementById('playerSearch');
    const results = document.getElementById('searchResults');
    const q = input.value.trim().toLowerCase();

    const normalize = s => s.toLowerCase().replace(/[^a-z0-9 ]/g, '');
    const qn = normalize(q);
    const matches = q.length === 0
      ? NBA_PLAYERS
      : NBA_PLAYERS.filter(p => {
          const pn = normalize(p.name);
          const tn = normalize(p.team);
          return pn.split(' ').some(part => part.startsWith(qn)) ||
                 pn.startsWith(qn) ||
                 tn.startsWith(qn) ||
                 tn.replace(/\s+/g,'').startsWith(qn.replace(/\s+/g,''));
        });

    if (!matches.length) { results.style.display = 'none'; return; }

    results.innerHTML = '';
    matches.forEach(p => {
      const item = document.createElement('div');
      item.style.cssText = 'padding:11px 14px;cursor:pointer;font-size:14px;color:#ccc;font-family:Inter,sans-serif;border-bottom:1px solid #252830;display:flex;justify-content:space-between;align-items:center;gap:12px;';
      item.innerHTML = `<span><span style="font-weight:700;color:#fff;">${p.name}</span><span style="font-size:11px;color:#2dd4bf;font-weight:700;margin-left:8px;">${p.pos}</span></span><span style="font-size:12px;color:#fff;font-weight:600;margin-left:auto;padding-left:10px;">${p.team}</span>`;
      item.addEventListener('mousedown', e => {
        e.preventDefault();
        const ta = document.getElementById('noteInput');
        const val = ta.value.trimEnd();
        ta.value = val + (val ? ' ' : '') + p.name + ' ' + p.team + ' ';
        input.value = '';
        results.style.display = 'none';
        ta.focus();
      });
      item.addEventListener('mouseover', () => item.style.background = 'rgba(200,245,90,0.06)');
      item.addEventListener('mouseout', () => item.style.background = 'transparent');
      results.appendChild(item);
    });
    results.style.display = 'block';
  }

    const results = document.getElementById('searchResults');
    if (results && !results.contains(e.target) && e.target.id !== 'playerSearch') {

  const EXPANSIONS = {
    'pts': 'points', 'reb': 'rebounds', 'ast': 'assists',
    'pra': 'points rebounds assists', 'stl': 'steals', 'blk': 'blocks',
    '3pm': '3-pointers made',
    'min': 'minutes', 'fg': 'field goals',
    'fd': 'FanDuel', 'pb': 'Builder', 'bm': 'Bookmaker',
    'onyx': 'Onyx', 'px': 'ProphetX', 'novig': 'Novig', 'nv': 'Novig',
    'fliff': 'Fliff', 'dk': 'DraftKings', 'mgm': 'BetMGM',
    'czr': 'Caesars', 'hard': 'HardRock', 'bet365': 'bet365',
    'pin': 'Pinnacle', 'pinnacle': 'Pinnacle', 'circa': 'Circa',
    'bov': 'Bovada', 'bovada': 'Bovada',
  };

  function expandShorthands(text) {
    text = text.replace(/\bo([0-9]+(?:\.[0-9]+)?)/gi, 'over $1');
    text = text.replace(/\bu([0-9]+(?:\.[0-9]+)?)/gi, 'under $1');
    text = text.replace(/(^|\s)(1[0-9]{2,}|[2-9][0-9]{2,})(?=\s|$)/g, '$1+$2');
    const expKeys = Object.keys(EXPANSIONS).sort((a,b) => b.length - a.length).join('|');
    const expRegex = new RegExp('\\b(' + expKeys + ')\\b', 'gi');
    text = text.replace(expRegex, w => EXPANSIONS[w.toLowerCase()] || w);



    return text;
  }

  document.getElementById('noteInput').addEventListener('input', function(e) {
    if (e.data === ' ') {
      const ta = this;
      const pos = ta.selectionStart;
      const before = ta.value;
      const expanded = expandShorthands(before);
      if (expanded !== before) {
        const diff = expanded.length - before.length;
        ta.value = expanded;
        ta.selectionStart = ta.selectionEnd = pos + diff;
      }
    }
  });

  function parsePlay(text) {
    // Extract: player, over/under, line, stat
    // Format: "Player Name Team over/under X.X stat ..."
    const statMap = {
      'points': 'pts', 'rebounds': 'reb', 'assists': 'ast',
      'points rebounds assists': 'pra', '3-pointers made': '3pm',
      'steals': 'stl', 'blocks': 'blk', 'minutes': 'min', 'turnovers': 'tov'
    };

    const ou = text.match(/\b(over|under)\s+([\d.]+)\s+(points(?:\s+rebounds\s+assists)?|rebounds|assists|3-pointers made|steals|blocks|minutes|turnovers)/i);
    if (!ou) return null;

    const direction = ou[1].toLowerCase();
    const line = parseFloat(ou[2]);
    const statRaw = ou[3].toLowerCase();
    const stat = statMap[statRaw] || statRaw;

    // Player is everything before the team name (which is before over/under)
    const beforeOU = text.substring(0, text.toLowerCase().indexOf(ou[0].toLowerCase())).trim();
    // Last 1-2 words before over/under are likely the team — player is before that
    const words = beforeOU.split(/\s+/);
    // Find player: check NBA_PLAYERS list
    let playerName = null;
    for (let len = Math.min(5, words.length); len >= 1; len--) {
      const candidate = words.slice(0, len).join(' ');
      if (NBA_PLAYERS.some(p => p.name.toLowerCase() === candidate.toLowerCase())) {
        playerName = candidate;
        break;
      }
    }
    // Fallback: first 2 words
    if (!playerName) playerName = words.slice(0, 2).join(' ');

    return { playerName, direction, line, stat };
  }

  async function gradePlay(i, btn) {
    const apiKey = '9cdb249f-9635-4cca-a998-37c7b98a9372';
    

    const text = plays[i];
    const parsed = parsePlay(text);
    if (!parsed) {
      showGrade(i, 'err', 'PARSE ERR', null, null);
      return;
    }

    btn.textContent = '...';
    btn.classList.add('grading');

    try {
      const { playerName, direction, line, stat } = parsed;

      // Search for player
      const playerRes = await fetch(
        `https://api.balldontlie.io/v1/players?search=${encodeURIComponent(playerName)}&per_page=5`,
        { headers: { 'Authorization': apiKey } }
      );
      const playerData = await playerRes.json();
      if (!playerData.data || playerData.data.length === 0) {
        showGrade(i, 'err', 'NO PLAYER', null, null); btn.textContent = 'GRADE'; btn.classList.remove('grading'); return;
      }
      const player = playerData.data[0];

      // Get yesterday's stats (or most recent game)
      const today = new Date();
      const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
      const dateStr = yesterday.toISOString().split('T')[0];

      const statsRes = await fetch(
        `https://api.balldontlie.io/v1/stats?player_ids[]=${player.id}&start_date=${dateStr}&end_date=${dateStr}&per_page=5`,
        { headers: { 'Authorization': apiKey } }
      );
      const statsData = await statsRes.json();

      if (!statsData.data || statsData.data.length === 0) {
        // Try 2 days ago
        const twoDays = new Date(today); twoDays.setDate(today.getDate() - 2);
        const dateStr2 = twoDays.toISOString().split('T')[0];
        const statsRes2 = await fetch(
          `https://api.balldontlie.io/v1/stats?player_ids[]=${player.id}&start_date=${dateStr2}&end_date=${dateStr2}&per_page=5`,
          { headers: { 'Authorization': apiKey } }
        );
        const statsData2 = await statsRes2.json();
        if (!statsData2.data || statsData2.data.length === 0) {
          showGrade(i, 'err', 'NO GAME', null, null); btn.textContent = 'GRADE'; btn.classList.remove('grading'); return;
        }
        gradeFromStats(i, statsData2.data[0], stat, line, direction);
      } else {
        gradeFromStats(i, statsData.data[0], stat, line, direction);
      }

    } catch(e) {
      showGrade(i, 'err', 'API ERR', null, null);
    }

    btn.textContent = 'GRADE';
    btn.classList.remove('grading');
  }

  function gradeFromStats(i, gameStats, stat, line, direction) {
    const statKeys = {
      'pts': 'pts', 'reb': 'reb', 'ast': 'ast',
      'pra': null, '3pm': 'fg3m', 'stl': 'stl',
      'blk': 'blk', 'min': 'min', 'tov': 'turnover'
    };

    let actual;
    if (stat === 'pra') {
      actual = (gameStats.pts || 0) + (gameStats.reb || 0) + (gameStats.ast || 0);
    } else {
      const key = statKeys[stat] || stat;
      actual = gameStats[key];
      if (stat === 'min' && typeof actual === 'string') {
        actual = parseFloat(actual.split(':')[0]);
      }
    }

    if (actual === undefined || actual === null) {
      showGrade(i, 'err', 'NO STAT', null, null); return;
    }

    actual = parseFloat(actual);
    let result;
    if (actual === line) result = 'push';
    else if (direction === 'over') result = actual > line ? 'win' : 'loss';
    else result = actual < line ? 'win' : 'loss';

    const odds = extractFirstOdds(plays[i]);
    const label = result === 'win' ? `✓ WIN (${actual})` : result === 'loss' ? `✗ LOSS (${actual})` : `PUSH (${actual})`;
    showGrade(i, result, label, actual, odds);
  }

  function showGrade(i, type, label, actual, odds) {
    const badge = document.getElementById(`grade-badge-${i}`);
    if (!badge) return;
    badge.style.display = 'inline-block';
    badge.className = `grade-badge grade-${type}`;
    badge.textContent = label;
    // Save grade if it's a real result
    if (type === 'win' || type === 'loss' || type === 'push') {
      const grades = loadGrades();
      grades[gradeKey(i)] = { result: type, actual, odds, date: getPlaysDate() };
      saveGrades(grades);
      updateTracker();
      renderSummary();
    }
  }

  // ── Grade All ────────────────────────────────────────────────────────
  async function gradeAll(btn) {
    if (!plays.length) return;
    btn.textContent = '⏳ Grading...';
    btn.disabled = true;

    for (let i = 0; i < plays.length; i++) {
      const grades = loadGrades();
      const key = getPlaysDate() + '::' + plays[i];
      if (grades[key]) continue; // already graded
      // find the grade button for this play and trigger it
      await gradePlayAsync(i);
      await new Promise(r => setTimeout(r, 300)); // small delay between calls
    }

    btn.textContent = '⚡ GRADE ALL';
    btn.disabled = false;
    renderSummary();
  }

  async function gradePlayAsync(i) {
    const apiKey = '9cdb249f-9635-4cca-a998-37c7b98a9372';
    const text = plays[i];
    const parsed = parsePlay(text);
    if (!parsed) return;

    try {
      const { playerName, direction, line, stat } = parsed;
      const playerRes = await fetch(
        `https://api.balldontlie.io/v1/players?search=${encodeURIComponent(playerName)}&per_page=5`,
        { headers: { 'Authorization': apiKey } }
      );
      const playerData = await playerRes.json();
      if (!playerData.data || !playerData.data.length) return;
      const player = playerData.data[0];

      const date = getPlaysDate();
      const statsRes = await fetch(
        `https://api.balldontlie.io/v1/stats?player_ids[]=${player.id}&start_date=${date}&end_date=${date}&per_page=5`,
        { headers: { 'Authorization': apiKey } }
      );
      const statsData = await statsRes.json();
      if (!statsData.data || !statsData.data.length) return;
      gradeFromStats(i, statsData.data[0], stat, line, direction);
    } catch(e) {}
  }

  // ── Summary ──────────────────────────────────────────────────────────
  function saveSummaryName() {
    localStorage.setItem('summary_name', document.getElementById('summaryName').value);
  }

  function loadSummaryName() {
    const saved = localStorage.getItem('summary_name');
    if (saved !== null) document.getElementById('summaryName').value = saved;
  }

  function getDateLabel(dateStr) {
    const today = new Date().toISOString().split('T')[0];
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toISOString().split('T')[0];
    if (dateStr === today) return 'Today';
    if (dateStr === yStr) return 'Yesterday';
    // Format as "Mon Mar 17"
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }

  function renderSummary() {
    const grades = loadGrades();
    const date = getPlaysDate();
    const name = document.getElementById('summaryName').value || 'Boardroom NBA';

    let dayW = 0, dayL = 0, dayPL = 0;
    const baseW = parseInt(localStorage.getItem('baseline_wins') || '0');
    const baseL = parseInt(localStorage.getItem('baseline_losses') || '0');
    const basePL = parseFloat(localStorage.getItem('baseline_pl') || '0');
    let allW = baseW, allL = baseL, allPL = basePL;

    for (const [key, g] of Object.entries(grades)) {
      if (g.result === 'push') continue;
      const pl = calcPL(g.odds, g.result);
      if (g.result === 'win') allW++; else allL++;
      allPL += pl;
      if (key.startsWith(date + '::')) {
        if (g.result === 'win') dayW++; else dayL++;
        dayPL += pl;
      }
    }

    if (dayW + dayL === 0 && allW + allL === 0) {
      document.getElementById('summarySection').style.display = 'none';
      return;
    }

    const fmtPL = v => (v >= 0 ? '+' : '') + v.toFixed(2) + 'u';
    const label = getDateLabel(date);
    const dayLine = `${label} ${dayW}-${dayL} ${fmtPL(dayPL)}`;
    const allLine = `${name} ${allW}-${allL} ${fmtPL(allPL)}`;

    document.getElementById('summaryText').innerHTML =
      `<span class="summary-day-line">${dayLine}</span>\n<span class="summary-alltime-line">${allLine}</span>`;
    document.getElementById('summarySection').style.display = 'block';
  }

  function copySummary(btn) {
    const grades = loadGrades();
    const date = getPlaysDate();
    const name = document.getElementById('summaryName').value || 'Boardroom NBA';

    let dayW = 0, dayL = 0, dayPL = 0;
    const baseW2 = parseInt(localStorage.getItem('baseline_wins') || '0');
    const baseL2 = parseInt(localStorage.getItem('baseline_losses') || '0');
    const basePL2 = parseFloat(localStorage.getItem('baseline_pl') || '0');
    let allW = baseW2, allL = baseL2, allPL = basePL2;

    for (const [key, g] of Object.entries(grades)) {
      if (g.result === 'push') continue;
      const pl = calcPL(g.odds, g.result);
      if (g.result === 'win') allW++; else allL++;
      allPL += pl;
      if (key.startsWith(date + '::')) {
        if (g.result === 'win') dayW++; else dayL++;
        dayPL += pl;
      }
    }

    const fmtPL = v => (v >= 0 ? '+' : '') + v.toFixed(2) + 'u';
    const label = getDateLabel(date);
    const text = `${label} ${dayW}-${dayL} ${fmtPL(dayPL)}\n${name} ${allW}-${allL} ${fmtPL(allPL)}`;

    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ COPIED';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1500);
    });
  }

</script>
