<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NBA Odds Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c22;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.11);
    --text: #e2e4eb;
    --muted: #64748b;
    --dim: #374151;
    --green: #10d986;
    --green-dim: rgba(16,217,134,0.10);
    --red: #f43f5e;
    --amber: #f59e0b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .header {
    display: flex;
    align-items: center;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 20;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text);
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .logo span { color: var(--green); }

  .header-controls {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap; flex: 1; justify-content: flex-end;
  }

  input[type="password"], input[type="text"], select {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 6px;
    height: 34px;
    padding: 0 12px;
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus, input[type="text"]:focus, select:focus { border-color: var(--green); }
  input[type="password"] { width: 230px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; }
  input[type="text"] { width: 200px; }
  select option { background: #1a1e28; }

  .btn {
    height: 34px; padding: 0 16px; border-radius: 6px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text); font-family: var(--sans); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn:hover { border-color: rgba(255,255,255,0.25); background: var(--surface2); }
  .btn.primary { border-color: var(--green); color: var(--green); }
  .btn.primary:hover { background: var(--green-dim); }

  .statusbar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 24px; border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--muted); flex-wrap: wrap;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px rgba(16,217,134,0.5); }
  .dot.err  { background: var(--red); }
  .dot.loading { background: var(--amber); animation: blink 0.9s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .credits { margin-left: auto; font-size: 11px; }

  .tabs { display: flex; padding: 0 24px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    padding: 10px 18px; font-family: var(--sans); font-size: 13px;
    font-weight: 500; color: var(--muted); border: none; background: transparent;
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--green); }

  .toolbar {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap;
  }
  .toolbar-label { font-size: 11px; color: var(--dim); font-weight: 500; }

  .table-wrap { overflow-x: auto; padding: 0 0 60px; }
  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted);
    padding: 10px 16px 8px; text-align: left;
    border-bottom: 1px solid var(--border); white-space: nowrap;
    position: sticky; top: 55px; background: var(--bg);
  }
  thead th.center { text-align: center; }

  tbody td {
    padding: 0 16px; border-bottom: 1px solid var(--border);
    vertical-align: middle; white-space: nowrap;
  }
  .sep-row td { height: 6px; padding: 0; background: var(--surface2); border: none; }

  /* Props summary row */
  .prop-summary { cursor: pointer; }
  .prop-summary td { height: 54px; }
  .prop-summary:hover td { background: rgba(255,255,255,0.02); }
  .prop-summary.open td { background: rgba(16,217,134,0.03); border-bottom-color: transparent; }

  .chevron {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 4px;
    color: var(--dim); font-size: 11px;
    transition: transform 0.2s, color 0.15s, background 0.15s;
    border: 1px solid var(--border2);
  }
  .prop-summary.open .chevron {
    transform: rotate(180deg); color: var(--green);
    border-color: rgba(16,217,134,0.3); background: var(--green-dim);
  }

  .player-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .team-tag { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .market-tag { font-size: 13px; color: var(--muted); }
  .line-tag { font-family: var(--mono); font-size: 12px; color: var(--dim); margin-left: 5px; }

  .best-price { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--green); line-height: 1; }
  .best-book-row { display: flex; align-items: center; gap: 5px; margin-top: 5px; }
  .book-favicon { width: 14px; height: 14px; border-radius: 3px; object-fit: contain; flex-shrink: 0; }
  .book-favicon-ph { width: 14px; height: 14px; border-radius: 3px; background: var(--dim); flex-shrink: 0; }
  .best-book-name { font-size: 11px; color: var(--muted); }
  .book-count { font-size: 12px; color: var(--dim); }

  /* Expand row */
  .expand-row td { padding: 0; }
  .expand-inner { overflow: hidden; max-height: 0; transition: max-height 0.28s ease; }
  .expand-inner.open { max-height: 900px; }

  .expand-content {
    padding: 16px 20px 20px 56px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .expand-title {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 12px;
  }
  .book-list { display: flex; flex-direction: column; gap: 5px; }

  .book-row {
    display: grid;
    grid-template-columns: 20px 200px 1fr 130px 130px;
    align-items: center; gap: 14px;
    padding: 10px 14px;
    background: var(--surface); border-radius: 8px;
    border: 1px solid var(--border); transition: border-color 0.15s;
  }
  .book-row.top-row {
    border-color: rgba(16,217,134,0.22);
    background: rgba(16,217,134,0.04);
  }
  .book-row.top-row .book-rank { color: var(--green); }

  .book-rank { font-family: var(--mono); font-size: 11px; color: var(--dim); text-align: right; }

  .book-identity { display: flex; align-items: center; gap: 9px; min-width: 0; overflow: hidden; }
  .book-logo {
    width: 24px; height: 24px; border-radius: 5px;
    object-fit: contain; flex-shrink: 0;
    background: var(--surface2); border: 1px solid var(--border2); padding: 2px;
  }
  .book-logo-ph {
    width: 24px; height: 24px; border-radius: 5px; background: var(--dim);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--muted); font-weight: 600;
  }
  .book-name-text { font-size: 13px; font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; }

  .book-bar-wrap { height: 3px; background: var(--border2); border-radius: 2px; }
  .book-bar-fill { height: 100%; border-radius: 2px; background: var(--dim); }
  .book-bar-fill.top { background: var(--green); }

  .book-price-cell { text-align: center; }
  .book-price-label { font-size: 10px; color: var(--dim); margin-bottom: 3px; font-weight: 500; letter-spacing: 0.04em; }
  .book-price-val { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--muted); }
  .book-price-val.best-ov { color: var(--green); }
  .book-price-val.best-un { color: var(--green); }
  .book-price-val.dim { color: var(--dim); }

  .expand-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .expand-title { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }

  .sort-toggle { display: flex; align-items: center; gap: 6px; }
  .sort-toggle-label { font-size: 11px; color: var(--dim); }
  .sort-btn {
    height: 26px; padding: 0 10px; border-radius: 5px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--muted); font-family: var(--sans); font-size: 11px;
    font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .sort-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .sort-btn.active { border-color: var(--green); color: var(--green); background: var(--green-dim); }

  /* Game lines */
  .cell-wrap { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .cell-line { font-family: var(--mono); font-size: 10px; color: var(--dim); }
  .cell-odds { font-family: var(--mono); font-size: 13px; color: var(--muted); }
  .cell-odds.best { color: var(--green); font-weight: 500; }
  .cell-odds.worst { color: var(--dim); }
  .cell-odds.na { color: var(--dim); font-size: 11px; }
  .game-label { font-size: 14px; font-weight: 500; }
  .game-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .side-label { font-size: 12px; color: var(--muted); }
  .mkt-label { font-size: 12px; color: var(--dim); font-weight: 500; }

  .book-th-inner { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .book-th-fav { width: 18px; height: 18px; border-radius: 4px; object-fit: contain; }
  .book-th-ph { width: 18px; height: 18px; border-radius: 4px; background: var(--dim); }

  .empty-msg { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">NBA <span>ODDS</span></div>
  <div class="header-controls">
    <input type="password" id="apikey" placeholder="Odds API key..." />
    <button class="btn primary" onclick="fetchData()">Fetch lines</button>
    <button class="btn" onclick="useMock()">Mock data</button>
  </div>
</div>

<div class="statusbar">
  <span class="dot" id="dot"></span>
  <span id="status-text">Enter your Odds API key or load mock data</span>
  <span class="credits" id="credits"></span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="setTab('props',this)">Player Props</button>
  <button class="tab-btn" onclick="setTab('game',this)">Game Lines</button>
</div>

<div class="toolbar">
  <span class="toolbar-label">Filter</span>
  <input type="text" id="search" placeholder="Search player or team..." oninput="render()" />
  <select id="stat-filter" onchange="onMarketChange()">
    <option value="all">All markets</option>
    <option value="player_points">Points</option>
    <option value="player_rebounds">Rebounds</option>
    <option value="player_assists">Assists</option>
    <option value="player_threes">3-pointers</option>
    <option value="player_blocks">Blocks</option>
    <option value="player_steals">Steals</option>
  </select>
  <select id="book-filter" onchange="render()"><option value="all">All books</option></select>
  <select id="game-picker" style="display:none" onchange="fetchProps()"><option value="">Select game...</option></select>
</div>

<div class="table-wrap">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

let currentTab = 'props', liveData = null, allEvents = [], openKey = null;

const expandSort = {};

function setStatus(s,msg,cred) {
  document.getElementById('dot').className='dot'+(s?' '+s:'');
  document.getElementById('status-text').textContent=msg;
  document.getElementById('credits').textContent=cred||'';
}
function setTab(tab,el) {
  currentTab=tab; openKey=null;
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('game-picker').style.display='none';
  document.getElementById('stat-filter').style.display=tab==='props'?'':'none';
  if(liveData) render();
  else { document.getElementById('thead').innerHTML=''; document.getElementById('tbody').innerHTML=''; }
}
function parseAm(n) { if(n==null) return null; return n>0?'+'+n:''+n; }
function oddsNum(str) { if(!str) return null; const n=parseInt(str.replace('+','')); return isNaN(n)?null:n; }
function bestClass(val,all) {
  const nums=all.map(v=>oddsNum(v)).filter(v=>v!==null);
  if(nums.length<2) return 'cell-odds';
  const n=oddsNum(val); if(n===null) return 'cell-odds na';
  const max=Math.max(...nums),min=Math.min(...nums);
  if(max===min) return 'cell-odds';
  if(n===max) return 'cell-odds best';
  if(n===min) return 'cell-odds worst';
  return 'cell-odds';
}
function buildBookFilter(names) {
  const sel=document.getElementById('book-filter');
  const uniq=[...new Set(names)].sort();
  sel.innerHTML='<option value="all">All books</option>'+uniq.map(b=>`<option value="${b}">${b}</option>`).join('');
}
function sortBooksByValue(books,getFn) {
  return books.map(b=>{
    const vals=getFn(b).map(v=>oddsNum(v)).filter(v=>v!==null);
    return {b,score:vals.length?vals.reduce((a,v)=>a+v,0)/vals.length:-Infinity};
  }).sort((a,b)=>b.score-a.score).map(s=>s.b);
}
// Sort by a specific side: 'over' = highest over odds first, 'under' = highest under odds first
function sortBooksForProp(arr, side) {
  return [...arr]
    .filter(b => b.ov || b.un)
    .map(b => ({
      ...b,
      score: side === 'under' ? (oddsNum(b.un) ?? -Infinity) : (oddsNum(b.ov) ?? -Infinity)
    }))
    .sort((a, b) => b.score - a.score);
}

function toggleExpand(key) { openKey = openKey === key ? null : key; render(); }
function setExpandSort(key, side, e) {
  e.stopPropagation();
  expandSort[key] = side;
  render();
}

// Pad american odds to always show at least 3 digits (e.g. +98 → +098, -96 → -096)
function fmtOdds(str) {
  if (!str) return '—';
  const n = oddsNum(str);
  if (n === null) return str;
  const abs = Math.abs(n);
  const padded = abs < 100 ? String(abs).padStart(3, '0') : String(abs);
  return (n >= 0 ? '+' : '-') + padded;
}

function buildExpandHtml(booksArr, line, rowKey) {
  const side = expandSort[rowKey] || 'over';
  const sorted = sortBooksForProp(booksArr, side);
  if (!sorted.length) return '<div class="expand-content"><div class="expand-title">No data</div></div>';

  // Bar relative to active sort side only
  const activeNums = sorted.map(s => side === 'under' ? oddsNum(s.un) : oddsNum(s.ov)).filter(v => v !== null);
  const minA = activeNums.length ? Math.min(...activeNums) : 0;
  const rangeA = activeNums.length > 1 ? Math.max(...activeNums) - minA : 1;

  // Best value per side — only highlight the active side's best
  const ovNums = sorted.map(s => oddsNum(s.ov)).filter(v => v !== null);
  const unNums = sorted.map(s => oddsNum(s.un)).filter(v => v !== null);
  const bestOvVal = ovNums.length ? Math.max(...ovNums) : null;
  const bestUnVal = unNums.length ? Math.max(...unNums) : null;

  const safeKey = rowKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const overActive = side === 'over';

  const rows = sorted.map((s, i) => {
    const ovN = oddsNum(s.ov), unN = oddsNum(s.un);
    const activeVal = side === 'under' ? unN : ovN;
    const barPct = activeVal !== null ? Math.round(((activeVal - minA) / rangeA) * 100) : 0;
    // Only highlight best price on the ACTIVE side
    const ovBest = overActive && ovN !== null && ovN === bestOvVal;
    const unBest = !overActive && unN !== null && unN === bestUnVal;
    const isTopRow = i === 0;
    return `<div class="book-row${isTopRow ? ' top-row' : ''}">
      <div class="book-rank">${i + 1}</div>
      <div class="book-identity">${logoImg(s.name, 'book-logo')}<span class="book-name-text">${s.name}</span></div>
      <div class="book-bar-wrap"><div class="book-bar-fill${isTopRow ? ' top' : ''}" style="width:${barPct}%"></div></div>
      <div class="book-price-cell">
        <div class="book-price-label">OVER ${line}</div>
        <div class="book-price-val${ovBest ? ' best-ov' : !s.ov ? ' dim' : ''}">${fmtOdds(s.ov)}</div>
      </div>
      <div class="book-price-cell">
        <div class="book-price-label">UNDER ${line}</div>
        <div class="book-price-val${unBest ? ' best-un' : !s.un ? ' dim' : ''}">${fmtOdds(s.un)}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="expand-content">
    <div class="expand-header">
      <span class="expand-title">All books</span>
      <div class="sort-toggle">
        <span class="sort-toggle-label">Sort by</span>
        <button class="sort-btn${overActive ? ' active' : ''}" onclick="setExpandSort('${safeKey}','over',event)">Best over</button>
        <button class="sort-btn${!overActive ? ' active' : ''}" onclick="setExpandSort('${safeKey}','under',event)">Best under</button>
      </div>
    </div>
    <div class="book-list">${rows}</div>
  </div>`;
}

async function fetchData() {
  const key=document.getElementById('apikey').value.trim();
  if(!key){setStatus('err','Please enter an API key');return;}
  setStatus('loading','Fetching...'); openKey=null;
  try {
    if(currentTab==='game'){
      const res=await fetch(`https://api.the-odds-api.com/v4/sports/basketball_nba/odds/?apiKey=${key}&regions=us,us2,us_ex&markets=h2h,spreads,totals&oddsFormat=american`);
      const rem=res.headers.get('x-requests-remaining');
      if(!res.ok){const e=await res.json();setStatus('err',e.message||'API error');return;}
      const data=await res.json();
      liveData={type:'game',events:data};
      buildBookFilter(data.flatMap(e=>e.bookmakers.map(b=>b.title)));
      setStatus('live',`${data.length} games loaded · regions: us, us2, us_ex`,rem?rem+' credits left':'');
      render();
    } else {
      const evRes=await fetch(`https://api.the-odds-api.com/v4/sports/basketball_nba/events?apiKey=${key}`);
      if(!evRes.ok){const e=await evRes.json();setStatus('err',e.message||'API error');return;}
      allEvents=await evRes.json();
      if(!allEvents.length){setStatus('live','No upcoming NBA events');return;}
      const picker=document.getElementById('game-picker');
      picker.innerHTML=allEvents.map(e=>{
        const t=new Date(e.commence_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        return `<option value="${e.id}">${e.away_team} @ ${e.home_team} — ${t}</option>`;
      }).join('');
      picker.style.display=''; fetchProps();
    }
  } catch(e){setStatus('err','Network error: '+e.message);}
}

async function fetchProps() {
  const key=document.getElementById('apikey').value.trim(); if(!key) return;
  const picker=document.getElementById('game-picker');
  const eventId=picker.value; if(!eventId) return;
  const statF=document.getElementById('stat-filter').value;
  const markets=statF==='all'?'player_points,player_rebounds,player_assists,player_threes,player_blocks,player_steals':statF;
  setStatus('loading','Loading props...'); openKey=null;
  try {
    const res=await fetch(`https://api.the-odds-api.com/v4/sports/basketball_nba/events/${eventId}/odds?apiKey=${key}&regions=us,us2,us_ex&markets=${markets}&oddsFormat=american`);
    const rem=res.headers.get('x-requests-remaining');
    if(!res.ok){const e=await res.json();setStatus('err',e.message||'API error');return;}
    const data=await res.json();
    liveData={type:'props',raw:data};
    buildBookFilter((data.bookmakers||[]).map(b=>b.title));
    setStatus('live',`${data.away_team} @ ${data.home_team} · regions: us, us2, us_ex`,rem?rem+' credits left':'');
    render();
  } catch(e){setStatus('err','Network error: '+e.message);}
}

function render() {
  if(!liveData) return;
  const search=document.getElementById('search').value.toLowerCase();
  const statF=document.getElementById('stat-filter').value;
  const bookF=document.getElementById('book-filter').value;
  const thead=document.getElementById('thead');
  const tbody=document.getElementById('tbody');
  if(currentTab==='props') renderProps(thead,tbody,search,statF,bookF);
  else renderGame(thead,tbody,search,bookF);
}

function renderProps(thead,tbody,search,statF,bookF) {
  let rows=[];
  if(liveData.mock){
    rows=liveData.props;
    if(statF!=='all') rows=rows.filter(r=>r.market===statF);
    if(search) rows=rows.filter(r=>r.player.toLowerCase().includes(search)||r.team.toLowerCase().includes(search));
    rows=rows.map(r=>({...r,booksArr:Object.entries(r.books).map(([name,odds])=>({name,ov:odds[0],un:odds[1]}))}));
  } else if(liveData.type==='props'&&liveData.raw){
    const raw=liveData.raw;
    const filteredBMs=bookF==='all'?raw.bookmakers:raw.bookmakers.filter(b=>b.title===bookF);
    const playerMap={};
    filteredBMs.forEach(book=>{
      book.markets.forEach(mkt=>{
        if(statF!=='all'&&mkt.key!==statF) return;
        mkt.outcomes.forEach(o=>{
          if(!o.description) return;
          const key=`${o.description}|||${mkt.key}|||${o.point}`;
          if(!playerMap[key]) playerMap[key]={player:o.description,team:'',market:mkt.key,line:o.point,books:{}};
          if(!playerMap[key].books[book.title]) playerMap[key].books[book.title]={};
          playerMap[key].books[book.title][o.name.toLowerCase()]=parseAm(o.price);
        });
      });
    });
    rows=Object.values(playerMap);
    if(search) rows=rows.filter(r=>r.player.toLowerCase().includes(search));
    rows.sort((a,b)=>a.player.localeCompare(b.player)||a.market.localeCompare(b.market));
    rows=rows.map(r=>({...r,booksArr:Object.entries(r.books).map(([name,sides])=>({name,ov:sides.over||null,un:sides.under||null}))}));
  }

  if(!rows.length){thead.innerHTML='';tbody.innerHTML=`<tr><td colspan="6" class="empty-msg">No props found</td></tr>`;return;}

  thead.innerHTML=`<tr>
    <th style="width:44px"></th>
    <th style="min-width:160px">Player</th>
    <th style="min-width:130px">Market</th>
    <th style="min-width:150px">Best over</th>
    <th style="min-width:150px">Best under</th>
    <th style="min-width:80px">Books</th>
  </tr>`;

  let lastPlayer=null, html='';
  rows.forEach((row,idx)=>{
    const isNew=row.player!==lastPlayer; lastPlayer=row.player;
    const rowKey=`${row.player}|||${row.market}|||${row.line}`;
    const isOpen=openKey===rowKey;
    const safeKey=rowKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const withOv=row.booksArr.filter(b=>b.ov&&oddsNum(b.ov)!==null).sort((a,b)=>oddsNum(b.ov)-oddsNum(a.ov));
    const withUn=row.booksArr.filter(b=>b.un&&oddsNum(b.un)!==null).sort((a,b)=>oddsNum(b.un)-oddsNum(a.un));
    const bestOv=withOv[0]||null, bestUn=withUn[0]||null;
    const bookCount=row.booksArr.filter(b=>b.ov||b.un).length;
    const expandHtml=buildExpandHtml(row.booksArr,row.line,rowKey);
    if(isNew&&idx>0) html+=`<tr class="sep-row"><td colspan="6"></td></tr>`;
    html+=`
      <tr class="prop-summary${isOpen?' open':''}" onclick="toggleExpand('${safeKey}')">
        <td style="width:44px;padding-left:18px"><span class="chevron">▾</span></td>
        <td style="min-width:160px">
          ${isNew?`<div class="player-name">${row.player}</div>${row.team?`<div class="team-tag">${row.team}</div>`:'`'}`:``}
        </td>
        <td style="min-width:130px">
          <span class="market-tag">${MARKET_LABELS[row.market]||row.market}</span><span class="line-tag">${row.line}</span>
        </td>
        <td style="min-width:150px">
          ${bestOv
            ?`<div class="best-price">${fmtOdds(bestOv.ov)}</div><div class="best-book-row">${faviconSmall(bestOv.name)}<span class="best-book-name">${bestOv.name}</span></div>`
            :`<span style="color:var(--dim);font-size:13px">—</span>`}
        </td>
        <td style="min-width:150px">
          ${bestUn
            ?`<div class="best-price">${fmtOdds(bestUn.un)}</div><div class="best-book-row">${faviconSmall(bestUn.name)}<span class="best-book-name">${bestUn.name}</span></div>`
            :`<span style="color:var(--dim);font-size:13px">—</span>`}
        </td>
        <td><span class="book-count">${bookCount} book${bookCount!==1?'s':''}</span></td>
      </tr>
      <tr class="expand-row">
        <td colspan="6" style="padding:0;border-bottom:${isOpen?'1px solid var(--border)':'none'}">
          <div class="expand-inner${isOpen?' open':''}">${expandHtml}</div>
        </td>
      </tr>`;
  });
  tbody.innerHTML=html;
}

// Game lines expand sort state: keyed by gameKey+'|||'+market+'|||'+side → 'team_a' or 'team_b'
const gameExpandSort = {};

function toggleGameExpand(key) { openKey = openKey === key ? null : key; render(); }
function setGameSort(key, side, e) { e.stopPropagation(); gameExpandSort[key] = side; render(); }

function buildGameExpandHtml(market, label, booksArr, sideAName, sideBName, rowKey) {
  const sortSide = gameExpandSort[rowKey] || 'a';
  const sorted = [...booksArr]
    .filter(b => b.a || b.b)
    .map(b => ({ ...b, score: sortSide === 'b' ? (oddsNum(b.b) ?? -Infinity) : (oddsNum(b.a) ?? -Infinity) }))
    .sort((a, b) => b.score - a.score);

  if (!sorted.length) return '<div class="expand-content"><div class="expand-title">No data</div></div>';

  const activeNums = sorted.map(s => sortSide === 'b' ? oddsNum(s.b) : oddsNum(s.a)).filter(v => v !== null);
  const minA = activeNums.length ? Math.min(...activeNums) : 0;
  const rangeA = activeNums.length > 1 ? Math.max(...activeNums) - minA : 1;
  const aNums = sorted.map(s => oddsNum(s.a)).filter(v => v !== null);
  const bNums = sorted.map(s => oddsNum(s.b)).filter(v => v !== null);
  const bestAVal = aNums.length ? Math.max(...aNums) : null;
  const bestBVal = bNums.length ? Math.max(...bNums) : null;
  const safeKey = rowKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  const rows = sorted.map((s, i) => {
    const aN = oddsNum(s.a), bN = oddsNum(s.b);
    const activeVal = sortSide === 'b' ? bN : aN;
    const barPct = activeVal !== null ? Math.round(((activeVal - minA) / rangeA) * 100) : 0;
    // Only highlight best on the active side
    const aBest = sortSide === 'a' && aN !== null && aN === bestAVal;
    const bBest = sortSide === 'b' && bN !== null && bN === bestBVal;
    const isTop = i === 0;
    return `<div class="book-row${isTop ? ' top-row' : ''}">
      <div class="book-rank">${i + 1}</div>
      <div class="book-identity">${logoImg(s.name, 'book-logo')}<span class="book-name-text">${s.name}</span></div>
      <div class="book-bar-wrap"><div class="book-bar-fill${isTop ? ' top' : ''}" style="width:${barPct}%"></div></div>
      <div class="book-price-cell">
        <div class="book-price-label">${sideAName}${s.lineA ? ' ' + s.lineA : ''}</div>
        <div class="book-price-val${aBest ? ' best-ov' : !s.a ? ' dim' : ''}">${fmtOdds(s.a)}</div>
      </div>
      <div class="book-price-cell">
        <div class="book-price-label">${sideBName}${s.lineB ? ' ' + s.lineB : ''}</div>
        <div class="book-price-val${bBest ? ' best-un' : !s.b ? ' dim' : ''}">${fmtOdds(s.b)}</div>
      </div>
    </div>`;
  }).join('');

  return `<div class="expand-content">
    <div class="expand-header">
      <span class="expand-title">${label} · all books</span>
      <div class="sort-toggle">
        <span class="sort-toggle-label">Sort by</span>
        <button class="sort-btn${sortSide === 'a' ? ' active' : ''}" onclick="setGameSort('${safeKey}','a',event)">${sideAName}</button>
        <button class="sort-btn${sortSide === 'b' ? ' active' : ''}" onclick="setGameSort('${safeKey}','b',event)">${sideBName}</button>
      </div>
    </div>
    <div class="book-list">${rows}</div>
  </div>`;
}

function renderGame(thead, tbody, search, bookF) {
  // Normalize data into a unified games array
  let games = [];

  if (liveData.mock) {
    const raw = search ? liveData.games.filter(g => g.matchup.toLowerCase().includes(search)) : liveData.games;
    games = raw.map(g => {
      const [away, home] = g.matchup.split(' @ ');
      const books = Object.keys(g.spreads);
      return {
        matchup: g.matchup, time: g.time, away, home,
        markets: [
          { key: 'spread', label: 'Spread', booksArr: books.map(b => ({ name: b, lineA: g.spreads[b]?.[0], a: g.spreads[b]?.[1], lineB: g.spreads[b]?.[2], b: g.spreads[b]?.[3] })) },
          { key: 'total',  label: 'Total',  booksArr: books.map(b => ({ name: b, lineA: 'o'+g.totals[b]?.[0], a: g.totals[b]?.[1], lineB: 'u'+g.totals[b]?.[2], b: g.totals[b]?.[3] })) },
          { key: 'ml',     label: 'ML',     booksArr: books.map(b => ({ name: b, lineA: null, a: g.ml[b]?.[0], lineB: null, b: g.ml[b]?.[1] })) },
        ]
      };
    });
  } else if (liveData.type === 'game' && liveData.events) {
    const events = liveData.events.filter(e => !search || (e.home_team + e.away_team).toLowerCase().includes(search));
    games = events.map(ev => {
      const time = new Date(ev.commence_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const mkBooks = (mktKey, sideAName, sideBName) => ev.bookmakers.map(bk => {
        const mkt = bk.markets.find(m => m.key === mktKey);
        if (!mkt) return { name: bk.title, a: null, b: null, lineA: null, lineB: null };
        const oA = mkt.outcomes.find(o => o.name === sideAName);
        const oB = mkt.outcomes.find(o => o.name === sideBName);
        return {
          name: bk.title,
          lineA: oA?.point != null ? (oA.point > 0 ? '+' : '') + oA.point : null,
          a: parseAm(oA?.price),
          lineB: oB?.point != null ? (oB.point > 0 ? '+' : '') + oB.point : null,
          b: parseAm(oB?.price),
        };
      });
      return {
        matchup: `${ev.away_team} @ ${ev.home_team}`, time,
        away: ev.away_team, home: ev.home_team,
        markets: [
          { key: 'spread', label: 'Spread', booksArr: mkBooks('spreads', ev.away_team, ev.home_team) },
          { key: 'total',  label: 'Total',  booksArr: (() => { const b = mkBooks('totals','Over','Under'); return b.map(x=>({...x,lineA:x.lineA?'o'+x.lineA:null,lineB:x.lineB?'u'+x.lineB:null})); })() },
          { key: 'ml',     label: 'ML',     booksArr: mkBooks('h2h', ev.away_team, ev.home_team) },
        ]
      };
    });
  }

  if (!games.length) { thead.innerHTML = ''; tbody.innerHTML = `<tr><td colspan="5" class="empty-msg">No games found</td></tr>`; return; }

  thead.innerHTML = `<tr>
    <th style="width:44px"></th>
    <th style="min-width:180px">Game</th>
    <th style="min-width:100px">Market</th>
    <th style="min-width:150px">Best ${games[0]?.away || 'away'}</th>
    <th style="min-width:150px">Best ${games[0]?.home || 'home'}</th>
  </tr>`;

  // Dynamic header won't work per-row, so use generic labels
  thead.innerHTML = `<tr>
    <th style="width:44px"></th>
    <th style="min-width:180px">Game</th>
    <th style="min-width:100px">Market</th>
    <th style="min-width:150px">Best side A</th>
    <th style="min-width:150px">Best side B</th>
  </tr>`;

  let html = '', lastGame = null;
  games.forEach(g => {
    g.markets.forEach((mkt, mi) => {
      const rowKey = `${g.matchup}|||${mkt.key}`;
      const isOpen = openKey === rowKey;
      const safeKey = rowKey.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const sideAName = mkt.key === 'total' ? 'Over' : g.away;
      const sideBName = mkt.key === 'total' ? 'Under' : g.home;

      const withA = mkt.booksArr.filter(b => b.a && oddsNum(b.a) !== null).sort((a,b) => oddsNum(b.a) - oddsNum(a.a));
      const withB = mkt.booksArr.filter(b => b.b && oddsNum(b.b) !== null).sort((a,b) => oddsNum(b.b) - oddsNum(a.b));
      const bestA = withA[0] || null, bestB = withB[0] || null;
      const bookCount = mkt.booksArr.filter(b => b.a || b.b).length;
      const expandHtml = buildGameExpandHtml(mkt.key, mkt.label, mkt.booksArr, sideAName, sideBName, rowKey);

      if (mi === 0 && lastGame !== null) html += `<tr class="sep-row"><td colspan="5"></td></tr>`;
      lastGame = g.matchup;

      html += `
        <tr class="prop-summary${isOpen ? ' open' : ''}" onclick="toggleGameExpand('${safeKey}')">
          <td style="width:44px;padding-left:18px"><span class="chevron">▾</span></td>
          <td style="min-width:180px">
            ${mi === 0 ? `<div class="player-name">${g.matchup}</div><div class="team-tag">${g.time}</div>` : ''}
          </td>
          <td style="min-width:100px"><span class="market-tag">${mkt.label}</span></td>
          <td style="min-width:150px">
            ${bestA
              ? `<div class="best-price">${fmtOdds(bestA.a)}</div><div class="best-book-row">${faviconSmall(bestA.name)}<span class="best-book-name">${bestA.name}</span></div>`
              : `<span style="color:var(--dim);font-size:13px">—</span>`}
          </td>
          <td style="min-width:150px">
            ${bestB
              ? `<div class="best-price">${fmtOdds(bestB.b)}</div><div class="best-book-row">${faviconSmall(bestB.name)}<span class="best-book-name">${bestB.name}</span></div>`
              : `<span style="color:var(--dim);font-size:13px">—</span>`}
          </td>
        </tr>
        <tr class="expand-row">
          <td colspan="5" style="padding:0;border-bottom:${isOpen ? '1px solid var(--border)' : 'none'}">
            <div class="expand-inner${isOpen ? ' open' : ''}">${expandHtml}</div>
          </td>
        </tr>`;
    });
  });
  tbody.innerHTML = html;
}
