<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NBA MATRIX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f0e1a;color:#e2e8f0;font-family:'Inter',sans-serif;min-height:100vh;font-size:15px;}
button{font-family:'Inter',sans-serif;cursor:pointer;font-size:15px;}
input{font-family:'Inter',sans-serif;font-size:15px;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#1a1830;}
::-webkit-scrollbar-thumb{background:#3d3560;border-radius:3px;}

#header{padding:14px 32px;border-bottom:1px solid #1e1c35;display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:#0f0e1a;}
#tabs{display:flex;border-bottom:1px solid #1e1c35;background:#0f0e1a;padding:0 32px;}
.tab-btn{padding:11px 22px;font-size:12px;letter-spacing:1px;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;color:#6b6896;text-transform:uppercase;font-family:'Inter',sans-serif;cursor:pointer;transition:color 0.2s;}
.tab-btn:hover{color:#a89cf7;}
.tab-btn.active{color:#a78bfa;border-bottom-color:#7c3aed;}

#main{padding:24px 32px;width:100%;}

.slot{margin-bottom:8px;padding:14px 18px;background:#16152a;border-radius:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid #1e1c35;}
.slot.loaded{border-color:#7c3aed44;background:#1a1535;}
.upload-label{cursor:pointer;background:#7c3aed;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;color:#fff;font-family:'Inter',sans-serif;transition:background 0.2s;}
.upload-label:hover{background:#6d28d9;}

#merge-btn{width:100%;padding:14px;font-size:13px;font-weight:700;letter-spacing:0.5px;border:none;border-radius:8px;margin-top:8px;transition:all 0.2s;}

#controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
#controls input[type=text]{background:#16152a;border:1px solid #1e1c35;border-radius:6px;padding:8px 14px;font-size:13px;color:#e2e8f0;outline:none;width:170px;transition:border-color 0.2s;}
#controls input[type=text]:focus{border-color:#7c3aed;}

.ctrl-btn{background:#16152a;border:1px solid #1e1c35;color:#6b6896;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;letter-spacing:0.3px;transition:all 0.2s;}
.ctrl-btn:hover{border-color:#7c3aed55;color:#a89cf7;}
.ctrl-btn.active{background:#7c3aed22;border-color:#7c3aed;color:#a78bfa;}

.stat-btn{background:#16152a;border:1px solid #1e1c35;color:#6b6896;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;transition:all 0.2s;}
.stat-btn:hover{border-color:#7c3aed55;color:#a89cf7;}
.stat-btn.active{background:#7c3aed22;border-color:#7c3aed;color:#a78bfa;}

#export-btn{background:#7c3aed;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:13px;font-weight:600;transition:background 0.2s;}
#export-btn:hover{background:#6d28d9;}

#table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #1e1c35;}
table{width:100%;border-collapse:collapse;table-layout:auto;}
thead{background:#16152a;}
th{padding:10px 12px;font-size:12px;color:#6b6896;letter-spacing:0.8px;font-weight:600;text-transform:uppercase;white-space:nowrap;}
th.left{text-align:left;}th.center{text-align:center;}
tr.even{background:#0f0e1a;}tr.odd{background:#121120;}
tr:hover{background:#1a1535 !important;}
td{border-bottom:1px solid #1a1830;}

.tol-wrap{display:flex;align-items:center;gap:8px;margin-left:auto;}

#tol-val{font-size:13px;font-weight:700;color:#a78bfa;min-width:44px;}
#shown-count{font-size:12px;font-weight:500;color:#6b6896;}
#log{font-size:12px;color:#6b6896;margin-left:auto;}
.sep{color:#2a2845;font-size:10px;}
#empty-results{color:#3d3a6b;text-align:center;padding:60px 0;font-size:13px;}

/* MODAL */
#track-modal{display:none;position:fixed;inset:0;background:#0008;z-index:1000;align-items:center;justify-content:center;}
#track-modal.open{display:flex;}
#track-modal-box{background:#16152a;border:1px solid #2a2845;border-radius:14px;padding:28px 28px 24px;width:460px;max-width:95vw;}
#track-modal-box h3{font-size:17px;font-weight:800;color:#fff;margin-bottom:2px;}
#track-modal-box .sub{font-size:12px;color:#6b6896;margin-bottom:22px;}
.modal-row{display:flex;gap:12px;margin-bottom:12px;}
.modal-field{flex:1;display:flex;flex-direction:column;gap:5px;}
.modal-field label{font-size:10px;font-weight:700;color:#6b6896;letter-spacing:1px;text-transform:uppercase;}
.modal-field input,.modal-field select{background:#0f0e1a;border:1px solid #1e1c35;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;width:100%;}
.modal-field input:focus,.modal-field select:focus{border-color:#7c3aed;}
.modal-field select option{background:#16152a;}
#modal-proj-display{font-size:13px;color:#a78bfa;font-weight:600;margin-bottom:4px;min-height:18px;}
#modal-stake-preview{font-size:13px;color:#6b6896;margin-bottom:18px;min-height:18px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.modal-btn-cancel{background:transparent;border:1px solid #1e1c35;color:#6b6896;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.modal-btn-save{background:#7c3aed;border:none;color:#fff;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;}

/* QUICK GRADE */
#qg-overlay{display:none;position:fixed;inset:0;background:#0a0918;z-index:2000;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;}
#qg-overlay.open{display:flex;}
#qg-card{background:#16152a;border:1px solid #2a2845;border-radius:16px;padding:32px;width:420px;max-width:95vw;text-align:center;}
#qg-progress{font-size:11px;color:#6b6896;letter-spacing:1px;margin-bottom:20px;}
#qg-player{font-size:24px;font-weight:800;color:#fff;margin-bottom:6px;}
#qg-detail{font-size:15px;color:#a78bfa;font-weight:600;margin-bottom:6px;}
#qg-proj{font-size:13px;color:#6b6896;margin-bottom:28px;}
.qg-btns{display:flex;gap:12px;justify-content:center;}
.qg-btn{border:none;border-radius:10px;padding:16px 28px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:transform 0.1s;letter-spacing:0.5px;}
.qg-btn:active{transform:scale(0.95);}
#qg-hit{background:#22c55e;color:#fff;}
#qg-miss{background:#f87171;color:#fff;}
#qg-void{background:#f59e0b;color:#fff;}
#qg-skip{background:#16152a;border:1px solid #2a2845;color:#6b6896;}
#qg-close-btn{margin-top:20px;background:transparent;border:none;color:#6b6896;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}

/* TRACKER */
.tracker-section{margin-bottom:28px;}
.tracker-section h4{font-size:13px;font-weight:700;color:#6b6896;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #1e1c35;}
.stat-card{display:inline-flex;flex-direction:column;background:#16152a;border:1px solid #1e1c35;border-radius:8px;padding:14px 20px;margin:0 8px 8px 0;min-width:130px;}
.stat-card .sc-label{font-size:11px;color:#6b6896;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;}
.stat-card .sc-val{font-size:22px;font-weight:800;color:#fff;}
.stat-card .sc-sub{font-size:12px;color:#6b6896;margin-top:3px;}
.stat-card .sc-units{font-size:14px;font-weight:800;margin-top:3px;}
.stat-card .sc-roi{font-size:11px;color:#a78bfa;margin-top:2px;font-weight:600;}
.bet-row-hit{color:#22c55e;}
.bet-row-miss{color:#f87171;}
.bet-row-pending{color:#a78bfa;}
#tracker-controls{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
#tracker-export-btn{background:#16152a;border:1px solid #2a2845;color:#a78bfa;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
#tracker-import-btn{background:#16152a;border:1px solid #2a2845;color:#6b6896;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.result-btn{border:none;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin:0 2px;}
.result-btn.hit{background:#22c55e22;color:#22c55e;border:1px solid #22c55e55;}
.result-btn.miss{background:#f8717122;color:#f87171;border:1px solid #f8717155;}
.result-btn.pending{background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa55;}

#copy-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#7c3aed;color:#fff;padding:8px 20px;border-radius:8px;
  font-size:13px;font-weight:600;opacity:0;transition:opacity 0.2s;
  pointer-events:none;z-index:9999;
}
.copyable{cursor:pointer;}
.copyable:hover{opacity:0.8;}
</style>

</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:32px;height:32px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:14px;font-weight:900;color:#fff;">N</span>
    </div>
    <div>
      <span style="font-size:18px;font-weight:800;color:#fff;letter-spacing:0.5px;">NBA</span>
      <span style="font-size:18px;font-weight:800;color:#a78bfa;letter-spacing:0.5px;margin-left:5px;">MATRIX</span>
    </div>
  </div>
  <div id="source-badges" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-left:16px;"></div>
  <span id="log"></span>
</div>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('upload')">UPLOAD</button>
  <button class="tab-btn" onclick="switchTab('results')">RESULTS</button>
  <button class="tab-btn" onclick="switchTab('tracker')">TRACKER</button>
  <button class="tab-btn" onclick="switchTab('autograde')">AUTO GRADE</button>
</div>

<div id="main">
  <!-- UPLOAD TAB -->
  <div id="upload-tab">
    <div id="slots-container"></div>
    <button id="merge-btn" onclick="runMerge()">RUN CONSENSUS MERGE — 0/4 SOURCES LOADED</button>
  </div>

  <!-- TRACKER TAB -->
  <div id="tracker-tab" style="display:none;"></div>

  <!-- AUTO GRADE TAB -->
  <div id="autograde-tab" style="display:none;"></div>

  <!-- RESULTS TAB -->
  <div id="results-tab" style="display:none;">
    <div id="empty-results">Upload sources and run merge first.</div>
    <div id="results-content" style="display:none;">
      <div id="controls">
        <input type="text" id="search-box" placeholder="Search player…" oninput="renderTable()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <button class="ctrl-btn" id="con-btn" onclick="toggleConOnly()">CONSENSUS ONLY</button>
        <span class="sep">|</span>
        <span style="color:#3d5570;font-size:11px;font-weight:600;letter-spacing:2px;">SORT</span>
        <button class="ctrl-btn" id="tight-btn" onclick="toggleSortMode()">TIGHTEST FIRST</button>
        <span class="sep">|</span>
        <div id="stat-btns"></div>
        <div class="tol-wrap">
          <span style="font-size:12px;font-weight:600;color:#6b6896;">TIGHTNESS</span>
          <div style="display:flex;align-items:center;gap:4px;background:#16152a;border:1px solid #1e1c35;border-radius:6px;padding:4px 10px;">
            <span style="font-size:12px;color:#6b6896;">±</span>
            <input type="number" id="tol-input" min="1" max="100" value="15" autocomplete="off" spellcheck="false"
              oninput="onTolChange()"
              style="width:40px;background:transparent;border:none;outline:none;color:#a78bfa;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;text-align:center;"/>
            <span style="font-size:12px;color:#6b6896;">%</span>
          </div>
          <span id="shown-count"></span>
        </div>
        <button id="export-btn" onclick="doExport()">EXPORT CSV</button>
      </div>
      <div id="table-wrap">
        <table>
          <thead id="table-head"></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

function norm(s) {
  if (!s) return "";
  return s.toLowerCase().replace(/\b(jr|sr|ii|iii|iv)\b/g,"").replace(/[^a-z]/g,"");
}


// Known name aliases: maps normalized source name -> normalized UA name
const NAME_ALIASES = {
  "carltoncarrington": "bubcarrington",
  "moewagner": "moritzwagner",
};

function resolveNorm(n) {
  const normalized = norm(n);
  return NAME_ALIASES[normalized] || normalized;
}

function parseCSV(raw) {
  const text = raw.charCodeAt(0)===0xFEFF ? raw.slice(1) : raw;
  const lines = text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const nonEmpty = lines.filter(l=>l.trim());
  if (!nonEmpty.length) return [];
  const headers = splitLine(nonEmpty[0]);
  return nonEmpty.slice(1).map(line=>{
    const vals = splitLine(line);
    const row = {};
    headers.forEach((h,i)=>{ row[h]=vals[i]??""; });
    return row;
  }).filter(r=>Object.values(r).some(v=>v.trim()));
}

function splitLine(line) {
  const vals=[]; let cur="", inQ=false;
  for (let ci=0; ci<line.length; ci++) {
    const ch = line[ci];
    if (ch==='"') { inQ=!inQ; }
    else if (ch===',' && !inQ) { vals.push(cur.trim()); cur=""; }
    else cur+=ch;
  }
  vals.push(cur.trim());
  return vals.map(v=>v.replace(/^"|"$/g,"").trim());
}

function findCol(headers, candidates) {
  const lc = headers.map(h=>h.toLowerCase().trim());
  for (const c of candidates) {
    const i = lc.findIndex(h=>h===c);
    if (i!==-1) return headers[i];
  }
  for (const c of candidates) {
    const i = lc.findIndex(h=>h.includes(c));
    if (i!==-1) return headers[i];
  }
  return null;
}

function parseSource(text) {
  const rows = parseCSV(text);
  if (!rows.length) return [];
  const h = Object.keys(rows[0]);
  const C = {
    name:    findCol(h,["player","name"]),
    pts:     findCol(h,["points","pts","exp pts"]),
    reb:     findCol(h,["rebounds","reb","exp reb"]),
    ast:     findCol(h,["assists","ast","exp ast"]),
    threepm: findCol(h,["3pm","exp 3p","three pointers made","threepm"]),
    pra:     findCol(h,["exp pra","pra","p-r-a"]),
    min:     findCol(h,["proj min","minutes","mins","min"]),
  };
  if (!C.name) return [];
  return rows.filter(r=>r[C.name]?.trim()).map(r=>{
    const g=col=>{if(!col)return null;const v=parseFloat(r[col]);return isNaN(v)?null:v;};
    const pts=g(C.pts),reb=g(C.reb),ast=g(C.ast);
    const pra=g(C.pra)??(pts!=null&&reb!=null&&ast!=null?pts+reb+ast:null);
    return {rawName:r[C.name].trim(), norm:resolveNorm(r[C.name]), pts,reb,ast,threepm:g(C.threepm),pra,min:g(C.min)};
  });
}

function loadFile(idx, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {

    slots[idx] = {label: file.name, players};
    setLog(`${SOURCES[idx].label} loaded: ${players.length} players`);
    buildSlots();
    updateBadges();
  };
  reader.readAsText(file);
}

function getSlotLookups() {
  return slots.map(s => {
    if (!s) return null;
    const lk = {};
    s.players.forEach(p => { lk[p.norm] = p; });
    return lk;
  });
}

function getStatVals(r, stat, lookups) {
  return lookups.flatMap(lk => {
    if (!lk) return [];
    const m = lk[norm(r.rawName)];
    return (m && m[stat] != null && m[stat] > 0) ? [m[stat]] : [];
  });
}

function isTight(r, stat, lookups) {
  const vals = getStatVals(r, stat, lookups);
  const minNeeded = Math.min(3, slots.filter(Boolean).length);
  if (vals.length < minNeeded) return false;
  const avg = vals.reduce((a,b)=>a+b,0) / vals.length;
  if (avg === 0) return false;
  return vals.every(v => Math.abs(v - avg) / avg * 100 <= tolerance);
}

function runMerge() {
  const active = slots.filter(Boolean);
  if (!active.length) { setLog("Load at least 1 source"); return; }

  const lookups = getSlotLookups();
  const minCon = Math.min(3, active.length);

  merged = UA_TEMPLATE.map(r => {
    const epNorm = norm(r.name);
    const matches = lookups.map(lk => lk ? (lk[epNorm]||null) : null);
    const found = matches.filter(Boolean);
    const con = {};
    STATS.forEach(stat => {
      const vals = found.map(p=>p[stat]).filter(v=>v!=null && v>0);
      con[stat] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    });
    return {rawName:r.name, norm:epNorm, team:r.team, pos:r.position, matches, found:found.length, con, isConsensus:found.length>=minCon};
  });

  const nM = merged.filter(r=>r.found>0).length;
  const nC = merged.filter(r=>r.isConsensus).length;
  setLog(`${nM} matched · ${nC} consensus (need ${minCon} sources)`);
  switchTab("results");
  renderTable();
}

}

let rowCache = [];

function trackRow(i) {
  const r = rowCache[i];
  if (!r) return;

}

function renderTable() {
  if (!merged) return;
  document.getElementById("empty-results").style.display="none";
  document.getElementById("results-content").style.display="block";
  buildStatBtns();

  const lookups = getSlotLookups();
  const search = document.getElementById("search-box").value.toLowerCase();

  let rows = merged
    .filter(r => !conOnly || isTight(r, sortBy, lookups))
    .filter(r => !search || r.rawName.toLowerCase().includes(search))
    .sort((a,b) => {
      if (sortMode==="consensus") {
        const aVals=getStatVals(a,sortBy,lookups), bVals=getStatVals(b,sortBy,lookups);
        const aAvg=aVals.length?aVals.reduce((x,y)=>x+y,0)/aVals.length:0;
        const bAvg=bVals.length?bVals.reduce((x,y)=>x+y,0)/bVals.length:0;
        const aSpread=aVals.length>1?Math.max(...aVals)-Math.min(...aVals):999;
        const bSpread=bVals.length>1?Math.max(...bVals)-Math.min(...bVals):999;
        if (aSpread!==bSpread) return aSpread-bSpread;
        if (aVals.length!==bVals.length) return bVals.length-aVals.length;
        return bAvg-aAvg;
      }
      return (b.con[sortBy]??-1)-(a.con[sortBy]??-1);
    });

  document.getElementById("shown-count").textContent = `${rows.length} shown`;

  // Header
  const head = document.getElementById("table-head");
  head.innerHTML = `<tr style="border-bottom:1px solid #252525">${
    ["PLAYER","POS","TEAM","INJ","TRACK",...SOURCES.map(s=>s.label),STAT_LABEL[sortBy]+" (AVG)","GAP"]
    .map((h,i)=>{
      const tight = i===1||i===2;
      const style = tight ? 'style="padding:10px 6px;width:50px"' : '';
      return `<th class="${i===0?'left':'center'}" ${style}>${h}</th>`;
    }).join("")
  }</tr>`;

  // Body
  const tbody = document.getElementById("table-body");
  // Cache rows for safe onclick access (avoids apostrophe issues)
  rowCache = rows.map((r,i) => {
    const lk = getSlotLookups();
    const srcVals = lk.map(l => { if(!l) return null; const m=l[norm(r.rawName)]; return (m&&m[sortBy]!=null)?m[sortBy]:null; });
    const pv = srcVals.filter(v=>v!=null);
    const avg = pv.length ? pv.reduce((a,b)=>a+b,0)/pv.length : null;
    return { player: r.rawName, pos: r.pos, team: r.team, stat: STAT_LABEL[sortBy], proj: avg };
  });

  tbody.innerHTML = rows.map((r,i)=>{
    const srcVals = lookups.map(lk=>{
      if(!lk) return null;
      const m=lk[norm(r.rawName)];
      return (m&&m[sortBy]!=null)?m[sortBy]:null;
    });
    const presentVals = srcVals.filter(v=>v!=null);
    const avg = presentVals.length ? presentVals.reduce((a,b)=>a+b,0)/presentVals.length : null;
    const tight = isTight(r, sortBy, lookups);
    const tc = presentVals.length===0?"#2a2845":tight?"#ffffff":"#8b87b8";
    const pc = presentVals.length===0?"#2a2845":tight?"#a78bfa":"#6b6896";

    const srcCells = srcVals.map((v,si)=>{
      const withinTol = v!=null&&avg!=null&&(avg===0||Math.abs(v-avg)/avg*100<=tolerance);
      if (v!=null) {
        return `<td style="padding:8px 12px;text-align:center" class="copyable" onclick="copyVal('${v.toFixed(2)}')" title="Click to copy"><span style="color:${withinTol?SOURCES[si].color:SOURCES[si].color+'33'};font-size:14px;font-weight:${withinTol?700:400}">${v.toFixed(2)}</span></td>`;
      }
      return `<td style="padding:8px 12px;text-align:center"><span style="color:#2a2845">—</span></td>`;
    }).join("");

    const gap = presentVals.length >= 2 ? Math.max(...presentVals) - Math.min(...presentVals) : null;
    const gapColor = gap === null ? '#2a2845' : gap <= 1 ? '#22c55e' : gap <= 2.5 ? '#f59e0b' : '#f87171';

    return `<tr class="${i%2===0?'even':'odd'}">
      <td style="padding:8px 12px;font-size:15px;font-weight:600;color:${tc};white-space:nowrap;width:200px">${r.rawName}</td>
      <td style="padding:8px 6px;font-size:14px;font-weight:500;color:#ffffff;text-align:center;width:50px">${r.pos}</td>
      <td style="padding:8px 6px;font-size:14px;font-weight:600;color:#ffffff;text-align:center;width:50px">${r.team}</td>
      <td style="padding:8px 12px;font-size:13px;font-weight:600;text-align:center;color:#f87171"></td>
      <td style="padding:4px 8px;text-align:center"><button onclick="trackRow(${i})" style="background:#7c3aed22;border:1px solid #7c3aed55;color:#a78bfa;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;">TRACK</button></td>
      ${srcCells}
      <td style="padding:8px 12px;font-size:15px;color:${avg!=null?'#ffffff':'#2a2845'};text-align:center;font-weight:700;${avg!=null?'cursor:pointer':''}" ${avg!=null?`onclick="copyVal('${avg.toFixed(2)}')" title="Click to copy"`:''} class="${avg!=null?'copyable':''}">${avg!=null?avg.toFixed(2):'—'}</td>
      <td style="padding:8px 12px;text-align:center;font-size:13px;font-weight:700;color:${gapColor}">${gap!=null?gap.toFixed(2):'—'}</td>
    </tr>`;
  }).join("");
}

function doExport() {
  if (!merged) return;
  const conLookup = {};
  merged.forEach(r => { if (r.found>0) conLookup[norm(r.rawName)] = r.con; });
  const header = "id,name,first_name,last_name,position,team,three_pointers_made,assists,blocks,double_double,points,rebounds,steals,triple_double,turnovers,fd_points,dk_points";
  const dataRows = UA_TEMPLATE.map(r => {
    const con = conLookup[norm(r.name)] || {};
    return [
      r.id, r.name, r.first_name, r.last_name, r.position, r.team,
      con.threepm!=null?con.threepm.toFixed(2):"",
      con.ast!=null?con.ast.toFixed(2):"",
      "","",
      con.pts!=null?con.pts.toFixed(2):"",
      con.reb!=null?con.reb.toFixed(2):"",
      "","","","","",
    ].map(v=>`"${v}"`).join(",");
  });
  const csv = [header,...dataRows].join("\n");
  const blob = new Blob([csv],{type:"text/csv"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="NBAmatrixProjections.csv"; a.style.display="none";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}



function copyVal(val) {
  navigator.clipboard.writeText(String(val)).then(() => {
    const t = document.getElementById("copy-toast");
    t.textContent = "Copied " + val;
    t.style.opacity = 1;
    clearTimeout(window._copyTimer);
    window._copyTimer = setTimeout(() => t.style.opacity = 0, 1200);
  });
}

// Use IndexedDB for unlimited bet storage
let db = null;

function initDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open("nba_matrix", 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains("bets")) {
        d.createObjectStore("bets", {keyPath: "id"});
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(); };
    req.onerror = () => {
      console.warn("IndexedDB failed, falling back to localStorage");
      resolve();
    };
  });
}

function loadBets() {
  return new Promise(resolve => {
    // Always try localStorage first - most reliable for file://
    try {
      const raw = localStorage.getItem("nba_matrix_bets");
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && parsed.length > 0) {
          bets = parsed.sort((a,b) => b.id - a.id);
          resolve();
          return;
        }
      }
    } catch(e) {}
    // Try IndexedDB as fallback
    if (db) {
      try {
        const tx = db.transaction("bets", "readonly");
        const store = tx.objectStore("bets");
        const req = store.getAll();
        req.onsuccess = () => {
          bets = (req.result || []).sort((a,b) => b.id - a.id);
          resolve();
        };
        req.onerror = () => resolve();
      } catch(e) { resolve(); }
    } else {
      resolve();
    }
  });
}

function saveBets() {
  // Always save to localStorage as primary (compact, reliable for local files)
  try {
    // Store only essential fields to stay under size limit
    const slim = bets.map(b => ({
      id:b.id, date:b.date, player:b.player, pos:b.pos,
      stat:b.stat, ou:b.ou, line:b.line, odds:b.odds,
      stake:b.stake, toWin:b.toWin, type:b.type,
      book:b.book, proj:b.proj, result:b.result
    }));
    localStorage.setItem("nba_matrix_bets", JSON.stringify(slim));
  } catch(e) {
    console.warn("localStorage save failed:", e);
  }
  // Also save to IndexedDB if available
  if (db) {
    try {
      const tx = db.transaction("bets", "readwrite");
      const store = tx.objectStore("bets");
      store.clear();
      bets.forEach(b => store.put(b));
    } catch(e) { console.warn("IndexedDB save failed:", e); }
  }
}

function deleteBetFromDB(id) {
  if (db) {
    const tx = db.transaction("bets", "readwrite");
    tx.objectStore("bets").delete(id);
  }
}

function calcStake(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  if (odds < 0) {
    // Favorite: stake enough to win 1u
    const stake = Math.abs(odds) / 100;
    return { stake: parseFloat(stake.toFixed(2)), toWin: 1.00, type: "fav" };
  } else {
    // Dog: stake 1u
    const toWin = odds / 100;
    return { stake: 1.00, toWin: parseFloat(toWin.toFixed(2)), type: "dog" };
  }
}

function updateStakePreview() {
  const odds = Number(document.getElementById("modal-odds").value);
  const preview = document.getElementById("modal-stake-preview");
  if (!odds || isNaN(odds)) { preview.textContent = ""; return; }
  const s = calcStake(odds);
  if (!s) { preview.textContent = ""; return; }
  preview.textContent = s.type === "fav"
    ? `Stake ${s.stake.toFixed(2)}u to win 1.00u (favorite)`
    : `Stake 1.00u to win ${s.toWin.toFixed(2)}u (underdog)`;
}

function openTrackModal(player, pos, stat, proj, team) {
  modalPlayer = player;
  modalPos = pos;
  document.getElementById("modal-player-name").textContent = player;
  document.getElementById("modal-player-sub").textContent = pos + " · Add a bet";
  document.getElementById("modal-line").value = "";
  window._modalLine = null;
  const lp = document.getElementById("line-preview"); if(lp) lp.textContent = "";
  const dateEl = document.getElementById("modal-date"); if(dateEl) dateEl.value = new Date().toISOString().split("T")[0];
  document.getElementById("modal-odds").value = "";
  document.getElementById("modal-fair").value = "";
  document.getElementById("modal-stat").value = stat || "PTS";
  document.getElementById("modal-proj-display").textContent = proj && proj !== 'null' ? `Blended Proj: ${proj}` : 'Blended Proj: —';
  window._modalProj = (proj && proj !== 'null') ? parseFloat(proj) : null;
  window._modalTeam = team || null;
  document.getElementById("modal-book").value = "DraftKings";
  document.getElementById("modal-stake-preview").textContent = "";
  document.getElementById("modal-save-btn").textContent = "Track Bet";
  document.getElementById("modal-save-btn").onclick = saveBet;
  window._editId = null;
  setOU("under");
  document.getElementById("track-modal").classList.add("open");
}

function closeTrackModal() {
  document.getElementById("track-modal").classList.remove("open");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeTrackModal(); });

function saveBet() {
  // Parse line from combined input (u17.5 / o17.5)
  const lineRaw = document.getElementById("modal-line").value.trim().toLowerCase();
  const lineMatch = lineRaw.match(/^[ou]\s*([\d.]+)$/);
  const line = lineMatch ? parseFloat(lineMatch[1]) : parseFloat(lineRaw);
  const odds = parseInt(document.getElementById("modal-odds").value);
  const stat = document.getElementById("modal-stat").value;
  const ou   = getOU();
  const book = document.getElementById("modal-book").value;

  if (isNaN(line) || isNaN(odds)) {
    alert("Please enter a line and odds.");
    return;
  }

  const s = calcStake(odds);
  const fair = parseInt(document.getElementById("modal-fair").value) || null;
  const now = new Date();
  const modalDateVal = document.getElementById("modal-date")?.value;
  const gameDate = modalDateVal ? new Date(modalDateVal + "T12:00:00") : now;
  const gameDateStr = gameDate.toLocaleDateString();
  const timestamp = now.toLocaleTimeString("en-US", {hour:"2-digit",minute:"2-digit"}) + " " + gameDateStr;
  const bet = {
    id: Date.now(),
    date: gameDateStr,
    timestamp,
    player: modalPlayer,
    pos: modalPos,
    stat, ou, line, odds, fair,
    stake: s.stake,
    toWin: s.toWin,
    type: s.type,
    book,
    proj: window._modalProj,
    team: window._modalTeam,
    result: "pending",
    actual: null,
  };

  bets.unshift(bet);
  saveBets();
  closeTrackModal();
  if (currentTab === "tracker") renderTracker();
  copyVal(`${modalPlayer} ${ou} ${line} ${stat}`);
}

function setBetResult(id, result) {
  const bet = bets.find(b => b.id === id);
  if (!bet) return;
  bet.result = result;
  saveBets();
  renderTracker();
}

function deleteBet(id) {
  if (!confirm("Delete this bet?")) return;
  bets = bets.filter(b => b.id !== id);
  deleteBetFromDB(id);
  renderTracker();
}

function exportBets() {
  const json = JSON.stringify(bets, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "nba_matrix_bets.json"; a.style.display = "none";
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function importBets() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const imported = JSON.parse(ev.target.result);
        bets = imported;
        saveBets();
        renderTracker();
      } catch { alert("Invalid file."); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function renderTracker() {
  const el = document.getElementById("tracker-tab");

  const settled = bets.filter(b => b.result !== "pending" && b.result !== "void");
  const hits    = bets.filter(b => b.result === "hit");
  const misses  = bets.filter(b => b.result === "miss");
  const pending = bets.filter(b => b.result === "pending");

  const totalStaked  = settled.reduce((a,b) => a + b.stake, 0);
  const totalWon     = hits.reduce((a,b) => a + b.toWin, 0);
  const totalLost    = misses.reduce((a,b) => a + b.stake, 0);
  const netPL        = totalWon - totalLost;
  const roi          = totalStaked > 0 ? ((netPL / totalStaked) * 100).toFixed(1) : "—";
  const winRate      = settled.length > 0 ? ((hits.length / settled.length) * 100).toFixed(1) : "—";

  // Time period breakdowns
  const now = new Date();
  const todayStr = now.toLocaleDateString("en-US");
  const yesterday = new Date(now - 24*60*60*1000);
  const yesterdayStr = yesterday.toLocaleDateString("en-US");
  const weekAgo = new Date(now - 7*24*60*60*1000);
  const monthAgo = new Date(now - 30*24*60*60*1000);

  function parseBetDate(b) { try { return new Date(b.date); } catch(e) { return null; } }

  function periodStats(filterFn) {
    const s = settled.filter(filterFn);
    const h = s.filter(b => b.result === "hit");
    const m = s.filter(b => b.result === "miss");
    const won = h.reduce((a,b) => a+b.toWin, 0);
    const lost = m.reduce((a,b) => a+b.stake, 0);
    const pl = won - lost;
    const staked = s.reduce((a,b) => a+b.stake, 0);
    const wr = s.length > 0 ? ((h.length/s.length)*100).toFixed(1) : "—";
    const roi = staked > 0 ? ((pl/staked)*100).toFixed(1) : "—";
    return { h: h.length, m: m.length, total: s.length, pl, wr, roi };
  }

  const dailyStats     = periodStats(b => b.date === todayStr);
  const yesterdayStats = periodStats(b => b.date === yesterdayStr);
  const weeklyStats    = periodStats(b => { const d = parseBetDate(b); return d && d >= weekAgo; });
  const monthlyStats   = periodStats(b => { const d = parseBetDate(b); return d && d >= monthAgo; });

  // Breakdown by stat
  const statBreak = {};
  settled.forEach(b => {
    if (!statBreak[b.stat]) statBreak[b.stat] = {hits:0,total:0,pl:0};
    statBreak[b.stat].total++;
    if (b.result==="hit") { statBreak[b.stat].hits++; statBreak[b.stat].pl += b.toWin; }
    else statBreak[b.stat].pl -= b.stake;
  });

  // Breakdown by book
  const bookBreak = {};
  settled.forEach(b => {
    if (!bookBreak[b.book]) bookBreak[b.book] = {hits:0,total:0,pl:0};
    bookBreak[b.book].total++;
    if (b.result==="hit") { bookBreak[b.book].hits++; bookBreak[b.book].pl += b.toWin; }
    else bookBreak[b.book].pl -= b.stake;
  });

  // EV bucket breakdown
  const evBuckets = {"5-9%":{hits:0,total:0,pl:0}, "10-14%":{hits:0,total:0,pl:0}, "15-19%":{hits:0,total:0,pl:0}, "20%+":{hits:0,total:0,pl:0}};
  settled.forEach(b => {
    const ev = calcEdge(b.odds, b.fair);
    if (ev == null || ev < 5) return;
    const bucket = ev>=20?"20%+":ev>=15?"15-19%":ev>=10?"10-14%":"5-9%";
    evBuckets[bucket].total++;
    if (b.result==="hit") { evBuckets[bucket].hits++; evBuckets[bucket].pl += b.toWin; }
    else evBuckets[bucket].pl -= b.stake;
  });

  // Over/Under breakdown
  const ouBreak = {over:{hits:0,total:0,pl:0}, under:{hits:0,total:0,pl:0}};
  settled.forEach(b => {
    ouBreak[b.ou].total++;
    if (b.result==="hit") { ouBreak[b.ou].hits++; ouBreak[b.ou].pl += b.toWin; }
    else ouBreak[b.ou].pl -= b.stake;
  });

  // Time frame breakdown (by hour of tracking timestamp)
  const timeBreak = {};
  bets.filter(b => b.result !== "pending" && b.timestamp).forEach(b => {
    const t = b.timestamp || "";
    const hrMatch = t.match(/^(\d+):(\d+)\s*(AM|PM)/i);
    if (!hrMatch) return;
    let hr = parseInt(hrMatch[1]);
    const ampm = hrMatch[3].toUpperCase();
    if (ampm === "PM" && hr !== 12) hr += 12;
    if (ampm === "AM" && hr === 12) hr = 0;
    const label = (hr % 12 || 12) + ":00 " + (hr < 12 ? "AM" : "PM") + " – " + ((hr+1) % 12 || 12) + ":00 " + ((hr+1) < 12 ? "AM" : "PM");
    if (!timeBreak[label]) timeBreak[label] = {hits:0,total:0,pl:0,hr};
    timeBreak[label].total++;
    if (b.result==="hit") { timeBreak[label].hits++; timeBreak[label].pl += b.toWin; }
    else timeBreak[label].pl -= b.stake;
  });

  const pct = (h,t) => t > 0 ? `${((h/t)*100).toFixed(0)}%` : "—";

  const statCards = (obj) => Object.entries(obj).map(([k,v]) => {
    const staked = settled.filter(b => b.stat===k||b.book===k).reduce((a,b)=>a+b.stake, 0) || v.total;
    const roi = v.total>0 ? ((v.pl/Math.max(0.01,staked))*100).toFixed(1) : '—';
    return `<div class="stat-card">
      <div class="sc-label">${k}</div>
      <div class="sc-units" style="color:${v.pl>=0?'#22c55e':'#f87171'}">${v.pl>=0?'+':''}${v.pl.toFixed(2)}u</div>
      <div class="sc-val" style="font-size:16px;color:${roi==='—'?'#fff':Number(roi)>=0?'#22c55e':'#f87171'}">${roi !== '—' ? roi+'%' : '—'} <span style="font-size:11px;font-weight:600;color:#6b6896;">ROI</span></div>
      <div class="sc-sub">${pct(v.hits,v.total)} · ${v.hits}W ${v.total-v.hits}L</div>
    </div>`;}).join("");

  const betSearch = (document.getElementById("bet-search")?.value || "").toLowerCase();
  const filteredBets = betSearch
    ? bets.filter(b => b.player.toLowerCase().includes(betSearch) ||
        b.stat.toLowerCase().includes(betSearch) ||
        b.book.toLowerCase().includes(betSearch))
    : bets;

  const betRows = filteredBets.map(b => {
    const rc = b.result==="hit"?"bet-row-hit":b.result==="miss"?"bet-row-miss":"bet-row-pending";
    const plVal = b.result==="hit" ? `+${b.toWin.toFixed(2)}u` : b.result==="miss" ? `-${b.stake.toFixed(2)}u` : b.result==="void" ? "VOID" : "—";
    const plColor = b.result==="hit"?"#22c55e":b.result==="miss"?"#f87171":b.result==="void"?"#f59e0b":"#6b6896";
    return `<tr style="border-bottom:1px solid #1a1830;">
      <td style="padding:8px 12px;font-size:14px;font-weight:600;color:#fff;white-space:nowrap">${b.player}</td>

      <td style="padding:8px 8px;font-size:13px;text-align:center;font-weight:700;color:${(()=>{const e=calcEdge(b.odds,b.fair);return e==null?'#6b6896':e>0?'#22c55e':'#f87171';})()}">${(()=>{const e=calcEdge(b.odds,b.fair);return e==null?'—':(e>0?'+':'')+e.toFixed(1)+'%';})()}</td>
      <td style="padding:8px 8px;font-size:13px;color:#fff;text-align:center">${b.odds > 0 ? '+'+b.odds : b.odds}</td>
      <td style="padding:8px 8px;font-size:13px;color:${b.fair!=null?(b.odds>b.fair?'#22c55e':b.odds<b.fair?'#f87171':'#fff'):'#6b6896'};text-align:center;font-weight:600">${b.fair!=null?(b.fair>0?'+'+b.fair:b.fair):'—'}</td>
      <td style="padding:8px 8px;font-size:13px;color:#8b87b8;text-align:center">${b.book}</td>
      <td style="padding:8px 8px;font-size:13px;color:#fff;text-align:center">${b.stake.toFixed(2)}u</td>
      <td style="padding:8px 8px;font-size:13px;font-weight:700;text-align:center;color:${plColor}">${plVal}</td>
      <td style="padding:8px 8px;text-align:center">
        <button class="result-btn hit" onclick="setBetResult(${b.id},'hit')">HIT</button>
        <button class="result-btn miss" onclick="setBetResult(${b.id},'miss')">MISS</button>
        <button class="result-btn" onclick="setBetResult(${b.id},'void')" style="background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b55;">VOID</button>
      </td>
      <td style="padding:8px 8px;text-align:center;white-space:nowrap">
        <button onclick="openEditModal(${b.id})" style="background:transparent;border:none;color:#6b6896;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;margin-right:6px;" title="Edit">✎</button>
        <button onclick="deleteBet(${b.id})" style="background:transparent;border:none;color:#3d3a6b;font-size:16px;cursor:pointer;" title="Delete">✕</button>
      </td>
    </tr>`;
  }).join("");

  el.innerHTML = `
    <div style="padding:0">
      <div id="tracker-controls">
        <span style="font-size:16px;font-weight:800;color:#fff;">${bets.length} Bets Tracked</span>
        <span style="font-size:11px;color:#22c55e;background:#22c55e15;border:1px solid #22c55e33;border-radius:4px;padding:2px 8px;">● Auto-saved</span>
        <input type="text" id="bet-search" placeholder="Search bets..." oninput="filterBetRows(this.value)"
          autocomplete="off" autocorrect="off" spellcheck="false"
          style="background:#16152a;border:1px solid #2a2845;border-radius:6px;padding:7px 14px;
            font-size:13px;color:#e2e8f0;outline:none;width:180px;font-family:'Inter',sans-serif;"/>
        <button onclick="screenshotBets()" style="background:#16152a;border:1px solid #2a2845;color:#a78bfa;
          border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;
          font-family:'Inter',sans-serif;">📸 Screenshot</button>
        <span style="color:#2a2845;font-size:12px;">|</span>
        <span style="font-size:13px;color:#6b6896;">${pending.length} pending · ${settled.length} settled</span>
        <button onclick="openQuickGrade()" style="background:#7c3aed;border:none;color:#fff;border-radius:6px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;">⚡ Quick Grade</button>
        <button id="tracker-export-btn" onclick="exportBets()">Backup to file</button>
        <button id="tracker-import-btn" onclick="importBets()">Restore from file</button>
      </div>

      <div class="tracker-section">

          <div class="stat-card" style="display:inline-flex">
            <div class="sc-label">Win Rate</div>

            <div class="sc-sub">${hits.length}W · ${misses.length}L</div>
          </div>
          <div class="stat-card" style="display:inline-flex">
            <div class="sc-label">Net P&L</div>
            <div class="sc-val" style="color:${netPL>=0?'#22c55e':'#f87171'}">${netPL>=0?'+':''}${netPL.toFixed(2)}u</div>
            <div class="sc-sub">${totalStaked.toFixed(2)}u staked</div>
          </div>
          <div class="stat-card" style="display:inline-flex">
            <div class="sc-label">ROI</div>
            <div class="sc-val" style="color:${Number(roi)>=0?'#22c55e':'#f87171'}">${roi !== '—' ? roi+'%' : '—'}</div>

            <div class="sc-units" style="color:${ouBreak.over.pl>=0?'#22c55e':'#f87171'}">${ouBreak.over.pl>=0?'+':''}${ouBreak.over.pl.toFixed(2)}u</div>
            <div class="sc-val" style="font-size:16px;color:${roi==='—'?'#fff':Number(roi)>=0?'#22c55e':'#f87171'}">${roi !== '—' ? roi+'%' : '—'} <span style="font-size:11px;font-weight:600;color:#6b6896;">ROI</span></div>
            <div class="sc-sub">${pct(ouBreak.over.hits,ouBreak.over.total)} · ${ouBreak.over.hits}W ${ouBreak.over.total-ouBreak.over.hits}L</div>`;})()}
          </div>
          <div class="stat-card" style="display:inline-flex">
            <div class="sc-label">Under</div>
            ${(()=>{const s=bets.filter(b=>b.ou==='under'&&b.result!=='pending'&&b.result!=='void').reduce((a,b)=>a+b.stake,0);const roi=ouBreak.under.total>0?((ouBreak.under.pl/Math.max(0.01,s))*100).toFixed(1):'—';return `
            <div class="sc-units" style="color:${ouBreak.under.pl>=0?'#22c55e':'#f87171'}">${ouBreak.under.pl>=0?'+':''}${ouBreak.under.pl.toFixed(2)}u</div>
            <div class="sc-val" style="font-size:16px;color:${roi==='—'?'#fff':Number(roi)>=0?'#22c55e':'#f87171'}">${roi !== '—' ? roi+'%' : '—'} <span style="font-size:11px;font-weight:600;color:#6b6896;">ROI</span></div>
            <div class="sc-sub">${pct(ouBreak.under.hits,ouBreak.under.total)} · ${ouBreak.under.hits}W ${ouBreak.under.total-ouBreak.under.hits}L</div>`;})()}

          <div class="stat-card" style="display:inline-flex">
            <div class="sc-label">${label}</div>
            <div class="sc-units" style="color:${s.pl>=0?'#22c55e':'#f87171'}">${s.pl>=0?'+':''}${s.pl.toFixed(2)}u</div>
            <div class="sc-val" style="font-size:16px;color:${s.roi==='—'?'#fff':Number(s.roi)>=0?'#22c55e':'#f87171'}">${s.roi !== '—' ? s.roi+'%' : '—'} <span style="font-size:11px;font-weight:600;color:#6b6896;">ROI</span></div>
            <div class="sc-sub">${s.wr}% · ${s.h}W ${s.m}L</div>
          </div>`).join('')}

        </div>

function saveEdit() {
  const id = window._editId;
  const bet = bets.find(b => b.id === id);
  if (!bet) return;
  // Parse line from combined input (u17.5 / o17.5)
  const lineRaw = document.getElementById("modal-line").value.trim().toLowerCase();
  const lineMatch = lineRaw.match(/^[ou]\s*([\d.]+)$/);
  const line = lineMatch ? parseFloat(lineMatch[1]) : parseFloat(lineRaw);
  const odds = parseInt(document.getElementById("modal-odds").value);
  if (isNaN(line) || isNaN(odds)) { alert("Please enter a line and odds."); return; }
  const s = calcStake(odds);
  const editDateVal = document.getElementById("modal-date")?.value;
  if (editDateVal) { const gd = new Date(editDateVal + "T12:00:00"); bet.date = gd.toLocaleDateString(); }
  bet.stat  = document.getElementById("modal-stat").value;
  bet.ou    = getOU();
  bet.line  = line;
  bet.odds  = odds;
  bet.fair  = parseInt(document.getElementById("modal-fair").value) || null;
  bet.book  = document.getElementById("modal-book").value;
  bet.stake = s.stake;
  bet.toWin = s.toWin;
  bet.type  = s.type;
  bet.proj  = window._modalProj;
  saveBets();
  closeTrackModal();
  renderTracker();
}


function setOU(val) {
  window._modalOU = val;
  // Update line input color preview if it exists
  const preview = document.getElementById("line-preview");
  if (preview && window._modalLine != null) {
    preview.textContent = val === "over" ? `OVER ${window._modalLine}` : val === "under" ? `UNDER ${window._modalLine}` : "";
    preview.style.color = val === "over" ? "#22c55e" : "#f87171";
  }
}

function parseLineInput(el) {
  const raw = el.value.trim().toLowerCase();
  const preview = document.getElementById("line-preview");
  // Match patterns: u17.5, o17.5, u 17.5, o 17.5
  const match = raw.match(/^([ou])\s*([\d.]+)$/);
  if (match) {
    const dir = match[1] === "o" ? "over" : "under";
    const num = parseFloat(match[2]);
    window._modalOU = dir;
    window._modalLine = num;
    el.style.borderColor = "#7c3aed";
    if (preview) {
      preview.textContent = (dir === "over" ? "OVER " : "UNDER ") + num;
      preview.style.color = dir === "over" ? "#22c55e" : "#f87171";
    }
  } else if (raw === "") {
    window._modalOU = "under";
    window._modalLine = null;
    el.style.borderColor = "#1e1c35";
    if (preview) preview.textContent = "";
  } else {
    window._modalLine = null;
    el.style.borderColor = "#f8717155";
    if (preview) { preview.textContent = "Type u17.5 or o17.5"; preview.style.color = "#f87171"; }
  }
}

function getOU() {
  return window._modalOU || "under";
}

function oddsToImplied(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  if (odds < 0) return Math.abs(odds) / (Math.abs(odds) + 100);
  return 100 / (odds + 100);
}

function oddsToDecimal(odds) {
  if (!odds || isNaN(odds)) return null;
  odds = Number(odds);
  if (odds < 0) return 1 + (100 / Math.abs(odds));
  return 1 + (odds / 100);
}

function calcEdge(bookOdds, fairOdds) {
  const fairProb = oddsToImplied(fairOdds);
  const bookDecimal = oddsToDecimal(bookOdds);
  if (fairProb == null || bookDecimal == null) return null;
  // EV% = (fair_prob * book_decimal_odds) - 1
  return ((fairProb * bookDecimal) - 1) * 100;
}

let qgQueue = [];
let qgIdx = 0;

function openQuickGrade() {
  qgQueue = bets.filter(b => b.result === "pending");
  if (qgQueue.length === 0) { alert("No pending bets to grade!"); return; }
  qgIdx = 0;
  document.getElementById("qg-overlay").classList.add("open");
  qgShow();
}

function qgShow() {
  if (qgIdx >= qgQueue.length) { closeQG(); renderTracker(); return; }
  const b = qgQueue[qgIdx];
  document.getElementById("qg-progress").textContent = (qgIdx + 1) + " of " + qgQueue.length + " PENDING BETS";
  document.getElementById("qg-player").textContent = b.player;
  document.getElementById("qg-detail").textContent = b.ou.toUpperCase() + " " + b.line + " " + b.stat + "  ·  " + (b.odds > 0 ? "+" + b.odds : b.odds) + "  ·  " + b.book;
  const edge = (b.fair && b.odds) ? (() => {
    const e = calcEdge(b.odds, b.fair);
    return e != null ? (e > 0 ? "+" : "") + e.toFixed(1) + "% EV" : "";
  })() : "";
  document.getElementById("qg-proj").textContent = (b.proj ? "Proj: " + b.proj.toFixed(2) + "  " : "") + edge;
}

function qgGrade(result) {
  const b = qgQueue[qgIdx];
  const bet = bets.find(x => x.id === b.id);
  if (bet) { bet.result = result; saveBets(); }
  qgIdx++;
  qgShow();
}

function qgNext() {
  qgIdx++;
  qgShow();
}

function closeQG() {
  document.getElementById("qg-overlay").classList.remove("open");
  renderTracker();
}

// Keyboard shortcuts for quick grade
document.addEventListener("keydown", e => {
  if (!document.getElementById("qg-overlay").classList.contains("open")) return;
  if (e.key === "h" || e.key === "H") qgGrade("hit");
  else if (e.key === "m" || e.key === "M") qgGrade("miss");
  else if (e.key === "v" || e.key === "V") qgGrade("void");
  else if (e.key === "s" || e.key === "S" || e.key === " ") { e.preventDefault(); qgNext(); }
  else if (e.key === "Escape") closeQG();
});

let agResults = {};

function renderAutoGrade() {

              const statusText = !r ? "pending" : r.result==="hit"?"HIT ✓":r.result==="miss"?"MISS ✗":r.result==="void"?"VOID 🚫":r.result==="not_found"?"not found":"pending";
              return `<tr style="border-bottom:1px solid #1a1830;background:${i%2===0?"#16152a":"#0f0e1a"}">

          agLog.map(l => `<div style="color:${l.startsWith("✓")?"#22c55e":l.startsWith("✗")?"#f87171":l.startsWith("🚫")?"#f59e0b":"#6b6896"}">${l}</div>`).join("")}

async function runAutoGrade() {
  if (agRunning) return;
  const pending = bets.filter(b => b.result === "pending");
  if (pending.length === 0) { alert("No pending bets!"); return; }

  agRunning = true;
  agLog = ["⚡ Fetching box scores from Ball Don't Lie API..."];
  agResults = {};
  renderAutoGrade();

  const API_KEY = "9cdb249f-9635-4cca-a998-37c7b98a9372";
  const BASE = "https://api.balldontlie.io/nba/v1";

  // Group pending bets by date
  const byDate = {};
  pending.forEach(b => {
    const d = b.date || new Date().toLocaleDateString("en-US");
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(b);
  });

  // For each date, fetch box scores once and grade all bets for that date
  for (const [dateStr, dateBets] of Object.entries(byDate)) {
    // Convert date from M/D/YYYY to YYYY-MM-DD
    const parts = dateStr.split('/');
    const isoDate = parts.length === 3
      ? parts[2] + '-' + parts[0].padStart(2,'0') + '-' + parts[1].padStart(2,'0')
      : dateStr;

    agLog.push("📅 Fetching " + isoDate + "...");
    renderAutoGrade();

     try {
      // Fetch all pages of stats for this date
      const playerStats = {};
      let cursor = null;
      let pageNum = 0;
      while (true) {
        const url = BASE + "/stats?dates[]=" + isoDate + "&per_page=100" + (cursor ? "&cursor=" + cursor : "");
        const pageRes = await fetch(url, { headers: { "Authorization": API_KEY } });
        if (!pageRes.ok) {
          agLog.push("✗ API error " + pageRes.status + ": " + (await pageRes.text()).slice(0,100));
          renderAutoGrade();
          break;
        }
        const pageData = await pageRes.json();
        (pageData.data || []).forEach(p => {
          if (!p.player) return;
          const name = (p.player.first_name + " " + p.player.last_name).toLowerCase().replace(/[^a-z ]/g,"");
          playerStats[name] = p;
        });
        pageNum++;
        if (pageData.meta && pageData.meta.next_cursor) {
          cursor = pageData.meta.next_cursor;
        } else {
          break;
        }
        if (pageNum > 10) break;
      }
      agLog.push("✓ Found " + Object.keys(playerStats).length + " players for " + isoDate + " (" + pageNum + " pages)");
      renderAutoGrade();


      // Grade each bet
      dateBets.forEach(b => {
        const searchName = b.player.toLowerCase().replace(/[^a-z ]/g,'');
        // Try exact match first, then partial
        let p = playerStats[searchName];
        if (!p) {
          // Try last name match
          const lastName = searchName.split(' ').slice(-1)[0];
          const firstInitial = searchName[0];
          p = Object.values(playerStats).find(x => {
            if (!x.player) return false;
            const pName = (x.player.first_name + ' ' + x.player.last_name).toLowerCase();
            return pName.includes(lastName) && pName[0] === firstInitial;
          });
        }

        if (!p) {
          // Check if player was DNP (not in box score = likely DNP)
          agResults[b.id] = { result: "void", found: true, actual: null };
          agLog.push("🚫 " + b.player + " " + b.stat + ": not in box score — VOID (DNP)");
          const realBet = bets.find(x => x.id === b.id);
          if (realBet) { realBet.result = "void"; saveBets(); }
          return;
        }

        // Get the stat value
        let actual = null;
        const stat = b.stat.toUpperCase();
        if (stat === "PTS") actual = p.pts;
        else if (stat === "REB") actual = p.reb;
        else if (stat === "AST") actual = p.ast;
        else if (stat === "3PM") actual = p.fg3m;
        else if (stat === "PRA") actual = (p.pts||0) + (p.reb||0) + (p.ast||0);
        else if (stat === "PR") actual = (p.pts||0) + (p.reb||0);
        else if (stat === "PA") actual = (p.pts||0) + (p.ast||0);
        else if (stat === "RA") actual = (p.reb||0) + (p.ast||0);
        else if (stat === "MIN") actual = p.min ? parseFloat(p.min) : null;

        if (actual === null) {
          agResults[b.id] = { result: "pending", found: false };
          agLog.push("⏸ " + b.player + " " + b.stat + ": stat not found");
          return;
        }

        const line = parseFloat(b.line);
        const hit = b.ou === "over" ? actual > line : actual < line;
        const result = hit ? "hit" : "miss";
        agResults[b.id] = { result, actual, found: true };
        const realBet = bets.find(x => x.id === b.id);
        if (realBet) { realBet.result = result; saveBets(); }
        const unitStr = hit
          ? `+${realBet ? realBet.toWin.toFixed(2) : "?"}u`
          : `-${realBet ? realBet.stake.toFixed(2) : "?"}u`;
        agLog.push((hit ? "✓ " : "✗ ") + b.player + " " + b.stat + ": " + actual + " vs " + b.ou + " " + line + " → " + result.toUpperCase() + "  " + unitStr);
      });

    } catch(e) {
      agLog.push("✗ Error: " + e.message);
    }

    renderAutoGrade();
    await new Promise(r => setTimeout(r, 300));
  }

  // Final W-L + P&L summary
  const gradedBets = pending.filter(b => agResults[b.id] && agResults[b.id].found);
  const hitBets  = gradedBets.filter(b => agResults[b.id].result === "hit");
  const missBets = gradedBets.filter(b => agResults[b.id].result === "miss");
  const voidBets = pending.filter(b => agResults[b.id] && agResults[b.id].result === "void");
  const totalWon  = hitBets.reduce((a, b) => a + (bets.find(x => x.id === b.id)?.toWin || 0), 0);
  const totalLost = missBets.reduce((a, b) => a + (bets.find(x => x.id === b.id)?.stake || 0), 0);
  const netPL = totalWon - totalLost;
  const plStr = (netPL >= 0 ? "+" : "") + netPL.toFixed(2) + "u";
  agLog.push("─────────────────────────────");
  agLog.push(hitBets.length + "-" + missBets.length + (voidBets.length ? " (" + voidBets.length + " void)" : "") + "  " + plStr);

  agRunning = false;
  renderAutoGrade();
}


function filterBetRows(val) {
  const s = val.toLowerCase();
  const rows = document.querySelectorAll('#bet-table-body tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = (!s || text.includes(s)) ? '' : 'none';
  });
}

// Init
buildSlots();
updateBadges();
</script>
