<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB BET TRACKER</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #050505;
    --surface:  #0e0e0e;
    --border:   #1a1a1a;
    --border2:  #222;
    --green:    #00e676;
    --green2:   #00c853;
    --green-dim:#003d1a;
    --red:      #ff3d3d;
    --red-dim:  #3d0000;
    --yellow:   #ffd600;
    --text:     #f0f0f0;
    --muted:    #555;
    --muted2:   #333;
    --mono:     'DM Mono', monospace;
    --display:  'Barlow Condensed', sans-serif;
  }

  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--mono); }

  .app { max-width: 780px; margin: 0 auto; padding: 24px 16px 80px; }

  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; border-bottom: 1px solid var(--border2); padding-bottom: 16px; }
  .header-title { font-family: var(--display); font-size: 42px; font-weight: 900; letter-spacing: 0.04em; line-height: 1; color: var(--green); text-transform: uppercase; }
  .header-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; border: 1px solid var(--border2); background: var(--surface); color: var(--muted); padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .btn:hover { border-color: var(--green); color: var(--green); }
  .btn-green { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }
  .btn-green:hover { background: var(--green2); border-color: var(--green2); color: #000; }
  .btn-danger { border-color: var(--red-dim); color: var(--red); }
  .btn-danger:hover { background: var(--red-dim); }

  .dashboard { margin-bottom: 24px; }
  .period-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
  .period-tab { font-family: var(--display); font-size: 13px; font-weight: 700; letter-spacing: 0.06em; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .period-tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .stats-grid-2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-label { font-size: 9px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .stat-val { font-family: var(--display); font-size: 22px; font-weight: 800; letter-spacing: 0.02em; }
  .stat-val.pos { color: var(--green); }
  .stat-val.neg { color: var(--red); }
  .stat-val.neu { color: var(--muted); }

  .breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 8px; }
  .breakdown-title { font-size: 9px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .tag-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .tag-row:last-child { border-bottom: none; }
  .tag-name { flex: 1; color: var(--green); font-weight: 500; }
  .tag-wl { color: var(--text); min-width: 50px; }
  .tag-pl { min-width: 70px; text-align: right; }
  .tag-pl.pos { color: var(--green); }
  .tag-pl.neg { color: var(--red); }
  .tag-empty { color: var(--muted); font-size: 11px; text-align: center; padding: 8px; }

  .input-section { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 16px; margin-bottom: 20px; }
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .date-label { font-size: 10px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
  .date-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; cursor: pointer; }
  .date-input:focus { border-color: var(--green); }

  .paste-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
  .bet-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: var(--mono); font-size: 12px; font-weight: 500; resize: none; outline: none; transition: border-color 0.15s; line-height: 1.7; }
  .bet-input:focus { border-color: var(--green); }
  .bet-input::placeholder { color: var(--muted); }

  .add-row { display: flex; justify-content: flex-end; margin-top: 8px; }

  .parse-preview { margin-top: 10px; display: none; }
  .parse-preview-title { font-size: 9px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
  .parse-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; padding: 3px 8px; border-radius: 3px; background: var(--green-dim); color: var(--green); border: 1px solid #005c1f; margin: 2px 3px 2px 0; }
  .parse-pill.err { background: var(--red-dim); color: var(--red); border-color: #5c0000; }

  .bets-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .bets-title { font-family: var(--display); font-size: 16px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text); }
  .bets-count { font-size: 11px; color: var(--green); margin-left: 8px; font-weight: 500; }

  .bet-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s; }
  .bet-item:hover { border-color: var(--border2); }
  .bet-item.graded-win  { border-left: 3px solid var(--green); }
  .bet-item.graded-loss { border-left: 3px solid var(--red); }
  .bet-item.graded-push { border-left: 3px solid var(--yellow); }

  .bet-text { font-size: 13px; font-weight: 500; line-height: 1.5; color: var(--text); margin-bottom: 7px; }
  .bet-meta { display: flex; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
  .stat-pill { font-size: 10px; padding: 2px 8px; border-radius: 3px; background: #0a1f0a; border: 1px solid #1a3a1a; color: #00c853; letter-spacing: 0.07em; text-transform: uppercase; font-weight: 500; }
  .bet-date-str { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .bet-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .bet-btn { font-family: var(--mono); font-size: 10px; padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.06em; }
  .bet-btn:hover { border-color: var(--green); color: var(--green); }
  .bet-btn.delete:hover { border-color: var(--red); color: var(--red); }

  .grade-badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .grade-win  { background: #002910; border: 1px solid var(--green); color: var(--green); }
  .grade-loss { background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
  .grade-push { background: #2a2000; border: 1px solid var(--yellow); color: var(--yellow); }

  .manual-grade-btns { display: inline-flex; gap: 4px; }
  .mgb { font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 4px; border: none; cursor: pointer; letter-spacing: 0.06em; }
  .mgb-w { background: var(--green); color: #000; }
  .mgb-l { background: var(--red); color: #fff; }
  .mgb-p { background: var(--yellow); color: #000; }

  .grade-all-btn { width: 100%; padding: 11px; border-radius: 8px; border: 1px solid #1a3a1a; background: #0a1a0a; color: var(--green); font-family: var(--display); font-size: 15px; font-weight: 800; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; transition: all 0.15s; margin-bottom: 16px; }
  .grade-all-btn:hover { background: var(--green-dim); border-color: var(--green); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; border: 1px dashed var(--border2); border-radius: 8px; }

  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .filter-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 2px; }
  .filter-tag { font-size: 10px; padding: 3px 10px; border-radius: 3px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.12s; }
  .filter-tag.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  .summary-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; padding: 14px; margin-bottom: 20px; }
  .summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .summary-label { font-size: 10px; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; }
  .summary-text { font-size: 14px; font-weight: 500; line-height: 1.8; }
  .summary-text .line1 { color: var(--text); }
  .summary-text .line2 { color: var(--green); font-weight: 700; }

  #fileInput { display: none; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="header-title">MLB TRACKER</div>
      <div class="header-sub">Personal · MLB · 2025</div>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="loadFromFile()">↑ LOAD</button>
      <button class="btn" onclick="saveToFile()">↓ SAVE</button>
      <input type="file" id="fileInput" accept=".json" onchange="handleFileLoad(event)">
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">
    <div class="period-tabs">
      <button class="period-tab active" onclick="setPeriod('all',this)">All Time</button>
      <button class="period-tab" onclick="setPeriod('month',this)">Month</button>
      <button class="period-tab" onclick="setPeriod('week',this)">Week</button>
      <button class="period-tab" onclick="setPeriod('day',this)">Today</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">W-L</div><div class="stat-val neu" id="dWL">—</div></div>
      <div class="stat-card"><div class="stat-label">Units +/-</div><div class="stat-val neu" id="dPL">—</div></div>
      <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-val neu" id="dWR">—</div></div>
    </div>
    <div class="stats-grid-2">
      <div class="stat-card"><div class="stat-label">ROI</div><div class="stat-val neu" id="dROI">—</div></div>
      <div class="stat-card"><div class="stat-label">Bets</div><div class="stat-val neu" id="dBets">—</div></div>
      <div class="stat-card"><div class="stat-label">Avg Odds</div><div class="stat-val neu" id="dOdds">—</div></div>
    </div>

    <!-- Stat breakdown -->
    <div class="breakdown" id="statBreakdown">
      <div class="breakdown-title">By Stat</div>
      <div class="tag-empty" id="statEmpty">No graded bets yet</div>
    </div>

    <!-- Book breakdown -->
    <div class="breakdown" id="bookBreakdown">
      <div class="breakdown-title">By Book</div>
      <div class="tag-empty" id="bookEmpty">No graded bets yet</div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary-box" id="summaryBox" style="display:none">
    <div class="summary-header">
      <div class="summary-label">Summary</div>
      <button class="btn" id="copyBtn" onclick="copySummary()">COPY</button>
    </div>
    <div class="summary-text" id="summaryText"></div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="date-row">
      <span class="date-label">Date</span>
      <input type="date" class="date-input" id="betDate">
    </div>
    <div class="paste-label">Paste slate</div>
    <textarea class="bet-input" id="slateInput" rows="8"
      placeholder="Jakob Marsee (Miami) under .5 hits&#10;PB +160&#10;Freddie Freeman (dodgers) under .5 hits&#10;PB +197&#10;..."
      autocorrect="off" autocapitalize="off" spellcheck="false"
      oninput="previewParse()"></textarea>
    <div class="parse-preview" id="parsePreview">
      <div class="parse-preview-title">Parsed — <span id="parseCount">0</span> bets</div>
      <div id="parsePills"></div>
    </div>
    <div class="add-row">
      <button class="btn btn-green" onclick="addSlate()">+ ADD ALL</button>
    </div>
  </div>

  <!-- Bets list -->
  <div class="bets-header">
    <div>
      <span class="bets-title">Bets</span>
      <span class="bets-count" id="betsCount"></span>
    </div>
    <div>
      <button class="btn btn-danger" onclick="clearAllBets()">CLEAR ALL</button>
    </div>
  </div>

  <button class="grade-all-btn" onclick="gradeAll(this)">⚡ GRADE ALL</button>

  <div class="filter-bar" id="filterBar"></div>

  <div id="betsList"></div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────
let bets = [];
let activePeriod = 'all';
let activeFilter = null;

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadFromStorage();
  initDate();
  render();
});

function initDate() {
  const el = document.getElementById('betDate');
  const today = new Date().toISOString().split('T')[0];
  el.value = today;
  el.addEventListener('change', () => localStorage.setItem('mlb_date', el.value));
}

// ── Storage ───────────────────────────────────────────────────────────
function loadFromStorage() {
  try { bets = JSON.parse(localStorage.getItem('mlb_bets') || '[]'); } catch(e) { bets = []; }
}
function saveToStorage() {
  localStorage.setItem('mlb_bets', JSON.stringify(bets));
}

// ── File IO ───────────────────────────────────────────────────────────
function saveToFile() {
  const blob = new Blob([JSON.stringify({ version:1, exported: new Date().toISOString(), bets }, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mlb-tracker-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
}
function loadFromFile() { document.getElementById('fileInput').click(); }
function handleFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (data.bets) { bets = data.bets; saveToStorage(); render(); }
    } catch(err) { alert('Invalid file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Slate Parser ──────────────────────────────────────────────────────
// Handles format:
//   Player Name (Team) over/under X.X stat
//   BOOK +/-ODDS [optional: I got ODDS]
//
// Also handles inline format: Player (Team) u.5 hits PB +160

const STAT_ALIASES = {
  'hit': 'hits', 'hits': 'hits',
  'tb': 'total bases', 'total base': 'total bases', 'total bases': 'total bases',
  'k': 'strikeouts', 'ks': 'strikeouts', 'strikeout': 'strikeouts', 'strikeouts': 'strikeouts',
  'hr': 'home runs', 'home run': 'home runs', 'home runs': 'home runs',
  'rbi': 'rbis', 'rbis': 'rbis',
  'run': 'runs', 'runs': 'runs',
  'walk': 'walks', 'walks': 'walks', 'bb': 'walks',
  'single': 'singles', 'singles': 'singles',
  'double': 'doubles', 'doubles': 'doubles',
  'stolen base': 'stolen bases', 'stolen bases': 'stolen bases', 'sb': 'stolen bases',
  'pitch': 'pitching ks', 'pitching k': 'pitching ks', 'pitching ks': 'pitching ks',
  'out': 'outs recorded', 'outs': 'outs recorded', 'outs recorded': 'outs recorded',
  'er': 'earned runs', 'earned run': 'earned runs', 'earned runs': 'earned runs',
};

const BOOK_ALIASES = {
  'pb': 'PrizePicks', 'prizepicks': 'PrizePicks',
  'dk': 'DraftKings', 'draftkings': 'DraftKings',
  'fd': 'FanDuel', 'fanduel': 'FanDuel',
  'espn': 'ESPN', 'mgm': 'BetMGM', 'betmgm': 'BetMGM',
  'czr': 'Caesars', 'caesars': 'Caesars',
  'bet365': 'Bet365', 'hard': 'Hard Rock', 'hardrock': 'Hard Rock',
  'fliff': 'Fliff', 'pin': 'Pinnacle', 'pinnacle': 'Pinnacle',
  'novig': 'Novig', 'nv': 'Novig', 'bov': 'Bovada', 'bovada': 'Bovada',
};

function normalizeOdds(str) {
  str = str.trim();
  if (!str) return null;
  const n = parseInt(str.replace(/[^0-9\-+]/g,''));
  if (isNaN(n)) return null;
  if (str.startsWith('-')) return n;
  return Math.abs(n);
}

function parseSlateLine(line) {
  line = line.trim();
  // Try: "Player (Team) over/under X.X stat"
  const propMatch = line.match(/^(.+?)\s*\(([^)]+)\)\s*(over|under|o|u)\s*([\d.]+)\s+(.+)$/i);
  if (propMatch) {
    const player = propMatch[1].trim();
    const team = propMatch[2].trim();
    const ouRaw = propMatch[3].toLowerCase();
    const ou = (ouRaw === 'o') ? 'over' : (ouRaw === 'u') ? 'under' : ouRaw;
    const line_ = parseFloat(propMatch[4]);
    const statRaw = propMatch[5].trim().toLowerCase();
    const stat = STAT_ALIASES[statRaw] || statRaw;
    return { type: 'prop', player, team, ou, line: line_, stat };
  }
  // Try book line: "PB +160" or "DK +197"
  const bookMatch = line.match(/^([a-z0-9]+)\s+([+-]?\d{2,4})(?:\s+.*)?$/i);
  if (bookMatch) {
    const bookKey = bookMatch[1].toLowerCase();
    const book = BOOK_ALIASES[bookKey] || bookMatch[1].toUpperCase();
    const odds = normalizeOdds(bookMatch[2]);
    if (odds !== null) return { type: 'book', book, odds };
  }
  // "I got ODDS" line
  const igotMatch = line.match(/i\s+got\s+([+-]?\d{2,4})/i);
  if (igotMatch) {
    const odds = normalizeOdds(igotMatch[1]);
    if (odds !== null) return { type: 'igot', odds };
  }
  return null;
}

function parseSlate(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const parsed = [];
  let current = null;

  for (const line of lines) {
    // Skip pure annotation lines
    if (/^(just\s+send|this\s+is\s+just|incase)/i.test(line)) continue;

    const result = parseSlateLine(line);
    if (!result) continue;

    if (result.type === 'prop') {
      if (current) parsed.push(current);
      current = { player: result.player, team: result.team, ou: result.ou, line: result.line, stat: result.stat, book: null, odds: null };
    } else if (result.type === 'book' && current && !current.book) {
      current.book = result.book;
      current.odds = result.odds;
    } else if (result.type === 'igot' && current) {
      // "I got X" overrides the book odds
      current.odds = result.odds;
    } else if (result.type === 'book' && current && current.book) {
      // Second book line = "I got" equivalent or just ignore
    }
  }
  if (current) parsed.push(current);
  return parsed;
}

function formatBetText(b) {
  const ouStr = b.ou.charAt(0).toUpperCase() + b.ou.slice(1);
  const oddsStr = b.odds !== null ? (b.odds > 0 ? `+${b.odds}` : `${b.odds}`) : '';
  return `${b.player} (${b.team}) ${ouStr} ${b.line} ${b.stat}${b.book ? ' · ' + b.book : ''}${oddsStr ? ' ' + oddsStr : ''}`;
}

function previewParse() {
  const text = document.getElementById('slateInput').value;
  const parsed = parseSlate(text);
  const preview = document.getElementById('parsePreview');
  const pills = document.getElementById('parsePills');
  const countEl = document.getElementById('parseCount');

  if (!text.trim() || !parsed.length) { preview.style.display = 'none'; return; }
  preview.style.display = 'block';
  countEl.textContent = parsed.length;

  pills.innerHTML = parsed.map(b => {
    const ok = b.player && b.stat && b.odds !== null;
    const oddsStr = b.odds !== null ? (b.odds > 0 ? `+${b.odds}` : `${b.odds}`) : '?';
    return `<span class="parse-pill ${ok ? '' : 'err'}">${b.player} ${b.ou} ${b.line} ${b.stat} ${oddsStr}</span>`;
  }).join('');
}

function addSlate() {
  const text = document.getElementById('slateInput').value;
  const parsed = parseSlate(text);
  if (!parsed.length) return;
  const date = document.getElementById('betDate').value;

  const newBets = parsed.map(b => ({
    id: Date.now() + Math.random(),
    text: formatBetText(b),
    player: b.player,
    team: b.team,
    ou: b.ou,
    line: b.line,
    stat: b.stat,
    book: b.book,
    odds: b.odds,
    date,
    grade: null,
    actual: null,
  }));

  bets = [...newBets, ...bets];
  saveToStorage();
  document.getElementById('slateInput').value = '';
  document.getElementById('parsePreview').style.display = 'none';
  render();
}

// ── Units math ────────────────────────────────────────────────────────
function calcPL(odds, result) {
  if (result === 'push') return 0;
  if (!odds) return result === 'win' ? 1 : -1;
  if (odds > 0) return result === 'win' ? +(odds / 100).toFixed(3) : -1;
  const risk = +(Math.abs(odds) / 100).toFixed(3);
  return result === 'win' ? 1 : -risk;
}
function fmtPL(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + 'u'; }
function fmtOdds(o) { return o > 0 ? '+' + o : '' + o; }

// ── Period ────────────────────────────────────────────────────────────
function setPeriod(p, btn) {
  activePeriod = p;
  document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function inPeriod(bet) {
  if (activePeriod === 'all') return true;
  const d = new Date(bet.date + 'T12:00:00');
  const now = new Date();
  if (activePeriod === 'day') return bet.date === now.toISOString().split('T')[0];
  if (activePeriod === 'week') { const w = new Date(now); w.setDate(now.getDate()-7); return d >= w; }
  if (activePeriod === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  return true;
}

// ── Dashboard ─────────────────────────────────────────────────────────
function updateDashboard() {
  const filtered = bets.filter(b => inPeriod(b) && (!activeFilter || b.stat === activeFilter));
  const graded = filtered.filter(b => b.grade === 'win' || b.grade === 'loss' || b.grade === 'push');
  const wins = graded.filter(b => b.grade === 'win').length;
  const losses = graded.filter(b => b.grade === 'loss').length;
  const total = wins + losses;
  const pl = graded.reduce((s, b) => s + calcPL(b.odds, b.grade), 0);
  const risk = graded.reduce((s, b) => {
    if (!b.odds) return s + 1;
    return s + (b.odds < 0 ? Math.abs(b.odds)/100 : 1);
  }, 0);
  const roi = risk ? (pl/risk*100).toFixed(1)+'%' : '—';
  const wr = total ? (wins/total*100).toFixed(1)+'%' : '—';
  const oddsArr = graded.filter(b => b.odds).map(b => b.odds);
  const avgOdds = oddsArr.length ? Math.round(oddsArr.reduce((a,b) => a+b,0)/oddsArr.length) : null;

  const set = (id, val, cls) => {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = 'stat-val ' + (cls || 'neu');
  };
  set('dWL', total ? `${wins}-${losses}` : '—', total ? (wins >= losses ? 'pos' : 'neg') : 'neu');
  const plCls = pl > 0 ? 'pos' : pl < 0 ? 'neg' : 'neu';
  set('dPL', graded.length ? fmtPL(pl) : '—', plCls);
  set('dWR', wr, total ? (wins/total >= 0.5 ? 'pos' : 'neg') : 'neu');
  set('dROI', roi, roi !== '—' ? (parseFloat(roi) >= 0 ? 'pos' : 'neg') : 'neu');
  set('dBets', filtered.length || '—', 'neu');
  set('dOdds', avgOdds ? fmtOdds(avgOdds) : '—', avgOdds ? (avgOdds >= 0 ? 'pos' : 'neu') : 'neu');

  updateStatBreakdown(filtered);
  updateBookBreakdown(filtered);
  updateSummary(wins, losses, pl);
}

function updateStatBreakdown(filtered) {
  const el = document.getElementById('statBreakdown');
  const empty = document.getElementById('statEmpty');
  el.querySelectorAll('.tag-row').forEach(r => r.remove());

  const stats = {};
  filtered.forEach(b => {
    if (!b.stat || !b.grade || b.grade === 'push') return;
    if (!stats[b.stat]) stats[b.stat] = { w:0, l:0, pl:0 };
    if (b.grade === 'win') { stats[b.stat].w++; stats[b.stat].pl += calcPL(b.odds,'win'); }
    else { stats[b.stat].l++; stats[b.stat].pl += calcPL(b.odds,'loss'); }
  });

  const keys = Object.keys(stats);
  if (!keys.length) { empty.style.display='block'; return; }
  empty.style.display='none';

  keys.sort((a,b) => (stats[b].w+stats[b].l) - (stats[a].w+stats[a].l)).forEach(stat => {
    const d = stats[stat];
    const row = document.createElement('div');
    row.className = 'tag-row';
    row.innerHTML = `<span class="tag-name">${stat}</span><span class="tag-wl">${d.w}-${d.l}</span><span class="tag-pl ${d.pl>=0?'pos':'neg'}">${fmtPL(d.pl)}</span>`;
    el.appendChild(row);
  });
}

function updateBookBreakdown(filtered) {
  const el = document.getElementById('bookBreakdown');
  const empty = document.getElementById('bookEmpty');
  el.querySelectorAll('.tag-row').forEach(r => r.remove());

  const books = {};
  filtered.forEach(b => {
    if (!b.book || !b.grade || b.grade === 'push') return;
    if (!books[b.book]) books[b.book] = { w:0, l:0, pl:0 };
    if (b.grade === 'win') { books[b.book].w++; books[b.book].pl += calcPL(b.odds,'win'); }
    else { books[b.book].l++; books[b.book].pl += calcPL(b.odds,'loss'); }
  });

  const keys = Object.keys(books);
  if (!keys.length) { empty.style.display='block'; return; }
  empty.style.display='none';

  keys.sort().forEach(book => {
    const d = books[book];
    const row = document.createElement('div');
    row.className = 'tag-row';
    row.innerHTML = `<span class="tag-name">${book}</span><span class="tag-wl">${d.w}-${d.l}</span><span class="tag-pl ${d.pl>=0?'pos':'neg'}">${fmtPL(d.pl)}</span>`;
    el.appendChild(row);
  });
}

function updateSummary(wins, losses, pl) {
  const box = document.getElementById('summaryBox');
  const txt = document.getElementById('summaryText');
  if (!(wins+losses)) { box.style.display='none'; return; }
  box.style.display='block';
  const lbl = { all:'All Time', month:'This Month', week:'This Week', day:'Today' }[activePeriod];
  txt.innerHTML = `<div class="line1">${lbl} ${wins}-${losses} ${fmtPL(pl)}</div><div class="line2">MLB Props</div>`;
}

function copySummary() {
  const txt = document.getElementById('summaryText');
  const lines = [...txt.querySelectorAll('div')].map(d => d.textContent).join('\n');
  navigator.clipboard.writeText(lines).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ COPIED';
    setTimeout(() => btn.textContent = 'COPY', 1800);
  });
}

// ── Filter bar ────────────────────────────────────────────────────────
function updateFilterBar() {
  const stats = [...new Set(bets.map(b => b.stat).filter(Boolean))].sort();
  const bar = document.getElementById('filterBar');
  if (!stats.length) { bar.innerHTML = ''; return; }
  bar.innerHTML = `<span class="filter-label">Filter:</span>` +
    `<span class="filter-tag ${!activeFilter ? 'active' : ''}" onclick="setFilter(null)">All</span>` +
    stats.map(s => `<span class="filter-tag ${activeFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">${s}</span>`).join('');
}

function setFilter(s) { activeFilter = s; render(); }

// ── Render ────────────────────────────────────────────────────────────
function render() {
  updateDashboard();
  updateFilterBar();
  renderBets();
}

function renderBets() {
  const list = document.getElementById('betsList');
  const count = document.getElementById('betsCount');
  const filtered = bets.filter(b => !activeFilter || b.stat === activeFilter);
  count.textContent = filtered.length ? `(${filtered.length})` : '';

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No bets yet — paste a slate above</div>';
    return;
  }

  list.innerHTML = filtered.map((bet) => {
    const realIdx = bets.indexOf(bet);
    const gradeClass = bet.grade ? `graded-${bet.grade}` : '';
    const badge = buildBadge(bet, realIdx);
    const ouStr = bet.ou ? (bet.ou.charAt(0).toUpperCase() + bet.ou.slice(1)) : '';
    const oddsStr = bet.odds !== null ? (bet.odds > 0 ? `+${bet.odds}` : `${bet.odds}`) : '';
    const meta = [
      bet.stat ? `<span class="stat-pill">${bet.stat}</span>` : '',
      ouStr ? `<span class="stat-pill">${ouStr} ${bet.line}</span>` : '',
      bet.book ? `<span class="stat-pill">${bet.book}</span>` : '',
      oddsStr ? `<span class="stat-pill">${oddsStr}</span>` : '',
    ].filter(Boolean).join('');

    return `<div class="bet-item ${gradeClass}" id="bet-${realIdx}">
      <div class="bet-text">${escHtml(bet.player)}${bet.team ? ' <span style="color:var(--muted);">(${escHtml(bet.team)})</span>' : ''}</div>
      <div class="bet-meta">${meta}</div>
      <div class="bet-date-str">${formatDate(bet.date)}</div>
      <div class="bet-actions">
        <div id="badge-${realIdx}">${badge}</div>
        <button class="bet-btn" onclick="gradeBet(${realIdx}, this)">GRADE</button>
        <button class="bet-btn delete" onclick="deleteBet(${realIdx})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function buildBadge(bet, i) {
  if (!bet.grade) return '';
  const pl = calcPL(bet.odds, bet.grade);
  const icon = bet.grade === 'win' ? '✓' : bet.grade === 'loss' ? '✗' : '~';
  const word = bet.grade === 'win' ? 'WIN' : bet.grade === 'loss' ? 'LOSS' : 'PUSH';
  const actualStr = bet.actual !== null && bet.actual !== 'manual' ? ` (${bet.actual})` : '';
  return `<span class="grade-badge grade-${bet.grade}">${icon} ${word} ${fmtPL(pl)}${actualStr}</span>`;
}

function showManualBtns(i) {
  const el = document.getElementById(`badge-${i}`);
  if (!el) return;
  el.innerHTML = `<div class="manual-grade-btns">
    <button class="mgb mgb-w" onclick="manualGrade(${i},'win')">W</button>
    <button class="mgb mgb-l" onclick="manualGrade(${i},'loss')">L</button>
    <button class="mgb mgb-p" onclick="manualGrade(${i},'push')">P</button>
  </div>`;
}

function manualGrade(i, result) { setGrade(i, result, 'manual'); }

function setGrade(i, result, actual) {
  const bet = bets[i];
  if (!bet) return;
  bet.grade = result;
  bet.actual = actual;
  saveToStorage();
  render();
}

// ── MLB API Grading ───────────────────────────────────────────────────
// Uses MLB Stats API (free, no key needed)
// https://statsapi.mlb.com

const MLB_STAT_KEYS = {
  'hits': 'hits',
  'total bases': 'totalBases',
  'strikeouts': 'strikeOuts',
  'home runs': 'homeRuns',
  'rbis': 'rbi',
  'runs': 'runs',
  'walks': 'baseOnBalls',
  'singles': 'singles',
  'doubles': 'doubles',
  'stolen bases': 'stolenBases',
  'pitching ks': 'strikeOuts',
  'outs recorded': 'outs',
  'earned runs': 'earnedRuns',
};

// Pitching stats require a different group
const PITCHING_STATS = new Set(['pitching ks', 'outs recorded', 'earned runs']);

async function findMLBPlayer(name) {
  const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
  try {
    const res = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}&sportId=1`);
    const data = await res.json();
    if (data.people && data.people.length) {
      const exact = data.people.find(p => norm(`${p.firstName} ${p.lastName}`) === norm(name));
      return exact || data.people[0];
    }
  } catch(e) {}

  // Fallback: search by last name
  try {
    const parts = name.trim().split(' ');
    const lastName = parts[parts.length - 1];
    const res = await fetch(`https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(lastName)}&sportId=1`);
    const data = await res.json();
    if (data.people && data.people.length) {
      const norm_name = norm(name);
      const match = data.people.find(p => norm(`${p.firstName} ${p.lastName}`) === norm_name);
      if (match) return match;
      // fuzzy: last name match + first initial
      const firstInit = name[0].toLowerCase();
      const fuzzy = data.people.find(p =>
        norm(p.lastName) === norm(lastName) &&
        p.firstName && p.firstName[0].toLowerCase() === firstInit
      );
      if (fuzzy) return fuzzy;
      return data.people[0];
    }
  } catch(e) {}
  return null;
}

async function getMLBGameId(playerId, dateStr) {
  // Get schedule for the date to find games
  try {
    const res = await fetch(`https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${dateStr}&hydrate=linescore`);
    const data = await res.json();
    if (!data.dates || !data.dates.length) return null;
    const games = data.dates[0].games || [];
    // Return all game IDs for that date so we can search
    return games.map(g => g.gamePk);
  } catch(e) { return null; }
}

async function getMLBStats(playerId, dateStr, stat) {
  const isPitching = PITCHING_STATS.has(stat);
  const group = isPitching ? 'pitching' : 'hitting';
  const statKey = MLB_STAT_KEYS[stat];
  if (!statKey) return null;

  try {
    // Get game log for the player around that date
    const season = dateStr.substring(0,4);
    const res = await fetch(
      `https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=${group}&season=${season}&sportId=1`
    );
    const data = await res.json();
    if (!data.stats || !data.stats.length || !data.stats[0].splits) return null;

    const splits = data.stats[0].splits;
    // Find the game matching the date
    const gameSplit = splits.find(s => s.date === dateStr);
    if (!gameSplit) return null;

    const val = gameSplit.stat[statKey];
    return val !== undefined ? val : null;
  } catch(e) { return null; }
}

async function gradeBet(i, btn) {
  const bet = bets[i];
  if (!bet) return;
  if (!bet.player || !bet.stat) { showManualBtns(i); return; }

  btn.textContent = '...';
  try {
    const player = await findMLBPlayer(bet.player);
    if (!player) { showManualBtns(i); btn.textContent = 'GRADE'; return; }

    const actual = await getMLBStats(player.id, bet.date, bet.stat);
    if (actual === null || actual === undefined) { showManualBtns(i); btn.textContent = 'GRADE'; return; }

    const numActual = parseFloat(actual);
    const result = numActual === bet.line ? 'push'
      : (bet.ou === 'over' ? numActual > bet.line : numActual < bet.line) ? 'win' : 'loss';
    setGrade(i, result, numActual);
  } catch(e) {
    showManualBtns(i);
  }
  btn.textContent = 'GRADE';
}

async function gradeAll(btn) {
  if (!bets.length) return;
  btn.textContent = '⏳ Grading...';
  btn.disabled = true;
  for (let i = 0; i < bets.length; i++) {
    if (bets[i].grade) continue;
    const bet = bets[i];
    if (!bet.player || !bet.stat) { showManualBtns(i); continue; }
    try {
      const player = await findMLBPlayer(bet.player);
      if (!player) { showManualBtns(i); continue; }
      const actual = await getMLBStats(player.id, bet.date, bet.stat);
      if (actual === null || actual === undefined) { showManualBtns(i); continue; }
      const numActual = parseFloat(actual);
      const result = numActual === bet.line ? 'push'
        : (bet.ou === 'over' ? numActual > bet.line : numActual < bet.line) ? 'win' : 'loss';
      setGrade(i, result, numActual);
    } catch(e) { showManualBtns(i); }
    await new Promise(r => setTimeout(r, 400));
  }
  btn.textContent = '⚡ GRADE ALL';
  btn.disabled = false;
  render();
}

// ── Helpers ───────────────────────────────────────────────────────────
function deleteBet(i) { bets.splice(i,1); saveToStorage(); render(); }

function clearAllBets() {
  if (!confirm('Clear all bets?')) return;
  bets = []; saveToStorage(); render();
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(d) {
  if (!d) return '';
  const today = new Date().toISOString().split('T')[0];
  const yest = new Date(); yest.setDate(yest.getDate()-1);
  const yStr = yest.toISOString().split('T')[0];
  if (d === today) return 'Today';
  if (d === yStr) return 'Yesterday';
  return new Date(d+'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
