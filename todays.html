<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ESPN API Debug</title>
<style>
body{background:#070c18;color:#fff;font-family:monospace;font-size:12px;padding:12px;}
h2{color:#00d4b4;margin-bottom:8px;}
.btn{background:#00d4b4;color:#000;border:none;padding:8px 16px;border-radius:6px;font-weight:700;cursor:pointer;margin:4px;}
pre{background:#111;border:1px solid #1e3050;border-radius:8px;padding:12px;overflow:auto;white-space:pre-wrap;word-break:break-all;max-height:400px;margin-top:8px;}
.ok{color:#22c55e;}.err{color:#f0484a;}.lbl{color:#a0bcda;font-weight:700;}
</style>
</head>
<body>
<h2>ESPN WNBA API Inspector</h2>
<button class="btn" onclick="run('scoreboard')">Scoreboard</button>
<button class="btn" onclick="run('scoreboard_teams')">Teams</button>
<button class="btn" onclick="run('schedule')">Schedule (IND 2026)</button>
<button class="btn" onclick="run('scoreboard_dated')">Scoreboard Jul 8</button>
<div id="out"></div>

<script>
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba';

async function run(type) {
  const out = document.getElementById('out');
  out.innerHTML = '<p style="color:#a0bcda">Loading…</p>';
  try {
    let url, label;
    if (type === 'scoreboard') { url = BASE+'/scoreboard'; label = 'Scoreboard'; }
    else if (type === 'scoreboard_dated') { url = BASE+'/scoreboard?dates=20260708'; label = 'Scoreboard Jul 8 2026'; }
    else if (type === 'scoreboard_teams') { url = BASE+'/teams?limit=20'; label = 'Teams'; }
    else if (type === 'schedule') { url = BASE+'/teams/5/schedule?season=2026&seasontype=2'; label = 'IND Schedule 2026'; }

    const r = await fetch(url);
    const d = await r.json();

    let html = `<p class="ok">✓ ${label} — HTTP ${r.status}</p>`;

    if (type === 'scoreboard' || type === 'scoreboard_dated') {
      const evs = d.events || [];
      html += `<p class="lbl">Events: ${evs.length}</p>`;
      evs.forEach((ev, i) => {
        const comp = ev.competitions?.[0];
        const home = comp?.competitors?.find(c=>c.homeAway==='home');
        const away = comp?.competitors?.find(c=>c.homeAway==='away');
        html += `<p><b>${away?.team?.abbreviation} @ ${home?.team?.abbreviation}</b> — ${comp?.status?.type?.shortDetail}</p>`;
        html += `<p class="lbl">Away logo: <span style="color:#fff">${away?.team?.logo || away?.team?.logos?.[0]?.href || 'NONE'}</span></p>`;
        
        // Check all possible odds locations
        const oddsKeys = ['odds','pickcenter'];
        oddsKeys.forEach(k => {
          const arr = comp?.[k] || [];
          html += `<p class="lbl">comp.${k} length: <span style="color:#fff">${arr.length}</span></p>`;
          if (arr[0]) {
            html += `<p class="lbl">  keys: <span style="color:#fff">${Object.keys(arr[0]).join(', ')}</span></p>`;
            html += `<p class="lbl">  overUnder: <span style="color:#fff">${arr[0].overUnder}</span></p>`;
            html += `<p class="lbl">  details: <span style="color:#fff">${arr[0].details}</span></p>`;
            html += `<p class="lbl">  spread: <span style="color:#fff">${arr[0].spread}</span></p>`;
            html += `<p class="lbl">  awayTeamOdds fav: <span style="color:#fff">${arr[0].awayTeamOdds?.favorite}</span></p>`;
            html += `<p class="lbl">  awayTeamOdds current: <span style="color:#fff">${JSON.stringify(arr[0].awayTeamOdds?.current||{})}</span></p>`;
            html += `<p class="lbl">  pointSpread: <span style="color:#fff">${JSON.stringify(arr[0].pointSpread||'none')}</span></p>`;
            html += `<p class="lbl">  moneyline: <span style="color:#fff">${JSON.stringify(arr[0].moneyline||'none')}</span></p>`;
            html += `<p class="lbl">  total: <span style="color:#fff">${JSON.stringify(arr[0].total||'none')}</span></p>`;
          }
        });
        html += '<hr style="border-color:#1e3050;margin:6px 0">';
      });
    }

    else if (type === 'scoreboard_teams') {
      const teams = d.sports?.[0]?.leagues?.[0]?.teams || [];
      html += `<p class="lbl">Teams: ${teams.length}</p>`;
      teams.forEach(t => {
        html += `<p>${t.team.abbreviation} | id:${t.team.id} | logo:${t.team.logos?.[0]?.href||t.team.logo||'NONE'}</p>`;
      });
    }

    else if (type === 'schedule') {
      const evs = d.events || [];
      html += `<p class="lbl">Events: ${evs.length}</p>`;
      const sample = evs.find(e => e.competitions?.[0]?.odds?.length || e.competitions?.[0]?.pickcenter?.length);
      if (sample) {
        const comp = sample.competitions[0];
        const home = comp.competitors.find(c=>c.homeAway==='home');
        const away = comp.competitors.find(c=>c.homeAway==='away');
        html += `<p><b>Sample with odds: ${away.team.abbreviation} @ ${home.team.abbreviation}</b></p>`;
        const arr = comp.odds || comp.pickcenter || [];
        html += `<pre>${JSON.stringify(arr[0], null, 2)}</pre>`;
      } else {
        html += `<p class="err">No events with odds found — showing first event structure:</p>`;
        const comp = evs[0]?.competitions?.[0];
        html += `<p class="lbl">Competition keys: ${Object.keys(comp||{}).join(', ')}</p>`;
        html += `<p class="lbl">comp.odds: ${JSON.stringify(comp?.odds||[])}</p>`;
        html += `<p class="lbl">comp.pickcenter: ${JSON.stringify(comp?.pickcenter||[])}</p>`;
        // Show raw first event
        html += `<pre>${JSON.stringify(evs[0]?.competitions?.[0]?.odds||[], null, 2)}</pre>`;
      }
      // show first 5 events dates
      evs.slice(0,5).forEach(ev => {
        const comp = ev.competitions[0];
        const home = comp.competitors.find(c=>c.homeAway==='home');
        const away = comp.competitors.find(c=>c.homeAway==='away');
        const hasOdds = (comp.odds||comp.pickcenter||[]).length;
        html += `<p>${ev.date.slice(0,10)}: ${away.team.abbreviation} @ ${home.team.abbreviation} | odds: ${hasOdds} | status: ${comp.status.type.state}</p>`;
      });
    }

    out.innerHTML = html;
  } catch(e) {
    out.innerHTML = `<p class="err">Error: ${e.message}</p>`;
  }
}
run('scoreboard');
</script>
</body>
</html>
