<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WNBA Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;600;700&display=swap');

:root {
  --bg:    #070c18;
  --navy:  #0b1424;
  --surf:  #101c2e;
  --surf2: #162338;
  --bord:  #1e3050;
  --teal:  #00d4b4;
  --tdim:  #00d4b418;
  --text:  #ffffff;
  --sub:   #ccdcf0;
  --lbl:   #a0bcda;
  --green: #22c55e; --gbg: #22c55e1a;
  --red:   #f0484a; --rbg: #f0484a1a;
  --amber: #f59e0b;
  --push:  #8ab0d0; --pbg: #8ab0d01a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:100dvh;overflow:hidden;overscroll-behavior:none;
  background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
#app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden;}

/* HEADER */
#hdr{flex-shrink:0;background:var(--navy);border-bottom:1px solid var(--bord);
  padding-top:env(safe-area-inset-top,0px);}
.hrow{display:flex;align-items:center;padding:10px 14px 7px;gap:8px;}
.hlogo{width:26px;height:26px;background:var(--teal);border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#000;flex-shrink:0;}
.htitle{font-size:15px;font-weight:900;letter-spacing:-.4px;flex:1;}
.htitle em{color:var(--teal);font-style:normal;}
.hlive{width:7px;height:7px;border-radius:50%;background:var(--red);
  animation:blink 1.2s ease infinite;display:none;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.hseason{background:var(--surf2);border:1px solid var(--bord);color:var(--text);
  border-radius:7px;padding:3px 8px;font-size:11px;font-family:'Inter',sans-serif;
  font-weight:700;-webkit-appearance:none;cursor:pointer;}
.hrefresh{background:var(--surf2);border:1px solid var(--bord);border-radius:6px;
  padding:3px 9px;font-size:13px;font-weight:700;color:var(--teal);cursor:pointer;flex-shrink:0;}
.navtabs{display:flex;padding:0 10px 8px;gap:4px;overflow-x:auto;scrollbar-width:none;}
.navtabs::-webkit-scrollbar{display:none;}
.ntab{flex-shrink:0;background:transparent;border:1px solid var(--bord);
  border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;
  color:var(--lbl);cursor:pointer;white-space:nowrap;transition:all .12s;}
.ntab.on{background:var(--tdim);border-color:var(--teal);color:var(--teal);}

/* PANE */
#pane{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;padding:10px 12px env(safe-area-inset-bottom,14px);}

/* SHARED */
.sec{font-size:11px;font-weight:800;color:var(--lbl);text-transform:uppercase;
  letter-spacing:.5px;margin:14px 0 7px;}
.sec:first-child{margin-top:2px;}
.loading{text-align:center;padding:60px 16px;color:var(--lbl);}
.spinner{width:24px;height:24px;border:2px solid var(--bord);border-top-color:var(--teal);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;}
.empty .ei{font-size:36px;margin-bottom:10px;}
.empty .et{font-size:13px;font-weight:700;color:var(--text);}
.empty .es{font-size:11px;color:var(--sub);margin-top:4px;font-weight:600;}

/* badges */
.badge{display:inline-flex;align-items:center;justify-content:center;
  border-radius:5px;font-size:10px;font-weight:800;padding:2px 7px;
  font-family:'JetBrains Mono',monospace;}
.badge.W{background:var(--gbg);color:var(--green);}
.badge.L{background:var(--rbg);color:var(--red);}
.badge.P{background:var(--pbg);color:var(--push);}
.badge.O{background:var(--gbg);color:var(--green);}
.badge.U{background:var(--rbg);color:var(--red);}

/* logo */
.lg{border-radius:8px;object-fit:contain;background:var(--surf2);padding:3px;
  border:1px solid var(--bord);flex-shrink:0;}
.lg-ph{border-radius:8px;background:var(--surf2);border:1px solid var(--bord);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--teal);flex-shrink:0;}

/* odds badge pill */
.op{background:var(--surf2);border:1px solid var(--bord);border-radius:5px;
  padding:2px 6px;font-size:10px;font-weight:700;color:var(--sub);white-space:nowrap;}
.op.fav{color:var(--amber);}

/* ══ TODAY TAB ══ */
.mc{background:var(--surf);border:1px solid var(--bord);border-radius:14px;
  margin-bottom:10px;overflow:hidden;}
.mc-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;}
.mc-team{display:flex;flex-direction:column;align-items:center;padding:14px 8px 10px;gap:5px;}
.mc-team.home{background:linear-gradient(140deg,var(--surf2) 0%,var(--surf) 100%);}
.mc-abbr{font-size:14px;font-weight:900;color:var(--text);}
.mc-rec{font-size:10px;color:var(--sub);font-weight:600;}
.mc-score{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.mc-score.win{color:var(--teal);}
.mc-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 10px;gap:4px;min-width:58px;}
.mc-at{font-size:10px;color:var(--lbl);font-weight:700;}
.mc-status{font-size:11px;font-weight:700;color:var(--sub);text-align:center;}
.mc-livedot{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--red);animation:blink 1.2s ease infinite;margin-right:3px;}
.mc-bc{background:var(--surf2);border:1px solid var(--bord);border-radius:4px;
  padding:2px 5px;font-size:9px;font-weight:700;color:var(--sub);}

/* 4-cell odds strip */
.mc-odds{border-top:1px solid var(--bord);display:grid;
  grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;background:var(--surf2);}
.mc-odiv{background:var(--bord);}
.oc{padding:7px 4px;text-align:center;}
.oc-l{font-size:9px;font-weight:700;color:var(--lbl);text-transform:uppercase;
  letter-spacing:.4px;margin-bottom:3px;}
.oc-v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
.oc-s{font-size:9px;color:var(--sub);margin-top:1px;font-weight:600;}

/* result row */
.mc-res{border-top:1px solid var(--bord);display:grid;
  grid-template-columns:1fr auto 1fr;align-items:center;padding:6px 10px;gap:6px;}
.rs{display:flex;align-items:center;gap:5px;}
.rs.r{flex-direction:row-reverse;}
.rs-lbl{font-size:9px;font-weight:700;color:var(--lbl);text-transform:uppercase;}
.rs-div{width:1px;height:22px;background:var(--bord);}

/* leaders */
.mc-ldrs{border-top:1px solid var(--bord);display:flex;}
.ldr{flex:1;padding:6px 8px;border-right:1px solid var(--bord);
  display:flex;align-items:center;gap:6px;overflow:hidden;min-width:0;}
.ldr:last-child{border-right:none;}
.ldr-hs{width:24px;height:24px;border-radius:50%;object-fit:cover;
  background:var(--surf2);flex-shrink:0;}
.ldr-n{font-size:10px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ldr-s{font-size:9px;color:var(--sub);font-weight:600;}

/* upcoming */
.uc{background:var(--surf);border:1px solid var(--bord);border-radius:14px;
  margin-bottom:10px;overflow:hidden;}
.uc-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 10px;}
.uc-tm{display:flex;flex-direction:column;align-items:center;gap:5px;}
.uc-ab{font-size:13px;font-weight:900;color:var(--text);}
.uc-rc{font-size:10px;color:var(--sub);font-weight:600;}
.uc-mid{text-align:center;}
.uc-time{font-size:13px;font-weight:800;color:var(--text);}
.uc-at{font-size:10px;color:var(--lbl);font-weight:700;margin-top:3px;}
.uc-odds{border-top:1px solid var(--bord);display:grid;
  grid-template-columns:1fr 1px 1fr 1px 1fr 1px 1fr;background:var(--surf2);}
.uc-div{background:var(--bord);}
.uco{padding:7px 4px;text-align:center;}
.uco-l{font-size:9px;font-weight:700;color:var(--lbl);text-transform:uppercase;
  letter-spacing:.3px;margin-bottom:3px;}
.uco-v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--text);}
.uco-v.fav{color:var(--amber);}
.no-odds-strip{border-top:1px solid var(--bord);padding:7px 12px;
  font-size:10px;color:var(--sub);font-weight:600;background:var(--surf2);text-align:center;}

/* ══ TRENDS TAB ══ */
.tpills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;}
.tpills::-webkit-scrollbar{display:none;}
.tpill{flex-shrink:0;background:var(--surf2);border:1px solid var(--bord);
  border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;
  color:var(--lbl);cursor:pointer;white-space:nowrap;transition:all .12s;}
.tpill.on{background:var(--tdim);border-color:var(--teal);color:var(--teal);}
.tsels{display:flex;gap:6px;margin-bottom:10px;}
.tsels select{flex:1;background:var(--surf2);border:1px solid var(--bord);color:var(--text);
  border-radius:8px;padding:6px 8px;font-size:12px;font-family:'Inter',sans-serif;
  font-weight:600;-webkit-appearance:none;cursor:pointer;}

.thero{background:var(--surf);border:1px solid var(--bord);border-radius:12px;
  padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.thero-info{flex:1;min-width:0;}
.thero-name{font-size:15px;font-weight:800;color:var(--text);}
.thero-sub{font-size:11px;color:var(--sub);font-weight:600;margin-top:2px;}
.thero-r{text-align:right;}
.thero-al{font-size:10px;color:var(--lbl);font-weight:700;margin-bottom:2px;}
.thero-av{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800;}

.stat2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.sbox{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:11px;text-align:center;}
.sbox-l{font-size:10px;font-weight:700;color:var(--lbl);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.sbox-v{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:700;color:var(--text);}
.sbox-s{font-size:10px;color:var(--sub);margin-top:2px;font-weight:600;}
.bar{background:var(--surf2);border-radius:3px;height:4px;margin-top:6px;overflow:hidden;}
.bf{height:100%;border-radius:3px;transition:width .35s ease;}

.sp2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.spcard{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:10px;}
.spcard-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--lbl);margin-bottom:7px;}
.sprow{display:flex;justify-content:space-between;align-items:center;
  padding:3px 0;border-bottom:1px solid var(--bord);font-size:11px;}
.sprow:last-child{border-bottom:none;padding-bottom:0;}
.spk{color:var(--lbl);font-weight:600;}
.spv{font-weight:800;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);}

/* game log */
.gtbl{background:var(--surf);border:1px solid var(--bord);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.gt-h,.gt-r{display:grid;padding:6px 10px;align-items:center;}
.gt-h{background:var(--surf2);border-bottom:1px solid var(--bord);}
.gth{font-size:10px;font-weight:700;color:var(--lbl);text-transform:uppercase;letter-spacing:.3px;}
.gth.c{text-align:center;}
.gt-r{border-bottom:1px solid var(--bord);}
.gt-r:last-child{border-bottom:none;}
.gdate{font-size:10px;color:var(--sub);font-weight:600;}
.gopp{font-size:12px;font-weight:700;color:var(--text);}
.gopp-s{font-size:10px;color:var(--sub);font-weight:600;}
.gscore{text-align:center;font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace;font-weight:600;}

/* ══ SCHEDULE TAB ══ */
.sfilts{display:flex;gap:5px;margin-bottom:10px;}
.sfbtn{background:var(--surf2);border:1px solid var(--bord);border-radius:7px;
  padding:5px 11px;font-size:11px;font-weight:700;color:var(--lbl);cursor:pointer;white-space:nowrap;}
.sfbtn.on{background:var(--tdim);border-color:var(--teal);color:var(--teal);}
.sday{font-size:11px;font-weight:800;color:var(--lbl);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 5px;}
.srow{background:var(--surf);border:1px solid var(--bord);border-radius:10px;
  padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.srow-tms{flex:1;min-width:0;}
.sline{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.sline:last-child{margin-bottom:0;}
.sha{font-size:10px;color:var(--lbl);width:18px;flex-shrink:0;font-weight:600;}
.sab{font-size:13px;font-weight:800;color:var(--text);}
.sab.win{color:var(--teal);}
.srec{font-size:10px;color:var(--sub);font-weight:600;}
.ssc{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--text);}
.ssc.win{color:var(--teal);}
.srow-sc{text-align:right;flex-shrink:0;}
.srow-time{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:2px;text-align:right;}
.srow-odds{flex-shrink:0;min-width:76px;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.sod-line{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--lbl);font-weight:600;}
.sod-v{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--text);}
.srow-badges{flex-shrink:0;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}

/* ══ STANDINGS TAB ══ */
.stbl{background:var(--surf);border:1px solid var(--bord);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.st-h,.st-r{display:grid;grid-template-columns:20px 1fr 36px 36px 44px 56px;padding:7px 10px;align-items:center;}
.st-h{background:var(--surf2);border-bottom:1px solid var(--bord);}
.sth2{font-size:10px;font-weight:700;color:var(--lbl);text-transform:uppercase;letter-spacing:.3px;}
.sth2.c{text-align:center;}
.st-r{border-bottom:1px solid var(--bord);}
.st-r:last-child{border-bottom:none;}
.st-rk{font-size:10px;color:var(--lbl);font-weight:700;}
.st-tm{display:flex;align-items:center;gap:6px;min-width:0;}
.st-tn{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.std{font-size:11px;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--sub);}
.std.ats{font-size:10px;font-weight:800;}
.pl-line{height:1px;background:var(--teal);opacity:.4;}

/* ══ LEAGUE TAB ══ */
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.lcard{background:var(--surf);border:1px solid var(--bord);border-radius:10px;padding:10px;}
.lcard-t{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--lbl);margin-bottom:8px;}
.lcard-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--bord);}
.lcard-row:last-child{border-bottom:none;padding-bottom:0;}
.lcard-logo{width:20px;height:20px;border-radius:4px;object-fit:contain;background:var(--surf2);flex-shrink:0;}
.lcard-n{font-size:11px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lcard-v{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;white-space:nowrap;}

/* color utils */
.cw{color:var(--green);}.cl{color:var(--red);}.ct{color:var(--teal);}.cp{color:var(--push);}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div class="hrow">
    <div class="hlogo">W</div>
    <div class="htitle">WNBA <em>Hub</em></div>
    <div class="hlive" id="liveDot"></div>
    <select class="hseason" id="seasonSel">
      <option value="2026">2026</option><option value="2025">2025</option>
      <option value="2024">2024</option><option value="2023">2023</option><option value="2022">2022</option>
    </select>
    <div class="hrefresh" id="refreshBtn">↻</div>
  </div>
  <div class="navtabs" id="navTabs">
    <div class="ntab on" data-tab="today">📅 Today</div>
    <div class="ntab" data-tab="trends">📊 Trends</div>
    <div class="ntab" data-tab="schedule">🗓 Schedule</div>
    <div class="ntab" data-tab="standings">🏆 Standings</div>
    <div class="ntab" data-tab="league">📈 League</div>
  </div>
</div>
<div id="pane"><div class="loading"><div class="spinner"></div>Loading…</div></div>
</div>

<script>
// ─────────────────────────────────────────────────
// CONFIG — put your Odds API key here if you have one
// ─────────────────────────────────────────────────
const BASE = 'https://site.api.espn.com/apis/site/v2/sports/basketball/wnba';

// ─────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────
const ST = {
  tab:'today', season:'2026',
  teams:[], teamMap:{},       // id → team
  idMap:{},                   // abbr → team
  schedCache:{},              // teamId-season → events[]
  trendsTeam:null, trendsSplit:'all', trendsView:'summary',
  schedFilter:'all',
  refreshTimer:null,
};

// ─────────────────────────────────────────────────
// LOGO — ESPN CDN by team ID
// ─────────────────────────────────────────────────
// logo comes directly from team.logo in ESPN API response
// e.g. "https://a.espncdn.com/i/teamlogos/wnba/500/ny.png"
function logoEl(logoUrl, abbr, size=44) {
  const r = size<=26?6:10;
  const ph = `<div class=lg-ph style=width:${size}px;height:${size}px;border-radius:${r}px;font-size:${size<=26?8:11}px>${(abbr||'?').slice(0,3)}</div>`;
  if (!logoUrl) return ph;
  return `<img class="lg" style="width:${size}px;height:${size}px;border-radius:${r}px" src="${logoUrl}" onerror="this.outerHTML='${ph}'" loading="lazy">`;
}

// ─────────────────────────────────────────────────
// ESPN API
// ─────────────────────────────────────────────────
async function fetchTeams() {
  const r = await fetch(`${BASE}/teams?limit=20`);
  const d = await r.json();
  return d.sports[0].leagues[0].teams.map(t=>({
    id:t.team.id, abbr:t.team.abbreviation,
    short:t.team.shortDisplayName, name:t.team.displayName,
    logo:t.team.logos?.[0]?.href||t.team.logo||null,
  }));
}

async function fetchScoreboard() {
  const r = await fetch(`${BASE}/scoreboard`);
  return r.json();
}

async function fetchTeamSchedule(teamId, season) {
  const key=`${teamId}-${season}`;
  if(ST.schedCache[key]) return ST.schedCache[key];
  const r = await fetch(`${BASE}/teams/${teamId}/schedule?season=${season}&seasontype=2`);
  const d = await r.json();
  ST.schedCache[key] = d.events||[];
  return ST.schedCache[key];
}

async function fetchStandings(season) {
  const r = await fetch(`${BASE}/standings?season=${season}`);
  return r.json();
}



// ─────────────────────────────────────────────────
// PARSE ESPN odds[] array (DraftKings via ESPN)
// Live API structure confirmed:
//   odds[0].pointSpread.away.close.line  = "-8.5"
//   odds[0].pointSpread.home.close.line  = "+8.5"
//   odds[0].total.over.close.line        = "o163.5"
//   odds[0].overUnder                    = 163.5
//   odds[0].moneyline.away.close.odds    = "-355"
//   odds[0].moneyline.home.close.odds    = "+280"
//   odds[0].awayTeamOdds.favorite        = true/false
//   odds[0].details                      = "ATL -8.5"
// ─────────────────────────────────────────────────
function parseESPNOdds(comp) {
  const arr = comp.odds || comp.pickcenter || [];
  if (!arr.length) return {};
  const o = arr[0]; // ESPN returns DraftKings first

  // O/U — direct field
  const ou = o.overUnder != null ? parseFloat(o.overUnder) : null;

  // Spread — pointSpread.away/home.close.line
  let awaySpread = null, homeSpread = null;
  const ps = o.pointSpread;
  if (ps) {
    const al = ps.away?.close?.line ?? ps.away?.open?.line;
    const hl = ps.home?.close?.line ?? ps.home?.open?.line;
    if (al != null) awaySpread = parseFloat(al);
    if (hl != null) homeSpread = parseFloat(hl);
  }

  // Moneyline — moneyline.away/home.close.odds
  let awayML = null, homeML = null;
  const ml = o.moneyline;
  if (ml) {
    const ao = ml.away?.close?.odds ?? ml.away?.open?.odds;
    const ho = ml.home?.close?.odds ?? ml.home?.open?.odds;
    if (ao != null) awayML = ao; // keep as string e.g. "-355"
    if (ho != null) homeML = ho;
  }

  // Favorite flags
  const awayFav = o.awayTeamOdds?.favorite || false;
  const homeFav = o.homeTeamOdds?.favorite || false;

  // Fallback: parse details string "ATL -8.5"
  if (awaySpread === null && homeSpread === null) {
    const details = o.details || '';
    if (details && details !== 'EVEN') {
      const num = parseFloat(details.split(' ').pop());
      if (!isNaN(num)) {
        if (awayFav)      { awaySpread = num; homeSpread = -num; }
        else if (homeFav) { homeSpread = num; awaySpread = -num; }
        else if (o.spread != null) {
          // ESPN "spread" field is magnitude, away is fav if details abbr matches away
          homeSpread = parseFloat(o.spread);
          awaySpread = -homeSpread;
        }
      }
    } else if (o.spread != null) {
      homeSpread = parseFloat(o.spread);
      awaySpread = -homeSpread;
    }
  }

  return { ou, awaySpread, homeSpread, awayML, homeML, awayFav, homeFav, details: o.details||'' };
}

// ─────────────────────────────────────────────────
// PARSE COMPETITION
// ─────────────────────────────────────────────────
function parseComp(ev) {
  const comp = ev.competitions?.[0];
  if (!comp) return null;
  const home = comp.competitors?.find(c=>c.homeAway==='home');
  const away = comp.competitors?.find(c=>c.homeAway==='away');
  if (!home||!away) return null;

  const st = comp.status?.type;
  const completed=st?.completed||false, live=st?.state==='in', pre=st?.state==='pre';
  const dt = new Date(ev.date);
  const hScore=parseInt(home.score)||0, aScore=parseInt(away.score)||0;
  const homeWon=completed&&hScore>aScore, awayWon=completed&&aScore>hScore;

  // Odds from ESPN DraftKings embed
  const odds = parseESPNOdds(comp);

  // ATS calc
  let homeATS=null, awayATS=null;
  if (completed && odds.homeSpread!=null) {
    const cov = hScore - aScore + odds.homeSpread;
    homeATS=cov>0?'W':cov<0?'L':'P';
    awayATS=cov<0?'W':cov>0?'L':'P';
  }
  // O/U calc
  let ouResult=null;
  if (completed && odds.ou!=null) {
    const tot=hScore+aScore;
    ouResult=tot>odds.ou?'O':tot<odds.ou?'U':'P';
  }

  // Leaders (live/completed games have per-game leaders; pre-game has season leaders)
  const hLdr=home.leaders?.find(l=>l.name==='points')?.leaders?.[0];
  const aLdr=away.leaders?.find(l=>l.name==='points')?.leaders?.[0];
  const leaders=[aLdr,hLdr].filter(Boolean).map(l=>({
    name:l.athlete?.shortName||l.athlete?.displayName||'',
    stat:l.displayValue+' PTS', hs:l.athlete?.headshot||null
  }));

  const bc=ev.broadcasts?.find(b=>b.market==='national')?.names?.[0]
         ||comp.broadcasts?.[0]?.names?.[0]||'';
  const wp=live?comp.situation?.lastPlay?.probability:null;
  const hRec=home.records?.find(r=>r.name==='overall')?.summary||'';
  const aRec=away.records?.find(r=>r.name==='overall')?.summary||'';

  // Logos come directly from ESPN team object
  const hLogo = home.team.logo || home.team.logos?.[0]?.href || null;
  const aLogo = away.team.logo || away.team.logos?.[0]?.href || null;

  return {
    id:ev.id,dt,completed,live,pre,
    statusText:st?.shortDetail||'',
    home:{id:home.team.id,abbr:home.team.abbreviation,name:home.team.displayName,
          short:home.team.shortDisplayName,score:hScore,rec:hRec,logo:hLogo},
    away:{id:away.team.id,abbr:away.team.abbreviation,name:away.team.displayName,
          short:away.team.shortDisplayName,score:aScore,rec:aRec,logo:aLogo},
    homeWon,awayWon,
    ...odds, homeATS,awayATS,ouResult,
    leaders,bc,wp,
    venue:comp.venue?.fullName||'',
  };
}

// ─────────────────────────────────────────────────
// PARSE TEAM GAME LOG
// ─────────────────────────────────────────────────
function parseTeamGames(events, teamId) {
  return events.reduce((acc,ev)=>{
    const g=parseComp(ev);
    if(!g||!g.completed) return acc;
    const isHome=g.home.id===teamId;
    const mine=isHome?g.home:g.away, opp=isHome?g.away:g.home;
    const atsR=isHome?g.homeATS:g.awayATS;
    const mySpread=isHome?g.homeSpread:g.awaySpread;
    acc.push({
      id:g.id,dt:g.dt,dateStr:g.dt.getMonth()+1+'/'+g.dt.getDate(),isHome,
      result:mine.score>opp.score?'W':'L',
      oppId:opp.id,oppAbbr:opp.abbr,oppLogo:opp.logo,
      ms:mine.score,os:opp.score,
      spread:mySpread,spreadResult:atsR,ouResult:g.ouResult,overUnder:g.ou,
      total:mine.score+opp.score,
    });
    return acc;
  },[]).sort((a,b)=>b.dt-a.dt);
}

function calcStats(games) {
  const ag=games.filter(g=>g.spreadResult);
  const og=games.filter(g=>g.ouResult);
  const aw=ag.filter(g=>g.spreadResult==='W').length;
  const al=ag.filter(g=>g.spreadResult==='L').length;
  const ap=ag.filter(g=>g.spreadResult==='P').length;
  const ow=og.filter(g=>g.ouResult==='O').length;
  const ou2=og.filter(g=>g.ouResult==='U').length;
  const op=og.filter(g=>g.ouResult==='P').length;
  const wins=games.filter(g=>g.result==='W').length;
  const losses=games.filter(g=>g.result==='L').length;
  const atsPct=(ag.length-ap)>0?aw/(ag.length-ap)*100:null;
  const ouPct=(og.length-op)>0?ow/(og.length-op)*100:null;
  const wPct=games.length>0?wins/games.length*100:null;
  const avgTot=og.length>0?og.reduce((s,g)=>s+g.total,0)/og.length:null;
  const avgMgn=games.length>0?games.reduce((s,g)=>s+(g.ms-g.os),0)/games.length:null;
  return {aw,al,ap,atsPct,ow,ou:ou2,op,ouPct,wins,losses,wPct,avgTot,avgMgn,n:games.length};
}

function filterGames(games){
  const s=ST.trendsSplit;
  if(s==='home') return games.filter(g=>g.isHome);
  if(s==='away') return games.filter(g=>!g.isHome);
  if(s==='last10') return games.slice(0,10);
  if(s==='last5') return games.slice(0,5);
  return games;
}

// DISPLAY UTILS
// ─────────────────────────────────────────────────
const pct   = n => n!==null&&n!==undefined ? n.toFixed(1)+'%' : '—';
const rec   = (w,l,p) => `${w}-${l}${p>0?'-'+p:''}`;
const cpct  = n => n===null||n===undefined?'':n>=55?'cw':n<=45?'cl':'';
const fmtSp = n => n===null||n===undefined?'—': n>0?`+${n}`:n===0?'PK':String(n);
const fmtML = n => n===null||n===undefined?'—': n>0?`+${n}`:String(n);
const fmtTm = dt => dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).replace(':00 ',' ');

function badgeEl(r,ou=false){
  if(!r) return `<span style="font-size:10px;font-weight:700;color:var(--lbl)">—</span>`;
  if(ou){const cls=r==='O'?'O':r==='U'?'U':'P';return `<span class="badge ${cls}">${r}</span>`;}
  return `<span class="badge ${r}">${r}</span>`;
}

function splitCard(label,n,st){
  return `<div class="spcard">
    <div class="spcard-t">${label} <span style="color:var(--lbl)">(${n}g)</span></div>
    <div class="sprow"><span class="spk">ATS</span><span class="spv ${cpct(st.atsPct)}">${rec(st.aw,st.al,st.ap)}</span></div>
    <div class="sprow"><span class="spk">Cover%</span><span class="spv ${cpct(st.atsPct)}">${pct(st.atsPct)}</span></div>
    <div class="sprow"><span class="spk">O/U</span><span class="spv ${cpct(st.ouPct)}">${rec(st.ow,st.ou,st.op)}</span></div>
    <div class="sprow"><span class="spk">Over%</span><span class="spv ${cpct(st.ouPct)}">${pct(st.ouPct)}</span></div>
  </div>`;
}

function gameLogTable(games,mode){
  if(!games.length) return `<div class="empty" style="padding:20px"><span class="et">No games.</span></div>`;
  const both=mode==='both';
  const cols=both?'40px 1fr 52px 34px 34px':mode==='ats'?'40px 1fr 60px 42px 1px':'40px 1fr 42px 42px 34px';
  const hdr=both
    ?`<div class="gth">Date</div><div class="gth">Opp</div><div class="gth c">Score</div><div class="gth c">ATS</div><div class="gth c">O/U</div>`
    :mode==='ats'
      ?`<div class="gth">Date</div><div class="gth">Opp</div><div class="gth c">Spread</div><div class="gth c">ATS</div><div></div>`
      :`<div class="gth">Date</div><div class="gth">Opp</div><div class="gth c">Pts</div><div class="gth c">Line</div><div class="gth c">O/U</div>`;
  const rows=games.map(g=>{
    const ha=g.isHome?'vs':'@';
    if(both) return `<div class="gt-r" style="grid-template-columns:${cols}">
      <div class="gdate">${g.dateStr}</div>
      <div style="display:flex;align-items:center;gap:5px">${logoEl(g.oppLogo,g.oppAbbr,22)}<span class="gopp-s">${ha} ${g.oppAbbr}</span></div>
      <div class="gscore">${g.result} ${g.ms}-${g.os}</div>
      <div style="text-align:center">${badgeEl(g.spreadResult)}</div>
      <div style="text-align:center">${badgeEl(g.ouResult,true)}</div>
    </div>`;
    if(mode==='ats') return `<div class="gt-r" style="grid-template-columns:${cols}">
      <div class="gdate">${g.dateStr}</div>
      <div><div class="gopp">${ha} ${g.oppAbbr}</div><div class="gopp-s">${g.result} ${g.ms}-${g.os}</div></div>
      <div class="gscore">${fmtSp(g.spread)}</div>
      <div style="text-align:center">${badgeEl(g.spreadResult)}</div>
      <div></div>
    </div>`;
    return `<div class="gt-r" style="grid-template-columns:${cols}">
      <div class="gdate">${g.dateStr}</div>
      <div><div class="gopp">${ha} ${g.oppAbbr}</div><div class="gopp-s">${g.total} pts</div></div>
      <div class="gscore">${g.total}</div>
      <div class="gscore">${g.overUnder??'—'}</div>
      <div style="text-align:center">${badgeEl(g.ouResult,true)}</div>
    </div>`;
  }).join('');
  return `<div class="gtbl"><div class="gt-h" style="grid-template-columns:${cols}">${hdr}</div>${rows}</div>`;
}

async function renderToday(){
  setPane(`<div class="loading"><div class="spinner"></div>Loading games…</div>`);
  try {
    const sbData = await fetchScoreboard();
    const events=(sbData.events||[]);
    const live=events.filter(ev=>ev.competitions[0].status.type.state==='in');
    const pre=events.filter(ev=>ev.competitions[0].status.type.state==='pre');
    const comp=events.filter(ev=>ev.competitions[0].status.type.completed);
    document.getElementById('liveDot').style.display=live.length?'block':'none';

    if(!events.length){
      setPane(`<div class="empty"><div class="ei">🏀</div><div class="et">No games today</div><div class="es">Check back on game days</div></div>`);
      return;
    }
    let html='';
    if(live.length){html+=`<div class="sec">🔴 Live</div>`;html+=live.map(ev=>renderMatchup(ev)).join('');}
    if(pre.length){html+=`<div class="sec">Upcoming</div>`;html+=pre.map(ev=>renderMatchup(ev)).join('');}
    if(comp.length){html+=`<div class="sec">Final</div>`;html+=comp.map(ev=>renderMatchup(ev)).join('');}
    setPane(html);
    if(ST.refreshTimer) clearTimeout(ST.refreshTimer);
    if(live.length) ST.refreshTimer=setTimeout(()=>{if(ST.tab==='today')renderToday();},30000);
  } catch(e){
    setPane(`<div style="color:var(--red);text-align:center;padding:40px;font-size:12px">Error: ${e.message}</div>`);
  }
}

    <select id="viewSel"><option value="summary">Summary</option><option value="ats">ATS Log</option><option value="ou">O/U Log</option><option value="splits">Splits</option></select>
  </div>`;

  if(!ST.trendsTeam){
    setPane(ph+`<div class="empty" style="padding:50px 0"><div class="ei">📊</div><div class="et">Pick a team above</div></div>`);
    bindTrends(); return;
  }
  setPane(ph+`<div class="loading"><div class="spinner"></div>Loading…</div>`);
  bindTrends();

  try {
    const evts=await fetchTeamSchedule(ST.trendsTeam,ST.season);
    const allG=parseTeamGames(evts,ST.trendsTeam);
    const games=filterGames(allG);
    const team=ST.teamMap[ST.trendsTeam];
    const s=calcStats(games);
    const ac=s.atsPct===null?'':s.atsPct>=55?'cw':s.atsPct<=45?'cl':'';

    let body=`<div class="thero">
      ${logoEl(team?.logo,team?.abbr)}
      <div class="thero-info"><div class="thero-name">${team?.short||'—'}</div><div class="thero-sub">${s.wins}-${s.losses} · ${games.length} games · ${ST.season}</div></div>
      <div class="thero-r"><div class="thero-al">ATS</div><div class="thero-av ${ac}">${rec(s.aw,s.al,s.ap)}</div></div>
    </div>`;

    if(ST.trendsView==='summary'){
      body+=`<div class="stat2">
        <div class="sbox"><div class="sbox-l">ATS</div><div class="sbox-v ${cpct(s.atsPct)}">${rec(s.aw,s.al,s.ap)}</div><div class="sbox-s">${pct(s.atsPct)} cover</div><div class="bar"><div class="bf" style="width:${s.atsPct??50}%;background:${(s.atsPct??50)>=50?'var(--green)':'var(--red)'}"></div></div></div>
        <div class="sbox"><div class="sbox-l">O/U</div><div class="sbox-v ${cpct(s.ouPct)}">${rec(s.ow,s.ou,s.op)}</div><div class="sbox-s">${pct(s.ouPct)} over</div><div class="bar"><div class="bf" style="width:${s.ouPct??50}%;background:${(s.ouPct??50)>=50?'var(--green)':'var(--red)'}"></div></div></div>
        <div class="sbox"><div class="sbox-l">W-L</div><div class="sbox-v">${rec(s.wins,s.losses,0)}</div><div class="sbox-s">${pct(s.wPct)} win</div><div class="bar"><div class="bf" style="width:${s.wPct??50}%;background:var(--teal)"></div></div></div>
        <div class="sbox"><div class="sbox-l">Avg Total</div><div class="sbox-v">${s.avgTot?s.avgTot.toFixed(1):'—'}</div><div class="sbox-s">Margin ${s.avgMgn!==null?(s.avgMgn>0?'+':'')+s.avgMgn.toFixed(1):'—'}</div></div>
      </div>`;
      const hG=games.filter(g=>g.isHome),aG=games.filter(g=>!g.isHome);
      body+=`<div class="sec">Home vs Away</div><div class="sp2">${splitCard('🏠 Home',hG.length,calcStats(hG))}${splitCard('✈️ Away',aG.length,calcStats(aG))}</div>`;
      body+=`<div class="sec">Last 5</div>${gameLogTable(games.slice(0,5),'both')}`;
    } else if(ST.trendsView==='ats'){
      body+=`<div class="sec">ATS Game Log</div>${gameLogTable(games,'ats')}`;
    } else if(ST.trendsView==='ou'){
      body+=`<div class="sec">O/U Game Log</div>${gameLogTable(games,'ou')}`;
    } else {
      const hG=games.filter(g=>g.isHome),aG=games.filter(g=>!g.isHome);
      const wG=games.filter(g=>g.result==='W'),lG=games.filter(g=>g.result==='L');
      const byM={};games.forEach(g=>{const m=g.dt.toLocaleString('default',{month:'short'});(byM[m]=byM[m]||[]).push(g);});
      body+=`<div class="sec">Home vs Away</div><div class="sp2">${splitCard('🏠 Home',hG.length,calcStats(hG))}${splitCard('✈️ Away',aG.length,calcStats(aG))}</div>
      <div class="sec">After W vs After L</div><div class="sp2">${splitCard('After W',wG.length,calcStats(wG))}${splitCard('After L',lG.length,calcStats(lG))}</div>
      <div class="sec">By Month</div><div class="sp2">${Object.entries(byM).map(([m,mg])=>splitCard(m,mg.length,calcStats(mg))).join('')}</div>`;
    }

    // Update selects to reflect state
    requestAnimationFrame(()=>{
      const ss=document.getElementById('splitSel');if(ss)ss.value=ST.trendsSplit;
      const vs=document.getElementById('viewSel');if(vs)vs.value=ST.trendsView;
      document.querySelector('#pane .loading')?.replaceWith(Object.assign(document.createElement('div'),{innerHTML:body}));
    });
  } catch(e){
    const ld=document.querySelector('#pane .loading');
    if(ld) ld.outerHTML=`<div style="color:var(--red);text-align:center;padding:20px;font-size:12px">Error: ${e.message}</div>`;
  }
}

function bindTrends(){
  requestAnimationFrame(()=>{
    document.getElementById('tpills')?.addEventListener('click',e=>{
      const p=e.target.closest('.tpill');if(!p)return;
      ST.trendsTeam=p.dataset.id;renderTrends();
    });
    document.getElementById('splitSel')?.addEventListener('change',e=>{ST.trendsSplit=e.target.value;renderTrends();});
    document.getElementById('viewSel')?.addEventListener('change',e=>{ST.trendsView=e.target.value;renderTrends();});
  });
}

// ─────────────────────────────────────────────────
// TAB: SCHEDULE
// ─────────────────────────────────────────────────
async function renderSchedule(){
  setPane(`<div class="loading"><div class="spinner"></div>Loading schedule…</div>`);
  try {
    const yr=ST.season;
    const [r1,r2]=await Promise.all([
      fetch(`${BASE}/scoreboard?dates=${yr}0501-${yr}1001&limit=500`).then(r=>r.json()),
      fetchScoreboard(),
    ]);
    const seen=new Set();
    const allEvts=[...(r1.events||[]),...(r2.events||[])].filter(ev=>{
      if(seen.has(ev.id))return false;seen.add(ev.id);return true;
    });
    const all=allEvts.map(ev=>parseComp(ev)).filter(Boolean).sort((a,b)=>b.dt-a.dt);

    const filters=[{k:'all',l:'All'},{k:'completed',l:'Final'},{k:'upcoming',l:'Upcoming'}];
    let html=`<div class="sfilts">${filters.map(f=>`<div class="sfbtn${ST.schedFilter===f.k?' on':''}" data-sf="${f.k}">${f.l}</div>`).join('')}</div>`;

    let filtered=all;
    if(ST.schedFilter==='completed') filtered=all.filter(g=>g.completed);
    if(ST.schedFilter==='upcoming')  filtered=all.filter(g=>g.pre||g.live);

    if(!filtered.length){html+=`<div class="empty" style="padding:30px"><div class="et">No games found</div></div>`;setPane(html);}
    else {
      const byDate={};
      filtered.forEach(g=>{
        const k=g.dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        (byDate[k]=byDate[k]||[]).push(g);
      });
      Object.entries(byDate).forEach(([lbl,gms])=>{
        html+=`<div class="sday">${lbl}</div>`;
        gms.forEach(g=>{
          html+=`<div class="srow">
            <div class="srow-tms">
              <div class="sline"><span class="sha">Away</span>${logoEl(g.away.logo,g.away.abbr,22)}<span class="sab${g.awayWon?' win':''}">${g.away.abbr}</span><span class="srec">${g.away.rec}</span></div>
              <div class="sline"><span class="sha">Home</span>${logoEl(g.home.logo,g.home.abbr,22)}<span class="sab${g.homeWon?' win':''}">${g.home.abbr}</span><span class="srec">${g.home.rec}</span></div>
            </div>
            ${g.completed
              ?`<div class="srow-sc"><div class="ssc${g.awayWon?' win':''}">${g.away.score}</div><div class="ssc${g.homeWon?' win':''}">${g.home.score}</div></div>
                <div class="srow-badges">${badgeEl(g.awayATS)}${badgeEl(g.ouResult,true)}</div>`
              :g.live
                ?`<div style="color:var(--red);font-size:10px;font-weight:800;min-width:50px;text-align:right">LIVE<br>${g.statusText}</div>`
                :`<div>
                    <div class="srow-time">${fmtTm(g.dt)}</div>
                    ${g.bc?`<div style="text-align:right"><span class="mc-bc">${g.bc}</span></div>`:''}
                  </div>
                  <div class="srow-odds">
                    <div class="sod-line"><span>Sprd</span><span class="sod-v">${g.awaySpread!==null?fmtSp(g.awaySpread)+'/'+ fmtSp(g.homeSpread):'—'}</span></div>
                    <div class="sod-line"><span>O/U</span><span class="sod-v">${g.ou??'—'}</span></div>
                  </div>`
            }
          </div>`;
        });
      });
      setPane(html);
    }
    document.querySelectorAll('.sfbtn').forEach(b=>b.addEventListener('click',()=>{ST.schedFilter=b.dataset.sf;renderSchedule();}));
  } catch(e){setPane(`<div style="color:var(--red);text-align:center;padding:40px;font-size:12px">Error: ${e.message}</div>`);}
}

// ─────────────────────────────────────────────────
// TAB: STANDINGS
// ─────────────────────────────────────────────────
async function renderStandings(){
  setPane(`<div class="loading"><div class="spinner"></div>Loading standings…</div>`);
  try {
    const d=await fetchStandings(ST.season);
    const atsMap={};
    for(const t of ST.teams){const k=`${t.id}-${ST.season}`;if(ST.schedCache[k]){atsMap[t.id]=calcStats(parseTeamGames(ST.schedCache[k],t.id));}}
    let html='';
    (d.children||[]).forEach(conf=>{
      const entries=conf.standings?.entries||[];
      html+=`<div class="sec">${conf.name||'Conference'}</div><div class="stbl">
        <div class="st-h"><div class="sth2">#</div><div class="sth2">Team</div><div class="sth2 c">W</div><div class="sth2 c">L</div><div class="sth2 c">PCT</div><div class="sth2 c">ATS</div></div>`;
      entries.forEach((e,i)=>{
        const t=e.team,to=ST.teamMap[t.id]||{};
        const sts=e.stats||[];
        const w=sts.find(s=>s.name==='wins')?.value??'—';
        const l=sts.find(s=>s.name==='losses')?.value??'—';
        const wp2=sts.find(s=>s.name==='winPercent')?.value;
        const ps=wp2!==undefined?parseFloat(wp2).toFixed(3).replace(/^0/,''):'—';
        const ast=atsMap[t.id];
        const atsStr=ast?rec(ast.aw,ast.al,ast.ap):'—';
        const atsCls=ast?cpct(ast.atsPct):'';
        if(i===6) html+=`<div class="pl-line"></div>`;
        html+=`<div class="st-r">
          <div class="st-rk">${i+1}</div>
          <div class="st-tm">${logoEl(ST.teamMap[t.id]?.logo,t.abbreviation,22)}<span class="st-tn">${t.shortDisplayName||t.abbreviation}</span></div>
          <div class="std c">${w}</div><div class="std c">${l}</div><div class="std c">${ps}</div>
          <div class="std c ats ${atsCls}">${atsStr}</div>
        </div>`;
      });
      html+=`</div>`;
    });
    if(!html) html=`<div class="empty"><div class="et">Standings not available for ${ST.season}</div></div>`;
    setPane(html);
  } catch(e){setPane(`<div style="color:var(--red);text-align:center;padding:40px;font-size:12px">Error: ${e.message}</div>`);}
}

// ─────────────────────────────────────────────────
// TAB: LEAGUE
// ─────────────────────────────────────────────────
async function renderLeague(){
  setPane(`<div class="loading"><div class="spinner"></div>Building league stats…</div>`);
  try {
    await Promise.allSettled(ST.teams.map(t=>fetchTeamSchedule(t.id,ST.season)));
    const teamStats=ST.teams.map(t=>{
      const evts=ST.schedCache[`${t.id}-${ST.season}`]||[];
      const g=parseTeamGames(evts,t.id);
      return {team:t,s:calcStats(g)};
    }).filter(x=>x.s.n>0);

    const byATS=[...teamStats].filter(x=>x.s.atsPct!==null).sort((a,b)=>b.s.atsPct-a.s.atsPct);
    const byOU=[...teamStats].filter(x=>x.s.ouPct!==null).sort((a,b)=>b.s.ouPct-a.s.ouPct);
    const byTot=[...teamStats].filter(x=>x.s.avgTot!==null).sort((a,b)=>b.s.avgTot-a.s.avgTot);

    const lrank=(arr,fn,cls)=>arr.slice(0,6).map(x=>`<div class="lcard-row">
      <img class="lcard-logo" src="${x.team.logo||''}" onerror="this.style.opacity='.2'">
      <span class="lcard-n">${x.team.abbr}</span>
      <span class="lcard-v ${cls}">${fn(x)}</span>
    </div>`).join('');

    const fullTbl=teamStats.sort((a,b)=>(b.s.atsPct||0)-(a.s.atsPct||0)).map(x=>`
      <div class="gt-r" style="grid-template-columns:1fr 66px 58px 50px 50px">
        <div style="display:flex;align-items:center;gap:6px">${logoEl(x.team.logo,x.team.abbr,22)}<span class="gopp">${x.team.abbr}</span></div>
        <div class="gscore">${rec(x.s.aw,x.s.al,x.s.ap)}</div>
        <div class="gscore ${cpct(x.s.atsPct)}" style="font-weight:800">${pct(x.s.atsPct)}</div>
        <div class="gscore">${rec(x.s.ow,x.s.ou,x.s.op)}</div>
        <div class="gscore ${cpct(x.s.ouPct)}" style="font-weight:800">${pct(x.s.ouPct)}</div>
      </div>`).join('');

    setPane(`
      <div class="sec">ATS Leaders · ${ST.season}</div>
      <div class="lgrid">
        <div class="lcard"><div class="lcard-t">🏆 Best Cover%</div>${lrank(byATS,x=>pct(x.s.atsPct),'cw')}</div>
        <div class="lcard"><div class="lcard-t">📉 Worst Cover%</div>${lrank([...byATS].reverse(),x=>pct(x.s.atsPct),'cl')}</div>
      </div>
      <div class="sec">O/U Leaders · ${ST.season}</div>
      <div class="lgrid">
        <div class="lcard"><div class="lcard-t">📈 Most Overs</div>${lrank(byOU,x=>pct(x.s.ouPct),'cw')}</div>
        <div class="lcard"><div class="lcard-t">📉 Most Unders</div>${lrank([...byOU].reverse(),x=>pct(x.s.ouPct),'cl')}</div>
      </div>
      <div class="sec">Scoring · ${ST.season}</div>
      <div class="lgrid">
        <div class="lcard"><div class="lcard-t">🔥 Highest Avg Total</div>${lrank(byTot,x=>x.s.avgTot.toFixed(1),'ct')}</div>
        <div class="lcard"><div class="lcard-t">🧊 Lowest Avg Total</div>${lrank([...byTot].reverse(),x=>x.s.avgTot.toFixed(1),'cp')}</div>
      </div>
      <div class="sec">Full Table · ${ST.season}</div>
      <div class="gtbl">
        <div class="gt-h" style="grid-template-columns:1fr 66px 58px 50px 50px">
          <div class="gth">Team</div><div class="gth c">ATS</div><div class="gth c">Cov%</div><div class="gth c">O/U</div><div class="gth c">Ov%</div>
        </div>${fullTbl}
      </div>`);
  } catch(e){setPane(`<div style="color:var(--red);text-align:center;padding:40px;font-size:12px">Error: ${e.message}</div>`);}
}

// ─────────────────────────────────────────────────
// ROUTING + INIT
// ─────────────────────────────────────────────────
function setPane(html){document.getElementById('pane').scrollTop=0;document.getElementById('pane').innerHTML=html;}
function route(){
  if(ST.tab==='today')          renderToday();
  else if(ST.tab==='trends')    renderTrends();
  else if(ST.tab==='schedule')  renderSchedule();
  else if(ST.tab==='standings') renderStandings();
  else if(ST.tab==='league')    renderLeague();
}

async function init(){
  document.getElementById('navTabs').addEventListener('click',e=>{
    const t=e.target.closest('.ntab');if(!t)return;
    document.querySelectorAll('.ntab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');ST.tab=t.dataset.tab;route();
  });
  document.getElementById('seasonSel').addEventListener('change',e=>{
    ST.season=e.target.value;ST.schedCache={};route();
  });
  document.getElementById('refreshBtn').addEventListener('click',route);
  try{
    ST.teams=await fetchTeams();
    ST.teamMap=Object.fromEntries(ST.teams.map(t=>[t.id,t]));
    ST.idMap=Object.fromEntries(ST.teams.map(t=>[t.abbr,t]));
  } catch(e){console.warn('Teams:',e);}
  route();
}
init();
</script>
