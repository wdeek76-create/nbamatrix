<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bat X EV Tracker</title>
<style>
:root {
  --bg:#080b10;--surface:#0e1218;--surface2:#141820;--surface3:#1a2028;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#f0f4ff;--muted:#6b7a94;--hint:#3d4a5e;
  --green:#4ade80;--green-bg:rgba(74,222,128,0.08);--green-border:rgba(74,222,128,0.2);
  --red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;
  --over-bg:rgba(74,222,128,0.1);--over-text:#4ade80;
  --under-bg:rgba(96,165,250,0.1);--under-text:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh;}
.wrap{max-width:1100px;margin:0 auto;padding:24px 20px;}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border2);}
h1{font-size:20px;font-weight:800;letter-spacing:-0.3px;}
.header p{font-size:12px;color:var(--muted);margin-top:4px;}
.market-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.mf-btn{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.mf-btn.active,.mf-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.25);background:var(--surface2);}
.mf-btn.c-total.active{color:var(--green);border-color:var(--green-border);background:var(--green-bg);}
.mf-btn.c-f5total.active{color:var(--amber);border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.08);}
.mf-btn.c-tt.active{color:var(--purple);border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.08);}
.mf-btn.c-f5tt.active{color:var(--orange);border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.08);}
.mf-btn.c-ml.active,.mf-btn.c-f5ml.active{color:var(--blue);border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.08);}
.mf-btn.c-rl.active,.mf-btn.c-f5rl.active{color:var(--orange);border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.08);}
.input-panel{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:20px;}
.input-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.panel-label{font-size:12px;font-weight:700;}
.panel-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.panel-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;}
.panel-count.ok{color:var(--green);background:var(--green-bg);}
.panel-count.err{color:var(--red);background:rgba(248,113,113,0.1);}
textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;padding:10px 12px;resize:vertical;min-height:100px;outline:none;}
textarea:focus{border-color:rgba(255,255,255,0.2);}
textarea.valid{border-color:var(--green-border);}
textarea.invalid{border-color:rgba(248,113,113,0.4);}
.filter-row{display:flex;align-items:center;gap:16px;margin-top:10px;flex-wrap:wrap;}
.filter-row label{font-size:11px;color:var(--muted);}
.filter-row input{width:70px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px;outline:none;}
.run-btn{display:block;width:100%;margin:16px 0;padding:12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:10px;color:var(--green);font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.03em;}
.run-btn:hover{background:rgba(74,222,128,0.15);}
.run-btn:disabled{opacity:0.4;cursor:not-allowed;}
.play-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.play-card.hot{border-color:rgba(74,222,128,0.25);}
.card-head{padding:14px 18px 12px;background:linear-gradient(135deg,var(--surface2) 0%,var(--surface) 100%);border-bottom:1px solid var(--border);}
.bet-line{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.bet-team{font-size:20px;font-weight:800;letter-spacing:-0.5px;}
.bet-dir{font-size:20px;font-weight:800;}
.bet-dir.over{color:var(--over-text);}
.bet-dir.under{color:var(--under-text);}
.bet-dir.yes{color:var(--green);}
.bet-dir.no{color:var(--red);}
.bet-total{font-size:20px;font-weight:800;}
.bet-odds-tag{font-size:13px;font-weight:700;padding:3px 10px;border-radius:6px;margin-left:4px;}
.bet-odds-tag.over{background:var(--over-bg);color:var(--over-text);}
.bet-odds-tag.under{background:var(--under-bg);color:var(--under-text);}
.bet-odds-tag.yes{background:var(--green-bg);color:var(--green);}
.bet-odds-tag.no{background:rgba(248,113,113,0.1);color:var(--red);}
.card-meta-row{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.card-meta-item{font-size:12px;color:var(--muted);}
.mkt-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:0.05em;text-transform:uppercase;}
.mkt-badge.total{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.mkt-badge.f5total{background:rgba(251,191,36,0.08);color:var(--amber);border:1px solid rgba(251,191,36,0.2);}
.mkt-badge.tt{background:rgba(167,139,250,0.08);color:var(--purple);border:1px solid rgba(167,139,250,0.2);}
.mkt-badge.f5tt{background:rgba(251,146,60,0.08);color:var(--orange);border:1px solid rgba(251,146,60,0.2);}
.mkt-badge.f5ml,.mkt-badge.ml{background:rgba(96,165,250,0.08);color:var(--blue);border:1px solid rgba(96,165,250,0.2);}
.mkt-badge.f5rl,.mkt-badge.rl{background:rgba(251,146,60,0.08);color:var(--orange);border:1px solid rgba(251,146,60,0.2);}
.strip{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sc{padding:12px 16px;border-right:1px solid var(--border);}
.sc:last-child{border-right:none;}
.sc-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:5px;}
.sc-val{font-size:18px;font-weight:700;line-height:1;margin-bottom:3px;}
.sc-val.green{color:var(--green);}
.sc-val.amber{color:var(--amber);}
.sc-val.blue{color:var(--blue);}
.sc-val.red{color:var(--red);}
.sc-sub{font-size:11px;color:var(--muted);}
.books-head{display:grid;grid-template-columns:1fr 80px 80px 110px 70px 60px;padding:8px 18px;background:var(--surface2);}
.books-head span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}
.book-row{display:grid;grid-template-columns:1fr 80px 80px 110px 70px 60px;padding:10px 18px;border-top:1px solid var(--border);align-items:center;}
.book-row:hover{background:var(--surface2);}
.bname{font-size:13px;font-weight:600;}
.bv{font-size:12px;color:var(--muted);}
.bv.best{color:var(--green);font-weight:700;}
.bv.pos{color:var(--green);font-weight:600;}
.bv.neg{color:var(--red);}
.bv.amber{color:var(--amber);}
.tracker-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--border);background:var(--surface2);gap:12px;}
.tracker-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.tracker-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tk{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:5px 8px;cursor:pointer;outline:none;}
.tracker-btn{font-size:12px;font-weight:600;padding:5px 14px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:6px;color:var(--green);cursor:pointer;white-space:nowrap;}
.tracker-btn:hover{background:rgba(74,222,128,0.15);}
.screenshot-btn{font-size:12px;font-weight:600;padding:5px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--muted);cursor:pointer;white-space:nowrap;}
.screenshot-btn:hover{color:var(--text);}
.tracker-section{background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;margin-top:24px;}
.tracker-title{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.tab-row{display:flex;gap:4px;}
.tab-btn{font-size:12px;font-weight:600;padding:4px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;}
.tab-btn.active{background:var(--surface2);color:var(--text);border-color:rgba(255,255,255,0.2);}
.tracker-clear{font-size:12px;font-weight:600;padding:4px 12px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:6px;color:var(--red);cursor:pointer;}
.track-head{display:grid;grid-template-columns:2fr 80px 70px 60px 70px 60px 60px 50px 70px 36px;padding:8px 14px;background:var(--surface2);}
.track-head span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;}
.track-row{display:grid;grid-template-columns:2fr 80px 70px 60px 70px 60px 60px 50px 70px 36px;padding:9px 14px;border-top:1px solid var(--border);align-items:center;cursor:pointer;}
.track-row:hover{background:var(--surface2);}
.tv{font-size:12px;}
.result-sel{background:var(--surface3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:11px;padding:2px 4px;}
.del-btn{background:none;border:none;color:var(--hint);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;}
.del-btn:hover{color:var(--red);}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;padding:16px;}
.dash-stat{background:var(--surface2);border-radius:8px;padding:12px 14px;}
.dash-stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;margin-bottom:6px;}
.dash-stat-val{font-size:18px;font-weight:700;line-height:1;margin-bottom:4px;}
.dash-stat-sub{font-size:11px;color:var(--muted);}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 16px;}
.bk-grid3{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 16px;}
.dash-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:16px 16px 8px;border-top:1px solid var(--border);}
.bk-head2{display:grid;grid-template-columns:1fr 32px 32px 32px 52px 72px 72px 72px;padding:6px 14px;background:var(--surface2);border-top:1px solid var(--border);}
.bk-head2 span{font-size:10px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.bk-row2{display:grid;grid-template-columns:1fr 32px 32px 32px 52px 72px 72px 72px;padding:8px 14px;border-top:1px solid var(--border);align-items:center;}
.bk-row2:hover{background:var(--surface2);}
.bk-val.m{color:var(--muted);}
.bk-card{background:var(--surface);border:1px solid var(--border2);border-radius:10px;overflow:hidden;}
.bk-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;padding:10px 14px;background:var(--surface2);}
.bk-head{display:grid;grid-template-columns:1fr 36px 36px 36px 50px 70px;padding:6px 14px;background:var(--surface2);border-top:1px solid var(--border);}
.bk-head span{font-size:10px;color:var(--hint);font-weight:600;text-transform:uppercase;}
.bk-row{display:grid;grid-template-columns:1fr 36px 36px 36px 50px 70px;padding:8px 14px;border-top:1px solid var(--border);align-items:center;}
.bk-row:hover{background:var(--surface2);}
.bk-label{font-size:13px;font-weight:500;}
.bk-val{font-size:12px;color:var(--muted);}
.bk-val.g{color:var(--green);font-weight:600;}
.bk-val.r{color:var(--red);}
.bk-val.pos{color:var(--green);font-weight:600;}
.bk-val.neg{color:var(--red);}
.manual-add{padding:14px 16px;border-top:1px solid var(--border2);background:var(--surface2);}
.manual-add-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.manual-add-row{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.mf{display:flex;flex-direction:column;gap:3px;}
.mf label{font-size:10px;color:var(--hint);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.mf input,.mf select{background:var(--surface3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:5px 8px;width:90px;outline:none;}
.mf select{width:120px;}
.skipped{font-size:11px;color:var(--hint);margin-bottom:12px;}
.cal-wrap{padding:16px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav{display:flex;align-items:center;gap:10px;}
.cal-nav button{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);width:28px;height:28px;cursor:pointer;font-size:14px;}
.cal-month{font-size:16px;font-weight:700;min-width:110px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:10px;color:var(--hint);font-weight:600;padding:4px 0;letter-spacing:0.05em;}
.cal-day{min-height:72px;border-radius:8px;border:1px solid var(--border);background:var(--surface);padding:8px;cursor:default;transition:border-color 0.15s;}
.cal-day.has-bets{cursor:pointer;}
.cal-day.has-bets:hover{border-color:rgba(255,255,255,0.2);}
.cal-day.today{border-color:var(--green-border);}
.cal-day.win-day{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.2);}
.cal-day.loss-day{background:rgba(248,113,113,0.06);border-color:rgba(248,113,113,0.15);}
.cal-day.mixed-day{background:rgba(251,191,36,0.04);border-color:rgba(251,191,36,0.15);}
.cal-day-num{font-size:12px;color:var(--muted);font-weight:600;}
.cal-day.has-bets .cal-day-num{color:var(--text);}
.cal-record{font-size:13px;font-weight:700;margin-top:4px;}
.cal-units{font-size:12px;font-weight:700;margin-top:2px;}
.cal-day-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.cal-day-modal-box{background:var(--bg);border:1px solid var(--border2);border-radius:12px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;}
.cal-day-modal-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.cal-bet-row{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.cal-bet-row:last-child{border-bottom:none;}
.cal-bet-name{font-size:13px;font-weight:600;}
.cal-bet-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.cal-result-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;}
.cal-result-badge.W{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.cal-result-badge.L{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.cal-result-badge.P{background:var(--surface2);color:var(--muted);border:1px solid var(--border2);}
.cal-result-badge.pending{background:var(--surface2);color:var(--hint);border:1px solid var(--border);}
.summary-modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;}
.summary-box{background:var(--bg);border:1px solid var(--border2);border-radius:14px;max-width:560px;width:100%;padding:20px;}
.summary-title{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.summary-filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.summary-filters label{font-size:11px;color:var(--muted);}
.summary-filters select,.summary-filters input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:4px 8px;outline:none;}
.summary-text{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:12px;font-size:12px;line-height:1.8;white-space:pre-wrap;font-family:monospace;max-height:400px;overflow-y:auto;color:var(--text);}
.summary-actions{display:flex;gap:8px;margin-top:12px;justify-content:flex-end;}

/* Parser styles */

  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1e2128; color: #e4e8f0; font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; border-bottom: 1px solid #363c47; background: #272b33; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1rem; font-weight: 800; letter-spacing: 0.06em; color: #3dd6f5; }
  header span { font-size: 0.67rem; color: #8892a4; font-family: 'JetBrains Mono', monospace; background: #1e2128; padding: 2px 8px; border-radius: 4px; border: 1px solid #363c47; }
  .workspace { display: grid; grid-template-columns: 1fr 1fr; flex: 1; }
  .pane { display: flex; flex-direction: column; border-right: 1px solid #363c47; }
  .pane:last-child { border-right: none; }
  .pane-header { display: flex; align-items: center; gap: 8px; padding: 8px 13px; background: #272b33; border-bottom: 1px solid #363c47; font-size: 0.67rem; font-family: 'JetBrains Mono', monospace; color: #8892a4; }
  .badge { background: #1e2128; border: 1px solid #363c47; border-radius: 3px; padding: 1px 7px; font-size: 0.64rem; font-family: 'JetBrains Mono', monospace; }
  .badge.ok { border-color: #5af0a0; color: #5af0a0; }
  .badge.err { border-color: #f05c5c; color: #f05c5c; }
  textarea { flex: 1; resize: none; background: #1e2128; color: #e4e8f0; font-family: 'JetBrains Mono', monospace; font-size: 0.74rem; border: none; padding: 13px; outline: none; line-height: 1.7; min-height: 340px; }
  textarea::placeholder { color: #8892a4; }
  .hdr-btn { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; background: #1e2128; color: #e4e8f0; border: 1px solid #363c47; border-radius: 4px; padding: 3px 10px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .hdr-btn:hover { border-color: #3dd6f5; color: #3dd6f5; }
  .hdr-btn.primary { background: #3dd6f5; color: #0b0e13; font-weight: 700; border: none; }
  .hdr-btn.primary:hover { background: #6ee8fa; }
  .hdr-btn.danger { border-color: #f05c5c; color: #f05c5c; }
  .hdr-btn.danger:hover { background: #f05c5c; color: #fff; }
  .market-tabs { display: flex; background: #1e2128; border-bottom: 1px solid #363c47; overflow-x: auto; flex-shrink: 0; scrollbar-width: thin; }
  .market-tab { font-family: 'JetBrains Mono', monospace; font-size: 0.63rem; padding: 7px 11px; cursor: pointer; color: #8892a4; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; gap: 4px; }
  .market-tab:hover { color: #e4e8f0; }
  .market-tab.active { color: #3dd6f5; border-bottom-color: #3dd6f5; }
  .tab-count { background: #272b33; border-radius: 3px; padding: 0 5px; font-size: 0.57rem; color: #8892a4; }
  .market-tab.active .tab-count { background: #1a2535; color: #3dd6f5; }
  .view-tabs { display: flex; background: #272b33; border-bottom: 1px solid #363c47; }
  .view-tab { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; padding: 6px 14px; cursor: pointer; color: #8892a4; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .view-tab.active { color: #5af0a0; border-bottom-color: #5af0a0; }
  .filter-row { display: flex; gap: 6px; padding: 7px 13px; background: #272b33; border-bottom: 1px solid #363c47; align-items: center; flex-wrap: wrap; }

<body>
<div class="wrap">

        <button id="modeRawBtn" onclick="setInputMode('raw')" style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);color:var(--muted);background:transparent;cursor:pointer">Gamesheet</button>

  <div id="gradeBar" style="display:none;margin-top:16px;padding:10px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">

    <button class="screenshot-btn" onclick="(async()=>{const d=parseDateMMDD(document.getElementById('regradeDate').value||'03/31');let r;try{r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+d+'&hydrate=linescore');}catch(e){r=await fetch('https://corsproxy.io/?url='+encodeURIComponent('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+d+'&hydrate=linescore'));}const data=await r.json();const games=(data.dates?.[0]?.games)||[];alert(games.map(g=>g.teams.away.team.name+' @ '+g.teams.home.team.name+' | away:'+g.teams.away.score+' home:'+g.teams.home.score).join('\n'));})()">🔍 API</button>
    <span id="gradeStatus" style="font-size:12px;color:var(--muted)"></span>
    <label class="screenshot-btn" style="cursor:pointer">⬆ Import<input type="file" accept=".json" onchange="importTracker(this)" style="display:none"></label>

<script>
let parsed = null;
let lastPlays = [];
let tracker = [];
let trackerTab = 'dashboard';
let activeMarket = 'ALL';

try { tracker = JSON.parse(localStorage.getItem('batxEvTracker')||'[]'); } catch(e){}

const TEAMS = {
  'ARI':'ARI','AZ':'ARI','DBACKS':'ARI','DIAMONDBACKS':'ARI',
  'ATL':'ATL','BRAVES':'ATL','BAL':'BAL','ORIOLES':'BAL',
  'BOS':'BOS','RED SOX':'BOS','REDSOX':'BOS',
  'CHC':'CHC','CUBS':'CHC','CWS':'CWS','WHITE SOX':'CWS','WHITESOX':'CWS',
  'CIN':'CIN','REDS':'CIN','CLE':'CLE','GUARDIANS':'CLE',
  'COL':'COL','ROCKIES':'COL','DET':'DET','TIGERS':'DET',
  'HOU':'HOU','ASTROS':'HOU','KC':'KC','ROYALS':'KC',
  'LAD':'LAD','DODGERS':'LAD','LAA':'LAA','ANGELS':'LAA',
  'MIA':'MIA','MARLINS':'MIA','MIL':'MIL','BREWERS':'MIL',
  'MIN':'MIN','TWINS':'MIN','NYM':'NYM','METS':'NYM',
  'NYY':'NYY','YANKEES':'NYY','ATH':'ATH','OAK':'ATH','ATHLETICS':'ATH',
  'PHI':'PHI','PHILLIES':'PHI','PHILADELPHIA':'PHI','PIT':'PIT','PIRATES':'PIT','PITTSBURGH':'PIT',
  'SD':'SD','PADRES':'SD','SF':'SF','GIANTS':'SF',
  'SEA':'SEA','MARINERS':'SEA','STL':'STL','CARDINALS':'STL',
  'TB':'TB','RAYS':'TB','TEX':'TEX','RANGERS':'TEX',
  'TOR':'TOR','BLUE JAYS':'TOR','BLUEJAYS':'TOR',
  'WSH':'WSH','WSN':'WSH','NATIONALS':'WSH'
};

function toAbbr(t) {
  t = t.toUpperCase().replace(/[^A-Z\s]/g,' ').replace(/\s+/g,' ').trim();
  if (TEAMS[t]) return TEAMS[t];
  const ns = t.replace(/\s+/g,'');
  if (TEAMS[ns]) return TEAMS[ns];
  for (const w of t.split(' ')) { if (TEAMS[w] && w.length>2) return TEAMS[w]; }
  return ns.slice(0,3);
}

function classifyMarket(m) {
  if (!m) return 'TOTAL';
  const u = m.toUpperCase().replace(/\s+/g,' ').trim();

  // 1st Half combinations
  if ((u.includes('1H')||u.includes('1ST HALF')||u.includes('FIRST HALF')) && (u.includes('TEAM')||u.includes('TT'))) return '1HTT';
  if ((u.includes('1H')||u.includes('1ST HALF')||u.includes('FIRST HALF')) && u.includes('RL')) return '1HRL';
  if ((u.includes('1H')||u.includes('1ST HALF')||u.includes('FIRST HALF')) && (u.includes('ML')||u.includes('MONEY'))) return '1HML';
  if (u.includes('1H')||u.includes('1ST HALF')||u.includes('FIRST HALF')) return '1HTOTAL';

  // F5 combinations
  if ((u.includes('F5')||u.includes('FIRST 5')) && (u.includes('TEAM')||u.includes('TT')) && u.includes('TOTAL')) return 'F5TT';
  if ((u.includes('F5')||u.includes('FIRST 5')) && u.includes('TOTAL')) return 'F5TOTAL';
  if ((u.includes('F5')||u.includes('FIRST 5')) && (u.includes('ML')||u.includes('MONEY LINE')||u.includes('MONEYLINE'))) return 'F5ML';
  if ((u.includes('F5')||u.includes('FIRST 5')) && u.includes('RL')) return 'F5RL';

  // 1st inning
  if (u.includes('1INN')||u.includes('1ST INN')||u.includes('FIRST INN')) {
    if (u.includes('TEAM')||u.includes('TT')) return '1INNTT';
    if (u.includes('ML')||u.includes('MONEY')) return '1INNML';
    if (u.includes('RL')||u.includes('RUN LINE')) return '1INNRL';
    return '1INNTOTAL';
  }

  // NRFI / YRFI
  if (u.includes('NRFI')||u.includes('YRFI')||u.includes('RYI')) return 'NRFI';

  // Team totals
  if ((u.includes('TEAM')||u.includes('TT')) && (u.includes('TOTAL')||u.includes('TT'))) return 'TT';

  // Full game total
  if (u==='TOTAL'||u==='GAME TOTAL'||u==='GAME TOTALS') return 'TOTAL';
  if (u.includes('GAME TOTAL')) return 'TOTAL';

  // ML / RL full game
  if (u==='ML'||u==='MONEY LINE'||u==='MONEYLINE') return 'ML';
  if (u==='RL'||u==='RUN LINE') return 'RL';

  // anything with just TOTAL
  if (u.includes('TOTAL')&&!u.includes('TEAM')&&!u.includes('TT')) return 'TOTAL';

  return 'OTHER';
}

const MKT_LABELS = {
  TOTAL:'Game Total', F5TOTAL:'F5 Total', TT:'Team Total', F5TT:'F5 Team Total',
  F5ML:'F5 ML', F5RL:'F5 RL', ML:'ML', RL:'Run Line',
  '1HTT':'1H Team Total', '1HTOTAL':'1H Total', '1HML':'1H ML', '1HRL':'1H RL',
  '1INNTOTAL':'1INN Total', '1INNTT':'1INN TT', '1INNML':'1INN ML', '1INNRL':'1INN RL',
  '1INN':'1st Inning', NRFI:'NRFI/YRFI', OTHER:'Other'
};

function mktBadge(type) {
  return `<span class="mkt-badge ${type.toLowerCase()}">${MKT_LABELS[type]||type}</span>`;
}

function fmtOdds(o) {
  if (o==null) return '—';
  return o>0?'+'+o:String(o);
}

function oddsToImplied(o) {
  if (o==null) return null;
  return o>0?100/(o+100):Math.abs(o)/(Math.abs(o)+100);
}

function validateInput() {
  const raw = document.getElementById('batxInput').value.trim();
  const ct = document.getElementById('pc');
  const el = document.getElementById('batxInput');
  if (!raw) { parsed=null; el.className=''; ct.textContent=''; ct.className='panel-count'; document.getElementById('runBtn').disabled=true; return; }
  try {
    const arr = JSON.parse(raw);
    parsed = Array.isArray(arr)?arr:[arr];
    el.className='valid'; ct.className='panel-count ok'; ct.textContent='✓ '+parsed.length+' rows';
    document.getElementById('runBtn').disabled=false;
  } catch(e) {
    parsed=null; el.className='invalid'; ct.className='panel-count err'; ct.textContent='Invalid JSON';
    document.getElementById('runBtn').disabled=true;
  }
}

function setMarket(mkt, btn) {
  activeMarket = mkt;
  document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderResults(lastPlays);
}

function runFilter() {
  if (!parsed) return;
  const minRoi = parseFloat(document.getElementById('minRoi').value)||5;
  const minMargin = parseFloat(document.getElementById('minMargin').value)||0;

  const seen = {};
  const plays = [];

  for (const b of parsed) {
    const mktType = classifyMarket(b.market||b.MARKET||'');
    let dir = (b.suggested_bet||'').toUpperCase();
    // If no suggested_bet but we have roi data, try to infer from over/under roi
    if (!dir) {
      if (b.over_odds!=null && b.under_odds!=null) continue; // ambiguous, skip
      if (b.over_odds!=null && b.under_odds==null) dir='OVER';
      else if (b.under_odds!=null && b.over_odds==null) dir='UNDER';
      else continue;
    }
    const roi = b.roi??b.expected_roi??null;
    if (roi!=null && roi < minRoi) continue;
    const proj = b.batx_proj??b.the_bat_x_projection??null;
    const tm = b.tm||b.game||'';
    const book = b.book||b.site||'';
    const date = b.date||'';
    const time = b.time||'';

    const isMLMkt = mktType==='1HML'||mktType==='F5ML'||mktType==='ML';
    const isRLMkt = mktType==='1HRL'||mktType==='F5RL'||mktType==='RL';
    let line=null, odds=null;
    if (isMLMkt) {
      // ML: over_odds holds the ML odds from BatX parser
      odds = b.over_odds??b.ml_odds??null;
      line = null;
    } else if (isRLMkt) {
      // RL: over_line = spread, over_odds = spread odds
      line = b.over_line??null;
      odds = b.over_odds??null;
    } else if (dir==='OVER') {
      line=b.over_line??null; odds=b.over_odds??null;
    } else if (dir==='UNDER') {
      line=b.under_line??null; odds=b.under_odds??null;
    } else {
      odds=b.ml_odds??b.ml??null;
    }

    if (minMargin>0 && proj!=null && line!=null) {
      const margin = dir==='OVER'?proj-line:dir==='UNDER'?line-proj:999;
      if (margin < minMargin) continue;
    }

    const fairPrice = b.fair_price??null;

    const dk = tm+'|'+(b.time||time||'')+'|'+mktType+'|'+(b.team||'')+'|'+dir;
    if (!seen[dk]) {
      seen[dk] = { tm, game:b.game||tm, team:b.team||'', market:b.market||'', mktType, dir, proj, line, date, time, books:[], isDupe:false };
      plays.push(seen[dk]);
    } else {
      // flag if same game/dir appears with different line (possible dupe input)
      const existingLine = seen[dk].line;
      if (line!=null && existingLine!=null && line!==existingLine) seen[dk].isDupe=true;
    }
    seen[dk].books.push({ book, odds, implied:oddsToImplied(odds), roi, line, fairPrice });
  }

  plays.sort((a,b)=>Math.max(...b.books.map(x=>x.roi??0))-Math.max(...a.books.map(x=>x.roi??0)));
  lastPlays = plays;
  const total = plays.reduce((s,p)=>s+p.books.length,0);
  document.getElementById('skipped').textContent = parsed.length?`${plays.length} plays · ${total} book entries · ${parsed.length-total} filtered out`:'';

  // auto-save best book per play to tracker
  let autoSaved = 0;
  for (const p of plays) {
    const best = p.books.reduce((a,b)=>b.roi!=null&&(a===null||(b.roi??-99)>(a.roi??-99))?b:a, null);
    if (!best) continue;
    // Build clean game label per market type
    const isMLMkt2 = p.mktType==='1HML'||p.mktType==='F5ML'||p.mktType==='ML';
    const isRLMkt2 = p.mktType==='1HRL'||p.mktType==='F5RL'||p.mktType==='RL';
    const isTTMkt2 = p.mktType==='TT'||p.mktType==='F5TT'||p.mktType==='1HTT';
    let gameLabel;
    if(isTTMkt2) gameLabel = (p.team||p.tm)+' '+p.dir+(p.line!=null?' '+p.line:'');
    else if(isMLMkt2) gameLabel = p.tm+' '+p.dir+' ML';
    else if(isRLMkt2) gameLabel = p.tm+' '+p.dir+(p.line!=null?' '+p.line:'')+' RL';
    else gameLabel = p.tm+' '+p.dir+(p.line!=null?' '+p.line:'');
    // skip if already tracked for this date+game+market
    if (tracker.find(t=>t.game===gameLabel&&t.date===p.date&&t.market===p.mktType)) continue;
    const rawG2 = p.game||p.tm||'';
    const gp2 = rawG2.toUpperCase().split(/[/@]/);
    const entry = {
      id: Date.now()+autoSaved,
      date: p.date, time: p.time,
      game: gameLabel, rawGame: rawG2,
      awayTeam: (gp2[0]||'').replace(/[^A-Z]/g,''),
      homeTeam: (gp2[1]||'').replace(/[^A-Z]/g,''),
      team: p.team||null,
      dir: p.dir, tm: p.tm,
      market: p.mktType, marketLabel: p.market||p.mktType,
      book: best.book, odds: best.odds, line: p.line,
      proj: p.proj??p.batx_proj, roi: best.roi, fairPrice: best.fairPrice??best.fair_price??null,
      tracked_at: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
      result: '',
      books: p.books
    };
    tracker.unshift(entry);
    autoSaved++;
  }
  if (autoSaved) {
    localStorage.setItem('batxEvTracker', JSON.stringify(tracker));
    renderTracker();
  }

  renderResults(plays);
}

function renderResults(plays) {
  const results = document.getElementById('results');
  const filtered = activeMarket==='ALL'?plays:plays.filter(p=>p.mktType===activeMarket);

  if (!filtered.length) {
    results.innerHTML='<div class="empty">No plays found<br><span style="font-size:12px">Paste Bat X JSON and hit Filter</span></div>';
    return;
  }

  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">${filtered.length} play${filtered.length!==1?'s':''}</div>`;

  for (let gi=0; gi<filtered.length; gi++) {
    const p = filtered[gi];
    const bestOdds = p.books.reduce((best,b)=>b.odds!=null&&(best===null||b.odds>best)?b.odds:best, null);
    const bestRoi = Math.max(...p.books.map(b=>b.roi??-99));
    const dirLow = p.dir==='OVER'?'over':p.dir==='UNDER'?'under':p.dir==='YES'?'yes':'no';
    const projMargin = p.proj!=null&&p.line!=null?(p.dir==='OVER'?p.proj-p.line:p.dir==='UNDER'?p.line-p.proj:null):null;
    const sortedBooks = [...p.books].sort((a,b)=>(b.roi??-99)-(a.roi??-99));

    let bookOpts='';

      <button class="screenshot-btn" onclick="copyPlayText(${gi},this)">📋 Copy</button>

}

function savePlay(gi, btn) {
  const p = (activeMarket==='ALL'?lastPlays:lastPlays.filter(x=>x.mktType===activeMarket))[gi];
  if (!p) return;
  const sels = document.querySelectorAll('.tracker-row select.tk');
  const bookEl = sels[gi*2], resEl = sels[gi*2+1];
  const bookName = bookEl?bookEl.value:(p.books[0]?.book||'');
  const result = resEl?resEl.value:'';
  const bc = p.books.find(b=>b.book===bookName)||(p.books.sort((a,b)=>(b.roi??-99)-(a.roi??-99))[0]);
  const isTTMarket = (p.mktType==='TT'||p.mktType==='F5TT'||p.mktType==='1HTT');
  const gameLabel = isTTMarket
    ? (p.team||p.tm)+' '+p.dir+(p.line!=null?' '+p.line:'')
    : p.tm+' '+p.dir+(p.line!=null?' '+p.line:'');
  const entry = {
    id:Date.now(), date:p.date, time:p.time,
    game:gameLabel, rawGame:p.game||p.tm, dir:p.dir, tm:p.tm,
    market:p.mktType, marketLabel:p.market,
    book:bookName, odds:bc?.odds??null, line:p.line,
    proj:p.proj, roi:bc?.roi??null, fairPrice:bc?.fairPrice??null,
    tracked_at:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
    result, books:p.books
  };
  tracker = tracker.filter(t=>!(t.game===gameLabel&&t.date===p.date&&t.market===p.mktType));
  tracker.unshift(entry);
  localStorage.setItem('batxEvTracker',JSON.stringify(tracker));
  renderTracker();
  btn.textContent='Saved ✓'; setTimeout(()=>btn.textContent='Save to tracker',1500);
}

function copyPlayText(gi, btn) {
  const p = (activeMarket==='ALL'?lastPlays:lastPlays.filter(x=>x.mktType===activeMarket))[gi];
  if (!p) return;
  const best=p.books.reduce((a,b)=>b.odds!=null&&(a===null||b.odds>a.odds)?b:a,null);
  const worst=p.books.length>1?p.books.reduce((a,b)=>b.odds!=null&&(a===null||b.odds<a.odds)?b:a,null):null;
  let text=`${p.tm} ${p.dir}${p.line?' '+p.line:''} [${MKT_LABELS[p.mktType]||p.mktType}] Proj ${p.proj??'?'}`;
  if(best) text+=` — Best ${fmtOdds(best.odds)} ${best.book}`;
  if(worst&&best&&worst.book!==best.book) text+=`, Worst ${fmtOdds(worst.odds)} ${worst.book}`;
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent='📋 Copy',2000);}).catch(()=>prompt('Copy:',text));
}

// TRACKER
function unitPnl(t) {
  const o=t.odds;
  if(t.result==='P') return 0;
  if(o==null) return t.result==='W'?1:-1;
  if(o>0) return t.result==='W'?o/100:-1;
  return t.result==='W'?1:-(Math.abs(o)/100);
}
function filterBetLog() {

  const rows = document.querySelectorAll('#betLogRows .track-row');

  });
}

function renderCalendarHTML(){
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const today=new Date();
  // Get all bets for this month
  const monthBets=tracker.filter(t=>{
    if(!t.date) return false;
    const m=t.date.match(/(\d{1,2})\/(\d{1,2})/);
    return m && parseInt(m[1])-1===calMonth && (new Date(calYear,calMonth,parseInt(m[2]))).getMonth()===calMonth;
  });
  const settled=monthBets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  const monthRoi=settled.reduce((s,t)=>s+unitPnl(t),0);
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  let html=`<div style="padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="calNav(-1)" style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);width:28px;height:28px;cursor:pointer;font-size:14px">‹</button>
        <span style="font-size:18px;font-weight:700">${monthNames[calMonth]} ${calYear}</span>
        <button onclick="calNav(1)" style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);width:28px;height:28px;cursor:pointer;font-size:14px">›</button>
      </div>
      <div style="font-size:15px;font-weight:700">Month: <span style="color:${monthRoi>=0?'var(--green)':'var(--red)'}">${(monthRoi>=0?'+':'')+monthRoi.toFixed(2)}u</span></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${['S','M','T','W','T','F','S'].map(d=>`<div style="text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:4px 0">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">`;

  // Empty cells before first day
  for(let i=0;i<firstDay;i++){
    html+=`<div style="min-height:80px;border-radius:8px;border:1px solid var(--border);background:var(--surface);opacity:0.3"></div>`;
  }

  for(let day=1;day<=daysInMonth;day++){
    const dateStr=String(calMonth+1).padStart(2,'0')+'/'+String(day).padStart(2,'0');
    const dayBets=monthBets.filter(t=>t.date===dateStr);
    const daySettled=dayBets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
    const w=daySettled.filter(t=>t.result==='W').length;
    const l=daySettled.filter(t=>t.result==='L').length;
    const roi=daySettled.reduce((s,t)=>s+unitPnl(t),0);
    const isToday=day===today.getDate()&&calMonth===today.getMonth()&&calYear===today.getFullYear();
    const hasBets=daySettled.length>0;
    let bg='var(--surface)', border='var(--border)';
    if(hasBets){
      if(roi>0.05){ bg='rgba(74,222,128,0.08)'; border='rgba(74,222,128,0.3)'; }
      else if(roi<-0.05){ bg='rgba(248,113,113,0.08)'; border='rgba(248,113,113,0.25)'; }
      else { bg='rgba(180,160,60,0.12)'; border='rgba(180,160,60,0.3)'; }
    }
    if(isToday) border='var(--green)';
    html+=`<div style="min-height:80px;border-radius:8px;border:1px solid ${border};background:${bg};padding:8px;cursor:${hasBets?'pointer':'default'}" ${hasBets?`onclick="showCalDay('${dateStr}')"`:''}">
      <div style="font-size:12px;color:${hasBets?'var(--text)':'var(--muted)'};font-weight:600">${day}</div>
      ${hasBets?`
        <div style="font-size:13px;font-weight:700;margin-top:4px">${w}-${l}</div>
        <div style="font-size:12px;font-weight:700;color:${roi>=0?'var(--green)':'var(--red)'}">${(roi>=0?'+':'')+roi.toFixed(2)}u</div>
      `:''}
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}

function buildSummary() {
  const filter = document.getElementById('sumDateFilter')?.value || 'All';
  let bets = tracker;
  if (filter === 'Open') bets = tracker.filter(t=>!t.result||t.result==='');
  else if (filter !== 'All') bets = tracker.filter(t=>t.date===filter);

  if (!bets.length) { document.getElementById('summaryText').textContent = 'No bets found.'; return; }

  // group by date
  const byDate = {};
  for (const t of bets) {
    const d = t.date||'Unknown';
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push(t);
  }

  const settled = bets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  const wins = settled.filter(t=>t.result==='W').length;
  const losses = settled.filter(t=>t.result==='L').length;
  const roi = settled.reduce((s,t)=>s+unitPnl(t),0);

  let lines = [];

  if (filter==='All'||filter==='Open') {
    lines.push('=== BAT X EV TRACKER ===');
    if (settled.length) lines.push(`Overall: ${wins}W-${losses}L · ${(roi>=0?'+':'')+roi.toFixed(2)}u`);
    lines.push('');
  }

  for (const [date, dayBets] of Object.entries(byDate).sort((a,b)=>b[0].localeCompare(a[0]))) {
    const daySettled = dayBets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
    const dWins = daySettled.filter(t=>t.result==='W').length;
    const dLosses = daySettled.filter(t=>t.result==='L').length;
    const dRoi = daySettled.reduce((s,t)=>s+unitPnl(t),0);
    const dRecord = daySettled.length ? ` · ${dWins}W-${dLosses}L · ${(dRoi>=0?'+':'')+dRoi.toFixed(2)}u` : '';
    lines.push(`📅 ${date}${dRecord}`);
    lines.push('─'.repeat(40));

    for (const t of dayBets) {
      const res = t.result==='W'?'✓ WIN':t.result==='L'?'✗ LOSS':t.result==='P'?'— PUSH':'⏳ PENDING';
      const mkt = MKT_LABELS[t.market]||t.market||'';
      const pnl = t.result?unitPnl(t):null;
      let line = `${t.game}`;
      if (mkt) line += ` [${mkt}]`;
      line += ` · ${t.book} ${t.odds!=null?fmtOdds(t.odds):''}`;
      if (t.fairPrice!=null) line += ` (fair ${fmtOdds(t.fairPrice)})`;
      if (t.proj!=null) line += ` · Proj ${t.proj}`;
      if (t.roi!=null) line += ` · ROI +${t.roi.toFixed(1)}%`;
      line += ` · ${res}`;
      if (pnl!=null) line += ` ${(pnl>=0?'+':'')+pnl.toFixed(2)}u`;
      lines.push(line);
    }
    lines.push('');
  }

  document.getElementById('summaryText').textContent = lines.join('\n');
}

function mktStat(bets, label) {
  if(!bets.length) return '';
  const s = bets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  const w=s.filter(t=>t.result==='W').length;
  const l=s.filter(t=>t.result==='L').length;
  const p=s.filter(t=>t.result==='P').length;
  const units=s.reduce((a,t)=>a+unitPnl(t),0);
  const wBets=s.filter(t=>t.result==='W');
  const lBets=s.filter(t=>t.result==='L');
  const avgWinRoi=wBets.length?(wBets.reduce((a,t)=>a+(t.roi||0),0)/wBets.length).toFixed(1):null;
  const avgLossRoi=lBets.length?-(lBets.reduce((a,t)=>a+(t.roi||0),0)/lBets.length).toFixed(1):null;
  const pend=bets.filter(t=>!t.result||t.result==='').length;
  const pad=18;
  let line='  '+label.padEnd(pad);
  if(s.length) {
    line+=`${w}W-${l}L`;
    if(p) line+=`-${p}P`;
    line+=`  ${(units>=0?'+':'')+units.toFixed(2)}u`;
    if(w > l && avgWinRoi) line+=`  ROI +${avgWinRoi}%`;
  } else {
    line+='pending';
  }
  if(pend && s.length) line+=`  (${pend} pending)`;
  return line;
}

function buildSummary() {
  const mode = document.getElementById('sumMode')?.value||'simple';
  const filter = document.getElementById('sumFilter')?.value||'all';
  const dateVal = document.getElementById('sumDate')?.value||'';
  let bets = [...tracker];
  if (filter==='open') bets = bets.filter(t=>!t.result||t.result==='');
  else if (filter==='settled') bets = bets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  else if (filter==='date' && dateVal) bets = bets.filter(t=>t.date===dateVal);

  if (!bets.length) { document.getElementById('summaryText').textContent='No bets match this filter.'; return; }

  const byDate = {};
  for (const t of bets) { const d=t.date||'Unknown'; if(!byDate[d]) byDate[d]=[]; byDate[d].push(t); }

  const settled = bets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  const wins=settled.filter(t=>t.result==='W').length, losses=settled.filter(t=>t.result==='L').length;
  const totalUnits=settled.reduce((s,t)=>s+unitPnl(t),0);
  const pending=bets.filter(t=>!t.result||t.result==='').length;

  if(mode==='simple') {
    // ── SIMPLE MODE ──
    const MKTS = [
      {key:'TOTAL',   label:'Game Totals'},
      {key:'TT',      label:'Team Totals'},
      {key:'1HTOTAL', label:'1H Totals'},
      {key:'1HTT',    label:'1H Team Totals'},
      {key:'1HML',    label:'1H Moneylines'},
      {key:'1HRL',    label:'1H Run Lines'},
      {key:'1INNTOTAL', label:'1INN Total'},
      {key:'1INNTT',    label:'1INN TT'},
      {key:'1INNML',    label:'1INN ML'},
      {key:'1INNRL',    label:'1INN RL'},
      {key:'NRFI',    label:'NRFI/YRFI'},
    ];
    let text = 'BAT X EV TRACKER\n'+'\n';
    if(settled.length) { text+='Overall  '+wins+'W-'+losses+'L  '+(totalUnits>=0?'+':'')+totalUnits.toFixed(2)+'u'+(pending?'  ('+pending+' pending)':'')+"\n\n"; }
    else text+=bets.length+' bets ('+pending+' pending)\n\n';

    for(const [date, dayBets] of Object.entries(byDate).sort()) {
      const ds=dayBets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
      const dw=ds.filter(t=>t.result==='W').length, dl=ds.filter(t=>t.result==='L').length;
      const du=ds.reduce((s,t)=>s+unitPnl(t),0);
      const dp=dayBets.filter(t=>!t.result||t.result==='').length;
      text+=date;
    if(ds.length) text+='  '+dw+'W-'+dl+'L  '+(du>=0?'+':'')+du.toFixed(2)+'u';
      if(dp) text+=` (${dp} pending)`;
      text+='\n';

      for(const {key,label} of MKTS) {
        const mb=dayBets.filter(t=>t.market===key);
        if(!mb.length) continue;
        const line=mktStat(mb,label);
        if(line) text+=line+'\n';
      }
      text+='\n';
    }
    document.getElementById('summaryText').textContent=text.trim();
    return;
  }

  // ── FULL MODE ──
  let text = 'BAT X EV TRACKER — FULL\n\n';
  if(settled.length) text+='Record  '+wins+'W-'+losses+'L  '+(totalUnits>=0?'+':'')+totalUnits.toFixed(2)+'u\n';
  text+=`Bets: ${bets.length}${pending?' ('+pending+' pending)':''}\n\n`;

  for(const [date, dayBets] of Object.entries(byDate).sort()) {
    const ds=dayBets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
    const dw=ds.filter(t=>t.result==='W').length, dl=ds.filter(t=>t.result==='L').length;
    const du=ds.reduce((s,t)=>s+unitPnl(t),0);
    const dp=dayBets.filter(t=>!t.result||t.result==='');
    text+=date;
    if(ds.length) text+='  '+dw+'W-'+dl+'L  '+(du>=0?'+':'')+du.toFixed(2)+'u';
    text+='\n';

    if(filter==='open') {
      // Group pending bets by game
      const byGame={};
      for(const t of dp) {
        const g=t.tm||t.game||'?';
        if(!byGame[g]) byGame[g]=[];
        byGame[g].push(t);
      }
      for(const [game, gameBets] of Object.entries(byGame).sort()) {
        text+='  '+game+'\n';
        for(const t of gameBets.sort((a,b)=>(b.roi||0)-(a.roi||0))) {
          text+='    '+t.game.replace(game,'').trim()+' ['+( MKT_LABELS[t.market]||t.market||'?')+'] '+t.book+' '+fmtOdds(t.odds);
          if(t.fairPrice!=null) text+=' Fair '+fmtOdds(t.fairPrice);
          if(t.roi!=null) text+=' ROI +'+t.roi.toFixed(1)+'%';
          text+='\n';
        }
      }
    } else {
      for(const t of dayBets) {
        const res=t.result==='W'?'W ':t.result==='L'?'L ':t.result==='P'?'P ':'  ';
        const pnl=t.result?` (${(unitPnl(t)>=0?'+':'')+unitPnl(t).toFixed(2)}u)`:'';
        text+=`  ${res}${t.game} [${MKT_LABELS[t.market]||t.market||'?'}] · ${t.book} ${fmtOdds(t.odds)}`;
        if(t.fairPrice!=null) text+=` · Fair ${fmtOdds(t.fairPrice)}`;
        if(t.proj!=null) text+=` · Proj ${t.proj}`;
        if(t.roi!=null) text+=` · ROI +${t.roi.toFixed(1)}%`;
        text+=pnl+'\n';
      }
    }
    text+='\n';
  }
  document.getElementById('summaryText').textContent=text.trim();
}

function exportXLSX(){
  try {
  if(!tracker.length){ alert('No bets to export'); return; }
  const settled=tracker.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  const pend=tracker.filter(t=>!t.result||t.result==='').length;

  function st(bets){
    const w=bets.filter(t=>t.result==='W').length,l=bets.filter(t=>t.result==='L').length,p=bets.filter(t=>t.result==='P').length;
    const units=bets.reduce((s,t)=>s+unitPnl(t),0),tot=w+l+p;
    let staked=0;
    for(const t of bets){if(!t.result||t.result==='')continue;const o=t.odds;staked+=(o==null||o>0?1:Math.abs(o)/100);}
    const roi=staked>0?units/staked*100:null;
    return {w,l,p,units,tot,wp:tot>0?w/tot*100:0,roi};
  }
  const pu=(s)=>(s.units>=0?'+':'')+s.units.toFixed(2)+'u';
  const pr=(s)=>s.roi!=null?(s.roi>=0?'+':'')+s.roi.toFixed(1)+'%':'—';
  const pw=(s)=>s.tot>0?s.wp.toFixed(1)+'%':'—';

  // ── BET LOG ──
  let run=0;
  const logRows=[...tracker].reverse().map(t=>{
    const pnl=t.result?unitPnl(t):null;
    if(pnl!=null)run+=pnl;
    return {'Date':t.date||'','Time':t.time||'','Play':t.game||'','Market':MKT_LABELS[t.market]||t.market||'',
      'Book':t.book||'','Odds':t.odds!=null?fmtOdds(t.odds):'','Fair':t.fairPrice!=null?fmtOdds(t.fairPrice):'',
      'Proj':t.proj!=null?t.proj:'','BatX Edge%':t.roi!=null?t.roi.toFixed(1):'','Line':t.line!=null?t.line:'',
      'Final':t.finalTotal!=null?t.finalTotal:'','Result':t.result==='W'?'WIN':t.result==='L'?'LOSS':t.result==='P'?'PUSH':'Pending',
      'Units P&L':pnl!=null?(pnl>=0?'+':'')+pnl.toFixed(2):'','Running Total':pnl!=null?(run>=0?'+':'')+run.toFixed(2):''};
  });
  const ws1=XLSX.utils.json_to_sheet(logRows);
  ws1['!cols']=[8,8,30,16,12,8,8,6,10,6,6,8,10,12].map(w=>({wch:w}));

  // ── BREAKDOWNS ──
  const roiBuckets=[
    {label:'5-7%',  fn:t=>t.roi>=5&&t.roi<7},
    {label:'7-10%', fn:t=>t.roi>=7&&t.roi<10},
    {label:'10-13%',fn:t=>t.roi>=10&&t.roi<13},
    {label:'13-16%',fn:t=>t.roi>=13&&t.roi<16},
    {label:'16-20%',fn:t=>t.roi>=16&&t.roi<20},
    {label:'20%+',  fn:t=>t.roi>=20},
  ];
  const aoa=[];
  const r=(...c)=>aoa.push(c);
  const br=()=>aoa.push([]);
  const HDR=['Category','W','L','P','Win%','Units P&L','Actual ROI%'];
  const addRow=(label,s)=>r(label,s.w,s.l,s.p,pw(s),pu(s),pr(s));

  function addOddsSection(bets){
    const buckets=[
      {label:'Heavy Fav (−200 or worse)', fn:t=>t.odds!=null&&t.odds<=-200},
      {label:'Fav (−150 to −199)',         fn:t=>t.odds!=null&&t.odds>=-199&&t.odds<=-150},
      {label:'Fav (−120 to −149)',         fn:t=>t.odds!=null&&t.odds>=-149&&t.odds<=-120},
      {label:'Fav (−100 to −119)',         fn:t=>t.odds!=null&&t.odds>=-119&&t.odds<=-100},
      {label:'Dog (+100 to +119)',         fn:t=>t.odds!=null&&t.odds>=100&&t.odds<=119},
      {label:'Dog (+120 to +149)',         fn:t=>t.odds!=null&&t.odds>=120&&t.odds<=149},
      {label:'Dog (+150 to +199)',         fn:t=>t.odds!=null&&t.odds>=150&&t.odds<=199},
      {label:'Big Dog (+200 or better)',   fn:t=>t.odds!=null&&t.odds>=200},
    ];
    const favs=bets.filter(t=>t.odds!=null&&t.odds<0);
    const dogs=bets.filter(t=>t.odds!=null&&t.odds>0);
    r('Favorite vs Underdog',...Array(6).fill(''));
    r(...HDR);
    if(favs.length) addRow('All Favorites (−)',st(favs));
    if(dogs.length) addRow('All Underdogs (+)',st(dogs));
    br();
    r('By Odds Bucket',...Array(6).fill(''));
    r(...HDR);
    for(const {label,fn} of buckets){
      const sub=bets.filter(fn);
      if(sub.length) addRow(label,st(sub));
    }
    br();
  }

  // Overall
  const ov=st(settled);
  r('BAT X EV TRACKER — OVERALL SUMMARY');
  br();
  r(...HDR);
  addRow('ALL TIME',ov);
  r(settled.length+' settled · '+pend+' pending');
  br();
  addOddsSection(settled);
  r('By BatX Edge% Bucket',...Array(6).fill(''));
  r(...HDR);
  for(const {label,fn} of roiBuckets){const sub=settled.filter(fn);if(sub.length)addRow(label,st(sub));}
  br();

  // Overall by book
  r('By Book',...Array(6).fill(''));
  r(...HDR);
  const allBooks=[...new Set(settled.map(t=>t.book))].sort();
  allBooks.forEach(b=>addRow(b,st(settled.filter(t=>t.book===b))));
  br(); br();

  const MKTS=[
    {key:'TOTAL',label:'GAME TOTALS'},{key:'TT',label:'TEAM TOTALS'},
    {key:'1HTOTAL',label:'1H TOTALS'},{key:'1HTT',label:'1H TEAM TOTALS'},
    {key:'1HML',label:'1H MONEYLINE'},{key:'1HRL',label:'1H RUN LINE'},
    {key:'1INNTOTAL',label:'1INN TOTAL'},{key:'1INNTT',label:'1INN TEAM TOTAL'},{key:'1INNML',label:'1INN MONEYLINE'},{key:'1INNRL',label:'1INN RUN LINE'},
  ];

  for(const {key,label} of MKTS){
    const ms=settled.filter(t=>t.market===key);
    if(!ms.length) continue;
    const isML=key==='1HML', isRL=key==='1HRL', isTot=!isML&&!isRL;
    r('── '+label+' ──');
    br();
    r(...HDR);
    addRow('Overall',st(ms));
    br();
    addOddsSection(ms);

    // BatX Edge buckets per market
    r('By BatX Edge% Bucket',...Array(6).fill(''));
    r(...HDR);
    for(const {label,fn} of roiBuckets){const sub=ms.filter(fn);if(sub.length)addRow(label,st(sub));}
    br();

    if(isTot){
      const overs=ms.filter(t=>t.dir==='OVER');
      const unders=ms.filter(t=>t.dir==='UNDER');
      if(overs.length){
        r('OVERS ONLY',...Array(6).fill(''));
        r(...HDR);
        addRow('Overall',st(overs));
        const books=[...new Set(overs.map(t=>t.book))].sort();
        books.forEach(b=>addRow(b,st(overs.filter(t=>t.book===b))));
        const lines=[...new Set(overs.filter(t=>t.line!=null).map(t=>t.line))].sort((a,b)=>a-b);
        if(lines.length){br();r('By Line',...Array(6).fill(''));r(...HDR);lines.forEach(l=>addRow('O'+l,st(overs.filter(t=>t.line===l))));}
        br();
      }
      if(unders.length){
        r('UNDERS ONLY',...Array(6).fill(''));
        r(...HDR);
        addRow('Overall',st(unders));
        const books=[...new Set(unders.map(t=>t.book))].sort();
        books.forEach(b=>addRow(b,st(unders.filter(t=>t.book===b))));
        const lines=[...new Set(unders.filter(t=>t.line!=null).map(t=>t.line))].sort((a,b)=>a-b);
        if(lines.length){br();r('By Line',...Array(6).fill(''));r(...HDR);lines.forEach(l=>addRow('U'+l,st(unders.filter(t=>t.line===l))));}
        br();
      }
    } else if(isRL){
      const spreads=[...new Set(ms.filter(t=>t.line!=null).map(t=>t.line))].sort((a,b)=>a-b);
      if(spreads.length){r('By Spread',...Array(6).fill(''));r(...HDR);spreads.forEach(sp=>addRow((sp>=0?'+':'')+sp+' RL',st(ms.filter(t=>t.line===sp))));br();}
      const books=[...new Set(ms.map(t=>t.book))].sort();
      r('By Book',...Array(6).fill(''));r(...HDR);books.forEach(b=>addRow(b,st(ms.filter(t=>t.book===b))));br();
    } else {
      const favs=ms.filter(t=>t.odds!=null&&t.odds<0),dogs=ms.filter(t=>t.odds!=null&&t.odds>0);
      r('By Side',...Array(6).fill(''));r(...HDR);
      if(favs.length) addRow('Favorite (−)',st(favs));
      if(dogs.length) addRow('Underdog (+)',st(dogs));
      br();
      const books=[...new Set(ms.map(t=>t.book))].sort();
      r('By Book',...Array(6).fill(''));r(...HDR);books.forEach(b=>addRow(b,st(ms.filter(t=>t.book===b))));br();
    }
    br();
  }

  const ws2=XLSX.utils.aoa_to_sheet(aoa);
  ws2['!cols']=[28,6,6,6,8,12,10].map(w=>({wch:w}));

  // ── DAILY SUMMARY ──
  const byDate={};
  for(const t of tracker){const d=t.date||'?';if(!byDate[d])byDate[d]=[];byDate[d].push(t);}
  const dailyRows=[];
  for(const [date,bets] of Object.entries(byDate).sort()){
    const ds=bets.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
    const s=st(ds);
    dailyRows.push({'Date':date,'W':s.w,'L':s.l,'P':s.p,'Win%':pw(s),'Units P&L':pu(s),'Actual ROI%':pr(s),'Pending':bets.filter(t=>!t.result||t.result==='').length});
  }
  const ws3=XLSX.utils.json_to_sheet(dailyRows);
  ws3['!cols']=[10,6,6,6,8,12,10,8].map(w=>({wch:w}));

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws1,'Bet Log');
  XLSX.utils.book_append_sheet(wb,ws2,'Breakdowns');
  XLSX.utils.book_append_sheet(wb,ws3,'Daily Summary');
  XLSX.writeFile(wb,'BatX-Tracker-'+new Date().toISOString().slice(0,10)+'.xlsx');
  } catch(e){ alert('Export error: '+e.message); }
}

function addManual(){
  const g=v=>document.getElementById(v)?.value?.trim();
  const n=v=>{const x=parseFloat(g(v));return isNaN(x)?null:x;};
  const tm=g('mf-tm');if(!tm){alert('TM required');return;}
  const date=g('mf-date');if(!date){alert('Date required');return;}
  const entry={id:Date.now(),date,tm,game:tm+' '+g('mf-dir')+(n('mf-line')!=null?' '+n('mf-line'):''),dir:g('mf-dir')||'OVER',market:g('mf-mkt')||'TOTAL',marketLabel:MKT_LABELS[g('mf-mkt')]||'',book:g('mf-book')||'',odds:g('mf-odds')?parseInt(g('mf-odds')):null,line:n('mf-line'),proj:n('mf-proj'),roi:n('mf-roi'),result:g('mf-result')||'',books:[],tracked_at:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})};
  tracker.unshift(entry);localStorage.setItem('batxEvTracker',JSON.stringify(tracker));renderTracker();
}

function renderTracker(){
  const el=document.getElementById('trackerSection');
  const gradeBar=document.getElementById('gradeBar');
  if(gradeBar)gradeBar.style.display='flex';
  const settled=tracker.filter(t=>t.result==='W'||t.result==='L'||t.result==='P');
  const wins=tracker.filter(t=>t.result==='W').length;
  const losses=tracker.filter(t=>t.result==='L').length;
  const pushes=tracker.filter(t=>t.result==='P').length;
  const pending=tracker.filter(t=>!t.result).length;
  const roi=settled.reduce((s,t)=>s+unitPnl(t),0);
  const roiStr=(roi>=0?'+':'')+roi.toFixed(2)+'u';
  const winRate=settled.length?(wins/settled.length*100).toFixed(1):'—';

  function breakdown(groupFn,labelFn,bets){
    const g={};
    for(const t of bets){const k=groupFn(t);if(!g[k])g[k]={label:labelFn(t,k),w:0,l:0,p:0,roi:0};if(t.result==='W'){g[k].w++;g[k].roi+=unitPnl(t);}else if(t.result==='L'){g[k].l++;g[k].roi+=unitPnl(t);}else if(t.result==='P')g[k].p++;}
    return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>v);
  }
  function bkTable(rows,title){
    if(!rows.length)return'';
    let h=`<div class="bk-card"><div class="bk-title">${title}</div><div class="bk-head"><span>Category</span><span>W</span><span>L</span><span>P</span><span>W%</span><span>Units</span></div>`;
    for(const r of rows){const t=r.w+r.l+r.p;const wp=t>0?(r.w/t*100).toFixed(0)+'%':'—';h+=`<div class="bk-row"><div class="bk-label">${r.label}</div><div class="bk-val g">${r.w}</div><div class="bk-val r">${r.l}</div><div class="bk-val">${r.p}</div><div class="bk-val">${wp}</div><div class="bk-val ${r.roi>=0?'pos':'neg'}">${(r.roi>=0?'+':'')+r.roi.toFixed(2)}u</div></div>`;}
    return h+'</div>';
  }

  const mktRows=breakdown(t=>t.market||'?',t=>MKT_LABELS[t.market]||t.market||'?',settled);
  const dirRows=breakdown(t=>(t.dir==='OVER'||t.dir==='UNDER')?t.dir:'OTHER',t=>(t.dir==='OVER'||t.dir==='UNDER')?t.dir:'Other (ML/RL)',settled);
  const roiRows=breakdown(t=>{const r=t.roi||0;return r<5?'a<5%':r<10?'b5-10%':'c10%+';},(_,k)=>k.slice(1),settled);
  const bookRows=breakdown(t=>t.book||'?',t=>t.book||'?',settled);

  function statCard(label,val,sub,color){return `<div class="dash-stat"><div class="dash-stat-label">${label}</div><div class="dash-stat-val" style="color:${color}">${val}</div>${sub?`<div class="dash-stat-sub">${sub}</div>`:''}</div>`;}

  let html='<div class="tracker-section">';
  html+=`<div class="tracker-title">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-size:15px;font-weight:700">Tracker</span>
      <div class="tab-row">
        <button class="tab-btn ${trackerTab==='dashboard'?'active':''}" onclick="setTab('dashboard')">Dashboard</button>
        <button class="tab-btn ${trackerTab==='calendar'?'active':''}" onclick="setTab('calendar')">Calendar</button>
        <button class="tab-btn ${trackerTab==='log'?'active':''}" onclick="setTab('log')">Bet log (${tracker.length})</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="screenshot-btn" onclick="showSummary()">📋 Summary</button>
      <button class="screenshot-btn" onclick="exportTracker()">⬇ JSON</button>
      <button class="screenshot-btn" onclick="exportXLSX()">⬇ Excel</button>
      <label class="screenshot-btn" style="cursor:pointer">⬆ Import<input type="file" accept=".json" onchange="importTracker(this)" style="display:none"></label>
      <button class="tracker-clear" onclick="clearPending()">Clear pending</button>
      <button class="tracker-clear" onclick="clearTracker()">Clear all</button>
    </div>
  </div>`;

  if(trackerTab==='dashboard'){
    // ---- HELPER: full breakdown table with o/u split ----
    function bkFull(rows, title, colspan3) {
      if(!rows.length) return '';
      let h=`<div class="bk-card"><div class="bk-title">${title}</div>
        <div class="bk-head2"><span>Category</span><span>W</span><span>L</span><span>P</span><span>W%</span><span>Units P&L</span><span>BatX Edge</span><span>Actual ROI</span></div>`;
      for(const r of rows){
        const t=r.w+r.l+r.p;
        const wp=t>0?(r.w/t*100).toFixed(1)+'%':'—';
        const avgRoi=t>0?(r.totalRoi/t).toFixed(1):'—';
        h+=`<div class="bk-row2">
          <div class="bk-label">${r.label}</div>
          <div class="bk-val">${r.w}</div>
          <div class="bk-val">${r.l}</div>
          <div class="bk-val">${r.p}</div>
          <div class="bk-val">${wp}</div>
          <div class="bk-val">${(r.roi>=0?'+':'')+r.roi.toFixed(2)}u</div>
          <div class="bk-val">${avgRoi!=='—'?'+'+avgRoi+'%':'—'}</div>
          <div class="bk-val">${(()=>{const ar=actualRoi(r.bets||[]);return ar!=='—'?(parseFloat(ar)>=0?'+':'')+ar+'%':'—';})()}</div>
        </div>`;
      }
      return h+'</div>';
    }

    function actualRoi(bets) {
      let staked=0, units=0;
      for(const t of bets) {
        if(t.result!=='W'&&t.result!=='L'&&t.result!=='P') continue;
        const o=t.odds; if(o==null){staked+=1;units+=unitPnl(t);continue;}
        staked+=(o>0?1:Math.abs(o)/100);
        units+=unitPnl(t);
      }
      return staked>0?((units/staked)*100).toFixed(1):'—';
    }

    function breakdown2(groupFn, labelFn, bets) {
      const g={};
      for(const t of bets){
        const k=groupFn(t);
        if(!g[k]) g[k]={label:labelFn(t,k),w:0,l:0,p:0,roi:0,totalRoi:0,bets:[]};
        if(t.result==='W'){g[k].w++;g[k].roi+=unitPnl(t);}
        else if(t.result==='L'){g[k].l++;g[k].roi+=unitPnl(t);}
        else if(t.result==='P') g[k].p++;
        g[k].totalRoi+=(t.roi||0);
        g[k].bets.push(t);
      }
      return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>v);
    }

    // all breakdowns
    const mktRows   = breakdown2(t=>t.market||'?', t=>MKT_LABELS[t.market]||t.market||'?', settled);
    const dirRows   = breakdown2(t=>{
      if(t.dir==='OVER') return 'OVER';
      if(t.dir==='UNDER') return 'UNDER';
      if(t.market==='1HML'||t.market==='F5ML'||t.market==='ML') return 'ML';
      if(t.market==='1HRL'||t.market==='F5RL'||t.market==='RL') return 'RL';
      return 'OTHER';
    }, t=>{
      if(t.dir==='OVER') return 'OVER';
      if(t.dir==='UNDER') return 'UNDER';
      if(t.market==='1HML'||t.market==='F5ML'||t.market==='ML') return 'Moneyline';
      if(t.market==='1HRL'||t.market==='F5RL'||t.market==='RL') return 'Run Line';
      return 'Other';
    }, settled);
    const lineRows  = breakdown2(t=>{
      const l=t.line; const d=t.dir==='OVER'?'o':'u';
      if(l==null) return 'z—';
      return d+(l%1===0?l+'.0':l);
    }, (t,k)=>k.replace(/^[ou]/,'').replace(/^z/,''), settled).sort((a,b)=>{
      // sort by line value numerically
      const aNum=parseFloat(a.label)||0; const bNum=parseFloat(b.label)||0;
      return aNum-bNum;
    });
    const roiBucketRows = breakdown2(t=>{
      const r=t.roi||0;
      if(r<5)  return 'a<5%';
      if(r<10) return 'b5–10%';
      if(r<15) return 'c10–15%';
      if(r<20) return 'd15–20%';
      return 'e20%+';
    }, (_,k)=>k.slice(1), settled);
    const bookRows  = breakdown2(t=>t.book||'?', t=>t.book||'?', settled);
    const overRows  = breakdown2(t=>{
      const l=t.line; if(l==null||t.dir!=='OVER') return null;
      return 'o'+(l%1===0?l+'.0':l);
    }, (t,k)=>k, settled.filter(t=>t.dir==='OVER'));
    const underRows = breakdown2(t=>{
      const l=t.line; if(l==null||t.dir!=='UNDER') return null;
      return 'u'+(l%1===0?l+'.0':l);
    }, (t,k)=>k, settled.filter(t=>t.dir==='UNDER'));


    html+='<div class="dash-stats">';
    html+=statCard('Record', wins+'W · '+losses+'L'+(pushes?' · '+pushes+'P':''), settled.length+' settled · '+pending+' pending','var(--text)');
    html+=statCard('Win rate', settled.length?winRate+'%':'—', 'settled bets only', 'var(--text)');
    html+=statCard('Units P&L', roiStr, 'win 1u minus / stake 1u plus', 'var(--text)');
    const avgROI = settled.length?(settled.reduce((s,t)=>s+(t.roi||0),0)/settled.length).toFixed(1):'—';
    let actStaked=0, actUnits=0;
    for(const t of settled){const o=t.odds;actStaked+=(o==null||o>0?1:Math.abs(o)/100);actUnits+=unitPnl(t);}
    const actROI=actStaked>0?((actUnits/actStaked)*100).toFixed(1):'—';
    html+=statCard('Actual ROI', actROI!=='—'?(parseFloat(actROI)>=0?'+':'')+actROI+'%':'—', 'units won ÷ units staked', actROI!=='—'&&parseFloat(actROI)>=0?'var(--green)':'var(--red)');
    html+=statCard('Avg BatX Edge', avgROI!=='—'?'+'+avgROI+'%':'—', 'avg projected edge', 'var(--text)');
    html+='</div>';

    // Market bet count summary
    const mktSummaryKeys = [
      {key:'TOTAL',label:'Game Total'},{key:'TT',label:'Team Total'},
      {key:'1HTOTAL',label:'1H Total'},{key:'1HTT',label:'1H Team Total'},
      {key:'1HML',label:'1H ML'},{key:'1HRL',label:'1H RL'},
      {key:'1INNTOTAL',label:'1INN Total'},{key:'NRFI',label:'NRFI/YRFI'},
    ];
    let mktPills = '';
    for(const {key,label} of mktSummaryKeys){
      const all=tracker.filter(t=>t.market===key);
      if(!all.length) continue;
      const s=all.filter(t=>t.result==='W'||t.result==='L'||t.result==='P').length;
      const p=all.filter(t=>!t.result||t.result==='').length;
      mktPills+=`<div style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:12px">
        <div style="color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase">${label}</div>
        <div style="font-weight:700;margin-top:2px">${all.length} bets <span style="color:var(--muted);font-weight:400;font-size:11px">(${s} settled${p?' · '+p+' pending':''})</span></div>
      </div>`;
    }
    html+=`<div style="background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px">Bets by Market</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${mktPills}</div>
    </div>`;

    // Per-market deep breakdowns

    const MARKETS_TRACKED = [
      {key:'TOTAL',    label:'Game Total'},
      {key:'TT',       label:'Team Total'},
      {key:'1HTOTAL',  label:'1H Total'},
      {key:'1HTT',     label:'1H Team Total'},
      {key:'1HML',     label:'1H Moneyline'},
      {key:'1HRL',     label:'1H Run Line'},
      {key:'1INNTOTAL',  label:'1INN Total'},
      {key:'1INNTT',     label:'1INN TT'},
      {key:'1INNML',     label:'1INN ML'},
      {key:'1INNRL',     label:'1INN RL'},
      {key:'NRFI',     label:'NRFI/YRFI'},
    ];

    function mktSettled(key) { return settled.filter(t=>t.market===key); }
    function lineBreak(bets, dir) {
      return breakdown2(t=>{
        const l=t.line; const d=dir==='OVER'?'o':'u';
        return d+(l!=null?(l%1===0?l+'.0':String(l)):'?');
      }, (t,k)=>k, bets.filter(t=>t.dir===dir));
    }

    // Line buckets: O8.5, U9.0 etc — totals only, exclude ML/RL
    const totalsMkts = ['TOTAL','TT','1HTOTAL','1HTT','NRFI'];
    const settledTotals = settled.filter(t=>totalsMkts.includes(t.market) && (t.dir==='OVER'||t.dir==='UNDER') && t.line!=null && t.line>=3);
    const lineBucketRows = breakdown2(t=>{
      const l=t.line;
      const d=t.dir==='OVER'?'o':'u';
      return d+(l%1===0?l+'.0':String(l));
    }, (t,k)=>{
      const l=t.line;
      const d=t.dir==='OVER'?'O':'U';
      return d+(l%1===0?l+'.0':String(l));
    }, settledTotals).sort((a,b)=>a.label.localeCompare(b.label));

    // Odds buckets
    const oddsBucketRows = breakdown2(t=>{
      const o=t.odds; if(o==null) return 'z?';
      if(o<=-200) return 'a-200 or worse';
      if(o<=-150) return 'b-150 to -199';
      if(o<=-120) return 'c-120 to -149';
      if(o<=-100) return 'd-100 to -119';
      if(o<=+110) return 'e+100 to +110';
      if(o<=+130) return 'f+111 to +130';
      return 'g+131 or better';
    }, (_,k)=>k.slice(1), settled);

    html+='<div class="dash-section-title">Overall</div>';
    html+='<div class="bk-grid3">';
    html+=bkFull(mktRows,'By market type');
    html+=bkFull(dirRows,'By direction');
    html+=bkFull(bookRows,'By book');
    html+=bkFull(roiBucketRows,'By Bat X ROI bucket');
    html+=bkFull(lineBucketRows,'By line (O/U)');
    html+=bkFull(oddsBucketRows,'By odds bucket');
    html+='</div>';

    for(const {key, label} of MARKETS_TRACKED){
      const ms = mktSettled(key);
      if(!ms.length) continue;
      const isML = key==='1HML';
      const isRL = key==='1HRL';
      html+=`<div class="dash-section-title">${label}</div>`;
      html+='<div class="bk-grid3">';
      if(isML){
        // ML: just OVER/UNDER equivalent = win/loss by direction bucket
        const dirB = breakdown2(t=>'dir', t=>'Results', ms);
        html+=bkFull(breakdown2(t=>t.book||'?',t=>t.book||'?',ms),`${label} — by book`);
      } else if(isRL){
        // RL: by spread (+0.5 vs -0.5)
        const rlRows = breakdown2(t=>{const l=t.line;return l!=null?(l>=0?'+'+l:String(l)):'?';},(t,k)=>k+' RL',ms);
        html+=bkFull(rlRows,`${label} — by spread`);
        html+=bkFull(breakdown2(t=>t.book||'?',t=>t.book||'?',ms),`${label} — by book`);
      } else {
        // Totals: OVER vs UNDER summary, then by line
        const ouRows = breakdown2(t=>t.dir==='OVER'?'OVER':'UNDER', t=>t.dir==='OVER'?'OVER':'UNDER', ms);
        html+=bkFull(ouRows,`${label} — OVER vs UNDER`);
        html+=bkFull(breakdown2(t=>t.book||'?',t=>t.book||'?',ms),`${label} — by book`);
      }
      html+='</div>';
    }

    if(!settled.length) html+='<div style="text-align:center;color:var(--hint);font-size:13px;padding:2rem;margin-top:12px">No settled plays yet — grade results in Bet Log</div>';
  } else if(trackerTab==='calendar') {
    html += renderCalendarHTML();
  } else {
    html+=`<div style="padding:10px 14px 6px">
      <input id="betLogSearch" type="text" placeholder="Search bets..." oninput="filterBetLog()" style="width:100%;box-sizing:border-box;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;padding:7px 10px;outline:none;">
    </div>`;
    html+=`<div class="track-head"><span>Play</span><span>Market</span><span>Book</span><span>Odds</span><span>Fair</span><span>Proj</span><span>ROI</span><span>Final</span><span>Result</span><span></span></div>`;
    html+=`<div id="betLogRows">`;
    for(const t of tracker){
      const resColor=t.result==='W'?'var(--green)':t.result==='L'?'var(--red)':t.result==='P'?'var(--muted)':'var(--hint)';
      const resLabel=t.result==='W'?'WIN ✓':t.result==='L'?'LOSS ✗':t.result==='P'?'PUSH —':'Pending';
      html+=`<div class="track-row"><div class="tv">${t.game}<span style="font-size:10px;color:var(--muted);margin-left:6px">${t.date}${t.time?' · '+t.time:''}</span></div><div class="tv" style="font-size:11px;color:var(--muted)">${MKT_LABELS[t.market]||t.market||'—'}</div><div class="tv">${t.book||'—'}</div><div class="tv">${t.odds!=null?fmtOdds(t.odds):'—'}</div><div class="tv amber">${t.fairPrice!=null?fmtOdds(t.fairPrice):'—'}</div><div class="tv">${t.proj??'—'}</div><div class="tv">${t.roi!=null?'+'+t.roi.toFixed(1)+'%':'—'}</div><div class="tv" style="font-size:11px;font-weight:700;color:var(--muted)">${t.finalTotal!=null?t.finalTotal:'—'}</div><div class="tv" onclick="event.stopPropagation()"><select class="result-sel" onchange="updateResult(${t.id},this.value)" style="background:var(--surface2);border:1px solid var(--border2);border-radius:4px;color:${resColor};font-size:11px;font-weight:700;padding:2px 4px;outline:none"><option value="" ${!t.result?'selected':''}>Pending</option><option value="W" ${t.result==='W'?'selected':''}>WIN</option><option value="L" ${t.result==='L'?'selected':''}>LOSS</option><option value="P" ${t.result==='P'?'selected':''}>PUSH</option></select></div><div onclick="event.stopPropagation()"><button onclick="editTrack(${t.id})" style="background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--muted);font-size:10px;padding:2px 6px;cursor:pointer;margin-right:4px">✎ Edit</button><button class="del-btn" onclick="deleteTrack(${t.id})">✕</button></div></div>`;
    }
    html+=`</div>`;
    html+=`<div class="manual-add">
      <div class="manual-add-title">+ Add manually</div>
      <div class="manual-add-row">
        <div class="mf"><label>TM</label><input id="mf-tm" placeholder="BAL/MIN"></div>
        <div class="mf"><label>Date</label><input id="mf-date" placeholder="03/30"></div>
        <div class="mf"><label>Market</label><select id="mf-mkt"><option value="TOTAL">Game Total</option><option value="TT">Team Total</option><option value="1HTOTAL">1H Total</option><option value="1HTT">1H Team Total</option><option value="1HML">1H ML</option><option value="1HRL">1H RL</option><option value="NRFI">NRFI/YRFI</option></select></div>
        <div class="mf"><label>Dir</label><select id="mf-dir"><option>OVER</option><option>UNDER</option><option>YES</option><option>NO</option></select></div>
        <div class="mf"><label>Line</label><input id="mf-line" type="number" step="0.5" placeholder="8.5"></div>
        <div class="mf"><label>Book</label><input id="mf-book" placeholder="Pinnacle"></div>
        <div class="mf"><label>Odds</label><input id="mf-odds" placeholder="-115"></div>
        <div class="mf"><label>Proj</label><input id="mf-proj" type="number" step="0.01"></div>
        <div class="mf"><label>ROI%</label><input id="mf-roi" type="number" step="0.1"></div>
        <div class="mf"><label>Result</label><select id="mf-result"><option value="">Pending</option><option value="W">Win</option><option value="L">Loss</option><option value="P">Push</option></select></div>
      </div>
      <button class="tracker-btn" onclick="addManual()" style="margin-top:8px">Add to tracker</button>
    </div>`;
  }
  html+='</div>';
  el.innerHTML=html;
  populateGradeDates();
}

// AUTO-GRADE via MLB Stats API
const MLB_API_ABBR={'ARI':'ARI','AZ':'ARI','ATL':'ATL','BAL':'BAL','BOS':'BOS','CHC':'CHC','CWS':'CWS','CIN':'CIN','CLE':'CLE','COL':'COL','DET':'DET','HOU':'HOU','KC':'KC','KCR':'KC','LAD':'LAD','LAA':'LAA','ANA':'LAA','MIA':'MIA','FLA':'MIA','MIL':'MIL','MIN':'MIN','NYM':'NYM','NYY':'NYY','ATH':'ATH','OAK':'ATH','SAC':'ATH','PHI':'PHI','PIT':'PIT','SD':'SD','SDP':'SD','SF':'SF','SFG':'SF','SEA':'SEA','STL':'STL','TB':'TB','TBR':'TB','TEX':'TEX','TOR':'TOR','WSH':'WSH','WSN':'WSH','WAS':'WSH'};
// Map API team names to our abbreviations
const MLB_NAME_ABBR={'Minnesota Twins':'MIN','Kansas City Royals':'KC','Baltimore Orioles':'BAL','Texas Rangers':'TEX','Atlanta Braves':'ATL','Oakland Athletics':'ATH','Sacramento Athletics':'ATH','Philadelphia Phillies':'PHI','Washington Nationals':'WSH','Pittsburgh Pirates':'PIT','New York Mets':'NYM','Colorado Rockies':'COL','Miami Marlins':'MIA','Boston Red Sox':'BOS','Cincinnati Reds':'CIN','Tampa Bay Rays':'TB','St. Louis Cardinals':'STL','Milwaukee Brewers':'MIL','Los Angeles Angels':'LAA','Chicago Cubs':'CHC','New York Yankees':'NYY','Seattle Mariners':'SEA','San Diego Padres':'SD','San Francisco Giants':'SF','Arizona Diamondbacks':'ARI','Detroit Tigers':'DET','Cleveland Guardians':'CLE','Los Angeles Dodgers':'LAD','Chicago White Sox':'CWS','Houston Astros':'HOU','Toronto Blue Jays':'TOR','Athletics':'ATH','San Diego Padres':'SD','San Francisco Giants':'SF','Los Angeles Dodgers':'LAD','Los Angeles Angels':'LAA','New York Yankees':'NYY','New York Mets':'NYM','Chicago Cubs':'CHC','Chicago White Sox':'CWS','Tampa Bay Rays':'TB','Kansas City Royals':'KC','Minnesota Twins':'MIN'};
function teamAbbr(g, side) { const name=(g.teams?.[side]?.team?.name||''); return MLB_NAME_ABBR[name]||toAbbr(name)||name.toUpperCase().slice(0,3); }

function parseDateMMDD(str){if(!str)return null;const m=str.match(/(\d{1,2})\/(\d{1,2})/);if(!m)return null;const now=new Date();let year=now.getFullYear();const month=parseInt(m[1]),day=parseInt(m[2]);if(month>now.getMonth()+1)year--;return `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;}

function extractTeams(str){
  const parts=str.toUpperCase().replace(/\s+[A-Z]+\s+[\d.]+\s*$/,'').replace(/\//g,'@').split('@').map(s=>s.replace(/[^A-Z]/g,' ').trim()).filter(Boolean);
  return parts.map(p=>{const ns=p.replace(/\s+/g,'');if(MLB_API_ABBR[ns])return MLB_API_ABBR[ns];for(const w of p.split(' '))if(MLB_API_ABBR[w])return MLB_API_ABBR[w];return ns.slice(0,3);});
}

// Extract both team abbrs from various formats
function gameToTeams(str) {
  if (!str) return [];
  const u = str.toUpperCase().trim();
  // Format 1: "AAA/BBB" or "AAA@BBB" - direct split
  const slashAt = u.match(/^([A-Z]{2,4})[/@]([A-Z]{2,4})/);
  if (slashAt) {
    const t1 = MLB_API_ABBR[slashAt[1]]||slashAt[1];
    const t2 = MLB_API_ABBR[slashAt[2]]||slashAt[2];
    return [t1,t2];
  }
  // Format 2: "AAA/BBB BBB UNDER 4.5" - game prefix then team
  const withSuffix = u.match(/([A-Z]{2,4})[/@]([A-Z]{2,4})\s/);
  if (withSuffix) {
    const t1 = MLB_API_ABBR[withSuffix[1]]||withSuffix[1];
    const t2 = MLB_API_ABBR[withSuffix[2]]||withSuffix[2];
    return [t1,t2];
  }
  return [];
}

async function regrade(){
  const sel = document.getElementById('regradeDate');
  const selectedDate = sel?.value;
  const statusEl = document.getElementById('gradeStatus');
  const setStatus = s => { if(statusEl) statusEl.textContent = s; };
  if(!selectedDate){ setStatus('Pick a date first'); return; }
  if(!confirm('Clear and re-grade '+selectedDate+'?')) return;
  // Clear ALL results for that date (including W/L/P)
  tracker.forEach(t=>{ if(t.date===selectedDate){ t.result=''; delete t.finalTotal; } });
  localStorage.setItem('batxEvTracker', JSON.stringify(tracker));
  setStatus('Cleared '+tracker.filter(t=>t.date===selectedDate).length+' bets — fetching scores...');
  // Grade directly without touching DOM
  await gradeDate(selectedDate, setStatus);
  localStorage.setItem('batxEvTracker', JSON.stringify(tracker));
  renderTracker();
  populateGradeDates();
}
