async function gradeDate(selectedDate, setStatus){
  setStatus('Finding pending bets...');
  const pending = tracker.filter(t=>(!t.result||t.result==='') && t.date===selectedDate);
  if(!pending.length){ setStatus('No pending bets for '+selectedDate); return; }
  const dateStr = parseDateMMDD(selectedDate);
  if(!dateStr){ setStatus('Bad date: '+selectedDate); return; }
  setStatus('Fetching scores...');
  let games = [];
  try {
    let resp;
    try { resp = await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+dateStr+'&hydrate=linescore'); }
    catch(e) { resp = await fetch('https://corsproxy.io/?url='+encodeURIComponent('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+dateStr+'&hydrate=linescore')); }
    const data = await resp.json();
    games = (data.dates?.[0]?.games)||[];
  } catch(e) { setStatus('Fetch error: '+e.message); return; }
  setStatus(games.length+' games found, grading...');
  if(!games.length){ return; }
  let graded = 0;
  for(const t of pending){
    const src = t.rawGame||t.tm||t.game||'';
    const teams = gameToTeams(src);
    if(teams.length<2) continue;
    // Find all matching games (handles doubleheaders)
    const matchingGames = games.filter(g=>{
      const ha=teamAbbr(g,'home'), aa=teamAbbr(g,'away');
      return teams.some(x=>x===ha||MLB_API_ABBR[x]===ha) && teams.some(x=>x===aa||MLB_API_ABBR[x]===aa);
    });
    let g;
    if(matchingGames.length<=1){
      g=matchingGames[0];
    } else {
      // Doubleheader — pick game whose start time is closest to bet time
      function parseTimeMin(tStr){
        if(!tStr) return 9999;
        const m=tStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
        if(!m) return 9999;
        let h=parseInt(m[1]),mn=parseInt(m[2]),ap=m[3].toUpperCase();
        if(ap==='PM'&&h!==12) h+=12;
        if(ap==='AM'&&h===12) h=0;
        return h*60+mn;
      }
      const betMin=parseTimeMin(t.time||'');
      // Sort matching games by their API start time
      const withTimes=matchingGames.map(mg=>{
        const gt=mg.gameDate||''; // ISO string e.g. "2024-04-21T17:05:00Z"
        const d=new Date(gt);
        const apiMin=isNaN(d)?9999:d.getUTCHours()*60+d.getUTCMinutes(); // UTC; close enough for ordering
        return {mg,apiMin};
      }).sort((a,b)=>a.apiMin-b.apiMin);
      // Pick the game whose rank (G1=earliest, G2=later) best matches bet time rank
      // Simple approach: if bet time <= midpoint of two game times → G1, else G2
      if(betMin===9999){
        g=matchingGames[0]; // no time info, default to first
      } else {
        const mid=(withTimes[0].apiMin+withTimes[withTimes.length-1].apiMin)/2;
        g=betMin<=mid ? withTimes[0].mg : withTimes[withTimes.length-1].mg;
      }
    }
    if(!g) continue;
    const isFinal=(g.status?.detailedState||'').toLowerCase().includes('final');
    const ls=g.linescore;
    const mkt=t.market||'TOTAL';
    const line=parseFloat(t.line)||0;
    const homeAbbr=teamAbbr(g,'home');
    const awayAbbr=teamAbbr(g,'away');
    function isTeamHome(abbrStr){
      // First try direct name match for ML/RL entries that store full name in t.team
      const hn=(g.teams?.home?.team?.name||'');
      const an=(g.teams?.away?.team?.name||'');
      if(hn===abbrStr) return true;
      if(an===abbrStr) return false;
      const a=toAbbr(abbrStr||'');
      return a===homeAbbr||MLB_API_ABBR[a]===homeAbbr;
    }
    function f5runs(){ const inn=(ls?.innings||[]).slice(0,5); return {h:inn.reduce((s,i)=>s+(parseInt(i.home?.runs)||0),0),a:inn.reduce((s,i)=>s+(parseInt(i.away?.runs)||0),0),ok:inn.length>=5||isFinal}; }
    const score=(side)=>parseInt(side==='home'?g.teams?.home?.score:g.teams?.away?.score)||0;
    function betTeamIsHome(teamName){
      // If teamName undefined, extract from game label e.g. "San Diego Padres UNDER 3.5"
      let tn = teamName;
      if(!tn || tn==='undefined') {
        tn = (t.game||'').replace(/\s+(OVER|UNDER|YES|NO)\s+[\d.]+.*/i,'').trim();
      }
      const hn=(g.teams?.home?.team?.name||'');
      const an=(g.teams?.away?.team?.name||'');
      if(hn===tn) return true;
      if(an===tn) return false;
      // abbr fallback
      const ba=toAbbr(tn||'');
      const mH=homeAbbr===ba||MLB_API_ABBR[ba]===homeAbbr;
      const mA=awayAbbr===ba||MLB_API_ABBR[ba]===awayAbbr;
      return mH&&!mA?true:!mH&&mA?false:homeAbbr===ba;
    }
    let result=null;
    if(mkt==='TOTAL'){
      if(!isFinal) continue;
      const tot=score('home')+score('away');
      result=tot>line?(t.dir==='OVER'?'W':'L'):tot<line?(t.dir==='UNDER'?'W':'L'):'P';
      t.finalTotal=tot;
    } else if(mkt==='TT'){
      if(!isFinal) continue;
      const isH=betTeamIsHome(t.team);
      const runs=isH?score('home'):score('away');
      result=runs>line?(t.dir==='OVER'?'W':'L'):runs<line?(t.dir==='UNDER'?'W':'L'):'P';
      t.finalTotal=runs;
          } else if(mkt==='1INNTOTAL'){
        const inn1=(ls?.innings||[])[0];
        if(!inn1&&!isFinal) continue;
        const h1=parseInt(inn1?.home?.runs)||0,a1=parseInt(inn1?.away?.runs)||0;
        const tot=h1+a1;
        result=tot>line?(t.dir==='OVER'?'W':'L'):tot<line?(t.dir==='UNDER'?'W':'L'):'P';
        t.finalTotal=tot;
      } else if(mkt==='1INNTT'){
        const inn1=(ls?.innings||[])[0];
        if(!inn1&&!isFinal) continue;
        const h1=parseInt(inn1?.home?.runs)||0,a1=parseInt(inn1?.away?.runs)||0;
        const isH=betTeamIsHome(t.team);
        const runs=isH?h1:a1;
        result=runs>line?(t.dir==='OVER'?'W':'L'):runs<line?(t.dir==='UNDER'?'W':'L'):'P';
        t.finalTotal=runs;
      } else if(mkt==='1INNML'){
        const inn1=(ls?.innings||[])[0];
        if(!inn1&&!isFinal) continue;
        const h1=parseInt(inn1?.home?.runs)||0,a1=parseInt(inn1?.away?.runs)||0;
        const isH=isTeamHome(t.dir);
        result=h1===a1?'P':(isH?h1>a1:a1>h1)?'W':'L';
      } else if(mkt==='1INNRL'){
        const inn1=(ls?.innings||[])[0];
        if(!inn1&&!isFinal) continue;
        const h1=parseInt(inn1?.home?.runs)||0,a1=parseInt(inn1?.away?.runs)||0;
        const isH=isTeamHome(t.dir);
        const diff=(isH?h1-a1:a1-h1)+line;
        result=diff>0?'W':diff<0?'L':'P';
      } else if(mkt==='1HTOTAL'||mkt==='F5TOTAL'){
      const {h,a,ok}=f5runs(); if(!ok) continue;
      const tot=h+a;
      result=tot>line?(t.dir==='OVER'?'W':'L'):tot<line?(t.dir==='UNDER'?'W':'L'):'P';
      t.finalTotal=tot;
    } else if(mkt==='1HTT'||mkt==='F5TT'){
      const {h,a,ok}=f5runs(); if(!ok) continue;
      const isH=betTeamIsHome(t.team);
      const runs=isH?h:a;
      result=runs>line?(t.dir==='OVER'?'W':'L'):runs<line?(t.dir==='UNDER'?'W':'L'):'P';
      t.finalTotal=runs;
    } else if(mkt==='1HML'||mkt==='F5ML'){
      const {h,a,ok}=f5runs(); if(!ok) continue;
      const isH=isTeamHome(t.dir);
      result=h===a?'P':(isH?h>a:a>h)?'W':'L';
    } else if(mkt==='1HRL'||mkt==='F5RL'){
      const {h,a,ok}=f5runs(); if(!ok) continue;
      const isH=isTeamHome(t.dir);
      const diff=(isH?h-a:a-h)+line;
      result=diff>0?'W':diff<0?'L':'P';
    }
    if(result){ t.result=result; graded++; }
  }
  localStorage.setItem('batxEvTracker',JSON.stringify(tracker));
  setStatus(graded+' bets graded!');
}

function trackSelectedPlays(){
  const checked=[...document.querySelectorAll('.parser-check:checked')];
  if(!checked.length){alert('Select at least one play');return;}
  let added=0;
  for(const cb of checked){
    const p=window._parsedPlays?.find(x=>x._id===cb.value);
    if(!p) continue;
    const rawG=p.game||p.tm||'';
    const gp=rawG.toUpperCase().split(/[/@]/);
    const label=(p.mktType==='TT'||p.mktType==='1HTT')?(p.team||p.tm):p.tm;
    const gameLabel=label+' '+p.dir+(p.line!=null?' '+p.line:'');
    if(tracker.find(t=>t.game===gameLabel&&t.date===p.date&&t.market===p.mktType)) continue;
    const best=p.books?.[0]||{};
    const entry={
      id:Date.now()+added,
      date:p.date,time:p.time,
      game:gameLabel,rawGame:rawG,
      awayTeam:(gp[0]||'').replace(/[^A-Z]/g,''),
      homeTeam:(gp[1]||'').replace(/[^A-Z]/g,''),
      team:p.team||null,
      dir:p.dir,tm:p.tm,
      market:p.mktType,marketLabel:p.market||p.mktType,
      book:best.book||p.book||'',
      odds:best.odds||p.over_odds||p.under_odds,
      line:p.line,proj:p.proj||p.batx_proj,
      roi:best.roi||p.roi,
      fairPrice:p.fairPrice||p.fair_price||null,
      tracked_at:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
      result:'',books:p.books||[]
    };
    tracker.unshift(entry);
    added++;
  }
  if(added){
    localStorage.setItem('batxEvTracker',JSON.stringify(tracker));
    parserSetStatus(added+' plays added to tracker!');
    document.querySelectorAll('.parser-check').forEach(cb=>cb.checked=false);
    renderTracker();
    setTab('dashboard');
  } else {
    parserSetStatus('All selected plays already tracked');
  }
}



// ── RAW GAMESHEET INPUT ──
const MARKET_MAP = {
  'game total':      'Game Total',
  'team total':      'Team Total',
  'f5 total':        'F5 Total',
  'f5 tt':           'F5 TT',
  'f5 ml':           'F5 ML',
  'f5 rl':           'F5 RL',
  '1h game total':   '1H Total',
  '1h total':        '1H Total',
  '1h team total':   '1H TT',
  '1h tt':           '1H TT',
  '1h moneyline':    '1H ML',
  '1h ml':           '1H ML',
  '1h run line':     '1H RL',
  '1h rl':           '1H RL',
  '1inn game total': '1H Total',
  '1inn total':      '1H Total',
  '1inn tt':         '1H TT',
  '1inn team total': '1H TT',
  '1inn ml':         '1H ML',
  '1inn moneyline':  '1H ML',
  '1inn rl':         '1H RL',
  '1inn run line':   '1H RL',
};
function parseEV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  for (let i = 0; i < lines.length; i++) {
    const parts = lines[i].split(/\t/);
    if (parts.length < 10) continue;
    const book = BOOKS.find(b => b.toLowerCase() === parts[0].trim().toLowerCase());
    if (!book) continue;
    const marketRaw = (parts[3] || '').trim();
    const marketKey = MARKET_MAP[marketRaw.toLowerCase()];
    if (!marketKey) continue;

    const date     = (parts[1] || '').trim();
    const time     = (parts[2] || '').trim();
    const teamFull = (parts[4] || '').trim();
    const gameRaw  = (parts[6] || '').trim();

    // For ML/RL markets the column layout is slightly different
    const isMLRL = marketKey === 'F5 ML' || marketKey === 'F5 RL' || marketKey === '1H ML' || marketKey === '1H RL';

    let over = {}, under = {}, batx = null, suggested = null, fair = null, winPct = null, ev = null, roi = null;

    if (isMLRL) {
      const isRL = marketKey === 'F5 RL' || marketKey === '1H RL';
      if (isRL) {
        // RL: col 9 = spread field e.g. "+0.5 (-105)"
        const spreadRaw = (parts[9] || '').trim();
        const spreadMatch = spreadRaw.match(/^([+-][\d.]+)\s*\(([+-]\d+)\)$/);
        if (spreadMatch) {
          over = { line: parseFloat(spreadMatch[1]), odds: parseInt(spreadMatch[2]) };
        }
        batx      = parts[13] ? parseFloat(parts[13]) : null;
        suggested = (parts[14] || '').trim() || null;
        fair      = parts[15] ? parseInt(parts[15]) : null;
        winPct    = parts[16] ? parseFloat(parts[16].replace('%','')) : null;
        ev        = parts[17] ? parseFloat(parts[17].replace(/[$,]/g,'')) : null;
        roi       = parts[18] ? parseFloat(parts[18].replace('%','')) : null;
      } else {
        // ML: col 12 = odds (e.g. "+130"), col 13 = batx proj, col 14 = suggested team, col 15 = fair, col 16 = win%, col 17 = ev, col 18 = roi
        const mlOdds = (parts[12] || '').trim();
        const mlMatch = mlOdds.match(/^([+-]\d+)$/);
        if (mlMatch) over = { odds: parseInt(mlMatch[1]) };
        batx      = parts[13] ? parseFloat(parts[13]) : null;
        suggested = (parts[14] || '').trim() || null;
        fair      = parts[15] ? parseInt(parts[15]) : null;
        winPct    = parts[16] ? parseFloat(parts[16].replace('%','')) : null;
        ev        = parts[17] ? parseFloat(parts[17].replace(/[$,]/g,'')) : null;
        roi       = parts[18] ? parseFloat(parts[18].replace('%','')) : null;
      }
    } else {
      over  = parseOdds(parts[10]);
      under = parseOdds(parts[11]);
      batx      = parts[13] ? parseFloat(parts[13]) : null;
      suggested = (parts[14] || '').trim() || null;
      fair      = parts[15] ? parseInt(parts[15]) : null;
      winPct    = parts[16] ? parseFloat(parts[16].replace('%','')) : null;
      ev        = parts[17] ? parseFloat(parts[17].replace(/[$,]/g,'')) : null;
      roi       = parts[18] ? parseFloat(parts[18].replace('%','')) : null;
    }

    if (!gameRaw) continue;
    const gp = gameRaw.split('@');
    // ATH@ATL = ATH away, ATL home -> store as AWAY/HOME = ATH/ATL
    const game = gp.length === 2 ? `${gp[0].trim()}/${gp[1].trim()}` : gameRaw.replace('@','/');
    const isTT = ['Team Total','F5 TT','1H TT'].includes(marketKey);
    const isML = ['F5 ML','1H ML'].includes(marketKey);
    const isRL = ['F5 RL','1H RL'].includes(marketKey);

    rows.push({
      market: marketKey, game,
      team: (isTT || isML || isRL) ? teamFull : null,
      book, date, time,
      over_line:  over.line  ?? null,
      over_odds:  over.odds  ?? null,
      under_line: under.line ?? null,
      under_odds: under.odds ?? null,
      batx_proj:  batx,
      suggested_bet: suggested,
      fair_price: fair,
      win_pct:    winPct,
      ev, roi
    });
  }
  // Normalize times: all rows for the same game get the same time
  const gameTimes = {};
  rows.forEach(r => {
    if (!r.game || !r.time) return;
    if (!gameTimes[r.game]) gameTimes[r.game] = {};
    gameTimes[r.game][r.time] = (gameTimes[r.game][r.time]||0) + 1;
  });
  const canonicalTime = {};
  Object.entries(gameTimes).forEach(([game, times]) => {
    canonicalTime[game] = Object.entries(times).sort((a,b)=>b[1]-a[1])[0][0];
  });
  const normalizedRows = rows.map(r => r.game && canonicalTime[r.game] ? {...r, time: canonicalTime[r.game]} : r);
  return normalizedRows;

}


function dedupe(rows) {
  const best = {};
  const times = {};
  rows.forEach(r => {
    const key = r.team
      ? `${r.market}|${r.team}|${r.suggested_bet}`
      : `${r.market}|${r.game}|${r.suggested_bet}`;
    // track most common time per key
    if (!times[key]) times[key] = {};
    if (r.time) times[key][r.time] = (times[key][r.time]||0) + 1;
    if (!best[key] || (r.roi ?? -Infinity) > (best[key].roi ?? -Infinity)) best[key] = r;
  });
  // assign most common time to each winner
  return Object.entries(best).map(([key, r]) => {
    if (times[key]) {
      const mostCommon = Object.entries(times[key]).sort((a,b)=>b[1]-a[1])[0];
      if (mostCommon) r = {...r, time: mostCommon[0]};
    }
    return r;
  });
}


let _rawMode = false;

function setInputMode(mode) {
  _rawMode = mode === 'raw';
  document.getElementById('batxInput').style.display = _rawMode ? 'none' : 'block';
  document.getElementById('rawInput').style.display = _rawMode ? 'block' : 'none';
  document.getElementById('rawResults').style.display = 'none';
  document.getElementById('modeJsonBtn').style.cssText = !_rawMode ? 
    'font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid var(--green);color:var(--green);background:rgba(74,222,128,0.08);cursor:pointer' :
    'font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);color:var(--muted);background:transparent;cursor:pointer';
  document.getElementById('modeRawBtn').style.cssText = _rawMode ? 
    'font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid var(--green);color:var(--green);background:rgba(74,222,128,0.08);cursor:pointer' :
    'font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:1px solid var(--border2);color:var(--muted);background:transparent;cursor:pointer';
}

function rawInputChanged() {
  clearTimeout(window._rawTimer);
  window._rawTimer = setTimeout(_parseRaw, 300);
}

function _parseRaw() {
  const ta = document.getElementById('rawInput');
  if(!ta || !ta.value.trim()) {
    document.getElementById('rawResults').style.display = 'none';
    return;
  }
  const minRoi = parseFloat(document.getElementById('minRoi').value) || 5;
  let rows = parseEV(ta.value);
  rows = rows.filter(r => (r.roi||0) >= minRoi);
  rows = dedupe(rows);
  window._rawPlays = rows.map((p,i) => ({...p, _id: String(i)}));
  
  document.getElementById('rawResults').style.display = 'block';
  document.getElementById('rawStatus').textContent = rows.length + ' plays found';
  
  const list = document.getElementById('rawPlaysList');
  if(!rows.length) {
    list.innerHTML = '<div style="padding:12px;color:var(--muted);text-align:center">No plays above ' + minRoi + '% ROI</div>';
    return;
  }
  
  list.innerHTML = rows.map((p,i) => {
    const dir = p.suggested_bet || '';
    const col = dir==='OVER' ? 'var(--green)' : dir==='UNDER' ? '#60a5fa' : 'var(--text)';
    const label = (p.market==='Team Total'||p.market==='1H TT'||p.market==='F5 TT') ? (p.team||p.tm) : p.tm;
    const mktType = p.mktType || p.market;
    const line = p.over_line ?? p.under_line;
    const odds = dir==='OVER' ? p.over_odds : dir==='UNDER' ? p.under_odds : p.over_odds;
    const already = tracker.find(t => {
      const gl = label+' '+dir+(line!=null?' '+line:'');
      const _mm = {'Game Total':'TOTAL','Team Total':'TT','1H Total':'1HTOTAL','F5 Total':'1HTOTAL','1H TT':'1HTT','F5 TT':'1HTT','1H ML':'1HML','F5 ML':'1HML','1H RL':'1HRL','F5 RL':'1HRL'};
      return t.game===gl && t.date===p.date && t.market===(_mm[p.market]||'TOTAL');
    });
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;border:1px solid ${already?'var(--border)':'var(--border2)'};background:var(--surface);margin-bottom:5px;opacity:${already?'0.5':'1'}">
      <input type="checkbox" class="raw-check" value="${i}" ${already?'disabled':''} style="width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${label} <span style="color:${col}">${dir}</span>${line!=null?' '+line:''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${p.game} · ${p.market} · ${p.date} ${p.time}</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:13px;font-weight:700">${odds!=null?(odds>0?'+':'')+odds:'—'}</div>
        <div style="font-size:11px;color:var(--green);font-weight:600">+${(p.roi||0).toFixed(1)}%</div>
      </div>
      ${already?'<div style="font-size:10px;color:var(--muted)">✓</div>':''}
    </div>`;
  }).join('');
}

function selectAllRaw() {
  document.querySelectorAll('.raw-check:not(:disabled)').forEach(cb => cb.checked = true);
}

function trackRawSelected() {
  const checked = [...document.querySelectorAll('.raw-check:checked')];
  if(!checked.length) { alert('Select at least one play'); return; }
  let added = 0;
  for(const cb of checked) {
    const p = window._rawPlays?.find(x => x._id === cb.value);
    if(!p) continue;
    const _mktMap = {'Game Total':'TOTAL','Team Total':'TT','1H Total':'1HTOTAL','F5 Total':'1HTOTAL','1H TT':'1HTT','F5 TT':'1HTT','1H ML':'1HML','F5 ML':'1HML','1H RL':'1HRL','F5 RL':'1HRL','1INN Total':'1INNTOTAL','1INN TT':'1INNTT','1INN ML':'1INNML','1INN RL':'1INNRL'};
    const mktType = _mktMap[p.market] || 'TOTAL';
    const rawG = p.game || p.tm || '';
    const gp = rawG.toUpperCase().split(/[/@]/);
    const dir = p.suggested_bet || '';
    const label = (p.market==='Team Total'||p.market==='1H TT'||p.market==='F5 TT') ? (p.team||p.tm) : p.tm;
    const line = dir==='OVER' ? p.over_line : p.under_line;
    const odds = dir==='OVER' ? p.over_odds : dir==='UNDER' ? p.under_odds : p.over_odds;
    const gameLabel = label+' '+dir+(line!=null?' '+line:'');
    if(tracker.find(t => t.game===gameLabel && t.date===p.date && t.market===p.mktType)) continue;
    const entry = {
      id: Date.now()+added,
      date: p.date, time: p.time,
      game: gameLabel, rawGame: rawG,
      awayTeam: (gp[0]||'').replace(/[^A-Z]/g,''),
      homeTeam: (gp[1]||'').replace(/[^A-Z]/g,''),
      team: p.team||null,
      dir: dir, tm: p.tm,
      market: p.mktType, marketLabel: p.market||p.mktType,
      book: p.book||'', odds: odds,
      line: line, proj: p.batx_proj,
      roi: p.roi, fairPrice: p.fair_price||null,
      tracked_at: new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),
      result: '', books: p.books||[]
    };
    tracker.unshift(entry);
    added++;
  }
  if(added) {
    localStorage.setItem('batxEvTracker', JSON.stringify(tracker));
    document.getElementById('rawStatus').textContent = added+' plays tracked!';
    document.querySelectorAll('.raw-check').forEach(cb => cb.checked = false);
    renderTracker();
  } else {
    alert('All selected plays already tracked');
  }
}


renderTracker();
populateGradeDates();
</script>
