<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NHL Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #080c14;
  --surface:   #0d1220;
  --surface2:  #111827;
  --surface3:  #182030;
  --border:    #1e2a3e;
  --border2:   #263347;
  --text:      #e4eaf6;
  --muted:     #5a6a84;
  --muted2:    #7a8fa8;
  --accent:    #3b82f6;
  --accent2:   #1d4ed8;
  --green:     #10d9a0;
  --green-dim: #0a4a38;
  --red:       #ef4444;
  --red-dim:   #5a1a1a;
  --gold:      #f59e0b;
  --gold-dim:  #5a3a08;
  --ice:       #7dd3fc;
  --navy:      #0f1929;
  --radius:    6px;
  --radius2:   10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1.25rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  font-style: italic;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo span { color: var(--ice); }
.logo svg { width: 22px; height: 22px; }

.header-tabs {
  display: flex;
  gap: 2px;
  margin-left: auto;
}
.htab {
  background: none;
  border: none;
  color: var(--muted2);
  font-family: 'Oswald', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: .08em;
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.htab:hover { color: var(--text); background: var(--surface2); }
.htab.active { color: var(--ice); background: var(--surface2); }

.header-stats {
  display: flex;
  gap: 16px;
  font-size: .8rem;
  color: var(--muted);
}
.hstat strong { color: var(--text); font-family: 'Oswald', sans-serif; font-size: 1rem; }
.hstat.green strong { color: var(--green); }
.hstat.red strong { color: var(--red); }

/* ── Layout ── */
.main { max-width: 1200px; margin: 0 auto; padding: 20px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--muted2);
}
.date-badge {
  font-size: .78rem;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 10px;
  border-radius: 99px;
}

/* ── Load bar ── */
.load-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  padding: 14px 18px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.load-bar label {
  font-size: .8rem;
  color: var(--muted2);
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.load-bar input[type=file] { display: none; }
.btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: var(--radius);
  padding: 6px 14px;
  font-family: 'Oswald', sans-serif;
  font-size: .9rem;
  font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
  white-space: nowrap;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary { background: var(--accent2); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: var(--accent); }
.btn.sm { padding: 4px 10px; font-size: .8rem; }
.btn.danger { border-color: var(--red-dim); color: var(--red); }
.btn.danger:hover { background: var(--red-dim); }

.load-status {
  font-size: .8rem;
  color: var(--muted);
}
.load-status.ok { color: var(--green); }
.load-status.err { color: var(--red); }

/* ── Games grid ── */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  overflow: hidden;
  transition: border-color .15s;
}
.game-card:hover { border-color: var(--border2); }

.game-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.game-time {
  font-size: .72rem;
  color: var(--muted);
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.game-proj-total {
  font-size: .72rem;
  color: var(--muted2);
}
.game-proj-total span { color: var(--gold); font-weight: 600; }

.game-teams {
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.team-row {
  display: grid;
  grid-template-columns: 36px 1fr auto auto auto auto;
  align-items: center;
  gap: 8px;
}
.team-abbrev {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.team-name-full {
  font-size: .75rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.win-pct {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: .88rem;
  width: 44px;
  text-align: right;
  padding: 2px 7px;
  border-radius: 4px;
  text-align: center;
}
.fair-pct {
  font-size: .72rem;
  color: var(--muted);
  width: 38px;
  text-align: right;
}
.edge-badge {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: .8rem;
  padding: 2px 7px;
  border-radius: 4px;
  min-width: 46px;
  text-align: center;
  letter-spacing: .02em;
}
.edge-badge.pos  { background: var(--green-dim); color: var(--green); }
.edge-badge.neg  { background: var(--red-dim);   color: var(--red); }
.edge-badge.zero { background: var(--surface3);  color: var(--muted); }

/* Puck line / total sub-section */
.game-markets {
  padding: 6px 12px 10px;
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--border);
}
.market-pill {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 8px;
  text-align: center;
}
.market-pill .lbl {
  font-size: .65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 2px;
}
.market-pill .val {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: .9rem;
}
.market-pill .odds {
  font-size: .72rem;
  color: var(--muted2);
}
.total-edge-val { font-size: .72rem; margin-top: 2px; }
.total-edge-val.over  { color: var(--green); }
.total-edge-val.under { color: var(--red);   }

/* Bet button */
.game-card-footer {
  padding: 0 12px 10px;
  display: flex;
  gap: 8px;
}

/* ── Bet Entry Modal ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 22px;
  width: 420px;
  max-width: 95vw;
}
.modal-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  font-size: 1.1rem;
  letter-spacing: .05em;
  margin-bottom: 16px;
  color: var(--ice);
  text-transform: uppercase;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.form-row.full { grid-template-columns: 1fr; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label {
  font-size: .72rem;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: .05em;
  font-weight: 600;
}
.form-group input,
.form-group select {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  padding: 7px 10px;
  font-family: 'Inter', sans-serif;
  font-size: .88rem;
  outline: none;
  transition: border-color .15s;
}
.form-group input:focus,
.form-group select:focus { border-color: var(--accent); }
.form-group select option { background: var(--surface2); }
.modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 14px;
  justify-content: flex-end;
}

/* ── Grade bar ── */
.grade-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius2); padding: 10px 14px; margin-bottom: 14px;
}
.grade-bar-label { font-size:.72rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap; }
.tk { background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:.78rem;padding:5px 8px;outline:none;cursor:pointer; }
.tracker-btn { font-size:.78rem;font-weight:600;padding:5px 14px;background:rgba(79,158,255,.1);border:1px solid rgba(79,158,255,.3);border-radius:var(--radius);color:var(--accent);cursor:pointer;white-space:nowrap; }
.tracker-btn:hover { background:rgba(79,158,255,.2); }
.screenshot-btn { font-size:.78rem;font-weight:600;padding:5px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted2);cursor:pointer;white-space:nowrap; }
.screenshot-btn:hover { color:var(--text); }
.danger-btn { font-size:.78rem;font-weight:600;padding:5px 12px;background:rgba(240,73,90,.08);border:1px solid rgba(240,73,90,.2);border-radius:var(--radius);color:var(--red);cursor:pointer;white-space:nowrap; }
.danger-btn:hover { background:rgba(240,73,90,.15); }
.pl-pos { color:var(--green);font-weight:600; }
.pl-neg { color:var(--red);font-weight:600; }

/* ── Track table ── */
.bet-log-wrap { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden; }
.track-head {
  display: grid;
  grid-template-columns: 78px 100px 68px 1fr 58px 58px 58px 78px 48px 80px 68px 30px;
  padding: 7px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); gap: 5px;
}
.track-head span { font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;user-select:none;white-space:nowrap;overflow:hidden; }
.track-row {
  display: grid;
  grid-template-columns: 78px 100px 68px 1fr 58px 58px 58px 78px 48px 80px 68px 30px;
  padding: 7px 14px; border-top: 1px solid var(--border); align-items: center; gap: 5px;
}
.track-row:hover { background: var(--surface2); }
.tv { font-size:.78rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.result-sel { background:var(--surface2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:.73rem;font-weight:700;padding:2px 4px;outline:none;width:100%;cursor:pointer; }
.del-btn { background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:2px 4px;border-radius:4px; }
.del-btn:hover { color:var(--red); }

/* ── Dashboard ── */
.dash-stats { display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px;margin-bottom:16px; }
.dash-stat { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 14px; }
.dash-stat-label { font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px; }
.dash-stat-val { font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;line-height:1;margin-bottom:4px; }
.dash-stat-sub { font-size:.68rem;color:var(--muted); }
.bk-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;margin-bottom:10px; }
.bk-title { font-size:.68rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border); }
.bk-head { display:grid;grid-template-columns:1fr 36px 36px 36px 55px 75px;padding:5px 14px;background:var(--surface2);border-top:1px solid var(--border); }
.bk-head span { font-size:.63rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em; }
.bk-row { display:grid;grid-template-columns:1fr 36px 36px 36px 55px 75px;padding:7px 14px;border-top:1px solid var(--border);align-items:center;font-size:.78rem; }
.bk-row:hover { background:var(--surface2); }
.bk-label { font-size:.8rem;font-weight:500; }
.bk-val { font-size:.75rem;color:var(--muted); }
.bk-val.g { color:var(--green);font-weight:600; }
.bk-val.r { color:var(--red); }
.bk-val.pos { color:var(--green);font-weight:600; }
.bk-val.neg { color:var(--red); }
.bk-grid { display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px; }
.dash-section-title { font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 6px;border-top:1px solid var(--border);margin-top:6px; }

/* ── Parser ── */
.parser-wrap { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);margin-bottom:18px;overflow:hidden; }
.parser-header { display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px; }
#pasteArea { width:100%;height:110px;background:var(--bg);border:none;border-bottom:1px solid var(--border);color:var(--muted2);font-family:'Inter',sans-serif;font-size:.78rem;padding:12px 14px;resize:vertical;outline:none;line-height:1.5; }
#pasteArea:focus { color:var(--text); }
#pasteArea::placeholder { color:var(--muted); }
.parser-footer { display:flex;align-items:center;justify-content:space-between;padding:8px 14px;flex-wrap:wrap;gap:8px; }

/* ── Odds input row ── */
.odds-inputs-row { display:flex;gap:6px;padding:8px 12px;border-top:1px solid var(--border);flex-wrap:wrap;background:var(--bg); }
.odds-input-group { display:flex;flex-direction:column;gap:3px;flex:1;min-width:52px; }
.oi-label { font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;text-align:center; }
.odds-input { background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Oswald',sans-serif;font-size:.88rem;font-weight:600;padding:4px;text-align:center;outline:none;width:100%;transition:border-color .12s;-moz-appearance:textfield; }
.odds-input::-webkit-outer-spin-button,.odds-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.odds-input:focus { border-color:var(--accent); }
.odds-input:not(:placeholder-shown) { color:var(--ice); }

/* ── empty state ── */
.empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  font-size: .9rem;
}
.empty svg { opacity: .2; margin-bottom: 10px; display: block; margin-inline: auto; }

/* toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius2);
  padding: 10px 16px;
  font-size: .85rem;
  z-index: 999;
  opacity: 0;
  transform: translateY(10px);
  transition: all .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok   { border-color: var(--green); color: var(--green); }
.toast.err  { border-color: var(--red);   color: var(--red);   }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <ellipse cx="12" cy="12" rx="10" ry="4" stroke="var(--ice)"/>
      <path d="M4 12c0 2 3.6 4 8 4s8-2 8-4" stroke="var(--ice)"/>
    </svg>
    NHL <span>Tracker</span>
  </div>

  <div class="header-stats" id="headerStats">
    <div class="hstat"><strong id="hRecord">0-0</strong> <span>record</span></div>
    <div class="hstat" id="hUnitsWrap"><strong id="hUnits">0.0u</strong> <span>units</span></div>
    <div class="hstat"><strong id="hBets">0</strong> <span>bets</span></div>
  </div>

  <div class="header-tabs">
    <button class="htab active" onclick="showPanel('games')">Games</button>
    <button class="htab" onclick="showPanel('log')">Bet Log</button>
    <button class="htab" onclick="showPanel('dash')">Dashboard</button>
  </div>
</header>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Bet Modal -->
<div class="overlay" id="betOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Log Bet</div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="bDate"/>
      </div>
      <div class="form-group">
        <label>Matchup</label>
        <input type="text" id="bMatchup" placeholder="e.g. EDM@VGK" readonly/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Market</label>
        <select id="bMarket">
          <option value="ML">Moneyline</option>
          <option value="PL">Puck Line</option>
          <option value="Total">Total (O/U)</option>
          <option value="Team Total">Team Total</option>
        </select>
      </div>
      <div class="form-group">
        <label>Side / Pick</label>
        <input type="text" id="bPick" placeholder="e.g. EDM ML or Over 6.5"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Odds</label>
        <input type="number" id="bOdds" placeholder="-110"/>
      </div>
      <div class="form-group">
        <label>Stake (units)</label>
        <input type="number" id="bStake" step="0.1" placeholder="1.0"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Edge %</label>
        <input type="number" id="bEdge" step="0.1" placeholder="auto-filled"/>
      </div>
      <div class="form-group">
        <label>Book</label>
        <input type="text" id="bBook" placeholder="FanDuel"/>
      </div>
    </div>
    <div class="form-row full">
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="bNotes" placeholder="optional"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveBet()">Save Bet</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- ── GAMES PANEL ── -->
  <div class="panel active" id="panel-games">
    <div class="section-header">
      <span class="section-title">Today's Games</span>
      <span class="date-badge" id="dateLabel">—</span>
    </div>

    <!-- Parser -->
    <div class="parser-wrap" id="parserWrap">
      <div class="parser-header">
        <span class="section-title">Paste HockeyStats</span>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-size:.75rem;color:var(--muted)">hockeystats.com/game-odds → Cmd+A → Cmd+C → paste below</span>
          <button class="btn sm" onclick="loadSample()">Load Sample</button>
        </div>
      </div>
      <textarea id="pasteArea" placeholder="Paste copied page text here…"></textarea>
      <div class="parser-footer">
        <div style="display:flex;gap:8px;align-items:center">
          <label style="font-size:.75rem;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.04em">Filter date:</label>
          <input type="date" id="filterDate" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);padding:5px 10px;font-family:Inter,sans-serif;font-size:.82rem;outline:none"/>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="load-status" id="loadStatus"></span>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let gameData   = null;
let bets       = JSON.parse(localStorage.getItem('nhl_bets') || '[]');
let modalGame  = null;
let sortField  = 'date';
let sortAsc    = false;

function setLoadStatus(msg, cls='') {
  const el = document.getElementById('loadStatus');
  el.textContent = msg;
  el.className   = 'load-status ' + cls;
}

// ── Panel switching ──────────────────────────────────────────────────────────
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.htab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.querySelectorAll('.htab').forEach(t => {
    if (t.textContent.toLowerCase().includes(id)) t.classList.add('active');
  });
  if (id === 'log')  { renderLog(); populateGradeDates(); }
  if (id === 'dash') renderDash();
}

// ── Parser ───────────────────────────────────────────────────────────────────
const HS_NORM   = { 'T.B':'TB', 'N.J':'NJ', 'L.A':'LA', 'S.J':'SJ' };
const MONTH_MAP = {
  'January':'01','February':'02','March':'03','April':'04',
  'May':'05','June':'06','July':'07','August':'08',
  'September':'09','October':'10','November':'11','December':'12'
};
const TEAM_NAMES = {
  'BUF':'Buffalo Sabres',    'OTT':'Ottawa Senators',    'PIT':'Pittsburgh Penguins',
  'TB': 'Tampa Bay',         'BOS':'Boston Bruins',       'FLA':'Florida Panthers',
  'MTL':'Montreal',          'NYR':'NY Rangers',          'DET':'Detroit Red Wings',
  'PHI':'Philadelphia',      'CBJ':'Columbus',            'CAR':'Carolina',
  'WSH':'Washington',        'NJ': 'New Jersey',          'WPG':'Winnipeg Jets',
  'DAL':'Dallas Stars',      'VAN':'Vancouver',           'MIN':'Minnesota Wild',
  'CHI':'Chicago',           'EDM':'Edmonton Oilers',     'CGY':'Calgary Flames',
  'VGK':'Vegas Golden Knts', 'TOR':'Toronto',             'SJ': 'San Jose Sharks',
  'UTA':'Utah HC',           'SEA':'Seattle Kraken',      'NSH':'Nashville',
  'LA': 'Los Angeles Kings', 'STL':'St. Louis Blues',     'ANA':'Anaheim Ducks',
  'NYI':'NY Islanders',      'COL':'Colorado Avalanche',
};

function runParser() {
  const raw = document.getElementById('pasteArea').value.trim();
  if (!raw) { setLoadStatus('Nothing pasted', 'err'); return; }

  const filterInput = document.getElementById('filterDate').value;
  const lines       = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const allGames    = [];
  const thisYear    = new Date().getFullYear();

  let curDate       = null;
  let curTime       = null;
  let pendingAbbrev = null;  // last abbrev line seen
  let awayAbbrev    = null;  // away locked, waiting for home
  let awayPct       = null;

  for (const line of lines) {
    // Date heading "April 2"
    const dateM = line.match(/^(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{1,2})$/);
    if (dateM) {
      curDate = `${thisYear}-${MONTH_MAP[dateM[1]]}-${dateM[2].padStart(2,'0')}`;
      curTime = pendingAbbrev = awayAbbrev = awayPct = null;
      continue;
    }

    // Time "7:00 PM EDT"
    // Only reset awayAbbrev if previous game completed (awayAbbrev==null means clean state)
    // If awayAbbrev is set when we hit a new time, the prior game was incomplete — discard it
    const timeM = line.match(/^(\d{1,2}:\d{2}\s*(?:AM|PM)\s*\w{2,4})$/i);
    if (timeM) {
      curTime       = timeM[1];
      pendingAbbrev = null;
      awayAbbrev    = null;  // discard any incomplete game
      awayPct       = null;
      continue;
    }

    // Skip noise
    if (line.endsWith('logo')) continue;
    if (/^\d+ Games$/.test(line)) continue;
    if (/^(©|Privacy|Contact|Terms|NHL and|HOCKEYSTATS|Hate|Game odds|Full game|4\/\d|A RAPTIVE|\d+\.\d+$)/.test(line)) continue;

    // Abbrev line "BUF" or "T.B" or "N.J"
    const abbrevM = line.match(/^([A-Z]{1,3}(?:\.[A-Z])?)$/);
    if (abbrevM) { pendingAbbrev = HS_NORM[abbrevM[1]] || abbrevM[1]; continue; }

    // Pct line "48%"
    const pctM = line.match(/^(\d{2})%$/);
    if (pctM && pendingAbbrev) {
      const pct = parseInt(pctM[1]);
      if (awayAbbrev === null) {
        awayAbbrev = pendingAbbrev;
        awayPct    = pct;
      } else {
        if (curDate && curTime)
          allGames.push({ date:curDate, time:curTime, away:awayAbbrev, home:pendingAbbrev, away_pct:awayPct, home_pct:pct });
        awayAbbrev = awayPct = null;
      }
      pendingAbbrev = null;
      continue;
    }
  }

  if (!allGames.length) { setLoadStatus('No games found — check paste', 'err'); return; }

  let targetDate = filterInput;
  if (!targetDate) {
    const todayStr = new Date().toISOString().slice(0,10);
    targetDate = allGames.find(g => g.date === todayStr) ? todayStr : allGames[0].date;
    document.getElementById('filterDate').value = targetDate;
  }

  const filtered = allGames.filter(g => g.date === targetDate);
  if (!filtered.length) { setLoadStatus(`No games on ${targetDate}`, 'err'); return; }

  _buildGameData(filtered, targetDate);
  const uniqueDates = [...new Set(allGames.map(g => g.date))].sort();
  renderDatePills(uniqueDates, targetDate, allGames);
  document.getElementById('dateLabel').textContent = fmtDate(targetDate);
  setLoadStatus(`✓ ${filtered.length} games on ${fmtDate(targetDate)}`, 'ok');
  renderGames();
}

function _buildGameData(games, date) {
  gameData = {
    generated: date,
    games: games.map(g => ({
      away:      g.away,
      home:      g.home,
      away_name: TEAM_NAMES[g.away] || g.away,
      home_name: TEAM_NAMES[g.home] || g.home,
      time:      g.time,
      hs_away_pct: g.away_pct,
      hs_home_pct: g.home_pct,
      away_ml:null, home_ml:null, spread_line:null, spread_ml_away:null,
      spread_ml_home:null, total_line:null, over_odds:null, under_odds:null,
      fair_away_pct:null, fair_home_pct:null, ml_edge_away:null, ml_edge_home:null,
      total_edge:null, proj_total:null, proj_away_goals:null, proj_home_goals:null, book:null,
    }))
  };
}

function fmtDate(iso) {
  const [,m,d] = iso.split('-');
  return `${'Jan Feb Mar Apr May Jun Jul Aug Sep Oct Nov Dec'.split(' ')[parseInt(m)-1]} ${parseInt(d)}`;
}

let _allParsedGames = [];
function renderDatePills(dates, active, allGames) {
  _allParsedGames = allGames;
  let wrap = document.getElementById('datePills');
  if (!wrap) {
    wrap = document.createElement('div');
    wrap.id = 'datePills';
    wrap.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;';
    document.getElementById('gamesContainer').before(wrap);
  }
  wrap.innerHTML = dates.map(d =>
    `<button class="btn sm ${d===active?'primary':''}" onclick="switchDate('${d}')">${fmtDate(d)}</button>`
  ).join('');
}

function switchDate(targetDate) {
  if (!_allParsedGames.length) return;
  const filtered = _allParsedGames.filter(g => g.date === targetDate);
  _buildGameData(filtered, targetDate);
  document.getElementById('filterDate').value = targetDate;
  document.getElementById('dateLabel').textContent = fmtDate(targetDate);
  setLoadStatus(`✓ ${filtered.length} games on ${fmtDate(targetDate)}`, 'ok');
  const uniqueDates = [...new Set(_allParsedGames.map(g => g.date))].sort();
  renderDatePills(uniqueDates, targetDate, _allParsedGames);
  renderGames();
}



// ── Sample data ──────────────────────────────────────────────────────────────

// ── Render Games ─────────────────────────────────────────────────────────────
const EDGE_THRESH = 2.0;

function renderGames() {
  const c = document.getElementById('gamesContainer');
  if (!gameData || !gameData.games.length) {
    c.innerHTML = '<div class="empty">No games found in data.</div>';
    return;
  }

  // Show odds toolbar
  document.getElementById('oddsToolbar').style.display = 'flex';

  // Sort: highest edge first, then no-odds games by time
  const sorted = [...gameData.games].sort((a, b) => {
    const edgeA = Math.max(a.ml_edge_away ?? -99, a.ml_edge_home ?? -99);
    const edgeB = Math.max(b.ml_edge_away ?? -99, b.ml_edge_home ?? -99);
    // Both have odds — sort by best edge desc
    if (edgeA !== -99 || edgeB !== -99) return edgeB - edgeA;
    return 0;
  });

  const grid = document.createElement('div');
  grid.className = 'games-grid';

  sorted.forEach((g, displayIdx) => {
    // Keep original idx for DOM IDs (use original game index for live edit refs)
    const origIdx = gameData.games.indexOf(g);
    const card = document.createElement('div');
    card.className = 'game-card';
    card.id = `card-${origIdx}`;
    card.innerHTML = buildCardHTML(g, origIdx);
    grid.appendChild(card);
  });

  c.innerHTML = '';
  c.appendChild(grid);
  refreshEVAlert();
}

function buildCardHTML(g, idx) {
  const awayEdge = g.ml_edge_away;
  const homeEdge = g.ml_edge_home;
  const hasEdge  = (awayEdge != null && awayEdge >= EDGE_THRESH) || (homeEdge != null && homeEdge >= EDGE_THRESH);

  // Best book per side
  const awayBook = g.book_away_ml || g.book || null;
  const homeBook = g.book_home_ml || g.book || null;
  const bookDisplay = awayBook || homeBook
    ? `${awayBook || homeBook}${awayBook && homeBook && awayBook !== homeBook ? ' / ' + homeBook : ''}`
    : '—';

  return `
    <div class="game-card-header" style="${hasEdge ? 'border-bottom-color:rgba(16,217,160,.25);' : ''}">
      <span class="game-time">${g.time || '—'}</span>
      ${hasEdge ? `<span style="font-family:'Oswald',sans-serif;font-weight:700;font-size:.72rem;color:var(--green);letter-spacing:.06em;text-transform:uppercase;">⚡ +EV</span>` : ''}
    </div>
    <div class="game-teams">
      <div style="display:grid;grid-template-columns:36px 1fr auto auto auto auto;gap:8px;padding:2px 12px 4px;border-bottom:1px solid var(--border);">
        <span></span><span></span>
        <span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;min-width:38px;text-align:right;">Win%</span>
        <span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;min-width:42px;text-align:right;">Model</span>
        <span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;min-width:42px;text-align:right;">Market</span>
        <span style="font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;min-width:42px;text-align:center;">Edge</span>
      </div>
      ${teamRow(g, 'away', idx)}
      ${teamRow(g, 'home', idx)}
    </div>
    <div class="odds-inputs-row">
      <div class="odds-input-group">
        <div class="oi-label">Away ML</div>
        <input class="odds-input" type="number" placeholder="—" value="${g.away_ml ?? ''}"
          onchange="updateOdds(${idx},'away_ml',this.value)" oninput="updateOdds(${idx},'away_ml',this.value)"/>
      </div>
      <div class="odds-input-group">
        <div class="oi-label">Home ML</div>
        <input class="odds-input" type="number" placeholder="—" value="${g.home_ml ?? ''}"
          onchange="updateOdds(${idx},'home_ml',this.value)" oninput="updateOdds(${idx},'home_ml',this.value)"/>
      </div>
      <div class="odds-input-group">
        <div class="oi-label">PL Away</div>
        <input class="odds-input" type="number" placeholder="—" value="${g.spread_ml_away ?? ''}"
          onchange="updateOdds(${idx},'spread_ml_away',this.value)" oninput="updateOdds(${idx},'spread_ml_away',this.value)"/>
      </div>
      <div class="odds-input-group">
        <div class="oi-label">PL Home</div>
        <input class="odds-input" type="number" placeholder="—" value="${g.spread_ml_home ?? ''}"
          onchange="updateOdds(${idx},'spread_ml_home',this.value)" oninput="updateOdds(${idx},'spread_ml_home',this.value)"/>
      </div>
      <div class="odds-input-group">
        <div class="oi-label">Total</div>
        <input class="odds-input" type="number" step="0.5" placeholder="—" value="${g.total_line ?? ''}"
          onchange="updateOdds(${idx},'total_line',this.value)" oninput="updateOdds(${idx},'total_line',this.value)"/>
      </div>
    </div>
    <div style="padding:5px 12px 8px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <span style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;">Book</span>
      <span id="book-${idx}" style="font-size:.78rem;color:${awayBook||homeBook?'var(--ice)':'var(--muted)'};font-family:'Oswald',sans-serif;font-weight:600;">${bookDisplay}</span>
    </div>`;
}

function teamRow(g, side, idx) {
  const abbrev    = g[side];
  const name      = g[side + '_name'] || abbrev;
  const pct       = g['hs_' + side + '_pct'];
  const edge      = g['ml_edge_' + side];
  const mktML     = g[side + '_ml'];
  const modelOdds = pct != null ? probToML(pct / 100) : null;

  const hasValue  = modelOdds != null && mktML != null && mktML > modelOdds;
  const modelOddsStr = modelOdds != null ? mlFmt(modelOdds) : '—';
  const mktStr       = mktML    != null ? mlFmt(mktML)      : '—';

  const edgeCls = edge == null ? 'zero' : edge >= EDGE_THRESH ? 'pos' : edge <= -EDGE_THRESH ? 'neg' : 'zero';
  const edgeTxt = edge == null ? '—' : (edge > 0 ? '+' : '') + edge.toFixed(1) + '%';

  // Win% badge — HockeyStats style: teal bg for favorites (≥50%), red for underdogs
  const isFav   = pct != null && pct >= 50;
  const pctBg   = pct == null ? 'var(--surface3)' : pct >= 60 ? 'rgba(16,217,160,.18)' : pct <= 40 ? 'rgba(239,68,68,.18)' : 'rgba(125,211,252,.1)';
  const pctClr  = pct == null ? 'var(--muted)' : pct >= 60 ? 'var(--green)' : pct <= 40 ? 'var(--red)' : 'var(--ice)';

  const modelStyle = hasValue
    ? 'color:var(--green);font-weight:700;'
    : 'color:var(--muted2);';
  const mktStyle = hasValue
    ? 'color:var(--text);font-weight:700;'
    : 'color:var(--muted);';

  const valueTag = hasValue
    ? `<span style="font-size:.58rem;background:rgba(16,217,160,.15);color:var(--green);border:1px solid rgba(16,217,160,.3);border-radius:3px;padding:1px 5px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;margin-left:2px;">VAL</span>`
    : '';

  return `
    <div class="team-row">
      <span class="team-abbrev">${abbrev}</span>
      <span class="team-name-full">${name}</span>
      <span class="win-pct" style="background:${pctBg};color:${pctClr};">${pct ?? '—'}%</span>
      <span style="${modelStyle}font-family:'Oswald',sans-serif;font-size:.9rem;min-width:44px;text-align:right;" id="model-${side}-${idx}" title="Model fair odds">${modelOddsStr}</span>
      <span style="${mktStyle}font-family:'Oswald',sans-serif;font-size:.9rem;min-width:44px;text-align:right;" id="mkt-${side}-${idx}" title="Best market price">${mktStr}${valueTag}</span>
      <span class="edge-badge ${edgeCls}" id="edge-${side}-${idx}">${edgeTxt}</span>

// ── Live odds editing ─────────────────────────────────────────────────────────
function updateOdds(idx, field, val) {
  const g   = gameData.games[idx];
  const num = val === '' ? null : parseInt(val);
  g[field]  = num;
  recomputeEdge(g);

  // Re-render just the edge badges + card border without full redraw
  const awayEdge = g.ml_edge_away;
  const homeEdge = g.ml_edge_home;

  for (const side of ['away','home']) {
    const edge      = g['ml_edge_' + side];
    const badge     = document.getElementById(`edge-${side}-${idx}`);
    const mktEl     = document.getElementById(`mkt-${side}-${idx}`);
    const modelEl   = document.getElementById(`model-${side}-${idx}`);
    const mktML     = g[side + '_ml'];
    const pct       = g['hs_' + side + '_pct'];
    const modelOdds = pct != null ? probToML(pct / 100) : null;
    const hasValue  = modelOdds != null && mktML != null && mktML > modelOdds;

    if (badge) {
      badge.textContent = edge == null ? '—' : (edge > 0 ? '+' : '') + edge.toFixed(1) + '%';
      badge.className   = 'edge-badge ' + (edge == null ? 'zero' : edge >= EDGE_THRESH ? 'pos' : edge <= -EDGE_THRESH ? 'neg' : 'zero');
    }
    if (modelEl) {
      modelEl.textContent = modelOdds != null ? mlFmt(modelOdds) : '—';
      modelEl.style.cssText = hasValue
        ? 'color:var(--green);font-weight:700;font-family:Oswald,sans-serif;font-size:.9rem;min-width:44px;text-align:right;'
        : 'color:var(--muted2);font-family:Oswald,sans-serif;font-size:.9rem;min-width:44px;text-align:right;';
    }
    if (mktEl) {
      const valTag = hasValue
        ? `<span style="font-size:.58rem;background:rgba(16,217,160,.15);color:var(--green);border:1px solid rgba(16,217,160,.3);border-radius:3px;padding:1px 5px;font-family:'Oswald',sans-serif;font-weight:600;letter-spacing:.04em;margin-left:2px;">VAL</span>`
        : '';
      mktEl.innerHTML = (mktML != null ? mlFmt(mktML) : '—') + valTag;
      mktEl.style.cssText = hasValue
        ? 'color:var(--text);font-weight:700;font-family:Oswald,sans-serif;font-size:.9rem;min-width:44px;text-align:right;'
        : 'color:var(--muted);font-family:Oswald,sans-serif;font-size:.9rem;min-width:44px;text-align:right;';
    }
  }

  // Update card border + EV badge + footer button
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    const hasEdge = (awayEdge != null && awayEdge >= EDGE_THRESH) || (homeEdge != null && homeEdge >= EDGE_THRESH);
    card.style.borderColor = hasEdge ? 'var(--green)' : '';

    // Update EV header badge
    const header = card.querySelector('.game-card-header');
    let evBadge  = header ? header.querySelector('.ev-badge') : null;
    if (hasEdge && !evBadge && header) {
      evBadge = document.createElement('span');
      evBadge.className = 'ev-badge';
      evBadge.style.cssText = "font-family:'Oswald',sans-serif;font-weight:700;font-size:.72rem;color:var(--green);letter-spacing:.06em;text-transform:uppercase;";
      evBadge.textContent = '⚡ +EV';
      header.appendChild(evBadge);
    } else if (!hasEdge && evBadge) {
      evBadge.remove();
    }

    // Update book display
    const bookEl = document.getElementById(`book-${idx}`);
    if (bookEl) {
      const bk = g.book_away_ml || g.book_home_ml || g.book || null;
      bookEl.textContent = bk || '—';
      bookEl.style.color = bk ? 'var(--ice)' : 'var(--muted)';
    }
  }

  refreshEVAlert();
}

function recomputeEdge(g) {
  if (g.away_ml != null && g.home_ml != null) {
    const ra = mlToImplied(g.away_ml), rh = mlToImplied(g.home_ml);
    const [fa, fh] = devigify(ra, rh);
    g.fair_away_pct   = round1(fa * 100);
    g.fair_home_pct   = round1(fh * 100);
    g.ml_edge_away    = round1(g.hs_away_pct - fa * 100);
    g.ml_edge_home    = round1(g.hs_home_pct - fh * 100);
  } else {
    g.fair_away_pct = g.fair_home_pct = g.ml_edge_away = g.ml_edge_home = null;
  }
  if (g.proj_total != null && g.total_line != null) {
    g.total_edge = round2(g.proj_total - g.total_line);
  }
}

function mlToImplied(ml) {
  return ml > 0 ? 100 / (ml + 100) : Math.abs(ml) / (Math.abs(ml) + 100);
}
function probToML(p) {
  if (p <= 0 || p >= 1) return null;
  return p >= 0.5
    ? Math.round(-(p / (1 - p)) * 100)
    : Math.round(((1 - p) / p) * 100);
}
function devigify(p1, p2) {
  const t = p1 + p2; return [p1/t, p2/t];
}
function round1(n) { return Math.round(n * 10) / 10; }
function round2(n) { return Math.round(n * 100) / 100; }

function refreshEVAlert() {
  const evGames = gameData?.games.filter(g =>
    (g.ml_edge_away != null && g.ml_edge_away >= EDGE_THRESH) ||
    (g.ml_edge_home != null && g.ml_edge_home >= EDGE_THRESH)
  ) || [];
  const bar = document.getElementById('evAlertBar');
  if (!bar) return;
  if (evGames.length) {
    bar.style.display = 'block';
    bar.textContent   = `⚡ ${evGames.length} +EV game${evGames.length > 1 ? 's' : ''} today`;
  } else {
    bar.style.display = 'none';
  }
}

// ── Fetch Odds API ────────────────────────────────────────────────────────────
const ODDS_API_KEY = 'c9cb14ff8cfbecf9e6d4481b19ac2371';
const BOOKS = ['pinnacle','fanduel','draftkings','betmgm','bovada','betonline_ag','mybookieag','williamhill_us','pointsbetus'];

async function fetchOdds() {
  if (!gameData?.games.length) { toast('Parse games first', 'err'); return; }
  const btn = document.getElementById('fetchOddsBtn');
  const status = document.getElementById('oddsStatus');
  btn.textContent = '⏳ Fetching…';
  btn.disabled = true;
  status.textContent = '';

  try {
    const url = `https://api.the-odds-api.com/v4/sports/icehockey_nhl/odds?apiKey=${ODDS_API_KEY}&regions=us,us2&markets=h2h,spreads,totals&bookmakers=${BOOKS.join(',')}&oddsFormat=american&dateFormat=iso`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`API error ${resp.status}`);
    const data = await resp.json();

    let filled = 0;
    gameData.games.forEach((g, idx) => {
      const match = findOddsMatch(g, data);
      if (!match) return;
      applyBestOdds(g, match);
      recomputeEdge(g);
      filled++;
    });

    // Auto-log all +EV bets (≥2% edge) that aren't already logged today
    const today = gameData.generated;
    let autoLogged = 0;
    gameData.games.forEach(g => {
      [['away', g.ml_edge_away, g.away_ml, g.book_away_ml],
       ['home', g.ml_edge_home, g.home_ml, g.book_home_ml]].forEach(([side, edge, odds, book]) => {
        if (edge == null || edge < EDGE_THRESH || odds == null) return;
        const pick    = `${g[side]} ML`;
        const matchup = `${g.away}@${g.home}`;
        // Skip if already logged today for this matchup+pick
        const exists  = bets.some(b => b.date===today && b.matchup===matchup && b.pick===pick);
        if (exists) return;
        const modelOdds = probToML((g['hs_'+side+'_pct']||0)/100);
        bets.unshift({
          id:         Date.now() + Math.random(),
          date:       today,
          matchup,
          market:     'ML',
          pick,
          odds,
          stake:      1,
          edge:       round1(edge),
          book:       book || g.book || '—',
          modelOdds,
          notes:      'auto',
          result:     'pending',
          pl:         null,
        });
        autoLogged++;
      });
    });

    if (autoLogged) { saveBets(); updateHeader(); }

    renderGames();
    const evCount = gameData.games.filter(g => (g.ml_edge_away>=EDGE_THRESH)||(g.ml_edge_home>=EDGE_THRESH)).length;
    status.textContent = `✓ ${filled}/${gameData.games.length} games filled · ${evCount} +EV${autoLogged ? ` · ${autoLogged} auto-logged` : ''}`;
    status.style.color = 'var(--green)';
    toast(`${filled} games filled${autoLogged ? `, ${autoLogged} +EV auto-logged` : ''}`, 'ok');
  } catch(e) {
    status.textContent = 'Odds API failed: ' + e.message;
    status.style.color = 'var(--red)';
    toast('Odds fetch failed', 'err');
  }

  btn.textContent = '⚡ Fetch Best Odds';
  btn.disabled = false;
}

// Full name lookup for Odds API matching — keyed by abbrev
const ODDS_FULL_NAMES = {
  'BUF':'Buffalo Sabres',        'OTT':'Ottawa Senators',
  'PIT':'Pittsburgh Penguins',   'TB': 'Tampa Bay Lightning',
  'BOS':'Boston Bruins',         'FLA':'Florida Panthers',
  'MTL':'Montreal Canadiens',    'NYR':'New York Rangers',
  'DET':'Detroit Red Wings',     'PHI':'Philadelphia Flyers',
  'CBJ':'Columbus Blue Jackets', 'CAR':'Carolina Hurricanes',
  'WSH':'Washington Capitals',   'NJ': 'New Jersey Devils',
  'WPG':'Winnipeg Jets',         'DAL':'Dallas Stars',
  'VAN':'Vancouver Canucks',     'MIN':'Minnesota Wild',
  'CHI':'Chicago Blackhawks',    'EDM':'Edmonton Oilers',
  'CGY':'Calgary Flames',        'VGK':'Vegas Golden Knights',
  'TOR':'Toronto Maple Leafs',   'SJ': 'San Jose Sharks',
  'UTA':'Utah Hockey Club',      'SEA':'Seattle Kraken',
  'NSH':'Nashville Predators',   'LA': 'Los Angeles Kings',
  'STL':'St. Louis Blues',       'ANA':'Anaheim Ducks',
  'NYI':'New York Islanders',    'COL':'Colorado Avalanche',
};

function findOddsMatch(g, oddsData) {
  const awayFull = ODDS_FULL_NAMES[g.away];
  const homeFull = ODDS_FULL_NAMES[g.home];
  return oddsData.find(od =>
    od.away_team === awayFull && od.home_team === homeFull
  ) || oddsData.find(od =>
    // fallback: partial match on first word of team name
    od.away_team?.split(' ').pop() === awayFull?.split(' ').pop() &&
    od.home_team?.split(' ').pop() === homeFull?.split(' ').pop()
  );
}

function applyBestOdds(g, odGame) {
  let bestAwayML = null, bestHomeML = null, bestAwayMLBook = null, bestHomeMLBook = null;
  let bestSpreadLineAway = null, bestSpreadMLAway = null, bestSpreadMLHome = null;
  let bestTotalLine = null, bestOverOdds = null, bestUnderOdds = null;

  for (const bm of odGame.bookmakers || []) {
    for (const mkt of bm.markets || []) {
      if (mkt.key === 'h2h') {
        for (const o of mkt.outcomes) {
          if (o.name === odGame.away_team && (bestAwayML === null || betterOdds(o.price, bestAwayML))) {
            bestAwayML = o.price; bestAwayMLBook = bm.key;
          }
          if (o.name === odGame.home_team && (bestHomeML === null || betterOdds(o.price, bestHomeML))) {
            bestHomeML = o.price; bestHomeMLBook = bm.key;
          }
        }
      }
      if (mkt.key === 'spreads') {
        for (const o of mkt.outcomes) {
          if (o.name === odGame.away_team && (bestSpreadMLAway === null || betterOdds(o.price, bestSpreadMLAway))) {
            bestSpreadMLAway = o.price; bestSpreadLineAway = o.point;
          }
          if (o.name === odGame.home_team && (bestSpreadMLHome === null || betterOdds(o.price, bestSpreadMLHome))) {
            bestSpreadMLHome = o.price;
          }
        }
      }
      if (mkt.key === 'totals') {
        for (const o of mkt.outcomes) {
          if (o.name === 'Over'  && (bestOverOdds  === null || betterOdds(o.price, bestOverOdds)))  { bestOverOdds  = o.price; bestTotalLine = o.point; }
          if (o.name === 'Under' && (bestUnderOdds === null || betterOdds(o.price, bestUnderOdds))) bestUnderOdds = o.price;
        }
      }
    }
  }

  if (bestAwayML   != null) g.away_ml = bestAwayML;
  if (bestHomeML   != null) g.home_ml = bestHomeML;
  if (bestSpreadMLAway != null) { g.spread_line = bestSpreadLineAway; g.spread_ml_away = bestSpreadMLAway; }
  if (bestSpreadMLHome != null) g.spread_ml_home = bestSpreadMLHome;
  if (bestTotalLine    != null) { g.total_line = bestTotalLine; g.over_odds = bestOverOdds; g.under_odds = bestUnderOdds; }

  // Store book per side so card can show it
  g.book_away_ml = bestAwayMLBook;
  g.book_home_ml = bestHomeMLBook;
  g.book = bestAwayMLBook || bestHomeMLBook || null;
}

function betterOdds(newPrice, curPrice) {
  // Higher payout = better. For favorites (negative) less negative = better, for dogs higher = better
  return newPrice > curPrice;
}

// ── Quick log EV bets ─────────────────────────────────────────────────────────
function quickLogEV(idx) {
  const g = gameData.games[idx];
  const evSides = [];
  if (g.ml_edge_away != null && g.ml_edge_away >= EDGE_THRESH)
    evSides.push({ pick: `${g.away} ML`, odds: g.away_ml, edge: g.ml_edge_away });
  if (g.ml_edge_home != null && g.ml_edge_home >= EDGE_THRESH)
    evSides.push({ pick: `${g.home} ML`, odds: g.home_ml, edge: g.ml_edge_home });

  if (!evSides.length) { openBetIdx(idx); return; }

  // If one side, open modal pre-filled
  const side = evSides[0];
  openBetIdx(idx, side.pick, side.odds, side.edge);
}

function openBetIdx(idx, prefillPick, prefillOdds, prefillEdge) {
  const g = gameData.games[idx];
  openBet(g, prefillPick, prefillOdds, prefillEdge);
}

function mlFmt(ml) {
  if (ml == null) return '—';
  return ml > 0 ? '+' + ml : '' + ml;
}
function puckFmt(line, ml) {
  if (line == null) return '—';
  const lineStr = line > 0 ? '+' + line : '' + line;
  return `${lineStr} (${mlFmt(ml)})`;
}

function openBet(g, prefillPick, prefillOdds, prefillEdge) {
  modalGame = g;
  document.getElementById('bDate').value    = gameData?.generated || new Date().toISOString().slice(0,10);
  document.getElementById('bMatchup').value = `${g.away}@${g.home}`;
  document.getElementById('bPick').value    = prefillPick || '';
  document.getElementById('bOdds').value    = prefillOdds || '';
  document.getElementById('bStake').value   = '1';
  document.getElementById('bEdge').value    = prefillEdge != null ? prefillEdge.toFixed(1) : '';
  document.getElementById('bBook').value    = g.book || '';
  document.getElementById('bNotes').value   = '';
  document.getElementById('modalTitle').textContent = `Log Bet — ${g.away} @ ${g.home}`;
  document.getElementById('bMarket').onchange = autoFillEdge;
  document.getElementById('bPick').oninput    = autoFillEdge;
  document.getElementById('betOverlay').classList.add('open');
}

function autoFillEdge() {
  if (!modalGame) return;
  const mkt  = document.getElementById('bMarket').value;
  const pick = document.getElementById('bPick').value.toUpperCase();
  let edge   = null;

  if (mkt === 'ML') {
    if (pick.includes(modalGame.away)) edge = modalGame.ml_edge_away;
    else if (pick.includes(modalGame.home)) edge = modalGame.ml_edge_home;
  } else if (mkt === 'Total') {
    if (pick.includes('OVER'))  { const te = modalGame.total_edge; if (te != null) edge =  te * 5; }
    if (pick.includes('UNDER')) { const te = modalGame.total_edge; if (te != null) edge = -te * 5; }
  }

  if (edge != null) document.getElementById('bEdge').value = edge.toFixed(1);
}

function closeModal() {
  document.getElementById('betOverlay').classList.remove('open');
  modalGame = null;
}

function saveBet() {
  const odds  = parseInt(document.getElementById('bOdds').value);
  const stake = parseFloat(document.getElementById('bStake').value);
  if (!odds || !stake) { toast('Enter odds and stake', 'err'); return; }

  // Derive model odds from the game data if available
  const pick = document.getElementById('bPick').value;
  let modelOdds = null;
  if (modalGame) {
    const pickU = pick.toUpperCase();
    if (pickU.includes(modalGame.away)) modelOdds = probToML((modalGame.hs_away_pct||0)/100);
    else if (pickU.includes(modalGame.home)) modelOdds = probToML((modalGame.hs_home_pct||0)/100);
  }

  const bet = {
    id:         Date.now(),
    date:       document.getElementById('bDate').value,
    matchup:    document.getElementById('bMatchup').value,
    market:     document.getElementById('bMarket').value,
    pick,
    odds,
    stake,
    edge:       parseFloat(document.getElementById('bEdge').value) || null,
    book:       document.getElementById('bBook').value,
    notes:      document.getElementById('bNotes').value,
    modelOdds,
    result:     'pending',
    pl:         null,
  };

  bets.unshift(bet);
  saveBets();
  closeModal();
  updateHeader();
  toast('Bet saved', 'ok');
}

// ── Bet Log ──────────────────────────────────────────────────────────────────
function renderLog() {
  const tbody  = document.getElementById('betTbody');
  const search = (document.getElementById('betSearch')?.value || '').toLowerCase();
  const fRes   = document.getElementById('filterResult')?.value || '';
  const fMkt   = document.getElementById('filterMarket')?.value || '';

  let filtered = [...bets].filter(b => {
    if (fRes && b.result !== fRes) return false;
    if (fMkt && b.market !== fMkt) return false;
    if (search && !JSON.stringify(b).toLowerCase().includes(search)) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortField], vb = b[sortField];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  if (!filtered.length) {
    tbody.innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted);font-size:.85rem;">No bets found.</div>`;
    return;
  }

  tbody.innerHTML = filtered.map(bet => {
    const pl       = bet.pl;
    const plStr    = pl == null ? '—' : `<span class="${pl>=0?'pl-pos':'pl-neg'}">${pl>=0?'+':''}${pl.toFixed(2)}u</span>`;
    const edgeStr  = bet.edge != null ? `<span class="${bet.edge>=EDGE_THRESH?'pl-pos':bet.edge<0?'pl-neg':''}">${bet.edge>0?'+':''}${bet.edge.toFixed(1)}%</span>` : '—';
    const resColor = bet.result==='win'?'var(--green)':bet.result==='loss'?'var(--red)':bet.result==='push'?'var(--gold)':'var(--muted)';
    const modelStr = bet.modelOdds != null ? mlFmt(bet.modelOdds) : '—';
    return `
      <div class="track-row">
        <div class="tv">${bet.date}</div>
        <div class="tv" title="${bet.matchup}">${bet.matchup}</div>
        <div class="tv" style="color:var(--muted2)">${bet.market}</div>
        <div class="tv" title="${bet.pick||''}">${bet.pick||'—'}</div>
        <div class="tv">${bet.odds>0?'+':''}${bet.odds}</div>
        <div class="tv">${edgeStr}</div>
        <div class="tv" style="color:var(--ice)">${modelStr}</div>
        <div class="tv" style="color:var(--muted2)">${bet.book||'—'}</div>
        <div class="tv">${bet.stake}u</div>
        <div class="tv" onclick="event.stopPropagation()">
          <select class="result-sel" style="color:${resColor}" onchange="gradeBet(${bet.id},this.value)">
            <option value="pending" ${bet.result==='pending'?'selected':''}>Pending</option>
            <option value="win"     ${bet.result==='win'    ?'selected':''}>WIN</option>
            <option value="loss"    ${bet.result==='loss'   ?'selected':''}>LOSS</option>
            <option value="push"    ${bet.result==='push'   ?'selected':''}>PUSH</option>
          </select>
        </div>
        <div class="tv">${plStr}</div>
        <div onclick="event.stopPropagation()"><button class="del-btn" onclick="deleteBet(${bet.id})">✕</button></div>
      </div>`;
  }).join('');

  populateGradeDates();
}

// ── Grade / cancel controls ───────────────────────────────────────────────────
function populateGradeDates() {
  const pendingDates = [...new Set(bets.filter(b=>b.result==='pending').map(b=>b.date).filter(Boolean))].sort();
  const allDates     = [...new Set(bets.map(b=>b.date).filter(Boolean))].sort();
  const gd = document.getElementById('gradeDate');
  if (gd) {
    const cur = gd.value;
    gd.innerHTML = '<option value="">Pick date…</option>' +
      pendingDates.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d} (${bets.filter(b=>b.date===d&&b.result==='pending').length} pending)</option>`).join('');
  }
  const rd = document.getElementById('regradeDate');
  if (rd) {
    const cur = rd.value;
    rd.innerHTML = '<option value="">Re-grade date…</option>' +
      allDates.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d} (${bets.filter(b=>b.date===d).length} bets)</option>`).join('');
  }
}

function setGradeStatus(msg) {
  const el = document.getElementById('gradeStatus');
  if (el) el.textContent = msg;
}

function gradeByDate() {
  const d = document.getElementById('gradeDate')?.value;
  if (!d) { setGradeStatus('Pick a date first'); return; }
  showBulkGradeModal(d, false);
}

function regradeByDate() {
  const d = document.getElementById('regradeDate')?.value;
  if (!d) { setGradeStatus('Pick a date first'); return; }
  if (!confirm(`Clear and re-grade all bets on ${d}?`)) return;
  bets.forEach(b => { if (b.date===d) { b.result='pending'; b.pl=null; }});
  saveBets(); updateHeader(); renderLog();
  showBulkGradeModal(d, true);
}

function cancelPendingByDate() {
  const d = document.getElementById('gradeDate')?.value;
  if (!d) { setGradeStatus('Pick a date first'); return; }
  const n = bets.filter(b=>b.date===d&&b.result==='pending').length;
  if (!n) { setGradeStatus('No pending bets on '+d); return; }
  if (!confirm(`Cancel ${n} pending bet${n>1?'s':''} on ${d}?`)) return;
  bets = bets.filter(b => !(b.date===d && b.result==='pending'));
  saveBets(); updateHeader(); renderLog();
  setGradeStatus(`Cancelled ${n} bets on ${d}`);
}

function clearPendingAll() {
  const n = bets.filter(b=>b.result==='pending').length;
  if (!n) { toast('No pending bets', 'err'); return; }
  if (!confirm(`Clear all ${n} pending bets?`)) return;
  bets = bets.filter(b => b.result !== 'pending');
  saveBets(); updateHeader(); renderLog();
  toast(`Cleared ${n} pending bets`, 'ok');
}

function showBulkGradeModal(date, isRegrade) {
  const dateBets = bets.filter(b => b.date === date);
  if (!dateBets.length) { setGradeStatus('No bets on '+date); return; }
  const existing = document.getElementById('bulkGradeModal');
  if (existing) existing.remove();

  const modal = document.createElement('div');
  modal.id = 'bulkGradeModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;';

  const box = document.createElement('div');
  box.style.cssText = 'background:var(--surface);border:1px solid var(--border2);border-radius:10px;max-width:580px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;';
  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <span style="font-size:1rem;font-weight:700;">${isRegrade?'Re-grade':'Grade'} — ${date}</span>
      <button onclick="document.getElementById('bulkGradeModal').remove()" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    ${dateBets.map(b => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;">
        <div style="flex:1;min-width:0;">
          <div style="font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.matchup} · ${b.pick||b.market}</div>
          <div style="font-size:.72rem;color:var(--muted);margin-top:2px;">${b.odds>0?'+':''}${b.odds} · ${b.stake}u${b.edge!=null?' · Edge '+b.edge.toFixed(1)+'%':''} · ${b.book||'—'}</div>
        </div>
        <select class="result-sel" style="min-width:80px;flex-shrink:0;" onchange="gradeBet(${b.id},this.value);updateBulkPL()">
          <option value="pending" ${b.result==='pending'?'selected':''}>Pending</option>
          <option value="win"     ${b.result==='win'    ?'selected':''}>WIN</option>
          <option value="loss"    ${b.result==='loss'   ?'selected':''}>LOSS</option>
          <option value="push"    ${b.result==='push'   ?'selected':''}>PUSH</option>
        </select>
      </div>`).join('')}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px;">
      <span id="bulkPLSummary" style="font-size:.82rem;color:var(--muted);"></span>
      <button class="btn primary" onclick="document.getElementById('bulkGradeModal').remove();renderLog();renderDash();updateHeader();">Done</button>
    </div>`;
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target===modal) { modal.remove(); renderLog(); renderDash(); } });
  updateBulkPL();
}

function updateBulkPL() {
  const el = document.getElementById('bulkPLSummary');
  if (!el) return;
  const graded = bets.filter(b=>b.result!=='pending'&&b.pl!=null);
  const units  = graded.reduce((s,b)=>s+(b.pl||0),0);
  el.textContent = graded.length ? `${graded.length} graded · ${units>=0?'+':''}${units.toFixed(2)}u` : '';
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function renderDash() {
  const el      = document.getElementById('dashInner');
  if (!el) return;
  const settled = bets.filter(b => b.result !== 'pending');
  const wins    = settled.filter(b => b.result === 'win').length;
  const losses  = settled.filter(b => b.result === 'loss').length;
  const pushes  = settled.filter(b => b.result === 'push').length;
  const pending = bets.filter(b => b.result === 'pending').length;
  const units   = settled.reduce((s,b) => s + (b.pl||0), 0);
  const staked  = settled.reduce((s,b) => s + b.stake, 0);
  const roi     = staked ? (units / staked) * 100 : 0;
  const evBets  = bets.filter(b => b.edge != null && b.edge >= EDGE_THRESH);

  function dStat(lbl,val,sub,color='var(--text)') {
    return `<div class="dash-stat"><div class="dash-stat-label">${lbl}</div><div class="dash-stat-val" style="color:${color}">${val}</div>${sub?`<div class="dash-stat-sub">${sub}</div>`:''}</div>`;
  }
  function bkTable(rows, title) {
    if (!rows.length) return '';
    let h = `<div class="bk-card"><div class="bk-title">${title}</div><div class="bk-head"><span>Category</span><span>W</span><span>L</span><span>P</span><span>W%</span><span>Units</span></div>`;
    for (const r of rows) {
      const t = r.w+r.l+r.p;
      const wp = t > 0 ? (r.w/t*100).toFixed(0)+'%' : '—';
      h += `<div class="bk-row"><div class="bk-label">${r.label}</div><div class="bk-val g">${r.w}</div><div class="bk-val r">${r.l}</div><div class="bk-val">${r.p}</div><div class="bk-val">${wp}</div><div class="bk-val ${r.units>=0?'pos':'neg'}">${(r.units>=0?'+':'')+r.units.toFixed(2)}u</div></div>`;
    }
    return h + '</div>';
  }
  function breakdown(groupFn, labelFn, arr) {
    const g = {};
    for (const b of arr) {
      const k = groupFn(b); if (!k) continue;
      if (!g[k]) g[k] = {label:labelFn(b,k), w:0, l:0, p:0, units:0};
      if (b.result==='win')  { g[k].w++; g[k].units += b.pl||0; }
      else if (b.result==='loss') { g[k].l++; g[k].units += b.pl||0; }
      else if (b.result==='push') g[k].p++;
    }
    return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])).map(([,v])=>v);
  }

  const mktRows  = breakdown(b=>b.market||'?', b=>b.market||'?', settled);
  const bookRows = breakdown(b=>b.book||'?',   b=>b.book||'?',   settled);
  const evRows   = (() => {
    const rows = breakdown(b => {
      const e = b.edge; if (e==null||e<EDGE_THRESH) return null;
      if (e<4) return 'a2–4%'; if (e<6) return 'b4–6%'; if (e<8) return 'c6–8%'; return 'd8%+';
    }, (_,k)=>k.slice(1), settled);
    const evSettled = settled.filter(b=>b.edge!=null&&b.edge>=EDGE_THRESH);
    if (evSettled.length) {
      rows.unshift({label:'⚡ All +EV', w:evSettled.filter(b=>b.result==='win').length, l:evSettled.filter(b=>b.result==='loss').length, p:evSettled.filter(b=>b.result==='push').length, units:evSettled.reduce((s,b)=>s+(b.pl||0),0)});
    }
    return rows;
  })();
  const oddsRows = breakdown(b => {
    if (!b.edge||b.edge<EDGE_THRESH||b.odds==null) return null;
    const o=b.odds;
    if (o<=-151) return 'a-151+'; if (o<=-121) return 'b-121 to -150';
    if (o<=-101) return 'c-101 to -120'; if (o<=110) return 'd+100 to +110';
    if (o<=130)  return 'e+111 to +130'; return 'f+131+';
  }, (_,k)=>k.slice(1), settled);

  let html = `<div class="dash-stats">
    ${dStat('Record',`${wins}W · ${losses}L${pushes?` · ${pushes}P`:''}`,`${settled.length} settled · ${pending} pending`)}
    ${dStat('Units P&L',(units>=0?'+':'')+units.toFixed(2)+'u','',units>=0?'var(--green)':'var(--red)')}
    ${dStat('ROI',settled.length?(roi>=0?'+':'')+roi.toFixed(1)+'%':'—','actual units / staked',roi>=0?'var(--green)':'var(--red)')}
    ${dStat('Win%',settled.length?(wins/settled.length*100).toFixed(1)+'%':'—',settled.length+' settled')}
    ${dStat('⚡ +EV Bets',evBets.length+'',evBets.filter(b=>b.result==='pending').length+' pending',evBets.length?'var(--green)':'var(--muted)')}
    ${dStat('Open',pending+'','pending bets')}
  </div>`;

  html += '<div class="dash-section-title">Overall</div><div class="bk-grid">';
  html += bkTable(mktRows,  'By Market');
  html += bkTable(bookRows, 'By Book');
  html += '</div>';

  if (evRows.length) {
    html += '<div class="dash-section-title">⚡ +EV Breakdown (≥2% edge)</div><div class="bk-grid">';
    html += bkTable(evRows,   'By Edge Bucket');
    html += bkTable(oddsRows, '+EV by Odds Bucket');
    html += '</div>';
  }

  if (!settled.length) html += '<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:2rem;">No settled bets yet.</div>';
  el.innerHTML = html;
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(bets,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `nhl-bets-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  toast('JSON exported', 'ok');
}

function importBets(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!Array.isArray(d)) throw new Error('Not an array');
      if (bets.length > 0 && !confirm('Merge with existing bets? Cancel to replace.')) {
        bets = d;
      } else {
        const ids = new Set(bets.map(b=>b.id));
        bets = [...bets, ...d.filter(b=>!ids.has(b.id))];
      }
      saveBets(); updateHeader(); renderLog();
      toast(`Imported ${d.length} bets`, 'ok');
    } catch(err) { toast('Import failed: '+err.message, 'err'); }
  };
  r.readAsText(f); input.value='';
}
function gradeBet(id, result) {
  const bet = bets.find(b => b.id === id);
  if (!bet) return;
  bet.result = result;
  if (result === 'win') {
    bet.pl = bet.odds > 0
      ? (bet.stake * bet.odds / 100)
      : (bet.stake * 100 / Math.abs(bet.odds));
  } else if (result === 'loss') {
    bet.pl = -bet.stake;
  } else if (result === 'push') {
    bet.pl = 0;
  } else {
    bet.pl = null;
  }
  saveBets();
  updateHeader();
}

function deleteBet(id) {
  bets = bets.filter(b => b.id !== id);
  saveBets(); updateHeader(); renderLog();
  toast('Bet removed', 'ok');
}

function sortLog(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  renderLog();
}

// ── Header stats ─────────────────────────────────────────────────────────────
function updateHeader() {
  const graded = bets.filter(b => b.result !== 'pending');
  const wins   = graded.filter(b => b.result === 'win').length;
  const losses = graded.filter(b => b.result === 'loss').length;
  const units  = graded.reduce((s, b) => s + (b.pl || 0), 0);

  document.getElementById('hRecord').textContent = `${wins}-${losses}`;
  document.getElementById('hUnits').textContent  = (units >= 0 ? '+' : '') + units.toFixed(1) + 'u';
  document.getElementById('hBets').textContent   = bets.length;
  const uw = document.getElementById('hUnitsWrap');
  uw.className = 'hstat ' + (units > 0 ? 'green' : units < 0 ? 'red' : '');
}

// ── Utils ────────────────────────────────────────────────────────────────────
function saveBets() {
  localStorage.setItem('nhl_bets', JSON.stringify(bets));
}

function clearBets() {
  if (!confirm('Clear ALL bets? This cannot be undone.')) return;
  bets = [];
  saveBets(); updateHeader(); renderLog();
  toast('All bets cleared', 'ok');
}

function exportCSV() {
  if (!bets.length) { toast('No bets to export', 'err'); return; }
  const cols = ['date','matchup','market','pick','odds','modelOdds','edge','stake','book','result','pl','notes'];
  const rows = [cols.join(','), ...bets.map(b => cols.map(c => JSON.stringify(b[c] ?? '')).join(','))];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `nhl-bets-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('CSV exported', 'ok');
}

function toast(msg, cls='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show ' + cls;
  setTimeout(() => el.className = 'toast', 2200);
}

// Close modal on overlay click
document.getElementById('betOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Init ─────────────────────────────────────────────────────────────────────
updateHeader();
document.getElementById('filterDate').value = new Date().toISOString().slice(0,10);
</script>
