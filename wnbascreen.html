<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WNBA Odds</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');
:root{
  --bg:#0a0d14;--sur:#111520;--sur2:#181d2e;--sur3:#1e2438;
  --bdr:#252d42;--teal:#00c9a7;--tdim:rgba(0,201,167,.12);
  --ylw:#fbbf24;--grn:#22c55e;--red:#ef4444;
  --txt:#e2e8f0;--mu:#64748b;--mu2:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:Inter,sans-serif;font-size:13px;min-height:100vh}
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:900;letter-spacing:-.5px;color:var(--teal);text-transform:uppercase}
.logo span{color:var(--txt)}
.badge{background:var(--tdim);color:var(--teal);border:1px solid var(--teal);padding:1px 7px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:1px;margin-left:7px}
.btn{background:var(--tdim);color:var(--teal);border:1px solid var(--teal);padding:5px 12px;border-radius:6px;cursor:pointer;font:600 11px Inter,sans-serif;transition:.15s}
.btn:hover{background:var(--teal);color:#000}
.btn:disabled{opacity:.4;cursor:not-allowed}
.sbar{padding:4px 14px;background:var(--sur);border-bottom:1px solid var(--bdr);display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:var(--mu)}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:3px;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.si strong{color:var(--txt);font-weight:600}
.tabs{display:flex;padding:8px 14px 0;background:var(--sur);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 13px;border-radius:5px 5px 0 0;cursor:pointer;font:600 12px Inter,sans-serif;color:var(--mu);border:1px solid transparent;border-bottom:none;white-space:nowrap;background:transparent;transition:.15s}
.tab.on{background:var(--bg);color:var(--teal);border-color:var(--bdr)}
.tab:not(.on):hover{color:var(--txt)}
.fbar{padding:8px 14px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--bdr)}
.fl{font-size:9px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pill{background:var(--sur);color:var(--mu2);border:1px solid var(--bdr);padding:3px 9px;border-radius:20px;cursor:pointer;font:600 11px Inter,sans-serif;transition:.12s}
.pill.on{background:var(--tdim);color:var(--teal);border-color:var(--teal)}
.pill:hover:not(.on){border-color:var(--mu);color:var(--txt)}
.srch{background:var(--sur);border:1px solid var(--bdr);color:var(--txt);padding:3px 10px;border-radius:6px;font:12px Inter,sans-serif;width:130px;outline:none}
.srch:focus{border-color:var(--teal)}
.srch::placeholder{color:var(--mu)}
.pg{display:none}.pg.on{display:block}
.main{padding:12px 14px}
/* fixed progress bar — survives innerHTML changes */
#prog-ov{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--bdr);padding:10px 14px;z-index:200;display:none}
#prog-lbl{font-size:11px;color:var(--mu2);margin-bottom:5px}
#prog-bar-wrap{height:3px;background:var(--sur3);border-radius:2px;overflow:hidden}
#prog-bar{height:100%;background:var(--teal);border-radius:2px;transition:width .3s;width:0%}
/* game row */
.grow{background:var(--sur2);border:1px solid var(--bdr);border-radius:9px;padding:9px 13px;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.gi{flex:1;min-width:0}
.gtit{font-weight:700;font-size:13px}
.gmet{font-size:10px;color:var(--mu2);margin-top:1px}
.gtot{text-align:right;flex-shrink:0}
.gtv{font:700 16px 'JetBrains Mono',monospace;color:var(--ylw)}
.gtl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
/* player card */
.pc{background:var(--sur);border:1px solid var(--bdr);border-radius:9px;margin-bottom:8px;overflow:hidden;transition:border-color .15s}
.pc:hover{border-color:rgba(0,201,167,.3)}
.pch{display:flex;align-items:center;padding:9px 13px;gap:9px;cursor:pointer;user-select:none}
.aw{position:relative;flex-shrink:0;width:44px;height:44px}
.ai{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--bdr);background:var(--sur3);display:block}
.afb{width:44px;height:44px;border-radius:50%;background:var(--sur3);border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--teal)}
.tbadge{position:absolute;bottom:-1px;right:-3px;width:17px;height:17px;border-radius:50%;background:var(--sur);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pi{flex:1;min-width:0}
.pn{font-weight:700;font-size:13px;color:var(--txt)}
.pm{font-size:10px;color:var(--mu2);margin-top:1px}
.pm .opp{color:var(--teal);font-weight:600}
.pr2{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.exp{color:var(--mu);font-size:12px;transition:transform .2s}
.pc.op .exp{transform:rotate(180deg)}
.pbdg{background:var(--tdim);color:var(--teal);border:1px solid rgba(0,201,167,.3);padding:1px 6px;border-radius:10px;font-size:9px;font-weight:700}
.itag{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700}
.pbdy{border-top:1px solid var(--bdr)}
.psec{padding:9px 13px;border-bottom:1px solid var(--bdr)}
.psec:last-child{border-bottom:none}
.psti{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.psti::after{content:'';flex:1;height:1px;background:var(--bdr)}
.plv{color:var(--teal);font:600 12px 'JetBrains Mono',monospace;margin-left:3px}
.lmv{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:5px}
.lmv.up{background:rgba(239,68,68,.2);color:var(--red)}
.lmv.dn{background:rgba(34,197,94,.2);color:var(--grn)}
.alts{margin-bottom:7px}
.altl{font-size:9px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;justify-content:space-between}
.altsc{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
.altsc::-webkit-scrollbar{height:2px}
.altsc::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
.ab{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:3px 9px;cursor:pointer;font:600 12px 'JetBrains Mono',monospace;color:var(--mu2);transition:.1s;white-space:nowrap;flex-shrink:0;position:relative}
.ab:hover{border-color:var(--teal);color:var(--teal)}
.ab.sel{background:var(--tdim);border-color:var(--teal);color:var(--teal)}
.ab.ml{border-color:rgba(251,191,36,.4)}
.mld{display:none;position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--ylw)}
.ab.ml .mld{display:block}
.brow{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
.bc{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:3px 7px;display:flex;flex-direction:column;align-items:center;min-width:52px;position:relative}
.bc.bo{border-color:var(--grn);background:rgba(34,197,94,.07)}
.bc.bu{border-color:var(--red);background:rgba(239,68,68,.07)}
.bn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.bl{font:600 12px 'JetBrains Mono',monospace;color:var(--txt)}
.bods{display:flex;gap:3px}
.boo{font:10px 'JetBrains Mono',monospace;color:var(--grn)}
.bou{font:10px 'JetBrains Mono',monospace;color:var(--red)}
.btg{position:absolute;top:-5px;right:2px;font-size:7px;font-weight:700;padding:1px 3px;border-radius:3px;text-transform:uppercase}
.btg.o{background:var(--grn);color:#000}
.btg.u{background:var(--red);color:#fff}
.cbar{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:4px 9px;margin-top:5px;display:flex;align-items:center;gap:7px}
.clb{font-size:9px;color:var(--mu);width:50px;flex-shrink:0}
.ctr{flex:1;height:4px;background:var(--sur3);border-radius:2px;overflow:hidden}
.cfi{height:100%;border-radius:2px;background:var(--grn)}
.cvl{font:600 10px 'JetBrains Mono',monospace;width:36px;text-align:right;flex-shrink:0}
.rlog{display:flex;gap:3px;margin-top:5px;overflow-x:auto;scrollbar-width:none}
.rlog::-webkit-scrollbar{display:none}
.rg{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:3px 6px;flex-shrink:0;text-align:center;min-width:40px}
.rv{font:700 11px 'JetBrains Mono',monospace}
.ro{font-size:7px;color:var(--mu);margin-top:1px}
.rg.h{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
.rg.m{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.06)}
.sp{background:var(--sur2);margin:0 13px 9px;border-radius:7px;border:1px solid var(--bdr);overflow:hidden}
.stbs{display:flex;border-bottom:1px solid var(--bdr);background:var(--sur3);overflow-x:auto;scrollbar-width:none}
.stbs::-webkit-scrollbar{display:none}
.stb{padding:5px 9px;font:700 9px Inter,sans-serif;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;background:transparent;border-top:none;border-left:none;border-right:none;transition:.12s;white-space:nowrap}
.stb.on{color:var(--teal);border-bottom-color:var(--teal)}
.sc{padding:9px}
.sgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:5px}
.sb{background:var(--sur);border:1px solid var(--bdr);border-radius:5px;padding:5px 7px;text-align:center}
.sbl{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.sbv{font:700 14px 'JetBrains Mono',monospace;color:var(--txt);margin-top:1px}
.sbs{font-size:8px;color:var(--mu2);margin-top:1px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{text-align:left;padding:7px;color:var(--mu);font-size:9px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--bdr);font-weight:600}
.tbl th:not(:first-child){text-align:center}
.tbl td{padding:7px;border-bottom:1px solid var(--bdr)}
.tbl td:not(:first-child){text-align:center;font:600 11px 'JetBrains Mono',monospace}
.tbl tr:last-child td{border-bottom:none}
.tlc{display:flex;align-items:center;gap:6px}
.ic{background:var(--sur);border:1px solid var(--bdr);border-radius:7px;padding:9px 13px;margin-bottom:7px;display:flex;gap:9px;align-items:flex-start}
/* logo placeholder — JS upgrades to real img */
.lph{border-radius:50%;background:var(--sur3);border:1px solid var(--bdr);display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--teal);flex-shrink:0}
.empty{text-align:center;padding:40px 20px;color:var(--mu)}
.empty .ei{font-size:28px;margin-bottom:8px}
.empty h3{font-size:14px;color:var(--mu2);margin-bottom:4px}
.wbox{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.2);border-radius:6px;padding:8px 11px;margin-bottom:9px;font-size:11px;color:var(--ylw);line-height:1.5}
@media(max-width:480px){.sgr{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center">
    <div class="logo">WNBA <span>Odds</span></div>
    <div class="badge">LIVE</div>
  </div>
  <button class="btn" id="refreshBtn" onclick="boot()">⟳ Refresh</button>
</div>
<div class="sbar">
  <span class="si"><span class="sdot"></span><strong id="sG">—</strong> games</span>
  <span class="si">📊 <strong id="sP">—</strong> props</span>
  <span class="si">📚 <strong id="sB">—</strong></span>
  <span class="si">🕐 <strong id="sT">—</strong></span>
</div>
<div class="tabs">
  <button class="tab on" onclick="pg('props',this)">Props</button>
  <button class="tab"    onclick="pg('mu',this)">Matchups</button>
  <button class="tab"    onclick="pg('def',this)">Def Ranks</button>
  <button class="tab"    onclick="pg('inj',this)">Injuries</button>
  <button class="tab"    onclick="pg('std',this)">Standings</button>
</div>
<div class="fbar">
  <span class="fl">Mkt</span>
  <button class="pill on" data-m="all"                     onclick="fm(this)">All</button>
  <button class="pill"    data-m="points"                  onclick="fm(this)">PTS</button>
  <button class="pill"    data-m="rebounds"                onclick="fm(this)">REB</button>
  <button class="pill"    data-m="assists"                 onclick="fm(this)">AST</button>
  <button class="pill"    data-m="points_rebounds_assists" onclick="fm(this)">PRA</button>
  <button class="pill"    data-m="points_rebounds"         onclick="fm(this)">P+R</button>
  <button class="pill"    data-m="points_assists"          onclick="fm(this)">P+A</button>
  <button class="pill"    data-m="rebounds_assists"        onclick="fm(this)">R+A</button>
  <button class="pill"    data-m="threes"                  onclick="fm(this)">3PM</button>
  <button class="pill"    data-m="double_double"           onclick="fm(this)">DD</button>
  <input class="srch" id="srch" placeholder="Search player…" oninput="rProps()">
</div>

<!-- fixed progress — lives outside page content so innerHTML never kills it -->
<div id="prog-ov">
  <div id="prog-lbl">Loading…</div>
  <div id="prog-bar-wrap"><div id="prog-bar"></div></div>
</div>

<div id="pg-props" class="pg on"><div class="main" id="cProps"><div style="padding:20px;color:var(--mu2);font-size:12px">Initializing…</div></div></div>
<div id="pg-mu"   class="pg"><div class="main" id="cMu"></div></div>
<div id="pg-def"  class="pg"><div class="main" id="cDef"></div></div>
<div id="pg-inj"  class="pg"><div class="main" id="cInj"></div></div>
<div id="pg-std"  class="pg"><div class="main" id="cStd"></div></div>

<script>
const BASE='https://api.balldontlie.io/wnba/v1';
const KEY='9cdb249f-9635-4cca-a998-37c7b98a9372';

let G=[],PL={},PR={},OP={},SS={},RS={},INJ=[],GO={},STD=[],TSS=[];
let mkt='all', sel={}, warns=[];

// ── PROGRESS (fixed overlay, never inside page content) ──
function prog(p,l){
  const ov=document.getElementById('prog-ov');
  const bar=document.getElementById('prog-bar');
  const lbl=document.getElementById('prog-lbl');
  if(!ov) return;
  ov.style.display='block';
  if(p!=null) bar.style.width=p+'%';
  if(l) lbl.textContent=l;
  if(p>=100) setTimeout(()=>{ ov.style.display='none'; },600);
}

// ── ESPN IDs ──
const EH={
  "A'ja Wilson":'4066453',"Chelsea Gray":'2529074',"Kelsey Plum":'3149390',
  "Jackie Young":'4066446',"Dearica Hamby":'3918296',"Alysha Clark":'2529065',
  "Breanna Stewart":'3149391',"Sabrina Ionescu":'4066430',"Jonquel Jones":'3918299',
  "Courtney Vandersloot":'2961238',"Caitlin Clark":'4432650',"Aliyah Boston":'4432642',
  "NaLyssa Smith":'4432648',"Kelsey Mitchell":'4066438',"Lexie Hull":'4432645',
  "Angel Reese":'4573096',"Kahleah Copper":'3918295',"Marina Mabrey":'4066441',
  "Courtney Williams":'3918301',"Napheesa Collier":'4066440',"Kayla McBride":'2529077',
  "Diamond Miller":'4573095',"Arike Ogunbowale":'4066447',"Satou Sabally":'4066449',
  "Rhyne Howard":'4432641',"Allisha Gray":'4066431',"Tiffany Hayes":'2529071',
  "Jewell Loyd":'3149395',"Nneka Ogwumike":'2529070',"Skylar Diggins-Smith":'2529072',
  "Diana Taurasi":'313232',"Brittney Griner":'2472778',"DeWanna Bonner":'313239',
  "Alyssa Thomas":'2961236',"DiJonai Carrington":'4432643',"Elena Delle Donne":'2489651',
  "Ariel Atkins":'4066428',"Shakira Austin":'4432640',
};
// BDL abbr → ESPN team numeric ID (verified)
const ET={
  ATL:'20',CHI:'19',CON:'18',DAL:'3',GS:'129689',GLD:'129689',
  IND:'5',LV:'17',LA:'6',MIN:'8',NY:'9',PHX:'11',
  POR:'132052',SEA:'15',TOR:'130093',WAS:'16',
  LVA:'17',LAX:'6',NYL:'9',
};
const BK={
  fanduel:{l:'FD',c:'#0077c8'},draftkings:{l:'DK',c:'#61b232'},
  caesars:{l:'CZR',c:'#006341'},betrivers:{l:'BRV',c:'#1d4ed8'},
  fanatics:{l:'FAN',c:'#e8002d'},betmgm:{l:'MGM',c:'#c5a000'},
};
const PL2={
  points:'Points',rebounds:'Rebounds',assists:'Assists',
  points_rebounds_assists:'PRA',points_rebounds:'Pts+Reb',
  points_assists:'Pts+Ast',rebounds_assists:'Reb+Ast',
  threes:'3-Pointers',double_double:'Dbl-Dbl',triple_double:'Triple-Dbl',
};
const PE={points:'🔥',rebounds:'💪',assists:'🎯',points_rebounds_assists:'🏆',
  points_rebounds:'📊',points_assists:'📊',rebounds_assists:'📊',
  threes:'🎯',double_double:'⭐',triple_double:'🌟'};

// ── UTILS ──
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const fmt=o=>o==null?'—':o>0?'+'+o:''+o;
const impl=a=>a>0?100/(a+100)*100:Math.abs(a)/(Math.abs(a)+100)*100;
const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;
const fn=(n,d=1)=>n!=null&&!isNaN(n)?Number(n).toFixed(d):'—';
const gtime=s=>{try{return new Date(s).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});}catch{return s||'—';}};

// ── ESPN LOGOS — JS-only, zero innerHTML string injection ──
function makeLogoImg(abbr, sz){
  const id=ET[(abbr||'').toUpperCase()];
  const div=document.createElement('div');
  div.className='lph';
  div.style.cssText=`width:${sz}px;height:${sz}px`;
  div.textContent=abbr||'';
  if(!id) return div;
  const img=document.createElement('img');
  img.src=`https://a.espncdn.com/i/teamlogos/wnba/500/${id}.png`;
  img.style.cssText=`width:${sz}px;height:${sz}px;object-fit:contain;flex-shrink:0`;
  img.loading='lazy';
  img.onerror=()=>img.replaceWith(div);
  return img;
}
// Attach logos after a container's innerHTML is set
function attachLogos(container){
  container.querySelectorAll('[data-logo]').forEach(slot=>{
    const abbr=slot.dataset.logo, sz=parseInt(slot.dataset.sz||'26');
    slot.replaceWith(makeLogoImg(abbr,sz));
  });
}
// Lightweight logo placeholder — just a data-attr span, replaced by attachLogos()
const L=(abbr,sz=26)=>`<span data-logo="${abbr||''}" data-sz="${sz}"></span>`;

// ── API ──
async function bdl(path, tries=3){
  for(let i=0;i<tries;i++){
    let r;
    try{ r=await fetch(BASE+path,{headers:{Authorization:KEY}}); }
    catch(e){ if(i===tries-1) throw new Error('Network error: '+e.message); await sleep(1000*(i+1)); continue; }
    if(r.status===429){ prog(null,`Rate limit — retrying in ${i+2}s…`); await sleep(1200*(i+1)); continue; }
    if(!r.ok) throw new Error(`BDL ${r.status}`);
    return r.json();
  }
  throw new Error('BDL failed after retries');
}
const safe=async p=>{try{return await bdl(p);}catch(e){console.warn('safe fail:',p,e.message);return {data:[]};};};

// ── BOOT ──
async function boot(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true; btn.textContent='⟳ Loading…';
  sel={}; warns=[];
  document.getElementById('cProps').innerHTML='<div style="padding:16px;color:var(--mu2);font-size:12px">Fetching today\'s data…</div>';
  prog(5,'Connecting to BDL…');
  try{
    await loadAll();
    renderAll();
    rStatus();
  }catch(e){
    prog(100);
    document.getElementById('cProps').innerHTML=`<div class="empty"><div class="ei">❌</div><h3>Error</h3><p style="font-size:11px">${e.message}</p></div>`;
    console.error(e);
  }
  btn.disabled=false; btn.textContent='⟳ Refresh';
}

async function loadAll(){
  const today=new Date().toISOString().slice(0,10);
  const yr=new Date().getFullYear();

  // 1. Games
  prog(10,'Loading games…');
  const gd=await bdl(`/games?dates[]=${today}&per_page=100`);
  G=gd.data||[];
  if(!G.length){ prog(100,'No games today.'); return; }

  // 2. Game odds
  prog(16,'Loading game odds…');
  const od=await safe(`/odds?dates[]=${today}&per_page=100`);
  GO={};
  (od.data||[]).forEach(o=>{if(!GO[o.game_id])GO[o.game_id]=[];GO[o.game_id].push(o);});
  await sleep(300);

  // 3. Props + opening lines per game
  PR={}; OP={};
  const pids=new Set();
  for(let i=0;i<G.length;i++){
    const gid=G[i].id;
    prog(18+Math.round(i/G.length*20),`Props game ${i+1}/${G.length}…`);
    const pd=await safe(`/odds/player_props?game_id=${gid}`);
    (pd.data||[]).forEach(row=>{
      pids.add(row.player_id);
      const p=PR[row.player_id]||(PR[row.player_id]={});
      const t=p[row.prop_type]||(p[row.prop_type]={});
      const v=t[row.vendor]||(t[row.vendor]=[]);
      v.push({line:parseFloat(row.line_value),over:row.market?.over_odds??null,under:row.market?.under_odds??null,odds:row.market?.odds??null,type:row.market?.type});
      v.sort((a,b)=>a.line-b.line);
    });
    await sleep(300);
    const op=await safe(`/odds/player_props/opening?game_id=${gid}`);
    (op.data||[]).forEach(row=>{ OP[`${row.player_id}_${row.prop_type}_${row.vendor}`]=parseFloat(row.line_value); });
    await sleep(300);
  }
  if(!pids.size) warns.push('No props posted yet — check back closer to tip-off (usually 2-4 hrs before game time).');

  const ids=[...pids];
  if(!ids.length){
    // still load injuries + standings even with no props
    prog(85,'Loading injuries…');
    INJ=(await safe('/player_injuries?per_page=100')).data||[];
    await sleep(300);
    STD=(await safe(`/standings?season=${yr}`)).data||[];
    prog(100,'Done');
    return;
  }

  const chunks=[];
  for(let i=0;i<ids.length;i+=40) chunks.push(ids.slice(i,i+40));

  // 4. Player info
  prog(42,'Loading player info…');
  PL={};
  for(const ch of chunks){
    const d=await safe(`/players?${ch.map(x=>`player_ids[]=${x}`).join('&')}&per_page=100`);
    d.data?.forEach(p=>PL[p.id]=p);
    await sleep(300);
  }

  // 5. Season stats
  prog(56,'Loading season stats…');
  SS={};
  for(const ch of chunks){
    const d=await safe(`/player_season_stats?${ch.map(x=>`player_ids[]=${x}`).join('&')}&season=${yr}&per_page=100`);
    d.data?.forEach(s=>SS[s.player.id]=s);
    await sleep(300);
  }
  // fallback to prior year
  const miss=ids.filter(x=>!SS[x]);
  if(miss.length){
    const mc=[];
    for(let i=0;i<miss.length;i+=40) mc.push(miss.slice(i,i+40));
    for(const ch of mc){
      const d=await safe(`/player_season_stats?${ch.map(x=>`player_ids[]=${x}`).join('&')}&season=${yr-1}&per_page=100`);
      d.data?.forEach(s=>{if(!SS[s.player.id])SS[s.player.id]=s;});
      await sleep(300);
    }
  }

  // 6. Recent games
  prog(70,'Loading recent game logs…');
  RS={};
  for(const ch of chunks){
    const d=await safe(`/player_stats?${ch.map(x=>`player_ids[]=${x}`).join('&')}&seasons[]=${yr}&per_page=100`);
    d.data?.forEach(s=>{(RS[s.player.id]||(RS[s.player.id]=[])).push(s);});
    await sleep(300);
  }
  Object.values(RS).forEach(a=>a.sort((a,b)=>new Date(b.game.date)-new Date(a.game.date)));

  // 7. Injuries, standings, team stats
  prog(82,'Loading injuries & standings…');
  INJ=(await safe('/player_injuries?per_page=100')).data||[];
  await sleep(300);
  STD=(await safe(`/standings?season=${yr}`)).data||[];
  await sleep(300);
  TSS=(await safe(`/team_season_stats?season=${yr}&per_page=100`)).data||[];

  prog(100,'Ready!');
}

// ── PROPS ──
function rProps(){
  const c=document.getElementById('cProps');
  if(!G.length) return;
  const srch=(document.getElementById('srch')?.value||'').toLowerCase();
  let html='', tot=0;
  if(warns.length) html+=`<div class="wbox">⚠️ ${warns.join('<br>')}</div>`;

  G.forEach(g=>{
    const hA=g.home_team?.abbreviation||'', aA=g.visitor_team?.abbreviation||'';
    const gps=Object.keys(PR).map(Number).filter(pid=>{
      const p=PL[pid]; if(!p) return false;
      if(p.team?.id!==g.home_team?.id&&p.team?.id!==g.visitor_team?.id) return false;
      if(srch&&!`${p.first_name} ${p.last_name}`.toLowerCase().includes(srch)&&!(p.team?.abbreviation||'').toLowerCase().includes(srch)) return false;
      if(mkt!=='all'&&!PR[pid]?.[mkt]) return false;
      return true;
    });
    const go=GO[g.id]||[], fd=go.find(o=>o.vendor==='fanduel')||go[0];
    const total=fd?.total_value||'—';
    const spread=fd?.spread_home_value!=null?`${fd.spread_home_value>0?'+':''}${fd.spread_home_value}`:'—';
    const live=g.status==='in_progress'?'🔴 LIVE':(g.period>0?`Q${g.period} ${g.time||''}`:gtime(g.date));

    html+=`<div class="grow">
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">${L(aA,26)}<span style="font-size:9px;color:var(--mu);font-weight:700;margin:0 2px">@</span>${L(hA,26)}</div>
      <div class="gi"><div class="gtit">${aA} @ ${hA}</div><div class="gmet">${live} · ${hA} ${spread}</div></div>
      <div class="gtot"><div class="gtv">${total}</div><div class="gtl">Total</div></div>
    </div>`;

    if(!gps.length){
      html+=`<div style="font-size:11px;color:var(--mu);padding:4px 2px 12px">No props posted yet for this game.</div>`;
    } else {
      gps.forEach(pid=>{ tot+=Object.keys(PR[pid]||{}).length; html+=rCard(pid,g); });
    }
  });

  document.getElementById('sP').textContent=tot;
  c.innerHTML=html||'<div class="empty"><div class="ei">🔍</div><h3>No props match</h3></div>';
  attachLogos(c);
}

function rCard(pid,game){
  const p=PL[pid]; if(!p) return '';
  const name=`${p.first_name} ${p.last_name}`;
  const ini=`${p.first_name?.[0]||''}${p.last_name?.[0]||''}`;
  const inj=INJ.find(i=>i.player?.id===pid);
  const ss=SS[pid];
  const abbr=p.team?.abbreviation||'';
  const opp=game.home_team?.id===p.team?.id?game.visitor_team?.abbreviation:game.home_team?.abbreviation;
  const pp=PR[pid]||{};
  const keys=mkt==='all'?Object.keys(pp):[mkt].filter(m=>pp[m]);

  // headshot
  const hsId=EH[name];
  const hsUrl=hsId?`https://a.espncdn.com/i/headshots/wnba/players/full/${hsId}.png`:null;
  const avaHtml=hsUrl
    ?`<img class="ai" src="${hsUrl}" onerror="this.style.display='none';var f=document.getElementById('afb${pid}');if(f)f.style.display='flex'" loading="lazy"><div class="afb" id="afb${pid}" style="display:none">${ini}</div>`
    :`<div class="afb">${ini}</div>`;

  // prop sections
  let ph='';
  keys.forEach(mk=>{
    const vm=pp[mk];
    const lines=[...new Set(Object.values(vm).flatMap(a=>a.map(x=>x.line)))].sort((a,b)=>a-b);
    const lc={}; Object.values(vm).forEach(a=>a.forEach(x=>{lc[x.line]=(lc[x.line]||0)+1;}));
    const ml=lines.reduce((a,b)=>lc[b]>lc[a]?b:a,lines[0]);
    const k=`${pid}_${mk}`;
    if(sel[k]==null) sel[k]=ml;
    const sv=sel[k];

    // line movement
    let mv='';
    const fv=Object.keys(vm)[0];
    if(fv){ const op=OP[`${pid}_${mk}_${fv}`]; if(op!=null&&op!==sv){ const d=(sv-op).toFixed(1); mv=`<span class="lmv ${parseFloat(d)>0?'up':'dn'}">${parseFloat(d)>0?'▲':'▼'}${Math.abs(parseFloat(d))}</span>`;} }

    // alt buttons
    const abs=lines.map(l=>`<button class="ab${l===sv?' sel':''}${l===ml?' ml':''}" onclick="pickL('${k}',${l},${pid})">${l}<span class="mld"></span></button>`).join('');

    // book chips
    let bO=-Infinity,bOk=null,bU=-Infinity,bUk=null;
    const bat={};
    Object.entries(vm).forEach(([v,a])=>{
      const e=a.find(x=>x.line===sv); if(!e) return;
      bat[v]=e;
      if(e.over!=null&&e.over>bO){bO=e.over;bOk=v;}
      if(e.under!=null&&e.under>bU){bU=e.under;bUk=v;}
    });
    const isM=Object.values(bat)[0]?.type==='milestone';
    let chips='';
    Object.entries(bat).forEach(([v,e])=>{
      const bk=BK[v]||{l:v.slice(0,4).toUpperCase(),c:'#888'};
      const iO=!isM&&v===bOk, iU=!isM&&v===bUk;
      const tg=iO?'<span class="btg o">O↑</span>':iU?'<span class="btg u">U↑</span>':'';
      chips+=`<div class="bc${iO?' bo':iU?' bu':''}">${tg}<span class="bn" style="color:${bk.c}">${bk.l}</span><span class="bl">${e.line}</span><div class="bods">${isM?`<span class="boo">${fmt(e.odds)}</span>`:`<span class="boo">${fmt(e.over)}</span><span class="bou">${fmt(e.under)}</span>`}</div></div>`;
    });

    const oo=Object.values(bat).map(e=>e.over).filter(x=>x!=null);
    const imp=oo.length?impl(avg(oo)):null;
    const cb=imp!=null?`<div class="cbar"><span class="clb">Over imp%</span><div class="ctr"><div class="cfi" style="width:${Math.min(imp,100)}%"></div></div><span class="cvl" style="color:${imp>52?'var(--grn)':'var(--mu2)'}">${imp.toFixed(1)}%</span></div>`:'';

    const sk={points:'pts',rebounds:'reb',assists:'ast'}[mk];
    let rl='';
    if(sk&&RS[pid]?.length){
      rl='<div class="rlog">';
      RS[pid].slice(0,5).forEach(g=>{ const v=g[sk]; if(v==null)return; const h=v>=sv; rl+=`<div class="rg ${h?'h':'m'}"><div class="rv" style="color:${h?'var(--grn)':'var(--red)'}">${v}</div><div class="ro">${g.team?.abbreviation||'?'}</div></div>`; });
      rl+='</div>';
    }

    ph+=`<div class="psec" data-m="${mk}">
      <div class="psti">${PE[mk]||'📊'} ${PL2[mk]||mk}<span class="plv">${sv}</span>${mv}</div>
      ${lines.length>1?`<div class="alts"><div class="altl"><span>Alt Lines</span><span style="color:var(--mu2)">${lines.length} lines · <span style="color:var(--ylw)">●</span> main</span></div><div class="altsc">${abs}</div></div>`:''}
      <div class="brow">${chips||'<span style="font-size:10px;color:var(--mu)">No odds at this line</span>'}</div>
      ${cb}${rl}
    </div>`;
  });

  const pts=fn(ss?.pts), reb=fn(ss?.reb), ast=fn(ss?.ast);
  const szn=ss?.season?` '${String(ss.season).slice(2)}`:'';

  return `<div class="pc" id="pc${pid}">
    <div class="pch" onclick="tc(${pid})">
      <div class="aw">${avaHtml}<div class="tbadge">${L(abbr,12)}</div></div>
      <div class="pi">
        <div class="pn">${name}${inj?` <span class="itag">${inj.status||'INJ'}</span>`:''}</div>
        <div class="pm">${p.position||''} · ${abbr} <span class="opp">vs ${opp||'?'}</span> · ${pts}/${reb}/${ast}${szn}</div>
      </div>
      <div class="pr2"><span class="exp">▼</span><span class="pbdg">${Object.keys(pp).length} props</span></div>
    </div>
    <div class="pbdy" id="pb${pid}" style="display:none">
      ${ph}
      <div class="sp">
        <div class="stbs">
          <button class="stb on" onclick="stab(${pid},'s',this)">Season${szn}</button>
          <button class="stb"    onclick="stab(${pid},'sh',this)">Shooting</button>
          <button class="stb"    onclick="stab(${pid},'rl',this)">Last 5</button>
          <button class="stb"    onclick="stab(${pid},'bi',this)">Bio</button>
        </div>
        <div id="s${pid}"  class="sc"><div class="sgr">
          ${sb('PTS',pts,'avg')}${sb('REB',reb,'avg')}${sb('AST',ast,'avg')}
          ${sb('STL',fn(ss?.stl),'avg')}${sb('BLK',fn(ss?.blk),'avg')}${sb('3PM',fn(ss?.fg3m),'avg')}
          ${sb('TO',fn(ss?.turnover),'avg')}${sb('MIN',fn(ss?.min),'avg')}
          ${sb('PRA',ss?fn((ss.pts||0)+(ss.reb||0)+(ss.ast||0)):'—','calc')}
        </div></div>
        <div id="sh${pid}" class="sc" style="display:none"><div class="sgr">
          ${sb('FG%',ss?.fg_pct!=null?fn(ss.fg_pct,1)+'%':'—','')}
          ${sb('3P%',ss?.fg3_pct!=null?fn(ss.fg3_pct,1)+'%':'—','')}
          ${sb('FT%',ss?.ft_pct!=null?fn(ss.ft_pct,1)+'%':'—','')}
          ${sb('FGM',fn(ss?.fgm),'avg')}${sb('FGA',fn(ss?.fga),'avg')}${sb('GP',ss?.games_played??'—','games')}
        </div></div>
        <div id="rl${pid}" class="sc" style="display:none">${rL5(pid)}</div>
        <div id="bi${pid}" class="sc" style="display:none">
          <div class="sgr">${sb('#',p.jersey_number??'—','')}${sb('Age',p.age??'—','')}${sb('Pos',p.position??'—','')}</div>
          <div style="font-size:10px;color:var(--mu2);margin-top:7px;line-height:1.7">${p.height?`📏 ${p.height}&emsp;`:''}${p.weight?`⚖️ ${p.weight}&emsp;`:''}${p.college?`🎓 ${p.college}`:''}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function rL5(pid){
  const gs=(RS[pid]||[]).slice(0,5);
  if(!gs.length) return '<div style="color:var(--mu);font-size:11px">No recent data.</div>';
  return `<div style="display:flex;flex-direction:column;gap:3px">${gs.map(g=>{
    const d=new Date(g.game.date).toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--bdr);font-size:10px">
      <span style="color:var(--mu);min-width:32px">${d}</span>
      <div style="display:flex;gap:8px">
        ${[['PTS','pts'],['REB','reb'],['AST','ast'],['STL','stl'],['BLK','blk']].map(([l,k])=>`<span><span style="color:var(--mu)">${l}</span> <strong style="font-family:'JetBrains Mono',monospace">${g[k]??'—'}</strong></span>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}
function sb(l,v,s){return `<div class="sb"><div class="sbl">${l}</div><div class="sbv">${v??'—'}</div>${s?`<div class="sbs">${s}</div>`:''}</div>`;}

// ── DEF RANKS ──
function rDef(){
  const c=document.getElementById('cDef');
  if(!G.length){c.innerHTML='<div class="empty"><div class="ei">🛡️</div><h3>No games</h3></div>';return;}
  const td={};
  G.forEach(g=>{
    [[g.home_team,g.visitor_team],[g.visitor_team,g.home_team]].forEach(([def,off])=>{
      const k=def.abbreviation;
      if(!td[k])td[k]={a:k,pts:[],reb:[],ast:[],blk:[],stl:[]};
      Object.keys(PR).map(Number).forEach(pid=>{
        if(PL[pid]?.team?.id!==off.id) return;
        const s=SS[pid]; if(!s) return;
        if(s.pts)td[k].pts.push(s.pts);
        if(s.reb)td[k].reb.push(s.reb);
        if(s.ast)td[k].ast.push(s.ast);
        if(s.blk)td[k].blk.push(s.blk);
        if(s.stl)td[k].stl.push(s.stl);
      });
    });
  });
  const af=a=>a.length?fn(avg(a)):'—';
  const rows=Object.values(td).map(t=>`<tr><td><div class="tlc">${L(t.a,18)}<strong style="color:var(--teal)">${t.a}</strong></div></td><td>${af(t.pts)}</td><td>${af(t.reb)}</td><td>${af(t.ast)}</td><td>${af(t.blk)}</td><td>${af(t.stl)}</td><td style="color:var(--mu2)">${t.pts.length}</td></tr>`).join('');
  const tsRows=TSS.map(t=>`<tr><td><div class="tlc">${L(t.team?.abbreviation,18)}<strong style="color:var(--teal)">${t.team?.abbreviation}</strong></div></td><td>${fn(t.pts)}</td><td>${fn(t.reb)}</td><td>${fn(t.ast)}</td><td>${fn(t.blk)}</td><td>${fn(t.stl)}</td><td style="color:var(--mu2)">${t.games_played||'—'}</td></tr>`).join('');
  c.innerHTML=`
    <div style="font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;padding:3px 0 7px">Today's Matchups — Avg Allowed</div>
    <table class="tbl" style="margin-bottom:16px"><thead><tr><th>Defense</th><th>PTS</th><th>REB</th><th>AST</th><th>BLK</th><th>STL</th><th>N</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="7" style="color:var(--mu);text-align:center;padding:14px">No data yet</td></tr>'}</tbody></table>
    ${tsRows?`<div style="font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;padding:3px 0 7px">Team Season Averages</div>
    <table class="tbl"><thead><tr><th>Team</th><th>PTS</th><th>REB</th><th>AST</th><th>BLK</th><th>STL</th><th>GP</th></tr></thead>
    <tbody>${tsRows}</tbody></table>`:''}
    <div style="font-size:9px;color:var(--mu);padding:8px 0">Top: season avgs of today's prop players vs each defense.</div>`;
  attachLogos(c);
}

// ── INJURIES ──
function rInj(){
  const c=document.getElementById('cInj');
  if(!INJ.length){c.innerHTML='<div class="empty"><div class="ei">✅</div><h3>No injuries reported</h3></div>';return;}
  c.innerHTML=INJ.map(i=>{
    const p=i.player, name=`${p.first_name} ${p.last_name}`, abbr=p.team?.abbreviation||'';
    const hsId=EH[name];
    const av=hsId?`<img src="https://a.espncdn.com/i/headshots/wnba/players/full/${hsId}.png" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--bdr)" onerror="this.style.display='none'" loading="lazy">`:
      `<div style="width:32px;height:32px;border-radius:50%;background:var(--sur3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--teal)">${p.first_name?.[0]||''}${p.last_name?.[0]||''}</div>`;
    const sc=i.status==='Out'?'var(--red)':i.status==='Doubtful'?'var(--ylw)':'var(--mu2)';
    return `<div class="ic">
      <div style="position:relative;flex-shrink:0">${av}<div style="position:absolute;bottom:-1px;right:-3px;width:15px;height:15px;border-radius:50%;background:var(--sur);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;overflow:hidden">${L(abbr,11)}</div></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:12px">${name} <span style="color:${sc};font-size:10px;font-weight:600">${i.status||''}</span></div>
        <div style="font-size:10px;color:var(--mu2);margin-top:1px">${abbr}${p.position?` · ${p.position}`:''}${i.return_date?` · Return: ${i.return_date}`:''}</div>
        ${i.comment?`<div style="font-size:10px;color:var(--mu);margin-top:4px;line-height:1.5">${i.comment}</div>`:''}
      </div>
    </div>`;
  }).join('');
  attachLogos(c);
}

// ── STANDINGS ──
function rStd(){
  const c=document.getElementById('cStd');
  if(!STD.length){c.innerHTML='<div class="empty"><div class="ei">🏆</div><h3>No standings data</h3></div>';return;}
  const E=STD.filter(s=>s.conference?.includes('Eastern')).sort((a,b)=>(a.playoff_seed||99)-(b.playoff_seed||99));
  const W=STD.filter(s=>s.conference?.includes('Western')).sort((a,b)=>(a.playoff_seed||99)-(b.playoff_seed||99));
  const conf=(t,teams)=>`<div style="font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.5px;padding:3px 0 7px">${t}</div>
    <table class="tbl" style="margin-bottom:16px"><thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>GB</th><th>H</th><th>A</th></tr></thead>
    <tbody>${teams.map(s=>`<tr>
      <td style="color:var(--mu)">${s.playoff_seed||'—'}</td>
      <td><div class="tlc">${L(s.team?.abbreviation,16)}<span style="font-weight:700">${s.team?.abbreviation}</span></div></td>
      <td style="color:var(--grn)">${s.wins}</td><td style="color:var(--red)">${s.losses}</td>
      <td>${fn(s.win_percentage,3)}</td><td style="color:var(--mu2)">${s.games_behind||'—'}</td>
      <td style="color:var(--mu2);font-size:10px">${s.home_record||'—'}</td>
      <td style="color:var(--mu2);font-size:10px">${s.away_record||'—'}</td>
    </tr>`).join('')}</tbody></table>`;
  c.innerHTML=conf('Eastern Conference',E)+conf('Western Conference',W);
  attachLogos(c);
}

// ── INTERACTIONS ──
function pickL(k,line,pid){
  sel[k]=line; rProps();
  requestAnimationFrame(()=>{ const b=document.getElementById('pb'+pid),card=document.getElementById('pc'+pid); if(b&&card){b.style.display='block';card.classList.add('op');} });
}
function tc(pid){
  const card=document.getElementById('pc'+pid),body=document.getElementById('pb'+pid);
  if(!card||!body)return;
  body.style.display=card.classList.toggle('op')?'block':'none';
}
function stab(pid,t,btn){
  ['s','sh','rl','bi'].forEach(x=>{const el=document.getElementById(x+pid);if(el)el.style.display=x===t?'block':'none';});
  btn.closest('.stbs').querySelectorAll('.stb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function pg(name,btn){
  document.querySelectorAll('.pg').forEach(el=>el.classList.remove('on'));
  document.getElementById('pg-'+name)?.classList.add('on');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function fm(btn){
  mkt=btn.dataset.m;
  document.querySelectorAll('.pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  rProps();
}
function rStatus(){
  document.getElementById('sG').textContent=G.length;
  const bks=new Set();
  Object.values(PR).forEach(pm=>Object.values(pm).forEach(vm=>Object.keys(vm).forEach(v=>bks.add(v))));
  document.getElementById('sB').textContent=[...bks].map(v=>BK[v]?.l||v).join(', ')||'—';
  document.getElementById('sT').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
document.getElementById('srch').addEventListener('input',rProps);
boot();
</script>
