<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SBK Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b27;--s2:#1c2333;--s3:#222b3d;--s4:#2a3550;
  --b0:rgba(255,255,255,0.06);--b1:rgba(255,255,255,0.1);--b2:rgba(255,255,255,0.16);
  --t0:#ffffff;--t1:rgba(255,255,255,0.7);--t2:rgba(255,255,255,0.4);--t3:rgba(255,255,255,0.2);
  --green:#00c9a7;--gd:rgba(0,201,167,0.12);
  --red:#ff5f5f;--rd:rgba(255,95,95,0.1);
  --blue:#4dabf7;--amber:#fcc419;--r:10px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t0);min-height:100vh;-webkit-font-smoothing:antialiased;font-weight:400}

/* Header */
.hdr{height:48px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(22,22,22,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--b0);position:sticky;top:0;z-index:99}
.logo{font-size:15px;font-weight:700;letter-spacing:-.3px}
.logo em{color:var(--green);font-style:normal}
.seg{display:flex;background:var(--s3);border-radius:7px;padding:2px;gap:2px}
.seg button{font:inherit;font-size:12px;font-weight:500;padding:4px 14px;border:none;border-radius:5px;background:none;color:var(--t1);cursor:pointer;transition:.12s}
.seg button.on{background:var(--s4);color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.4)}

/* Summary */
.sum{display:flex;gap:6px;padding:8px 18px;border-bottom:1px solid var(--b0);flex-wrap:wrap;align-items:center}
.chip{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--s2);color:var(--t1);border:1px solid var(--b1)}
.chip b{color:var(--t0);font-weight:600}
.chip.g{color:var(--accent);background:var(--gd);border-color:rgba(0,212,170,.2)}
.chip.r{color:var(--red);background:var(--rd);border-color:rgba(255,87,87,.18)}

/* Daily summary */
.daily{padding:8px 18px;border-bottom:1px solid var(--b0);display:flex;flex-direction:column;gap:4px}
.drow{display:flex;align-items:center;gap:14px;padding:7px 12px;background:var(--s1);border:1px solid var(--b0);border-radius:8px}
.ddate{font-size:13px;font-weight:600;letter-spacing:-.2px;min-width:62px}
.dstats{display:flex;gap:14px;flex:1;font-size:12px;color:var(--t1)}
.dcopy{font:inherit;font-size:11px;font-weight:500;padding:3px 9px;border-radius:5px;border:1px solid var(--b1);background:none;color:var(--t1);cursor:pointer;transition:.12s}
.dcopy:hover{background:var(--s3);color:var(--t0)}

/* Controls */
.ctl{display:flex;gap:5px;padding:8px 18px;background:var(--s1);border-bottom:1px solid var(--b0);flex-wrap:wrap;align-items:center}
.btn{font:inherit;font-size:11px;font-weight:500;padding:5px 11px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--t1);cursor:pointer;transition:.12s;white-space:nowrap}
.btn:hover{background:var(--s3);color:var(--t0)}
.btn.g{background:var(--gd);border-color:rgba(0,212,170,.25);color:var(--accent)}
.btn.r{background:var(--rd);border-color:rgba(255,69,58,.2);color:var(--red)}
.btn.b{background:rgba(90,200,250,.08);border-color:rgba(90,200,250,.22);color:var(--blue)}
.btn.a{background:rgba(252,196,25,.07);border-color:rgba(252,196,25,.2);color:var(--amber)}
select.sel{font:inherit;font-size:11px;font-weight:500;padding:5px 9px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--t0);outline:none;cursor:pointer}
.stxt{font-size:11px;color:var(--t1)}
.stxt.ok{color:var(--green)}
.stxt.err{color:var(--red)}

/* Paste */
.paste{padding:10px 18px;border-bottom:1px solid var(--b0)}
textarea{width:100%;min-height:88px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t0);font:inherit;font-size:12px;padding:10px 12px;resize:vertical;outline:none;transition:border-color .15s}
textarea:focus{border-color:rgba(0,212,170,.35)}
.pact{display:flex;gap:6px;margin-top:7px;align-items:center}

/* Tabs */
.tabs{display:flex;padding:0 18px;border-bottom:1px solid var(--b0)}
.tab{font:inherit;font-size:12px;font-weight:500;padding:11px 14px;border:none;border-bottom:2px solid transparent;background:none;color:var(--t1);cursor:pointer;transition:.12s}
.tab.on{color:var(--t0);border-bottom-color:var(--accent)}

/* Body */
.body{padding:14px 18px}
.empty{text-align:center;padding:60px;color:var(--t2);font-size:13px}

/* Date group */
.dghdr{display:flex;justify-content:space-between;align-items:center;padding:12px 0 7px;border-bottom:1px solid var(--b1);margin-bottom:8px;margin-top:4px}
.dglbl{font-size:13px;font-weight:600;letter-spacing:-.3px}
.dgmeta{font-size:11px;color:var(--t1)}

/* Prop table */
.ptbl{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.phdr{display:grid;grid-template-columns:150px 38px 50px 68px 58px 50px 88px 58px;gap:10px;padding:5px 14px;background:var(--s2)}
.phdr span{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.prow{display:grid;grid-template-columns:150px 38px 50px 68px 58px 50px 88px 58px;gap:10px;padding:9px 14px;border-top:1px solid var(--b0);align-items:center;transition:background .1s}
.prow:hover{background:rgba(255,255,255,.02)}
.pname{font-size:13px;font-weight:600;letter-spacing:-.3px;color:var(--t0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.pproj{font-size:12px;color:var(--t1);font-weight:500}
.pmkt{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--s3);color:var(--t1);display:inline-block;white-space:nowrap}
.pline{font-size:13px;font-weight:600;letter-spacing:-.2px}
.pline.O{color:var(--accent)}
.pline.U{color:var(--blue)}
.podds{font-size:11px;color:var(--t2)}
.pev{font-size:12px;font-weight:700}
.pev.p{color:var(--accent)}
.pev.n{color:var(--red)}
.rsel{font:inherit;font-size:11px;font-weight:500;padding:4px 7px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--t1);cursor:pointer;outline:none;width:100%;transition:.12s}
.rsel.win{border-color:rgba(0,212,170,.3);color:var(--accent);background:var(--gd)}
.rsel.loss{border-color:rgba(255,87,87,.25);color:var(--red);background:var(--rd)}
.rsel.push{border-color:rgba(252,196,25,.25);color:var(--amber)}
.ppnl{font-size:12px;font-weight:600;text-align:right;letter-spacing:-.2px}
.ppnl.p{color:var(--accent)}
.ppnl.n{color:var(--red)}

/* Dashboard */
.dgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.dcard{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:20px 22px}
.dcard .lbl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}
.dcard .val{font-size:28px;font-weight:700;letter-spacing:-.7px;line-height:1}
.dcard .sub{font-size:11px;color:var(--t2);margin-top:6px}
.slbl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin:26px 0 10px}
.bwrap{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.bkt{width:100%;border-collapse:collapse}
.bkt th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);padding:10px 18px;text-align:left;border-bottom:1px solid var(--b0)}
.bkt th:not(:first-child){text-align:right}
.bkt td{font-size:13px;padding:12px 18px;border-bottom:1px solid var(--b0);color:var(--t1)}
.bkt td:first-child{color:var(--t0);font-weight:600}
.bkt td:not(:first-child){text-align:right}
.bkt tr:last-child td{border-bottom:none}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ougrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.oucard{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden}
.ouchdr{display:flex;justify-content:space-between;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--b0);font-size:12px;font-weight:600}
.oucard table{width:100%;border-collapse:collapse;table-layout:fixed}
.oucard td{font-size:12px;padding:10px 14px;border-bottom:1px solid var(--b0);color:var(--t1);white-space:nowrap}
.oucard td:first-child{color:var(--t0);font-weight:600}
.oucard td:not(:first-child){text-align:right}
.oucard tr:last-child td{border-bottom:none}

/* Bet Log */
.ltbl{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden}
.lhdr{display:grid;grid-template-columns:26px 58px 1fr 44px 60px 58px 38px 50px 70px 72px;gap:8px;padding:6px 14px;background:var(--s2)}
.lhdr span{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.lrow{display:grid;grid-template-columns:26px 58px 1fr 44px 60px 58px 38px 50px 70px 72px;gap:8px;padding:9px 14px;border-top:1px solid var(--b0);font-size:12px;align-items:center}
.lrow:hover{background:rgba(255,255,255,.02)}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><em>SBK</em> TRACKER</div>
  <div class="seg">
    <button class="on" onclick="setSport('mlb')">MLB</button>
    <button onclick="setSport('nba')">NBA</button>
  </div>
  <span style="font-size:11px;color:var(--t1)" id="dateDisplay"></span>
</div>

<div id="dailyBar"></div>
<div class="sum" id="sumBar"></div>

<div class="ctl">
  <select class="sel" id="filterResult" onchange="renderAll()">
    <option value="">All Results</option>
    <option value="win">Wins</option>
    <option value="loss">Losses</option>
    <option value="pending">Pending</option>
  </select>
  <select class="sel" id="filterMarket" onchange="renderAll()"><option value="">All Markets</option></select>
  <select class="sel" id="gradeDate"><option value="">Grade date...</option></select>
  <button class="btn" id="gradeBtn" onclick="autoGrade()">⟳ Grade</button>
  <select class="sel" id="regradeDate"><option value="">Re-grade date...</option></select>
  <button class="btn b" onclick="regrade()">↺ Re-grade</button>
  <button class="btn a" onclick="repairDates()">Fix Dates</button>
  <button class="btn" onclick="debugAPI()">API Names</button>
  <button class="btn" onclick="exportXLSX()">↓ Export</button>
  <button class="btn" onclick="saveState()">Save</button>
  <button class="btn r" onclick="props=[];saveState();renderAll();">Clear All</button>
  <span class="stxt" id="gradeStatus"></span>
</div>

<div class="paste">
  <textarea id="pasteBox" placeholder="Paste Sharpr text here — MLB or NBA auto-detected..."></textarea>
  <div class="pact">
    <button class="btn g" onclick="parsePaste()">Parse</button>
    <button class="btn" onclick="document.getElementById('pasteBox').value='';document.getElementById('pasteBox').focus()">Clear</button>
    <span class="stxt" id="parseStatus"></span>
  </div>
</div>

<div class="tabs">
  <button class="tab on" onclick="setTab('plays')">Plays</button>
  <button class="tab" onclick="setTab('dashboard')">Dashboard</button>
  <button class="tab" onclick="setTab('log')">Bet Log (<span id="logCount">0</span>)</button>
</div>

<div class="body"><div id="body"></div></div>

<script>
// ── State ──────────────────────────────────────────────
let sport='mlb', props=[], tab='plays';

function setSport(s){
  sport=s;
  document.querySelectorAll('.seg button').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===s));
  renderAll();
}
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['plays','dashboard','log'][i]===t));
  renderAll();
}
function saveState(){try{localStorage.setItem('sbk',JSON.stringify(props));}catch(e){}}
function loadState(){try{const d=localStorage.getItem('sbk');if(d)props=JSON.parse(d);}catch(e){}}
function getTodayStr(){return new Date().toISOString().split('T')[0];}
function sgn(n){return n==null?'':(n>=0?'+':'')+n.toFixed(2)+'u';}
function uRisk(p){const o=parseFloat(p.odds);return(!isNaN(o)&&o<0)?Math.abs(o)/100:1;}
function normName(n){return n.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z ]/g,'').trim().replace(/\s+/g,' ');}

// ── Helpers ────────────────────────────────────────────
function parseIP(v){const s=String(v).split('.');return(parseInt(s[0])||0)*3+(parseInt(s[1])||0);}

function gradeResult(p,actual){
  const line=parseFloat(p.line);
  let result;
  if(p.market==='OUTS'){const a=parseFloat(actual);result=p.side==='O'?(a>line?'win':a<line?'loss':'push'):(a<line?'win':a>line?'loss':'push');}
  else{const a=parseFloat(actual);result=p.side==='O'?(a>line?'win':a<line?'loss':'push'):(a<line?'win':a>line?'loss':'push');}
  p.actual=actual; p.result=result;
  const odds=parseFloat(p.odds);
  if(result==='win') p.pnl=odds>0?odds/100:1;
  else if(result==='loss') p.pnl=odds<0?-(Math.abs(odds)/100):-1;
  else p.pnl=0;
}

// ── MLB Parser ─────────────────────────────────────────
function parseMLB(text) {
  const MMAP={'Outs':'OUTS','BB':'BB','ER':'ER','K':'K','Hits':'HA'};
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const results=[];
  const bestIdx=lines.findIndex(l=>l==='Best Line');
  if(bestIdx<0)return results;

  const timeMap={};
  for(let k=0;k<bestIdx;k++){
    const m=lines[k].match(/^(.+?)•\s*(.+)$/);
    if(m){const gl=m[1].replace(/\s/g,'');timeMap[gl]=m[2].trim();}
  }

  function isPName(s){if(!s||!s.includes(' ')||s.length<4)return false;if(!/^[A-Z]/.test(s))return false;if(/^(FanDuel|DraftKings|ProphetX|BetOnline|Novig|Fliff|Best Line)$/i.test(s))return false;return true;}

  let i=bestIdx+1;
  while(i<lines.length){
    const l=lines[i];
    if(!isPName(l)){i++;continue;}
    const player=l.replace(/\s*[A-Z]{1,2}$/,'').trim();
    if(!player||player.split(' ').length<2){i++;continue;}
    let j=i+1;
    if(lines[j]===l)j++;
    if(lines[j]&&/^[A-Z]{1,2}$/.test(lines[j]))j++;

    let proj=null,market=null,teamToks=[];
    while(j<lines.length){
      const tok=lines[j];
      const cm=tok.match(/^(\d+\.?\d*)(Outs|BB|ER|K|Hits)$/i);
      if(cm){proj=parseFloat(cm[1]);market=MMAP[cm[2]]||cm[2].toUpperCase();j++;break;}
      if(/^\d+\.?\d*$/.test(tok)){proj=parseFloat(tok);j++;break;}
      if(isPName(tok)&&tok!==l)break;
      if(/^[A-Z]{2,3}$/.test(tok))teamToks.push(tok);
      j++;
    }
    if(!market&&lines[j]&&/^(Outs|BB|ER|K|Hits)$/i.test(lines[j])){market=MMAP[lines[j]]||lines[j].toUpperCase();j++;}
    if(lines[j]&&/^\d+\s*PC$/.test(lines[j]))j++;
    if(!market){i++;continue;}

    const teams=teamToks.filter(t=>t!=='vs'&&t!=='@'&&t.length>=2);
    const gameLabel=teams.length>=2?teams[0]+'/'+teams[teams.length-1]:teams[0]||'';

    let gameTime='',dateStr=getTodayStr();
    const rawTime=Object.entries(timeMap).find(([k])=>teams.some(t=>k.includes(t)));
    if(rawTime){
      const tr=rawTime[1];
      const moN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const dtm=tr.match(/(\d+)\/(\d+)\s+([\d:]+\s*[AP]M)/i);
      const tom=tr.match(/([\d:]+\s*[AP]M)/i);
      if(dtm){const mn=parseInt(dtm[1]),dy=parseInt(dtm[2]);dateStr=new Date().getFullYear()+'-'+String(mn).padStart(2,'0')+'-'+String(dy).padStart(2,'0');gameTime=moN[mn]+'-'+dy+' '+dtm[3];}
      else if(tom){const now=new Date();gameTime=moN[now.getMonth()+1]+'-'+now.getDate()+' '+tom[1];}
    }

    const norm=[];let k=j;
    while(k<lines.length){
      const tok=lines[k];
      if(isPName(tok)&&k>j+1)break;
      const lo=tok.match(/^([ou])([\d.]+)$/);
      const no=(lines[k+1]||'').match(/^\(([+-]\d+)\)$/);
      if(lo&&no){norm.push(tok+'('+no[1]+')');k+=2;}else{norm.push(tok);k++;}
    }

    let bestEV=null,bestOdds=null,bestLine=null,bestSide=null;
    let ni=0;
    while(ni<norm.length){
      const tok=norm[ni];
      const em=tok.match(/^([+-][\d.]+)%$/);
      if(em){
        const ev=parseFloat(em[1]);
        const nx=norm[ni+1]||'';
        const lm=nx.match(/^([ou])([\d.]+)\(([+-]\d+)\)$/);
        if(lm&&ev>0&&bestEV===null){bestEV=ev;bestSide=lm[1].toUpperCase();bestLine=parseFloat(lm[2]);bestOdds=lm[3];}
        if(lm){ni+=2;continue;}
      }
      ni++;
    }
    if(bestEV!==null&&bestEV>0){
      results.push({id:Date.now()+Math.random(),sport:'mlb',player,market,game:gameLabel,gameTime,line:bestLine,side:bestSide,odds:bestOdds,ev:bestEV,proj,date:dateStr,result:'',actual:null,pnl:null,notes:''});
    }
    i=k;
  }
  return results;
}

// ── NBA Parser ─────────────────────────────────────────
function parseNBA(text) {
  const NM={'PTS':'PTS','REB':'REB','AST':'AST','PRA':'PRA','PR':'PR','PA':'PA','RA':'RA','3PM':'3PM','BLK':'BLK','STL':'STL','TO':'TO','BLKST':'BLKST'};
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const results=[];
  const bestIdx=lines.findIndex(l=>l==='Best Line');
  if(bestIdx<0)return results;

  function isPName(s){if(!s||!s.includes(' ')||s.length<4)return false;if(!/^[A-Z]/.test(s))return false;if(/^(FanDuel|DraftKings|ProphetX|BetOnline|Novig|Fliff|Caesars|PointsBet|WynnBET|Unibet|Barstool|Betway)$/i.test(s))return false;return true;}

  const timeMap={};
  for(let k=0;k<bestIdx;k++){
    const m=lines[k].match(/^•\s*([\d:]+\s*[AP]M)$/i);
    if(m){for(let p=k-1;p>=Math.max(0,k-8);p--){if(isPName(lines[p])){timeMap[lines[p].trim()]=m[1].trim();break;}}}
  }

  let i=bestIdx+1;
  while(i<lines.length){
    const l=lines[i];
    if(!isPName(l)){i++;continue;}
    const player=l.trim();
    let j=i+1;
    if(lines[j]===l)j++;
    if(lines[j]&&/^[A-Z][A-Z-]{0,4}$/.test(lines[j])&&lines[j].length<=5)j++;

    let proj=null,market=null;
    while(j<lines.length){
      const tok=lines[j];
      if(/^\d+\.?\d*$/.test(tok)){proj=parseFloat(tok);j++;break;}
      if(isPName(tok)&&tok!==l)break;
      j++;
    }
    if(!market&&lines[j]&&NM[lines[j]]){market=NM[lines[j]];j++;}
    if(lines[j]&&/^\d+\.?\d*\s*mins?$/i.test(lines[j]))j++;
    if(!market&&lines[j]&&NM[lines[j]]){market=NM[lines[j]];j++;}
    if(!market){i++;continue;}

    let gameTime='',dateStr=getTodayStr();
    const rt=timeMap[player];
    if(rt){const now=new Date();const moN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];gameTime=moN[now.getMonth()+1]+'-'+now.getDate()+' '+rt;}

    const norm=[];let k=j;
    while(k<lines.length){
      const tok=lines[k];
      if(isPName(tok)&&k>j+1)break;
      const lo=tok.match(/^([ou])([\d.]+)$/);
      const no=(lines[k+1]||'').match(/^\(([+-]\d+)\)$/);
      if(lo&&no){norm.push(tok+'('+no[1]+')');k+=2;}else{norm.push(tok);k++;}
    }

    let bestEV=null,bestOdds=null,bestLine=null,bestSide=null;
    let ni=0;
    while(ni<norm.length){
      const tok=norm[ni];
      const em=tok.match(/^([+-][\d.]+)%$/);
      if(em){
        const ev=parseFloat(em[1]);
        const nx=norm[ni+1]||'';
        const lm=nx.match(/^([ou])([\d.]+)\(([+-]\d+)\)$/);
        if(lm&&ev>0&&bestEV===null){bestEV=ev;bestSide=lm[1].toUpperCase();bestLine=parseFloat(lm[2]);bestOdds=lm[3];}
        if(lm){ni+=2;continue;}
      }
      ni++;
    }
    if(bestEV!==null&&bestEV>0){
      results.push({id:Date.now()+Math.random(),sport:'nba',player,market,game:'',gameTime,line:bestLine,side:bestSide,odds:bestOdds,ev:bestEV,proj,date:dateStr,result:'',actual:null,pnl:null});
    }
    i=k;
  }
  return results;
}

// ── Parse paste ────────────────────────────────────────
function parsePaste(){
  const text=document.getElementById('pasteBox').value.trim();
  const status=document.getElementById('parseStatus');
  if(!text){status.textContent='Nothing to paste.';return;}
  let detected=sport;
  if(text.includes('Pitcher K')||text.includes('EROuts')||/\d+\.\d+(Outs|BB|ER|K|Hits)/.test(text))detected='mlb';
  else if(text.includes('Points')||text.includes('Rebounds')||/\bPTS\b|\bREB\b|\bAST\b|\bPRA\b/.test(text))detected='nba';
  const newPlays=detected==='mlb'?parseMLB(text):parseNBA(text);
  let added=0;
  newPlays.forEach(p=>{
    const dupe=props.find(t=>t.player===p.player&&t.market===p.market&&t.date===p.date&&t.line===p.line&&t.side===p.side);
    if(!dupe){props.unshift(p);added++;}
  });
  saveState();renderAll();
  if(newPlays.length===0){status.textContent='Parser found 0 plays.';status.className='stxt err';}
  else{status.textContent='Added '+added+' of '+newPlays.length+' plays.';status.className='stxt ok';document.getElementById('pasteBox').value='';}
}

function getFiltered(){
  let f=props.filter(p=>p.sport===sport);

  else if(res)f=f.filter(p=>p.result===res);

}

  const roi=risk>0?(pnl/risk*100).toFixed(1):null;
  const wr=settled.length?(w/settled.length*100).toFixed(1):null;
  document.getElementById('sumBar').innerHTML=
    '<span class="chip"><b>'+sp.length+'</b> plays</span>'+

    '<span class="chip'+(roi&&parseFloat(roi)>=0?' g':' r')+'">'+( roi?(parseFloat(roi)>=0?'+':'')+roi+'%':'—')+' ROI</span>'+
    '<span class="chip">'+sp.filter(p=>!p.result||p.result==='').length+' pending</span>';

  // Daily bar
  const moN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  function dl(d){const m=d?.match(/\d{4}-(\d{2})-(\d{2})/);return m?moN[parseInt(m[1])]+'-'+parseInt(m[2]):d||'?';}
  const dates=[...new Set(sp.map(p=>p.date).filter(Boolean))].sort().reverse();
  if(!dates.length){document.getElementById('dailyBar').innerHTML='';return;}
  window._dd={};
  let bar='<div class="daily">';
  dates.slice(0,5).forEach((d,di)=>{
    const dp=sp.filter(p=>p.date===d);
    const ds=dp.filter(p=>p.result&&p.result!=='');
    const dw=ds.filter(p=>p.result==='win').length,dl2=ds.filter(p=>p.result==='loss').length;
    const dpu=ds.filter(p=>p.result==='push').length;
    const dpnl=ds.reduce((a,p)=>a+(p.pnl||0),0);
    const drisk=ds.reduce((a,p)=>a+uRisk(p),0);
    const droi=drisk>0?(dpnl/drisk*100).toFixed(1)+'%':'—';
    const wr2=ds.length?(dw/ds.length*100).toFixed(1)+'%':'—';
    const pc=dpnl>=0?'var(--green)':'var(--red)';
    window._dd[di]={date:dl(d),dw,dl:dl2,dpu,wr:wr2,pnl:sgn(dpnl),roi:droi,total:dp.length,settled:ds.length,plays:dp.map(p=>({player:p.player,market:p.market,line:p.line,side:p.side,result:p.result,pnl:p.pnl}))};
    bar+='<div class="drow"><span class="ddate">'+dl(d)+'</span><div class="dstats"><span>'+dw+'W '+dl2+'L'+(dpu?' '+dpu+'P':'')+'</span><span>'+wr2+' W%</span><span style="color:'+pc+';font-weight:600">'+sgn(dpnl)+'</span><span>'+dp.length+' plays</span></div><button class="dcopy" onclick="copyDay('+di+')">Copy</button></div>';

function copyDay(di){
  const d=window._dd?.[di];if(!d)return;
  let t='📊 SBK Tracker — '+d.date+'\n'+d.dw+'W '+d.dl+'L | W% '+d.wr+' | P&L '+d.pnl+' | ROI '+d.roi+'\n'+d.total+' plays ('+d.settled+' settled)\n';
  const wins=d.plays.filter(p=>p.result==='win'),losses=d.plays.filter(p=>p.result==='loss'),pend=d.plays.filter(p=>!p.result||p.result==='');
  if(wins.length){t+='\n✅ WINS\n';wins.forEach(p=>{t+='  '+p.player+' '+p.market+' '+p.line+' '+(p.side==='O'?'O':'U')+(p.pnl!=null?' ('+(p.pnl>=0?'+':'')+p.pnl.toFixed(2)+'u)':'')+'\n';});}
  if(losses.length){t+='\n❌ LOSSES\n';losses.forEach(p=>{t+='  '+p.player+' '+p.market+' '+p.line+' '+(p.side==='O'?'O':'U')+(p.pnl!=null?' ('+(p.pnl>=0?'+':'')+p.pnl.toFixed(2)+'u)':'')+'\n';});}
  if(pend.length){t+='\n⏳ PENDING ('+pend.length+')\n';pend.forEach(p=>{t+='  '+p.player+' '+p.market+' '+p.line+' '+(p.side==='O'?'O':'U')+'\n';});}
  navigator.clipboard.writeText(t).then(()=>{}).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
}

function setResult(sel){
  const id=parseFloat(sel.dataset.id);
  const p=props.find(x=>x.id===id);if(!p)return;
  p.result=sel.value;sel.className='rsel '+p.result;
  const odds=parseFloat(p.odds);
  if(p.result==='win')p.pnl=odds>0?odds/100:1;
  else if(p.result==='loss')p.pnl=odds<0?-(Math.abs(odds)/100):-1;
  else if(p.result==='push')p.pnl=0;
  else p.pnl=null;
  const pnlEl=sel.closest('.pr')?.querySelector('.ppnl');
  if(pnlEl){pnlEl.textContent=p.pnl!=null?(p.pnl>=0?'+':'')+p.pnl.toFixed(2)+'u':'';pnlEl.className='ppnl '+(p.pnl>=0?'p':'n');}
  saveState();updateSum();
  if(tab==='dashboard')renderDashboard();
}

// ── Dashboard ──────────────────────────────────────────
function renderDashboard(){
  const el=document.getElementById('body');
  const sp=props.filter(p=>p.sport===sport);
  const settled=sp.filter(p=>p.result&&p.result!=='skip');
  const w=settled.filter(p=>p.result==='win').length,l=settled.filter(p=>p.result==='loss').length,pu=settled.filter(p=>p.result==='push').length;
  const pnl=settled.reduce((a,p)=>a+(p.pnl||0),0);
  const risk=settled.reduce((a,p)=>a+uRisk(p),0);
  const roi=risk>0?(pnl/risk*100).toFixed(1):null;
  const wr=settled.length?(w/settled.length*100).toFixed(1):null;
  const pc=pnl>=0?'var(--green)':'var(--red)';
  const rc=roi&&parseFloat(roi)>=0?'var(--green)':'var(--red)';

  function bk(arr,kFn){
    const g={};arr.forEach(p=>{const k=kFn(p);if(!g[k])g[k]=[];g[k].push(p);});
    return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,a])=>{
      const s=a.filter(p=>p.result&&p.result!=='skip');
      const sw=s.filter(p=>p.result==='win').length,sl=s.filter(p=>p.result==='loss').length;
      const sp2=s.reduce((a,p)=>a+(p.pnl||0),0);
      const sr=s.reduce((a,p)=>a+uRisk(p),0);
      const roi2=sr>0?(sp2/sr*100).toFixed(1)+'%':'—';
      const pc2=sp2>=0?'var(--green)':'var(--red)';
      return '<tr><td>'+k+'</td><td>'+sw+'-'+sl+'</td><td style="color:'+pc2+'">'+(sp2>=0?'+':'')+sp2.toFixed(2)+'u</td><td style="color:'+pc2+'">'+roi2+'</td></tr>';
    }).join('');
  }

  const mkts=[...new Set(sp.map(p=>p.market))].sort();
  const overs=settled.filter(p=>p.side==='O'),unders=settled.filter(p=>p.side==='U');

  const ouCards=mkts.map(m=>{
    const mp=settled.filter(p=>p.market===m);if(!mp.length)return'';
    const os=mp.filter(p=>p.side==='O'),us=mp.filter(p=>p.side==='U');
    const mp2=mp.reduce((a,p)=>a+(p.pnl||0),0);
    const pc3=mp2>=0?'var(--green)':'var(--red)';
    function mr(arr,lbl,col){
      if(!arr.length)return'';
      const w2=arr.filter(p=>p.result==='win').length,l2=arr.filter(p=>p.result==='loss').length;
      const pnl2=arr.reduce((a,p)=>a+(p.pnl||0),0);
      const r2=arr.reduce((a,p)=>a+uRisk(p),0);
      const roi3=r2>0?(pnl2/r2*100).toFixed(1)+'%':'—';
      const pc4=pnl2>=0?'var(--green)':'var(--red)';
      return '<tr><td style="color:'+col+';white-space:nowrap;font-weight:600">'+lbl+'</td><td style="white-space:nowrap">'+w2+'-'+l2+'</td><td style="white-space:nowrap">'+(arr.length?(w2/arr.length*100).toFixed(1):'—')+'%</td><td style="color:'+pc4+';white-space:nowrap">'+(pnl2>=0?'+':'')+pnl2.toFixed(2)+'u</td><td style="color:'+pc4+';white-space:nowrap">'+roi3+'</td></tr>';
    }
    return '<div class="oucard"><div class="ouchdr"><span>'+m+'</span><span style="color:'+pc3+'">'+(mp2>=0?'+':'')+mp2.toFixed(2)+'u</span></div><table><thead><tr><td>Side</td><td>W-L</td><td>W%</td><td>P&L</td><td>ROI</td></tr></thead><tbody>'+mr(os,'Over','var(--green)')+mr(us,'Under','var(--blue)')+'</tbody></table></div>';
  }).join('');

  // Edge buckets
  const EBS=[{l:'1-4%',min:1,max:5},{l:'5-9%',min:5,max:10},{l:'10-14%',min:10,max:15},{l:'15-19%',min:15,max:20},{l:'20%+',min:20,max:999}];
  function ebst(arr){
    const s=arr.filter(p=>p.result&&p.result!=='skip');
    const w2=s.filter(p=>p.result==='win').length,l2=s.filter(p=>p.result==='loss').length;
    const pnl2=s.reduce((a,p)=>a+(p.pnl||0),0);
    const r2=s.reduce((a,p)=>a+uRisk(p),0);
    const pc2=pnl2>=0?'var(--green)':'var(--red)';
    return '<td>'+arr.length+'</td><td>'+w2+'-'+l2+'</td><td>'+(s.length?(w2/s.length*100).toFixed(1):'—')+'%</td><td style="color:'+pc2+'">'+(pnl2>=0?'+':'')+pnl2.toFixed(2)+'u</td><td style="color:'+pc2+'">'+(r2>0?(pnl2/r2*100).toFixed(1)+'%':'—')+'</td>';
  }
  const th='<th>N</th><th>W-L</th><th>W%</th><th>P&L</th><th>ROI</th>';
  const ebRows=EBS.map(b=>{
    const ba=settled.filter(p=>(p.ev||0)>=b.min&&(p.ev||0)<b.max);
    const bo=ba.filter(p=>p.side==='O'),bu=ba.filter(p=>p.side==='U');
    return '<tr style="border-bottom:1px solid var(--b0)"><td style="font-weight:600;color:var(--t0)">'+b.l+'</td>'+ebst(ba)+'<td style="color:var(--green);font-size:10px;padding:0 8px">O</td>'+ebst(bo)+'<td style="color:var(--blue);font-size:10px;padding:0 8px">U</td>'+ebst(bu)+'</tr>';
  }).join('');

  el.innerHTML=
    '<div class="dgrid">'+
      '<div class="dcard"><div class="lbl">Record</div><div class="val">'+w+'W · '+l+'L</div><div class="sub">'+settled.length+' settled · '+sp.filter(p=>!p.result||p.result==='').length+' pending</div></div>'+
      '<div class="dcard"><div class="lbl">Win Rate</div><div class="val">'+(wr?wr+'%':'—')+'</div><div class="sub">settled only</div></div>'+
      '<div class="dcard"><div class="lbl">P&L</div><div class="val" style="color:'+pc+'">'+sgn(pnl)+'</div><div class="sub">units profit/loss</div></div>'+
      '<div class="dcard"><div class="lbl">ROI</div><div class="val" style="color:'+rc+'">'+(roi?(parseFloat(roi)>=0?'+':'')+roi+'%':'—')+'</div><div class="sub">units won ÷ staked</div></div>'+
    '</div>'+
    '<div class="bg2">'+
      '<div><div class="slbl">By Market</div><div class="bwrap"><table class="bkt"><thead><tr><th>Market</th><th>W-L</th><th>P&L</th><th>ROI</th></tr></thead><tbody>'+bk(sp,p=>p.market)+'</tbody></table></div></div>'+
      '<div><div class="slbl">By Direction</div><div class="bwrap"><table class="bkt"><thead><tr><th>Side</th><th>W-L</th><th>P&L</th><th>ROI</th></tr></thead><tbody>'+bk(settled,p=>p.side==='O'?'Over':'Under')+'</tbody></table></div></div>'+
    '</div>'+
    '<div class="slbl">By Market — Over vs Under</div><div class="ougrid">'+ouCards+'</div>'+
    '<div class="slbl">By Edge Bucket — All · Over · Under</div>'+
    '<div class="bwrap" style="overflow-x:auto"><table class="bkt" style="min-width:700px"><thead><tr><th>Bucket</th>'+th+'<th style="color:var(--green)">O</th>'+th+'<th style="color:var(--blue)">U</th>'+th+'</tr></thead><tbody>'+ebRows+'</tbody></table></div>';
}

function repairDates(){
  const mo={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  let n=0;
  props.forEach(p=>{if(p.gameTime){const m=p.gameTime.match(/([A-Za-z]+)-(\d+)/);if(m&&mo[m[1]]){const c=new Date().getFullYear()+'-'+mo[m[1]]+'-'+m[2].padStart(2,'0');if(p.date!==c){p.date=c;n++;}}}});
  if(n){saveState();renderAll();alert('Fixed '+n+' dates.');}else alert('All dates correct.');
}

async function regrade(){
  const sel=document.getElementById('regradeDate');
  const d=sel?.value;
  const status=document.getElementById('gradeStatus');
  if(!d){status.textContent='Pick a re-grade date.';return;}

  let n=0;
  props.forEach(p=>{if(p.sport===sport&&p.date===d&&p.result){p.result='';p.actual=null;p.pnl=null;n++;}});
  saveState();renderAll();
  document.getElementById('gradeDate').value=d;
  await autoGrade();
}

async function autoGrade(){
  const sel=document.getElementById('gradeDate');
  const selectedDate=sel?.value;
  const btn=document.getElementById('gradeBtn');
  const status=document.getElementById('gradeStatus');
  if(!selectedDate){status.textContent='Pick a date.';return;}
  btn.disabled=true;
  if(sport==='nba')await gradeNBA(selectedDate,status);
  else await gradeMLB(selectedDate,status);
  btn.disabled=false;
}

// ── MLB Grader ─────────────────────────────────────────
function buildPlayerLookup(boxscores){
  const lookup={};
  Object.values(boxscores).forEach(bs=>{
    if(!bs.teams)return;
    ['away','home'].forEach(side=>{
      const team=bs.teams[side];
      if(!team?.players)return;
      Object.values(team.players).forEach(player=>{
        const name=player.person?.fullName;
        if(!name)return;
        const norm=normName(name);
        const ps=player.stats?.pitching;
        if(!ps)return;
        const outs=(()=>{const p2=String(ps.inningsPitched||0).split('.');return(parseInt(p2[0])||0)*3+(parseInt(p2[1])||0);})();
        if(outs===0)return;
        lookup[norm]={K:ps.strikeOuts,OUTS:outs,HA:ps.hits,ER:ps.earnedRuns??ps.runs??null,BB:ps.baseOnBalls,IP:ps.inningsPitched};
      });
    });
  });
  return lookup;
}

function findPlayerStat(lookup,name,market){
  const norm=normName(name);
  let entry=lookup[norm];
  if(!entry){const keys=Object.keys(lookup);const k=keys.find(k2=>k2.endsWith(' '+norm.split(' ').slice(-1)[0])||norm.endsWith(' '+k2.split(' ').slice(-1)[0]));if(k)entry=lookup[k];}
  if(!entry)return null;
  const v=entry[market];
  return v!=null?v:null;
}

async function gradeMLB(selectedDate,status){
  status.textContent='Fetching MLB schedule…';status.className='stxt';
  const mo2={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
  const pending=props.filter(p=>p.sport==='mlb'&&(!p.result||p.result==='')&&p.date===selectedDate);
  const datesSet=new Set([selectedDate]);
  pending.forEach(p=>{if(p.gameTime){const gm=p.gameTime.match(/([A-Za-z]+)-(\d+)/);if(gm&&mo2[gm[1]])datesSet.add(new Date().getFullYear()+'-'+mo2[gm[1]]+'-'+gm[2].padStart(2,'0'));}});
  try{
    const allGames=[];
    for(const d of [...datesSet]){
      const r=await fetch('https://statsapi.mlb.com/api/v1/schedule?sportId=1&date='+d);
      const data=await r.json();
      if(data.dates?.[0]?.games)allGames.push(...data.dates[0].games);
    }
    const bs={};
    for(const g of allGames){
      if(g.status.abstractGameState==='Final'){
        try{const r=await fetch('https://statsapi.mlb.com/api/v1/game/'+g.gamePk+'/boxscore');bs[g.gamePk]=await r.json();}catch(e){}
      }
    }
    if(!Object.keys(bs).length){status.textContent='No completed MLB games.';return;}
    const lookup=buildPlayerLookup(bs);
    let graded=0,missed=[];
    props.forEach(p=>{
      if(p.result||p.sport!=='mlb')return;
      let pd=p.date||selectedDate;
      if(p.gameTime){const gm=p.gameTime.match(/([A-Za-z]+)-(\d+)/);if(gm&&mo2[gm[1]])pd=new Date().getFullYear()+'-'+mo2[gm[1]]+'-'+gm[2].padStart(2,'0');}
      if(pd!==selectedDate)return;
      const sv=findPlayerStat(lookup,p.player,p.market);
      if(sv===null){missed.push(p.player+' ('+p.market+')');return;}
      gradeResult(p,sv);graded++;
    });
    saveState();renderAll();
    status.textContent=graded?'Graded '+graded+' MLB props. ✓'+(missed.length?' Not found: '+missed.slice(0,2).join(', '):''):'Graded 0. Not found: '+missed.slice(0,3).join(', ');
    status.className=graded?'stxt ok':'stxt';
  }catch(e){status.textContent='MLB error: '+e.message;status.className='stxt err';}
}

// ── NBA Grader (matches NBA Matrix logic) ──────────────
async function gradeNBA(selectedDate,status){
  const BASE='https://api.balldontlie.io/nba/v1';
  const HDR={'Authorization':'9cdb249f-9635-4cca-a998-37c7b98a9372'};
  const mo2={Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};

  // Build set of ISO dates from pending props
  const pending=props.filter(p=>p.sport==='nba'&&(!p.result||p.result==='')&&p.date===selectedDate);
  const datesSet=new Set([selectedDate]);
  pending.forEach(p=>{
    if(p.gameTime){const gm=p.gameTime.match(/([A-Za-z]+)-(\d+)/);if(gm&&mo2[gm[1]])datesSet.add(new Date().getFullYear()+'-'+mo2[gm[1]]+'-'+gm[2].padStart(2,'0'));}
  });

  try{
    // Fetch all pages of stats for each date (with cursor pagination)
    const lookup={};
    for(const isoDate of [...datesSet]){
      status.textContent='Fetching NBA stats for '+isoDate+'…';
      let cursor=null,page=0;
      while(page<10){
        const url=BASE+'/stats?dates[]='+isoDate+'&per_page=100'+(cursor?'&cursor='+cursor:'');
        const r=await fetch(url,{headers:HDR});
        if(!r.ok)break;
        const data=await r.json();
        (data.data||[]).forEach(s=>{
          if(!s.player)return;
          // DNP check — store min for voiding
          const minRaw=(s.min||'0').toString();
          const mp=minRaw.split(':');
          const minVal=mp.length>1?parseInt(mp[0])+parseInt(mp[1])/60:parseFloat(minRaw);
          const nm=normName((s.player.first_name||'')+' '+(s.player.last_name||''));
          if(!nm)return;
          lookup[nm]={
            PTS:s.pts??0,REB:s.reb??0,AST:s.ast??0,'3PM':s.fg3m??0,
            BLK:s.blk??0,STL:s.stl??0,TO:s.turnover??0,
            PRA:(s.pts??0)+(s.reb??0)+(s.ast??0),
            PR:(s.pts??0)+(s.reb??0),PA:(s.pts??0)+(s.ast??0),
            RA:(s.reb??0)+(s.ast??0),BLKST:(s.blk??0)+(s.stl??0),
            _min:minVal
          };
        });
        page++;
        if(data.meta?.next_cursor)cursor=data.meta.next_cursor;
        else break;
      }
    }

    if(!Object.keys(lookup).length){status.textContent='No NBA stats found — games may not be final yet.';return;}

    let graded=0,voided=0,missed=[];
    props.forEach(p=>{
      if(p.result||p.sport!=='nba')return;
      let pd=p.date||selectedDate;
      if(p.gameTime){const gm=p.gameTime.match(/([A-Za-z]+)-(\d+)/);if(gm&&mo2[gm[1]])pd=new Date().getFullYear()+'-'+mo2[gm[1]]+'-'+gm[2].padStart(2,'0');}
      if(pd!==selectedDate)return;

      const nm=normName(p.player);
      let entry=lookup[nm];
      // Fallback: last name + first initial match
      if(!entry){
        const lastName=nm.split(' ').slice(-1)[0];
        const firstInit=nm[0];
        const k=Object.keys(lookup).find(k2=>k2.endsWith(' '+lastName)&&k2[0]===firstInit);
        if(k)entry=lookup[k];
      }
      if(!entry){missed.push(p.player);return;}

      // DNP void
      if(entry._min<0.5){
        p.result='push';p.pnl=0;p.actual=0;
        voided++;graded++;return;
      }

      const sv=entry[p.market];
      if(sv==null){missed.push(p.player+' ('+p.market+')');return;}
      gradeResult(p,sv);graded++;
    });

    saveState();renderAll();
    let msg=graded?'Graded '+graded+' NBA props. ✓':'Graded 0.';
    if(voided)msg+=' '+voided+' DNP voided.';
    if(missed.length)msg+=' Not found: '+missed.slice(0,3).join(', ');
    status.textContent=msg;
    status.className=graded?'stxt ok':'stxt';
  }catch(e){status.textContent='NBA error: '+e.message;status.className='stxt err';}
}

// ── Export ─────────────────────────────────────────────
function exportXLSX(){
  const sp=props.filter(p=>p.sport===sport);
  if(!sp.length){alert('No plays.');return;}
  const settled=sp.filter(p=>p.result&&p.result!=='skip');
  function st(arr){const s=arr.filter(p=>p.result&&p.result!=='skip');const w=s.filter(p=>p.result==='win').length,l=s.filter(p=>p.result==='loss').length;const pnl=s.reduce((a,p)=>a+(p.pnl||0),0);const r=s.reduce((a,p)=>a+uRisk(p),0);return{w,l,wr:s.length?(w/s.length*100).toFixed(1)+'%':'—',pnl:(pnl>=0?'+':'')+pnl.toFixed(2)+'u',roi:r>0?(pnl/r*100).toFixed(1)+'%':'—',total:arr.length,settled:s.length};}
  function bk(arr,kFn){const g={};arr.forEach(p=>{const k=kFn(p);if(!g[k])g[k]=[];g[k].push(p);});return Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,a])=>{const s=st(a);return[k,s.total,s.w+'-'+s.l,s.wr,s.pnl,s.roi];});}
  const ov=st(sp);const H=['Category','Plays','W-L','W%','P&L','ROI'];
  const sheets=[
    {name:'Summary',rows:[['SBK TRACKER — '+sport.toUpperCase()],['Export',new Date().toLocaleDateString()],[],['OVERALL'],['Plays','Settled','W','L','W%','P&L','ROI'],[ov.total,ov.settled,ov.w,ov.l,ov.wr,ov.pnl,ov.roi],[],['BY MARKET'],H,...bk(sp,p=>p.market),[],['BY DIRECTION'],H,...bk(settled,p=>p.side==='O'?'Over':'Under')]},
    {name:'Bet Log',rows:(()=>{let r=0;const rows=[['#','Date','Player','Market','Line','Side','Odds','EV%','Proj','Actual','Result','P&L','Running P&L']];[...sp].forEach((p,i)=>{r+=(p.pnl||0);rows.push([i+1,p.date||'',p.player,p.market,p.line,p.side,p.odds,p.ev?(p.ev.toFixed(1)+'%'):'',p.proj??'',p.actual??'',p.result?p.result.charAt(0).toUpperCase()+p.result.slice(1):'Pending',p.pnl!=null?(p.pnl>=0?'+':'')+p.pnl.toFixed(2)+'u':'',(r>=0?'+':'')+r.toFixed(2)+'u']);});return rows;})()},
  ];
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function col(i){return i<26?String.fromCharCode(65+i):String.fromCharCode(64+Math.floor(i/26))+String.fromCharCode(65+(i%26));}
  function wsXML(rows){let x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';rows.forEach((r,ri)=>{if(!r?.length)return;x+='<row r="'+(ri+1)+'\">';r.forEach((c,ci)=>{const ref=col(ci)+(ri+1);const v=c==null?'':c;const s=String(v);const n=typeof v==='number'||(s!==''&&!isNaN(Number(s))&&!s.endsWith('%')&&!s.endsWith('u')&&!s.startsWith('+')&&s!=='-'&&s!=='—');if(n)x+='<c r="'+ref+'"><v>'+esc(v)+'</v></c>';else x+='<c r="'+ref+'" t="inlineStr"><is><t>'+esc(v)+'</t></is></c>';});x+='</row>';});return x+'</sheetData></worksheet>';}
  function wbXML(ns){return'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+ns.map((n,i)=>'<sheet name="'+esc(n)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>').join('')+'</sheets></workbook>';}
  function wbRels(n){let x='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">';for(let i=0;i<n;i++)x+='<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';return x+'</Relationships>';}
  const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+sheets.map((_,i)=>'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join('')+'</Types>';
  const rr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  const cT=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;}return t;})();
  function crc(d){let c=0xFFFFFFFF;for(let i=0;i<d.length;i++)c=cT[(c^d[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
  function s2b(s){const b=[];for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048)b.push(0xC0|(c>>6),0x80|(c&0x3F));else b.push(0xE0|(c>>12),0x80|((c>>6)&0x3F),0x80|(c&0x3F));}return new Uint8Array(b);}
  function u16(n){return[n&0xFF,(n>>8)&0xFF];}function u32(n){return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
  function mkzip(files){const ents=[];let off=0;const parts=[];files.forEach(f=>{const nb=s2b(f.name);const cr=crc(f.data);const lh=[0x50,0x4B,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,...u32(cr),...u32(f.data.length),...u32(f.data.length),...u16(nb.length),0x00,0x00,...nb];ents.push({nb,cr,sz:f.data.length,off});parts.push(new Uint8Array(lh),f.data);off+=lh.length+f.data.length;});const cdOff=off;ents.forEach(e=>{const cd=[0x50,0x4B,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,...u32(e.cr),...u32(e.sz),...u32(e.sz),...u16(e.nb.length),0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,...u32(e.off),...e.nb];parts.push(new Uint8Array(cd));off+=cd.length;});const cdSz=off-cdOff;parts.push(new Uint8Array([0x50,0x4B,0x05,0x06,0x00,0x00,0x00,0x00,...u16(ents.length),...u16(ents.length),...u32(cdSz),...u32(cdOff),0x00,0x00]));const tot=parts.reduce((s,p)=>s+p.length,0);const out=new Uint8Array(tot);let pos=0;parts.forEach(p=>{out.set(p,pos);pos+=p.length;});return out;}
  const files=[{name:'[Content_Types].xml',data:s2b(ct)},{name:'_rels/.rels',data:s2b(rr)},{name:'xl/workbook.xml',data:s2b(wbXML(sheets.map(s=>s.name)))},{name:'xl/_rels/workbook.xml.rels',data:s2b(wbRels(sheets.length))},...sheets.map((s,i)=>({name:'xl/worksheets/sheet'+(i+1)+'.xml',data:s2b(wsXML(s.rows))}))];
  const blob=new Blob([mkzip(files)],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='sbk_'+sport+'_'+new Date().toISOString().split('T')[0]+'.xlsx';a.click();URL.revokeObjectURL(a.href);
}
